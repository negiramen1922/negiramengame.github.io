<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
		<title>Abyss Redive ver2.30</title>
		<style>
		:root {
			--bg-dark: #0d0d0d;
			--panel-bg: #1a1a1a;
			--border-color: #333;
			--text-main: #e0e0e0;
			--text-dim: #999;
			--accent-green: #4caf50;
			--accent-blue: #2196f3;
			--accent-purple: #9c27b0;
			--accent-red: #e91e63;
			--gold: #ffc107;
			--hp-color: #ff5252;
			--mp-color: #448aff;
			--exp-color: #9c27b0;
			--transition: all 0.1s ease;
		}
		
		* {
			box-sizing: border-box;
			word-break: break-word;
			overflow-wrap: break-word;
		}

		body {
			background-color: #000;
			color: var(--text-main);
			font-family: "Segoe UI", sans-serif;
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			height: 100dvh;
			overflow: hidden;
		}
		#game-wrapper {
			width: 100%;
			max-width: 1200px;
			height: 100%;
			max-height: 100dvh;
			background-color: var(--bg-dark);
			border: 1px solid var(--border-color);
			display: flex;
			flex-direction: column;
			position: relative;
		}
		header {
			height: auto;
			min-height: 50px;
			background: #151515;
			border-bottom: 1px solid var(--border-color);
			display: flex;
			align-items: center;
			padding: 3px 8px;
			justify-content: space-between;
			flex-shrink: 0;
			flex-wrap: wrap;
			gap: 8px;
		}
		.header-left,
		.header-right {
			display: flex;
			gap: 10px;
			align-items: center;
			flex-wrap: wrap;
		}
		.stat-badge {
			display: flex;
			align-items: center;
			gap: 4px;
			font-weight: bold;
			font-size: 0.9rem;
			cursor: pointer;
			white-space: nowrap;
		}
		#main-container {
			flex: 1;
			display: grid;
			grid-template-columns: 1fr 260px;
			overflow: hidden;
			min-height: 0;
		}
		#viewport {
			padding: 6px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: radial-gradient(circle at center, #1e1e1e 0%, #0d0d0d 100%);
			position: relative;
			overflow-y: auto;
			width: 100%;
		}
		aside {
			background: #111;
			border-left: 1px solid var(--border-color);
			padding: 6px 8px;
			overflow-y: auto;
		}
		#log-area {
			height: 110px;
			flex-shrink: 0;
			background: #050505;
			border-top: 1px solid var(--border-color);
			padding: 10px 20px;
			overflow-y: auto;
			font-family: "Consolas", monospace;
			font-size: 0.9rem;
			cursor: pointer;
			position: relative;
			transition: background 0.2s;
		}
		#log-area:hover {
			background: #080808;
		}
		#log-expand-hint {
			position: absolute;
			bottom: 4px;
			right: 8px;
			font-size: 0.65rem;
			color: #333;
			pointer-events: none;
			user-select: none;
		}
		#log-modal-overlay {
			display: none;
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background: rgba(0,0,0,0.85);
			z-index: 9999;
			align-items: center;
			justify-content: center;
		}
		#log-modal-overlay.active {
			display: flex;
		}
		#log-modal-box {
			background: #0a0a0a;
			border: 1px solid #333;
			border-radius: 12px;
			width: min(90vw, 700px);
			height: min(80vh, 600px);
			display: flex;
			flex-direction: column;
			box-shadow: 0 8px 40px rgba(0,0,0,0.9);
		}
		#log-modal-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 16px;
			border-bottom: 1px solid #222;
			font-size: 0.82rem;
			color: #666;
		}
		#log-modal-content {
			flex: 1;
			overflow-y: auto;
			padding: 10px 16px;
			font-family: "Consolas", monospace;
			font-size: 0.88rem;
		}
		.log-entry {
			margin-bottom: 2px;
			line-height: 1.4;
			border-bottom: 1px solid #111;
		}
		.log-p-atk { color: #fff; }
		.log-e-atk { color: var(--accent-red); }
		.log-crit { color: var(--gold); font-weight: bold; }
		.log-sys { color: #8bc34a; }
		.log-gold { color: var(--gold); }
		.log-red { color: var(--accent-red); }

		button {
			font-family: inherit;
			transition: var(--transition);
			cursor: pointer;
			border: none;
			outline: none;
			white-space: normal;
			line-height: 1.3;
		}
		button:disabled {
			opacity: 0.2;
			cursor: not-allowed;
			filter: grayscale(1);
		}
		
		.btn-icon {
			padding: 10px 14px;
			border-radius: 4px;
			border: 1px solid #444;
			background: #222;
			color: #eee;
			font-size: 0.95rem;
		}
header .btn-icon {
			padding: 8px 10px;
			font-size: 0.85rem;
		}
		.btn-action {
			padding: 16px;
			font-size: clamp(1rem, 4vw, 1.1rem);
			font-weight: bold;
			border-radius: 8px;
			color: white;
			text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
			width: 100%;
			margin-bottom: 0;
			min-height: 54px;
			flex-shrink: 0;
		}		
		.btn-green { background: var(--accent-green); }
		@keyframes tut-pulse-anim {
			0%,100% { box-shadow: 0 0 0 3px #6366f1, 0 0 16px #6366f1aa; }
			50%     { box-shadow: 0 0 0 5px #818cf8, 0 0 32px #818cf8cc; }
		}
		.tut-pulse { animation: tut-pulse-anim 1s ease-in-out infinite !important; }
		#dungeon-ui {
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 100%;
		}
		.btn-blue { background: var(--accent-blue); }
		.btn-purple { background: var(--accent-purple); }
		.btn-red { background: var(--accent-red); }

		.modal-overlay {
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background: rgba(0, 0, 0, 0.9);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 9000;
			padding: 8px 4px;
			box-sizing: border-box;
			overflow-y: auto;
		}
		.modal {
			background: var(--panel-bg);
			border: 1px solid var(--accent-blue);
			padding: 16px 16px 20px;
			width: 98%;
			max-width: 700px;
			border-radius: 12px;
			max-height: 90dvh;
			max-height: 90vh;
			overflow-y: auto;
			margin: auto;
			position: relative;
		}
		.active-turn {
			border-color: var(--accent-green) !important;
			box-shadow: 0 0 15px var(--accent-green);
			transform: translateY(-3px);
		}
		.bar-bg {
			width: 100%;
			height: 8px;
			background: #000;
			border-radius: 3px;
			margin: 4px 0;
			border: 1px solid #333;
			overflow: hidden;
		}
		.bar-fill {
			height: 100%;
			transition: width 0.2s ease;
		}
		.char-card {
			background: #1a1a1a;
			border: 1px solid #333;
			padding: 8px;
			margin-bottom: 10px;
			border-radius: 8px;
		}
		.enemy-container {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			gap: 4px;
			justify-content: center;
			min-height: 80px;
			width: 100%;
			margin-bottom: 6px;
			padding: 6px;
			background: rgba(0,0,0,0.2);
			border-radius: 8px;
			border: 1px solid #222;
			box-sizing: border-box;
		}
		.party-formation-label {
			width: 100%;
			text-align: center;
			font-size: 0.7rem;
			letter-spacing: 0.1em;
			padding-bottom: 2px;
			margin-bottom: 2px;
		}
		.cursor-pointer {
			cursor: pointer;
		}
		.targeting-active {
			animation: pulse-border 1.5s infinite;
		}
		@keyframes pulse-border {
			0% { border-color: #444; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
			70% { border-color: #4caf50; box-shadow: 0 0 10px 5px rgba(76, 175, 80, 0); }
			100% { border-color: #444; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
		}
		.battle-unit-box {
			flex: 1 1 0;
			min-width: 70px;       /* 最低限。スマホで4人でも入る */
			max-width: 180px;
			background: #151515;
			border: 2px solid #333;
			padding: 7px 4px;
			border-radius: 8px;
			text-align: center;
			font-size: 0.78rem;
			box-sizing: border-box;
			word-break: break-word;
			overflow: hidden;
		}
		.party-battle-container {
			display: flex;
			gap: 6px;
			justify-content: center;
			margin-bottom: 10px;
			flex-wrap: nowrap;
			width: 100%;
			overflow: hidden;    /* はみ出し防止 */
			box-sizing: border-box;
		}
		.hidden {
			display: none !important;
		}
		.skill-milestone {
			border: 1px solid #333;
			padding: 8px;
			border-radius: 8px;
			background: #111;
			margin-bottom: 8px;
		}
		.skill-milestone h3 {
			margin: 0 0 8px 0;
			font-size: 0.85rem;
			color: var(--accent-purple);
			border-bottom: 1px solid #222;
		}
		.skill-options {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}
		.skill-card {
			border: 1px solid #444;
			padding: 10px;
			border-radius: 6px;
			text-align: left;
			background: #1a1a1a;
			font-size: 0.8rem;
			position: relative;
		}
		.skill-card b {
			display: block;
			color: #fff;
			margin-bottom: 4px;
			font-size: 0.9rem;
		}
		.skill-card small {
			color: var(--text-dim);
			display: block;
			line-height: 1.3;
		}
		.skill-card.available {
			border-color: var(--accent-blue);
			cursor: pointer;
		}
		.skill-card.available:hover {
			background: #252525;
			border-color: #fff;
		}
		.skill-card.selected {
			border-color: var(--accent-green);
			background: rgba(76, 175, 80, 0.15);
			box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.2);
		}
		.skill-card.locked {
			opacity: 0.3;
			pointer-events: none;
		}

		@media (max-width: 900px) {
			#main-container {
				grid-template-columns: 1fr;
				grid-template-rows: 1fr 35%;
			}
			aside {
				border-left: none;
				border-top: 1px solid var(--border-color);
				padding: 10px;
			}
			.stat-badge {
				font-size: 0.8rem;
			}
			header .btn-icon {
				padding: 5px 8px;
				font-size: 0.8rem;
			}
		}

		@media (max-width: 600px) {
			#log-area {
				height: 120px;
				font-size: 0.85rem;
				padding: 8px 12px;
			}
			.battle-unit-box {
				flex: 1 1 calc(50% - 10px);
				padding: 6px;
				font-size: 0.8rem;
				min-width: 120px;
			}
			.char-card {
				padding: 10px;
			}
			.char-card div[style*="font-size:0.6rem"] {
				font-size: 0.75rem !important;
				line-height: 1.4;
			}
			.skill-options {
				grid-template-columns: 1fr !important;
			}
		}

		@media (max-height: 600px) {
			#log-area {
				height: 70px;
				font-size: 0.78rem;
			}
			.modal {
				max-height: 95vh;
			}
			#viewport {
				padding: 4px;
			}
			.btn-action {
				padding: 8px 10px;
				font-size: 0.82rem;
			}
			.char-card {
				padding: 6px;
			}
		}
		@media (max-width: 480px) {
			.stat-badge { font-size: 0.72rem; gap: 3px; }
			header .btn-icon { padding: 3px 6px; font-size: 0.72rem; }
			#log-area { height: 90px; font-size: 0.78rem; }
			.char-card { padding: 6px; }
			.battle-unit-box { padding: 5px; font-size: 0.75rem; }
		}

		/* ═══ スマホUI最適化 ═══ */
		@media (max-width: 480px) {
			/* モーダル：小画面でパディング最小化 */
			.modal {
				padding: 12px 12px 16px;
				width: 94%;
				max-width: 480px;
				border-radius: 14px;
				margin: auto;
				/* 画面の85%を上限にしてモーダル内スクロール → 閉じるボタンが常に見える */
				max-height: 85dvh;
				max-height: 85vh;
				overflow-y: auto;
				-webkit-overflow-scrolling: touch;
			}
			.modal-overlay {
				align-items: center;
				padding: 12px 0;
				overflow-y: auto;
			}
			/* モーダル内スクロール領域を制限 */
			.modal [style*="max-height:44vh"],
			.modal [style*="max-height:48vh"],
			.modal [style*="max-height:45vh"],
			.modal [style*="max-height:52vh"] {
				max-height: 38dvh !important;
			}
			.modal [style*="max-height:38vh"] {
				max-height: 32dvh !important;
			}
			.modal [style*="max-height:40vh"] {
				max-height: 34dvh !important;
			}
			/* 戦闘：ユニットボックス小型化 */
			.battle-unit-box {
				min-width: 72px !important;
				max-width: 140px !important;
				padding: 4px 3px !important;
				font-size: 0.7rem !important;
			}
			/* 戦闘：前衛後衛が並んでも収まるよう縮小 */
			.party-battle-container,
			.enemy-container {
				gap: 4px !important;
			}
			/* ヘッダーの手動セーブボタンを小さく */
			#btn-manual-save { font-size: 0.7rem; padding: 3px 6px; }
			/* 戦闘ユニット名・HPテキスト省略 */
			.battle-unit-box [style*="font-weight:bold"] {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 100%;
				display: block;
			}
			/* 戦闘スキルメニューのグリッドを1列に */
			#battle-skill-menu {
				grid-template-columns: 1fr !important;
			}
			/* 戦闘ボタンも縮小 */
			#atk-btn, #skl-btn {
				padding: 10px 8px !important;
				font-size: 0.88rem !important;
			}
			/* ログエリア縮小 */
			#log-area { height: 72px; }
		}

		/* 戦闘ユニットボックス：前衛後衛4人 + 敵が全員入るよう動的サイズ */
		.battle-unit-box {
			flex: 1 1 0;
			min-width: 0;
			word-break: break-all;
		}
		.enemy-container {
			flex-wrap: wrap;
		}
		.party-battle-container {
			flex-wrap: nowrap;  /* 前衛後衛は横並び維持、縮小で対応 */
		}

		/* ═══ エンチャントポップアップ ═══ */
		#enchant-popup-overlay {
			position: absolute; top:0; left:0; right:0; bottom:0;
			z-index: 50000;
			background: rgba(0,0,0,0.88);
			display: none;
			align-items: center; justify-content: center;
		}
		#enchant-popup-overlay.active {
			display: flex;
		}
		#enchant-popup-box {
			position: relative;
			width: min(360px, 92vw);
			border-radius: 18px;
			padding: 36px 28px 28px;
			text-align: center;
			border: 2px solid transparent;
		}
		#enchant-popup-box.success {
			background: linear-gradient(160deg, #1c1100, #2e1c00, #1c1000);
			border-color: #d08010;
			box-shadow: 0 0 80px rgba(200,130,10,0.4), 0 0 30px rgba(0,0,0,0.95), inset 0 0 30px rgba(200,130,10,0.05);
		}
		#enchant-popup-box.failure {
			background: linear-gradient(160deg, #0d0d0d, #111, #0d0d0d);
			border-color: #2a2a2a;
			box-shadow: 0 0 40px rgba(0,0,0,0.95);
		}
		.enchant-popup-particles {
			position: absolute; inset: 0;
			pointer-events: none; overflow: hidden; border-radius: 18px;
		}
		@keyframes enchantFloat {
			0%   { transform: translateY(0) scale(1);   opacity: 1; }
			100% { transform: translateY(-90px) scale(0.3); opacity: 0; }
		}
		@keyframes enchantPulse {
			0%,100% { filter: drop-shadow(0 0 8px currentColor); }
			50%     { filter: drop-shadow(0 0 24px currentColor) drop-shadow(0 0 48px currentColor); }
		}
		@keyframes enchantAppear {
			0%   { opacity:0; transform: scale(0.6) translateY(20px); }
			60%  { opacity:1; transform: scale(1.06) translateY(-4px); }
			100% { opacity:1; transform: scale(1) translateY(0); }
		}
		@keyframes enchantShake {
			0%,100% { transform: translateX(0); }
			20%     { transform: translateX(-8px); }
			40%     { transform: translateX(8px); }
			60%     { transform: translateX(-5px); }
			80%     { transform: translateX(5px); }
		}
		.enchant-appear { animation: enchantAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
		.enchant-shake  { animation: enchantShake 0.45s ease; }

		/* ═══ パーティクル・演出システム ═══ */
		#fx-layer {
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			pointer-events: none;
			z-index: 9000;
			overflow: hidden;
		}
		.fx-particle {
			position: absolute;
			border-radius: 50%;
			pointer-events: none;
			animation: fx-float linear forwards;
		}
		@keyframes fx-float {
			0%   { transform: translate(0,0) scale(1); opacity: 1; }
			100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
		}
		.fx-slash {
			position: absolute;
			pointer-events: none;
			animation: fx-slash-anim 0.35s ease-out forwards;
		}
		@keyframes fx-slash-anim {
			0%   { opacity: 1; transform: scaleX(0.3) rotate(var(--rot)); }
			60%  { opacity: 0.9; transform: scaleX(1) rotate(var(--rot)); }
			100% { opacity: 0; transform: scaleX(1.3) rotate(var(--rot)); }
		}
		.fx-burst {
			position: absolute;
			border-radius: 50%;
			pointer-events: none;
			animation: fx-burst-anim 0.4s ease-out forwards;
		}
		@keyframes fx-burst-anim {
			0%   { transform: scale(0.1); opacity: 1; }
			60%  { transform: scale(1); opacity: 0.7; }
			100% { transform: scale(1.6); opacity: 0; }
		}
		.fx-text {
			position: absolute;
			pointer-events: none;
			font-weight: bold;
			text-shadow: 0 0 8px currentColor;
			animation: fx-text-rise 0.9s ease-out forwards;
			white-space: nowrap;
		}
		@keyframes fx-text-rise {
			0%   { transform: translate(-50%, 0) scale(0.8); opacity: 1; }
			30%  { transform: translate(-50%, -18px) scale(1.1); opacity: 1; }
			100% { transform: translate(-50%, -55px) scale(0.9); opacity: 0; }
		}
		.fx-screen-flash {
			position: fixed;
			top:0; left:0; width:100%; height:100%;
			pointer-events: none;
			animation: fx-flash 0.25s ease-out forwards;
		}
		@keyframes fx-flash {
			0%   { opacity: 0.22; }
			100% { opacity: 0; }
		}
		.fx-shake { animation: fx-shake-anim 0.3s ease-out; }
		@keyframes fx-shake-anim {
			0%,100% { transform: translate(0); }
			20%    { transform: translate(-4px, 2px); }
			40%    { transform: translate(4px, -2px); }
			60%    { transform: translate(-3px, 1px); }
			80%    { transform: translate(3px, -1px); }
		}
		.battle-unit-box { transition: box-shadow 0.2s; }
		.fx-hit-glow-red  { box-shadow: 0 0 18px 6px rgba(248,113,113,0.7) !important; }
		.fx-hit-glow-blue { box-shadow: 0 0 18px 6px rgba(96,165,250,0.7) !important; }

						margin-top:18px;padding:11px 36px;border-radius:10px;
						font-size:0.95rem;font-weight:bold;cursor:pointer;
						border:1px solid #444;background:#1a1a1a;color:#888;
						width:100%;transition:background 0.15s,color 0.15s;"

		<script>
		console.log('Game Initialized')

		// ==========================================
		// オーディオシステム (BGM & SE 独立制御)
		// ==========================================
		const AudioContext = window.AudioContext || window.webkitAudioContext;
		let audioCtx = null;
		let masterGain = null;
		let bgmGain   = null;
		let seGain    = null;
		let isBgmMuted = false;
		let isSeMuted  = false;
		let isMuted = false; // 後方互換用（playBGM/playSE内の参照向け）
		let currentBGM = null;
		let bgmNodes = [];
		let bgmInterval = null;

		function initAudio() {
			if(audioCtx) return;
			audioCtx = new AudioContext();
			masterGain = audioCtx.createGain();
			masterGain.gain.value = 1.0;
			masterGain.connect(audioCtx.destination);
			bgmGain = audioCtx.createGain();
			bgmGain.gain.value = isBgmMuted ? 0 : 0.1;
			bgmGain.connect(masterGain);
			seGain = audioCtx.createGain();
			seGain.gain.value = isSeMuted ? 0 : 1.0;
			seGain.connect(masterGain);
		}

		function _applyBgmMute() {
			if (!bgmGain) return;
			bgmGain.gain.value = isBgmMuted ? 0 : 0.1;
		}
		function _applySeМute() {
			if (!seGain) return;
			seGain.gain.value = isSeMuted ? 0 : 1.0;
		}
		function toggleBgmMute() {
			initAudio();
			isBgmMuted = !isBgmMuted;
			_applyBgmMute();
			if (!isBgmMuted && audioCtx.state === 'suspended') audioCtx.resume();
			if (!isBgmMuted && currentBGM) { const s = currentBGM; currentBGM = null; playBGM(s); }
			isMuted = isBgmMuted && isSeMuted;
			_updateSoundButtons();
			try { localStorage.setItem('abyss_bgm_muted', isBgmMuted ? '1' : '0') } catch {}
		}
		function toggleSeMute() {
			initAudio();
			isSeMuted = !isSeMuted;
			_applySeМute();
			if (!isSeMuted && audioCtx.state === 'suspended') audioCtx.resume();
			isMuted = isBgmMuted && isSeMuted;
			_updateSoundButtons();
			try { localStorage.setItem('abyss_se_muted', isSeMuted ? '1' : '0') } catch {}
		}
		function toggleMute() {
			const anyOn = !isBgmMuted || !isSeMuted;
			isBgmMuted = anyOn; isSeMuted = anyOn; isMuted = anyOn;
			_applyBgmMute(); _applySeМute();
			if (!anyOn && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
			if (!isBgmMuted && currentBGM) { const s = currentBGM; currentBGM = null; playBGM(s); }
			_updateSoundButtons();
			try {
				localStorage.setItem('abyss_bgm_muted', isBgmMuted ? '1' : '0')
				localStorage.setItem('abyss_se_muted',  isSeMuted  ? '1' : '0')
			} catch {}
		}
		function _updateSoundButtons() {
			const _bb = document.getElementById('hb-bgm-btn')
			const _sb = document.getElementById('hb-se-btn')
			if (_bb) { _bb.textContent = isBgmMuted ? '🎵 BGM：OFF' : '🎵 BGM：ON'; _bb.style.color = isBgmMuted ? '#666' : '#4ade80'; _bb.style.borderColor = isBgmMuted ? '#333' : '#2a4a2a'; }
			if (_sb) { _sb.textContent = isSeMuted  ? '🔔 効果音：OFF' : '🔔 効果音：ON'; _sb.style.color = isSeMuted ? '#666' : '#60a5fa'; _sb.style.borderColor = isSeMuted ? '#333' : '#1e3a5f'; }
			var _bm = document.getElementById('btn-mute'); if (_bm) _bm.innerText = (isBgmMuted && isSeMuted) ? '🔇' : '🔊'
		}
		;(function _loadSoundPrefs() {
			try {
				isBgmMuted = localStorage.getItem('abyss_bgm_muted') === '1'
				isSeMuted  = localStorage.getItem('abyss_se_muted')  === '1'
				isMuted    = isBgmMuted && isSeMuted
			} catch {}
		})()

		// 画面のどこかをクリックしたらオーディオ再生許可＆クリック音
		document.addEventListener('click', (e) => {
			initAudio();
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume();
			}
			const target = e.target.closest('button, .cursor-pointer, .stat-badge, .skill-card.available');
			if(target && !target.disabled && target.id !== 'btn-mute') {
				playSE('click');
			}
		});

		function playSE(type) {
			if(!audioCtx || isSeMuted) return;
			const t = audioCtx.currentTime;
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.connect(gain);
			gain.connect(seGain);

			if (type === 'click') {
				osc.type = 'sine';
				osc.frequency.setValueAtTime(800, t);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
				osc.start(t);
				osc.stop(t + 0.05);
			} else if (type === 'attack') {
				osc.type = 'square';
				osc.frequency.setValueAtTime(800, t);
				osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
				osc.start(t);
				osc.stop(t + 0.1);
			} else if (type === 'enemy_attack') {
				osc.type = 'sawtooth';
				osc.frequency.setValueAtTime(200, t);
				osc.frequency.linearRampToValueAtTime(50, t + 0.15);
				gain.gain.setValueAtTime(0.5, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.15);
				osc.start(t);
				osc.stop(t + 0.15);
			} else if (type === 'heal' || type === 'item') {
				osc.type = 'sine';
				osc.frequency.setValueAtTime(400, t);
				osc.frequency.linearRampToValueAtTime(800, t + 0.2);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.2);
				osc.start(t);
				osc.stop(t + 0.2);
			} else if (type === 'magic') {
				osc.type = 'sine';
				osc.frequency.setValueAtTime(600, t);
				osc.frequency.linearRampToValueAtTime(1200, t + 0.3);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.3);
				osc.start(t);
				osc.stop(t + 0.3);
			} else if (type === 'debuff') {
				osc.type = 'triangle';
				osc.frequency.setValueAtTime(400, t);
				osc.frequency.linearRampToValueAtTime(100, t + 0.3);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.3);
				osc.start(t);
				osc.stop(t + 0.3);
			} else if (type === 'error') {
				osc.type = 'sawtooth';
				osc.frequency.setValueAtTime(150, t);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.1);
				osc.start(t);
				osc.stop(t + 0.1);
			} else if (type === 'win') {
				[400, 500, 600, 800].forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = 'square';
					o.connect(g);
					g.connect(seGain);
					let startTime = t + i * 0.1;
					o.frequency.setValueAtTime(freq, startTime);
					g.gain.setValueAtTime(0.2, startTime);
					g.gain.linearRampToValueAtTime(0.01, startTime + 0.2);
					o.start(startTime);
					o.stop(startTime + 0.2);
				});
			} else if (type === 'legendary') {
				// ★ レジェンダリー入手：豪華な上昇ファンファーレ
				osc.disconnect(); gain.disconnect(); // 単音oscは使わない
				const notes = [523, 659, 784, 1047, 1319];
				notes.forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = i < 3 ? 'square' : 'sine';
					o.connect(g); g.connect(seGain);
					const st = t + i * 0.13;
					o.frequency.setValueAtTime(freq, st);
					g.gain.setValueAtTime(0.22, st);
					g.gain.exponentialRampToValueAtTime(0.001, st + 0.55);
					o.start(st); o.stop(st + 0.6);
				});
				// 追加：キラキラ高音
				[2093, 2637].forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = 'sine';
					o.connect(g); g.connect(seGain);
					const st = t + 0.55 + i * 0.12;
					o.frequency.setValueAtTime(freq, st);
					g.gain.setValueAtTime(0.15, st);
					g.gain.exponentialRampToValueAtTime(0.001, st + 0.4);
					o.start(st); o.stop(st + 0.45);
				});
			} else if (type === 'unlock') {
				// ★ 鍛冶屋解放：明るい解禁チャイム
				osc.disconnect(); gain.disconnect();
				const unlockNotes = [392, 523, 659, 784];
				unlockNotes.forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = 'sine';
					o.connect(g); g.connect(seGain);
					const st = t + i * 0.18;
					o.frequency.setValueAtTime(freq, st);
					g.gain.setValueAtTime(0.25, st);
					g.gain.exponentialRampToValueAtTime(0.001, st + 0.5);
					o.start(st); o.stop(st + 0.55);
				});
			} else if (type === 'daily') {
				// ★ デイリー受け取り：軽やかなコイン音＋上昇
				osc.disconnect(); gain.disconnect();
				[523, 659, 784, 1047].forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = i % 2 === 0 ? 'triangle' : 'sine';
					o.connect(g); g.connect(seGain);
					const st = t + i * 0.1;
					o.frequency.setValueAtTime(freq, st);
					g.gain.setValueAtTime(0.3, st);
					g.gain.exponentialRampToValueAtTime(0.001, st + 0.35);
					o.start(st); o.stop(st + 0.4);
				});
			}
		}

		function playBGM(scene) {
			if(!audioCtx) initAudio();
			if(currentBGM === scene) return;
			
			stopBGM();
			currentBGM = scene;
			
			if(isBgmMuted) return;

			const t = audioCtx.currentTime;
			
			if(scene === 'town') {
				// ── マイクラ風 落ち着いた町BGM ──
				// C major ペンタトニック: C4 D4 E4 G4 A4 C5 G3
				// ピアノ風音色 = sine + 薄いtriangle倍音
				// 音楽盒風メロディを setInterval でゆっくり鳴らす
				const NOTE = {
					G3:196.00, C4:261.63, D4:293.66, E4:329.63,
					G4:392.00, A4:440.00, C5:523.25, E5:659.25, G5:783.99
				}
				// メロディシーケンス（0=休符）
				const melody = [
					'E4','G4', 0,   'A4','G4', 0,   'E4', 0,
					'C4','D4','E4', 0,   'D4','C4', 0,    0,
					'G3','C4','E4','G4', 0,   'E4','D4', 0,
					'C4', 0,   'D4', 0,   'E4','G4','A4', 0,
					'G4','E4', 0,   'C5', 0,  'A4','G4', 0,
					'E4','G4','A4', 0,   'G4','E4','C4', 0,
				]
				// ベースパッド（持続和音: C major）
				const padFreqs = [65.41, 130.81, 164.81] // C2 C3 E3
				padFreqs.forEach((f, pi) => {
					const osc  = audioCtx.createOscillator()
					const gain = audioCtx.createGain()
					const filt = audioCtx.createBiquadFilter()
					filt.type = 'lowpass'
					filt.frequency.value = 400
					osc.type = 'triangle'
					osc.frequency.value = f
					gain.gain.setValueAtTime(0.001, t)
					gain.gain.linearRampToValueAtTime(pi === 0 ? 0.07 : 0.04, t + 3)
					osc.connect(filt); filt.connect(gain); gain.connect(bgmGain)
					osc.start()
					bgmNodes.push({ osc, gain })
				})
				// 揺らぎLFO（自然な息感）
				const lfoOsc  = audioCtx.createOscillator()
				const lfoGain = audioCtx.createGain()
				lfoOsc.type = 'sine'
				lfoOsc.frequency.value = 0.08
				lfoGain.gain.value = 0.018
				lfoOsc.connect(lfoGain)
				lfoOsc.start()
				bgmNodes.push({ osc: lfoOsc, gain: lfoGain })

				// ピアノ風単音を鳴らすヘルパー
				function playPianoNote(freq, vol) {
					if (isBgmMuted || !audioCtx) return
					const now = audioCtx.currentTime
					const o1 = audioCtx.createOscillator()
					const g1 = audioCtx.createGain()
					o1.type = 'sine'
					o1.frequency.value = freq
					g1.gain.setValueAtTime(vol, now)
					g1.gain.exponentialRampToValueAtTime(vol * 0.3, now + 0.4)
					g1.gain.exponentialRampToValueAtTime(0.0001, now + 1.8)
					o1.connect(g1); g1.connect(bgmGain)
					o1.start(now); o1.stop(now + 1.9)
					const o2 = audioCtx.createOscillator()
					const g2 = audioCtx.createGain()
					o2.type = 'triangle'
					o2.frequency.value = freq * 2
					g2.gain.setValueAtTime(vol * 0.18, now)
					g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.8)
					o2.connect(g2); g2.connect(bgmGain)
					o2.start(now); o2.stop(now + 0.9)
				}

				let mStep = 0
				const BPM_INTERVAL = 480
				bgmInterval = setInterval(() => {
					if (isBgmMuted) return
					const note = melody[mStep % melody.length]
					if (note && NOTE[note]) playPianoNote(NOTE[note], 0.13)
					mStep++
				}, BPM_INTERVAL)
			} else if (scene === 'dungeon') {
				const freqs = [65.41, 73.42];
				freqs.forEach(f => {
					const osc = audioCtx.createOscillator();
					const gain = audioCtx.createGain();
					osc.type = 'triangle';
					osc.frequency.value = f;
					gain.gain.setValueAtTime(0.01, t);
					gain.gain.linearRampToValueAtTime(0.2, t + 2);
					osc.connect(gain);
					gain.connect(bgmGain);
					osc.start();
					bgmNodes.push({osc, gain});
				});
			} else if (scene === 'battle') {
				let step = 0;
				const sequence = [130.81, 130.81, 146.83, 155.56, 130.81, 0, 116.54, 130.81];
				bgmInterval = setInterval(() => {
					if(isBgmMuted) return;
					const freq = sequence[step % sequence.length];
					if(freq > 0) {
						const osc = audioCtx.createOscillator();
						const gain = audioCtx.createGain();
						osc.type = 'square';
						const time = audioCtx.currentTime;
						osc.frequency.setValueAtTime(freq, time);
						gain.gain.setValueAtTime(0.15, time);
						gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
						osc.connect(gain);
						gain.connect(bgmGain);
						osc.start(time);
						osc.stop(time + 0.15);
					}
					step++;
				}, 150);
			}
		}

		function stopBGM() {
			const t = audioCtx ? audioCtx.currentTime : 0;
			bgmNodes.forEach(node => {
				if(node.gain) {
					node.gain.gain.cancelScheduledValues(t);
					node.gain.gain.linearRampToValueAtTime(0.01, t + 0.5);
				}
				setTimeout(() => {
					if(node.osc) node.osc.stop();
					if(node.lfo) node.lfo.stop();
					if(node.osc) node.osc.disconnect();
					if(node.gain) node.gain.disconnect();
				}, 600);
			});
			bgmNodes = [];
			if(bgmInterval) {
				clearInterval(bgmInterval);
				bgmInterval = null;
			}
			currentBGM = null;
		}
		// ==========================================

		const MILESTONES = [2, 5, 7, 10, 12, 15, 17, 20, 25, 30, 33, 35, 38, 40, 43, 45, 48, 50]

		function generateRune() {
			const currentTier = Math.min(5, Math.floor((gameState.maxFloor - 1) / 10) + 1);
			const isPct = Math.random() > 0.5;
            
			// 属性の定義（既存8種＋新4種）
			const elements = [
				{ id: 'fire',        n: '緋',   color: '#e91e63', stat: 'str'         },
				{ id: 'magic',       n: '紫苑', color: '#9c27b0', stat: 'matk'        },
				{ id: 'earth',       n: '琥珀', color: '#ff9800', stat: 'vit'         },
				{ id: 'water',       n: '瑠璃', color: '#2196f3', stat: 'mdef'        },
				{ id: 'life',        n: '翡翠', color: '#4caf50', stat: 'hp'          },
				{ id: 'spirit',      n: '蒼',   color: '#00bcd4', stat: 'mp'          },
				{ id: 'wind',        n: '迅',   color: '#8bc34a', stat: 'agi'         },
				{ id: 'star',        n: '煌',   color: '#ffc107', stat: 'luk'         },
				{ id: 'gold',        n: '財',   color: '#f9a825', stat: 'goldBonus'   },  // ゴールド獲得
				{ id: 'wisdom',      n: '智',   color: '#7c4dff', stat: 'expBonus'    },  // EXP獲得
				{ id: 'slayer',      n: '刃',   color: '#ff5252', stat: 'dmgBonus'    },  // ダメージ増加
				{ id: 'shadow',      n: '影',   color: '#607d8b', stat: 'evaBonus'    },  // 回避率
			];
			const el = elements[Math.floor(Math.random() * elements.length)];

			let targetStat = el.stat;
			// 煌(star)は幸運か会心に分岐
			if (el.id === 'star') {
				targetStat = Math.random() > 0.5 ? 'luk' : 'cri';
			}

			let val = 0;
			let statKey = targetStat;
			let d = '';

			const pctStats = { goldBonus:'G獲得', expBonus:'EXP', dmgBonus:'ダメージ', evaBonus:'回避率' };

			if (targetStat === 'cri') {
				val = Math.floor(Math.random() * 5 + 1) + currentTier * 2;
				d = `会心+${val}%`;
				val = val / 100;
			} else if (pctStats[targetStat]) {
				// 新属性：常に%値
				val = Math.floor(Math.random() * 3 + 1) + currentTier;
				statKey = targetStat;
				d = `${pctStats[targetStat]}+${val}%`;
			} else {
				const statNameMap = {str:'物攻', matk:'特攻', vit:'物耐', mdef:'特耐', agi:'速度', luk:'幸運', hp:'HP', mp:'MP'};
				if (isPct) {
					val = Math.floor(Math.random() * 3 + 1) + currentTier * 2;
					statKey = targetStat + 'Pct';
					d = `${statNameMap[targetStat]} ${val}%UP`;
				} else {
					let base = Math.floor(Math.random() * 20) + 10;
					if (targetStat === 'hp') base *= 5;
					if (targetStat === 'mp') base *= 2;
					val = base * (currentTier * currentTier);
					d = `${statNameMap[targetStat]} +${val}`;
				}
			}

			let rune = { id: 'r_' + Date.now() + Math.random(), n: `${el.n}のルーン`, d: d, type: 'rune', element: el.id, color: el.color, s: {}, locked: false };
			rune.s[statKey] = val;
			return applyRarity(rune);
		}

			{ tier: 'Elite',  rate: 0.10, color: '#60a5fa', labelColor: '#1e3a5f' },
			{ tier: 'Rare',   rate: 0.04, color: '#c084fc', labelColor: '#3b1f5e' },
			{ tier: 'Legend', rate: 0.01, color: '#fb923c', labelColor: '#5e2a0a' },
		]
		// 二つ名個数の確率（累積）
		const TITLE_COUNT_TABLE = [
			{ count: 3, cumRate: 0.01 },
			{ count: 2, cumRate: 0.08 },
			{ count: 1, cumRate: 0.28 },
		]
		const ELITE_TRAITS = {
			Elite: [
				{ title: '剛腕の',   apply: e => { e.atk  = Math.floor(e.atk  * 1.40) },                              desc: '物理攻撃+40%' },

				{ title: '金剛の',   apply: e => { e.def  = Math.floor(e.def  * 1.40); e.mdef = Math.floor(e.mdef * 1.40) }, desc: '防御+40%' },
				{ title: '迅速な',   apply: e => { e.agi  = Math.floor(e.agi  * 1.50) },                              desc: '速度+50%' },
				{ title: '巨躯の',   apply: e => { const bonus = Math.floor(e.maxHp * 0.60); e.hp += bonus; e.maxHp += bonus }, desc: 'HP+60%' },
			],
			Rare: [
				{ title: '不壊の',    apply: e => { const bonus = Math.floor(e.maxHp * 0.40); e.hp += bonus; e.maxHp += bonus; e._regenPct = 0.05 }, desc: 'HP+40%・毎ターン回復5%', onTurnStart: e => { e.hp = Math.min(e.maxHp, e.hp + Math.floor(e.maxHp * 0.05)) } },
				{ title: '復讐する', apply: e => { e._reflectChance = 0.20; e._reflectPct = 0.30 },               desc: '被ダメ時20%で30%反射' },
				{ title: '呪われし', apply: e => { e._poisonOnHit = true },                                         desc: '攻撃時毒付与' },

			],
		}

		function rollEliteTier() {
			const r = Math.random()
			let cum = 0
			for (const t of ELITE_TIERS) {
				cum += t.rate
				if (r < cum) return t
			}
			return null
		}

		function applyEliteTraits(e) {
			const tierObj = rollEliteTier()
			if (!tierObj) return e

			// 二つ名個数を決定
			let count = 0
			const cr = Math.random()
			for (const row of TITLE_COUNT_TABLE) {
				if (cr < row.cumRate) { count = row.count; break }
			}
			if (count === 0) count = 1

			// 特性プールからランダムに count 個選ぶ（重複なし）
			const pool = [...(ELITE_TRAITS[tierObj.tier] || [])]
			const chosen = []
			while (chosen.length < count && pool.length > 0) {
				const idx = Math.floor(Math.random() * pool.length)
				chosen.push(pool.splice(idx, 1)[0])
			}
			if (chosen.length === 0) return e

			// 特性を適用
			chosen.forEach(tr => tr.apply(e))

			// 名前に二つ名を付加
			const titleStr = chosen.map(tr => tr.title).join('')
			e.name = titleStr + e.name
			e.eliteTier   = tierObj.tier
			e.eliteColor  = tierObj.color
			e.eliteLabelBg = tierObj.labelColor
			e.eliteTraits  = chosen
			e._isElite     = true

			// HP等の再整合
			if (e.hp > e.maxHp) e.maxHp = e.hp

			return e
		}

		function rollEnchant(itemType) {
			const r = Math.random()
			let level
			if      (r < 0.10) level = 0
			else if (r < 0.60) level = 1
			else if (r < 0.90) level = 2
			else               level = 3
			if (level === 0) return null
			const cat = (itemType === 'weapon') ? 'weapon' : 'armor'
			const pool = ENCHANT_DATA[cat]
			const chosen = pool[Math.floor(Math.random() * pool.length)]
			const levelData = chosen.levels[level - 1]
			return { id: chosen.id, level, val: levelData.val, name: levelData.name, icon: chosen.icon }
		}

		function getEnchantCost(tier) {
			if (!tier || tier <= 2) return 1000
			if (tier <= 4) return 5000
			if (tier <= 6) return 20000
			return 100000
		}

		// サブステータスのリロールコスト（レアリティ × Tier）
		function getSubRerollCost(item) {
			const tierMul = { 1: 1, 2: 2, 3: 4, 4: 8, 5: 16 }[item.tier || 1] || 1
			const rarityBase = {
				'アンコモン':  500,
				'レア':        2000,
				'エピック':    8000,
				'レジェンダリー': 30000,
			}[item.rarityLabel] || 0
			if (rarityBase === 0) return 0  // コモンはサブなし
			return rarityBase * tierMul
		}

		// サブステータスの数（レアリティから決定）
		function getSubCount(rarityLabel) {
			return { 'アンコモン': 1, 'レア': 2, 'エピック': 3, 'レジェンダリー': 4 }[rarityLabel] || 0
		}

		// サブステータスを再生成して item.subEffects を書き換える
		function rerollSubEffects(item) {
			const count = getSubCount(item.rarityLabel)
			if (count === 0) return
			const used = new Set()
			const newSubs = []
			let tries = 0
			while (newSubs.length < count && tries < 50) {
				tries++
				const sub = GLOBAL_SUB_POOL[Math.floor(Math.random() * GLOBAL_SUB_POOL.length)]
				if (used.has(sub.k)) continue
				used.add(sub.k)
				const v = sub.isCri
					? (sub.min + Math.floor(Math.random() * (sub.max - sub.min + 1))) * 0.01
					: sub.min + Math.floor(Math.random() * (sub.max - sub.min + 1))
				newSubs.push({ n: sub.n, k: sub.k, v })
			}
			item.subEffects = newSubs
		}

		// executeSubReroll: インベントリidxのアイテムのサブステを再抽選
		function executeSubReroll(idx, filterType = 'all') {
			const item = gameState.inventory[idx]
			if (!item) return
			const cost = getSubRerollCost(item)
			if (cost === 0) { showMsg('このレアリティはサブステータスがありません'); return }
			if (gameState.gold < cost) {
				showMsg(`ゴールドが不足しています（必要: ${cost.toLocaleString()}G）`)
				playSE('error')
				return
			}
			const prevSubs = (item.subEffects || []).map(s => ({ ...s }))
			gameState.gold -= cost
			rerollSubEffects(item)
			save_game()
			playSE('enchant_success')
			addLog(`🎲 ${item.n} のサブステータスをリロール！ (${cost.toLocaleString()}G)`, 'log-gold')
			showSubRerollResult(item, prevSubs, cost, idx, filterType)
		}

		const _SUB_PCT_KEYS = new Set(['goldBonus','expBonus','criMult','physPierce','magicPierce','dmgBonus','mpCostReduce','evaBonus'])
		// サブステータス1件の表示文字列を返す
		function _fmtSub(e) {
			if (e.k === 'cri') return e.n + '+' + (e.v * 100).toFixed(0) + '%'
			if (_SUB_PCT_KEYS.has(e.k)) return e.n + '+' + e.v + '%'
			return e.n + '+' + e.v
		}

			const r = Math.random()

			const fl = gameState.maxFloor

			} else {
				if (r < 0.45) { rarity = { label: 'コモン',     color: '#ffffff', mul: 1.0 }; subCount = 0 }
				else if (r < 0.75) { rarity = { label: 'アンコモン', color: '#4caf50', mul: 1.15 }; subCount = 1 }
				else           { rarity = { label: 'レア',       color: '#2196f3', mul: 1.4 }; subCount = 2 }
			}
			item.rarityLabel = rarity.label
			item.rarityColor = rarity.color
			if (item.s) {
				for (let k in item.s) {
					if (typeof item.s[k] === 'number' && k !== 'cap' && k !== 'cri') {
						item.s[k] = Math.floor(item.s[k] * rarity.mul)
					}
				}
			}
			item.subEffects = []
			const SUB_POOL = [
				{ n: 'HP+', k: 'maxHp', min: 5, max: 40 },
				{ n: 'MP+', k: 'maxMp', min: 3, max: 20 },
				{ n: 'ATK+', k: 'str', min: 2, max: 15 },
				{ n: 'MATK+', k: 'matk', min: 2, max: 15 },
				{ n: 'DEF+', k: 'vit', min: 2, max: 10 },
				{ n: 'AGI+', k: 'agi', min: 1, max: 8 },
			]
			for (let i = 0; i < subCount; i++) {
				const sub = SUB_POOL[Math.floor(Math.random() * SUB_POOL.length)]
				const val = sub.min + Math.floor(Math.random() * (sub.max - sub.min + 1))
				if (!item.subEffects.find(e => e.k === sub.k)) item.subEffects.push({ n: sub.n, k: sub.k, v: val })
			}
			return item
		}

				} else {
					console.warn('Job data not found for character:', p)
					return { maxHp: 100, maxMp: 10, str: 10, matk: 5, vit: 5, mdef: 5, agi: 5, luk: 5, cri: 0.05, multiplier: 1.0 }
				}
			}
			let lvMod = (p.lv ?? 1) - 1
			let fs = {
				maxHp: Math.floor(job.base.hp + job.grow.hp * lvMod),
				maxMp: Math.floor(job.base.mp + job.grow.mp * lvMod),
				str: job.base.str + job.grow.str * lvMod,
				matk: job.base.matk + job.grow.matk * lvMod,
				vit: job.base.vit + job.grow.vit * lvMod,
				mdef: job.base.mdef + job.grow.mdef * lvMod,
				agi: job.base.agi + job.grow.agi * lvMod,
				luk: job.base.luk + job.grow.luk * lvMod,
				cri: job.base.cri + job.grow.cri * lvMod,
				multiplier: 1.0,
			}

			const applySubEffects = (item) => {
				if (!item || !item.subEffects) return;
				item.subEffects.forEach(eff => {
					let key = eff.k;
					if (key === 'hp') key = 'maxHp';
					if (key === 'mp') key = 'maxMp';
					// 通常ステータス
					if (fs[key] !== undefined) { fs[key] += eff.v; return; }
					// 特殊サブステータス（fs._xxx に集積）
					if (key === 'goldBonus')    { fs._goldBonus    = (fs._goldBonus    || 0) + eff.v; return; }
					if (key === 'expBonus')     { fs._expBonus     = (fs._expBonus     || 0) + eff.v; return; }
					if (key === 'criMult')      { fs._criMultBonus = (fs._criMultBonus || 0) + eff.v; return; }
					if (key === 'physPierce')   { fs._physPierce   = (fs._physPierce   || 0) + eff.v; return; }
					if (key === 'magicPierce')  { fs._magicPierce  = (fs._magicPierce  || 0) + eff.v; return; }
					if (key === 'dmgBonus')     { fs._dmgBonus     = (fs._dmgBonus     || 0) + eff.v; return; }
					if (key === 'mpCostReduce') { fs._mpCostReduce = (fs._mpCostReduce || 0) + eff.v; return; }
					if (key === 'evaBonus')     { fs._evaBonus     = (fs._evaBonus     || 0) + eff.v; return; }
				});
			};

			// ════════════════════════════════════════════════════════════
			// ver2.4 ステータス算出順序（仕様書準拠）
			// STEP1: 基礎値 + 装備フラット加算 + パッシブ加算
			// STEP2: 装備%UP + ルーン%UP（合算して一括乗算）
			// STEP3: ルーンセット効果（乗算）
			// STEP4: バフ倍率（battle.buffsで乗算）
			// ════════════════════════════════════════════════════════════

			// ── STEP1: 装備フラット加算 + 武器倍率 ──
			// mp/hp キーを maxMp/maxHp にマッピングするヘルパー
			const _mapKey = k => k === 'mp' ? 'maxMp' : k === 'hp' ? 'maxHp' : k
			if (p.equip.weapon) {
				for (let k in p.equip.weapon.s) {
					if (!k.endsWith('Pct')) { const mk = _mapKey(k); fs[mk] = (fs[mk] || 0) + p.equip.weapon.s[k] }
				}
				fs.multiplier = p.equip.weapon.m || 1.0
				applySubEffects(p.equip.weapon)
			}
			if (p.equip.armor) {
				for (let k in p.equip.armor.s) {
					if (!k.endsWith('Pct')) { const mk = _mapKey(k); fs[mk] = (fs[mk] || 0) + p.equip.armor.s[k] }
				}
				applySubEffects(p.equip.armor)
			}
			// アクセサリー：フラット加算のみ（%UPはSTEP2へ）
			gameState.party.forEach(m => {
				if (m.equip && m.equip.acc && m.equip.acc.s) {
					for (let k in m.equip.acc.s) {
						if (k === 'cap' || k.endsWith('Pct')) continue
						const mk = _mapKey(k); fs[mk] = (fs[mk] || 0) + m.equip.acc.s[k]
					}
					applySubEffects(m.equip.acc)
				}
			})
			// ルーン：フラット加算のみ（%UPはSTEP2へ）
			if (p.equip && p.equip.runes) {
				p.equip.runes.forEach(rune => {
					if (rune.s) {
						for (let k in rune.s) {
							if (k.endsWith('Pct')) continue
							if (k === 'hp') fs.maxHp += rune.s[k]
							else if (k === 'mp') fs.maxMp += rune.s[k]
							else fs[k] = (fs[k] || 0) + rune.s[k]
						}
					}
					applySubEffects(rune)
				})
			}
			// パッシブスキル加算
			for (let lv in p.learnedSkills) {
				const sIdx = p.learnedSkills[lv]
				const skill = job.skills[lv][sIdx]
				if (skill.type === 'passive') {
					if (skill.stat === 'hp') fs.maxHp += skill.val
					else if (skill.stat === 'mp') fs.maxMp += skill.val
					else fs[skill.stat] += skill.val
				}
			}

			// ── STEP2: 装備%UP + ルーン%UP を合算して一括乗算 ──
			// pctBonus[stat] = 合計%（例: strPct:10 + strPct:5 → 15%UP）
			const pctBonus = {}
			const _addPct = (s, val) => { pctBonus[s] = (pctBonus[s] || 0) + val }
			const _resolvePctKey = k => {
				let s = k.slice(0, -3) // 'strPct' → 'str'
				if (s === 'hp') s = 'maxHp'
				if (s === 'mp') s = 'maxMp'
				return s
			}
			// 装備（武器・防具）の%UP
			;[p.equip.weapon, p.equip.armor].forEach(item => {
				if (!item || !item.s) return
				for (let k in item.s) {
					if (k.endsWith('Pct')) _addPct(_resolvePctKey(k), item.s[k])
				}
			})
			// アクセサリーの%UP
			gameState.party.forEach(m => {
				if (m.equip && m.equip.acc && m.equip.acc.s) {
					for (let k in m.equip.acc.s) {
						if (k.endsWith('Pct')) _addPct(_resolvePctKey(k), m.equip.acc.s[k])
					}
				}
			})
			// ルーンの%UP
			if (p.equip && p.equip.runes) {
				p.equip.runes.forEach(rune => {
					if (!rune.s) return
					for (let k in rune.s) {
						if (k.endsWith('Pct')) _addPct(_resolvePctKey(k), rune.s[k])
					}
				})
			}
			// 合算%を一括で乗算
			for (let stat in pctBonus) {
				if (fs[stat] !== undefined) {
					fs[stat] = Math.floor(fs[stat] * (1 + pctBonus[stat] / 100))
				}
			}

			// ── STEP3: ルーンセット効果（乗算）──
			if (p.equip && p.equip.runes) {
				const counts = { fire:0, magic:0, earth:0, water:0, life:0, spirit:0, wind:0, star:0, ice:0 }
				p.equip.runes.forEach(r => { if (counts[r.element] !== undefined) counts[r.element]++ })
				if (counts.fire   >= 3) fs.str   = Math.floor(fs.str   * 1.15)
				if (counts.magic  >= 3) fs.matk  = Math.floor(fs.matk  * 1.15)
				if (counts.earth  >= 3) fs.vit   = Math.floor(fs.vit   * 1.15)
				if (counts.water  >= 3) fs.mdef  = Math.floor(fs.mdef  * 1.15)
				if (counts.life   >= 3) fs.maxHp = Math.floor(fs.maxHp * 1.20)
				if (counts.spirit >= 3 || counts.ice >= 3) fs.maxMp = Math.floor(fs.maxMp * 1.20)
				if (counts.wind   >= 3) fs.agi   = Math.floor(fs.agi   * 1.15)
				if (counts.star   >= 3) { fs.luk = Math.floor(fs.luk * 1.20); fs.cri += 0.05 }
			}
			battle.buffs
				.filter(b => b.pIdx === gameState.party.indexOf(p))
				.forEach(b => {
					if (b.stat === 'cri') { fs.cri += (b.val || 0); return }
					if (fs[b.stat] !== undefined) {
						if (b.val >= 1) fs[b.stat] += b.val
						else fs[b.stat] = Math.floor(fs[b.stat] * (1 + b.val))
					}
				})
			fs.cri = Math.min(fs.cri, 0.5)
			// ── エンチャント属性をfsに付加（バトル用） ──
			const _wEnch = p.equip && p.equip.weapon && p.equip.weapon.enchant ? p.equip.weapon.enchant : null
			const _aEnch = p.equip && p.equip.armor  && p.equip.armor.enchant  ? p.equip.armor.enchant  : null
			if (_wEnch) {
				if (_wEnch.id === 'pierce')  fs._enchantPierce  = _wEnch.val
				if (_wEnch.id === 'lethal')  fs._enchantLethal  = _wEnch.val
				if (_wEnch.id === 'vampire') fs._enchantVampire = _wEnch.val
				if (_wEnch.id === 'double')  fs._enchantDouble  = _wEnch.val
				if (_wEnch.id === 'giant')   fs._enchantGiant   = _wEnch.val
			}
			if (_aEnch) {
				if (_aEnch.id === 'resist')   fs._enchantResist   = _aEnch.val
				if (_aEnch.id === 'reflect')  fs._enchantReflect  = _aEnch.val
				if (_aEnch.id === 'regen')    fs._enchantRegen    = _aEnch.val
				if (_aEnch.id === 'barrier')  fs._enchantBarrier  = _aEnch.val
				if (_aEnch.id === 'tenacity') fs._enchantTenacity = _aEnch.val
			}
			// ── STEP5: タレント（always / front_row / back_row）──
			const _pTalents = p.talents || {}
			Object.values(_pTalents).forEach(t => {
				if (!t || !t.effect) return
				const eff = t.effect
				if (t.trigger === 'always') {
					// criBonus
					if (eff.criBonus) fs.cri = Math.min(0.75, fs.cri + eff.criBonus)
					// magicDmgBonus / dmgBonus は戦闘時に参照するため _talentDmgBonus に格納
					if (eff.magicDmgBonus) fs._talentMagicDmg = (fs._talentMagicDmg||0) + eff.magicDmgBonus
					if (eff.dmgBonus) fs._talentDmgBonus = (fs._talentDmgBonus||0) + eff.dmgBonus
					if (eff.mpCostReduction) fs._mpCostReduce = (fs._mpCostReduce||0) + eff.mpCostReduction
					if (eff.criMultBonus) fs._criMultBonus = (fs._criMultBonus||0) + eff.criMultBonus
					if (eff.extraHitOnMulti) fs._extraHit = (fs._extraHit||0) + eff.extraHitOnMulti
					if (eff.itemHealBonus) fs._itemHealBonus = eff.itemHealBonus
				} else if (t.trigger === 'front_row' && p.row === 'front') {
					if (eff.stat && eff.buffPct) {
						if (eff.stat === 'mdef') fs.mdef = Math.floor(fs.mdef * (1 + eff.buffPct))
						else if (eff.stat === 'str') fs.str = Math.floor(fs.str * (1 + eff.buffPct))
						else if (eff.stat === 'vit') fs.vit = Math.floor(fs.vit * (1 + eff.buffPct))
					}
					if (eff.magicDmgBonus) fs._talentMagicDmg = (fs._talentMagicDmg||0) + eff.magicDmgBonus
				} else if (t.trigger === 'back_row' && p.row === 'back') {
					if (eff.dmgBonus) fs._talentDmgBonus = (fs._talentDmgBonus||0) + eff.dmgBonus
				} else if (t.trigger === 'mp_above') {
					// mp_above: MP残量チェック（戦闘中のみ有効）
					if (battle && battle.active && p.mp >= (p.maxMp||100) * (t.threshold||0.5)) {
						if (eff.magicDmgBonus) fs._talentMagicDmg = (fs._talentMagicDmg||0) + eff.magicDmgBonus
					}
				}
			})
			fs.cri = Math.min(fs.cri, 0.75)
			return fs
		}

		function getMaxCapacity() {
			let base = 15
			// 全キャラのLv÷5の合計（1キャラ5Lvごとに+1枠）
			gameState.party.forEach(p => {
				base += Math.floor(p.lv / 5)
			})
			// アクセサリーのカバン拡張
			gameState.party.forEach(p => {
				if (p.equip && p.equip.acc && p.equip.acc.s && p.equip.acc.s.cap) {
					base += p.equip.acc.s.cap
				}
			})
			// ゴールドで購入した拡張枠
			base += gameState.bagExpansion ?? 0
			return base
		}

		function getBagCapBreakdown() {
			const base = 15
			let lvBonus = 0
			gameState.party.forEach(p => { lvBonus += Math.floor(p.lv / 5) })
			let accBonus = 0
			gameState.party.forEach(p => {
				if (p.equip?.acc?.s?.cap) accBonus += p.equip.acc.s.cap
			})
			const expand = gameState.bagExpansion ?? 0
			return { base, lvBonus, accBonus, expand, total: base + lvBonus + accBonus + expand }
		}

		// ═══ 回避率計算 ═══════════════════════════════════════════════
		// 回避率(%) = 5 + (防御側agi - 攻撃側agi)×0.2 + (防御側luk - 攻撃側luk)×0.1
		// 上限35%、下限0%
		function calcEvasion(atkAgi, atkLuk, defAgi, defLuk, evaBonus = 0) {
			const rate = 5 + (defAgi - atkAgi) * 0.2 + (defLuk - atkLuk) * 0.1
			const capped = Math.min(35, Math.max(0, rate))
			return Math.min(1, (capped + evaBonus) / 100)
		}
		// 回避判定 → true:回避成功
		function rollEvasion(atkAgi, atkLuk, defAgi, defLuk, evaBonus = 0) {
			return Math.random() < calcEvasion(atkAgi, atkLuk, defAgi, defLuk, evaBonus)
		}

				function calcTacticalDamage(attackerStats, defenderDef, defenderMDef, lv, isEnemy = false, dType = 'physical') {
			// ════════════════════════════════════════════════════════════
			// ver2.4 ダメージ計算式
			//
			// 【攻撃力】
			//   attackerStats.str / .matk
			//   = (基礎値 + 装備加算 + パッシブ加算)
			//     × (装備%UP + ルーン%UP)    ← getFinalStats内でPct系加算済み
			//     × ルーンセット効果           ← getFinalStats内で乗算済み
			//     × バフ倍率                   ← getFinalStats内でbuffs適用済み
			//     × スキル倍率(s.pow)          ← スキル呼び出し側で乗算済み
			//   × 武器倍率(multiplier)         ← calcTacticalDamage内で乗算
			//
			// 【防御力】
			//   defenderDef / defenderMDef
			//   = 敵の vit / mdef（バフ込みで渡される）
			//   × デバフ減衰率                 ← enemyDebuffsで軽減
			//   × 防御緩和量（貫通エンチャント） ← pierce で軽減
			//
			// 【ダメージ式】
			//   damage = (finalAtk × 0.5) - (finalDef × 0.25)
			//            + 最低保証(finalAtk × 5%)
			// ════════════════════════════════════════════════════════════

			// ── ① 最終防御力の算出 ──
			let finalDef = dType === 'physical' ? defenderDef : defenderMDef

			if (!isEnemy) {
				// デバフ減衰率
				battle.enemyDebuffs.forEach(d => {
					const matchesDef = (dType === 'physical' && (d.stat === 'def' || d.stat === 'vit'))
					                || (dType === 'magic'    && (d.stat === 'mdef'))
					if (!matchesDef) return
					finalDef = d.val >= 1
						? Math.max(0, finalDef - d.val)
						: Math.floor(finalDef * (1 - d.val))
				})
				// エンチャント貫通（防御を%無視）
				if (attackerStats._enchantPierce) {
					finalDef = Math.floor(finalDef * (1 - attackerStats._enchantPierce))
				}
				// サブステータス・ルーン貫通（物理/特殊別）
				const _subPierce = dType === 'physical'
					? (attackerStats._physPierce || 0)
					: (attackerStats._magicPierce || 0)
				if (_subPierce > 0) {
					finalDef = Math.floor(finalDef * (1 - _subPierce / 100))
				}
			}
			finalDef = Math.max(0, finalDef)

			// ── ② 最終攻撃力の算出 ──
			const atkStat = dType === 'magic' ? attackerStats.matk : attackerStats.str
			const finalAtk = atkStat * (attackerStats.multiplier || 1.0)

			// ── ③ ダメージ計算 ──
			const minGuarantee = Math.max(1, Math.floor(finalAtk * 0.05))
			const rawDamage    = (finalAtk * 0.5) - (finalDef * 0.25)
			let baseDamage     = Math.max(minGuarantee, rawDamage)

			// ── ④ 会心判定 ──
			// 会心倍率：1.6 + エンチャント加算 + サブステ/ルーン会心威力(%)
			const isCrit   = Math.random() < (attackerStats.cri || 0)
			const _criMultBonus = !isEnemy ? ((attackerStats._criMultBonus || 0) / 100) : 0
			const critMult = 1.6 + (attackerStats._enchantLethal || 0) + _criMultBonus
			let damage     = isCrit ? baseDamage * critMult : baseDamage

			// ── ⑤ 最終ダメージボーナス（サブステ/ルーン） ──
			if (!isEnemy && attackerStats._dmgBonus) {
				damage = damage * (1 + attackerStats._dmgBonus / 100)
			}
			// タレント由来のダメージボーナス
			if (!isEnemy && attackerStats._talentDmgBonus) {
				damage = damage * (1 + attackerStats._talentDmgBonus)
			}

			// ── ⑥ ブレ補正 ±10% ──
			const finalDamage = Math.floor(damage * (0.9 + Math.random() * 0.2))

			return { val: Math.max(minGuarantee, finalDamage), crit: isCrit }
		}

		// ─── セーブトースト制御 ───
		let _saveToastTimer = null
		function showSaveToast(msg = 'セーブ完了', isError = false) {
			const toast = document.getElementById('save-toast')
			const msgEl = document.getElementById('save-toast-msg')
			const icon  = toast ? toast.querySelector('.save-icon') : null
			if (!toast) return
			if (msgEl) msgEl.textContent = msg
			if (icon) icon.textContent = isError ? '⚠️' : '💾'
			toast.style.borderColor = isError ? '#7a2a2a' : '#2a5a2a'
			toast.style.color       = isError ? '#f87171' : '#4ade80'
			// アイコンアニメをリセットして再生
			if (icon) { icon.style.animation = 'none'; requestAnimationFrame(() => { icon.style.animation = '' }) }
			toast.classList.add('visible')
			if (_saveToastTimer) clearTimeout(_saveToastTimer)
			_saveToastTimer = setTimeout(() => toast.classList.remove('visible'), 2200)
		}

		function save_game(silent = false) {
			try {
				const pid = window.projectId || 'default_game'
				const saveKey = 'game_' + pid
				localStorage.setItem(saveKey, JSON.stringify(gameState))
				if (!silent) showSaveToast('セーブ完了')
				console.log('Game saved to', saveKey)
			} catch (e) {
				showSaveToast('セーブ失敗', true)
				console.error(e)
			}
		}

		function manualSave() {
			const btn = document.getElementById('btn-manual-save')
			if (btn) { btn.classList.add('saving'); btn.textContent = '💾…' }
			save_game()
			setTimeout(() => {
				if (btn) { btn.classList.remove('saving'); btn.textContent = '💾' }
			}, 1000)
		}

		function load_game() {
			try {
				const pid = window.projectId || 'default_game'
				const saveKey = 'game_' + pid
				const data = localStorage.getItem(saveKey)
				if (data) {
					const parsed = JSON.parse(data)
					parsed.gold = parsed.gold ?? 0
					parsed.floor = parsed.floor ?? 1
					parsed.inDungeon = parsed.inDungeon ?? false
					parsed.party = parsed.party ?? []
					parsed.inventory = parsed.inventory ?? []
					parsed.tempGold = parsed.tempGold ?? 0
					parsed.exploreCount = parsed.exploreCount ?? 0
					parsed.stairsFound = parsed.stairsFound ?? false
					parsed.bossDefeated = parsed.bossDefeated ?? []
					parsed.maxFloor = parsed.maxFloor ?? 1
					parsed.guildWarehouse = parsed.guildWarehouse ?? (parsed.guildStorage ?? [])
					parsed.guildWarehouseCap = parsed.guildWarehouseCap ?? (parsed.guildStorageCap ?? 50)
					parsed.bagExpansion = parsed.bagExpansion ?? 0
					parsed.guildBench = parsed.guildBench ?? []
					// guildBench メンバー正規化（party と同じ処理）
					parsed.guildBench = parsed.guildBench ?? []
					;[...parsed.party, ...parsed.guildBench].forEach(p => {
						if (!p) return
						p.equip = p.equip ?? { weapon: null, armor: null, acc: null, runes: [] }
						p.learnedSkills = p.learnedSkills ?? {}
						p.equippedSkills = p.equippedSkills ?? []
						p.skillUpgrades = p.skillUpgrades ?? {}
						p.row = p.row ?? 'front'
					})
					parsed.party.forEach(p => {
						if (p.job === '戦士') p.job = 'ウォリアー'
						else if (p.job === '騎士') p.job = 'パラディン'
						else if (p.job === '魔術師') p.job = 'ウィザード'
						else if (p.job === '探索者') p.job = 'レンジャー'
						p.equip = p.equip ?? { weapon: null, armor: null, acc: null, runes: [] }
						p.learnedSkills = p.learnedSkills ?? {}
						p.equippedSkills = p.equippedSkills ?? []
						p.row = p.row ?? 'front'
						p.skillCooldowns = p.skillCooldowns || {}
						p.exp = p.exp ?? 0
						p.nextExp = p.nextExp ?? 100
						p.lv = p.lv ?? 1
						if (p.hp === undefined || p.mp === undefined) {
							const fs = getFinalStats(p)
							p.hp = p.hp ?? fs.maxHp
							p.mp = p.mp ?? fs.maxMp
						}
					})
					gameState = parsed
					console.log('Game loaded')
					return true
				}
			} catch (e) {
				console.error(e)
			}
			return false
		}

		function exploreRandomEvent() {
			if (!gameState.inDungeon) return
			gameState.exploreCount++
			const disp = document.getElementById('event-display')
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				startBattle()
				return
			}
			const r = Math.random()
			if (r < 0.6) {
				startBattle()
			} else if (r < 0.9) {
				let baseGold = Math.floor(Math.random() * 80 * gameState.floor) + 60;
				let msg = `宝箱！`;
				
				const lootRoll = Math.random();
				let loot = null;

				// 現在の階層からTierを算出 (10階層ごとにTierアップ、最大Tier5)
				const currentTier = Math.min(5, Math.floor((gameState.floor - 1) / 10) + 1);

				if (lootRoll < 0.25) { // ゴールド 25%
					gameState.tempGold += baseGold;
					msg = `宝箱！ ${baseGold}G`;
				} else if (lootRoll < 0.30) { // 大当たりゴールド 5%
					let jackpot = baseGold * 5 + 500;
					gameState.tempGold += jackpot;
					msg = `<span style="color:var(--gold); font-weight:bold;">✨大当たり宝箱✨ ${jackpot}G!!</span>`;
					addLog(`大当たり！ ${jackpot}G獲得！`, 'log-gold');
				} else if (lootRoll < 0.42) { // 武器 12%
					// 現在のTier以下の武器のみプールにする
					const pool = SHOP_ITEMS.weapon.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'weapon', locked: false });
				} else if (lootRoll < 0.54) { // 防具 12%
					const pool = SHOP_ITEMS.armor.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'armor', locked: false });
				} else if (lootRoll < 0.60) { // 汎用 6%
					const pool = SHOP_ITEMS.acc.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'acc', locked: false });
				} else if (lootRoll < 0.70) { // アイテム 10%
					// アイテムは1つ上のTierまで出やすくする（救済措置）
					const pool = SHOP_ITEMS.item.filter(i => i.tier <= currentTier + 1);
					loot = { ...pool[Math.floor(Math.random() * pool.length)], type: 'item', locked: false };
				} else if (lootRoll < 0.90) { // ルーン 20%
					loot = generateRune();
				} else { // 残り 10% その他(小銭のみ)
					gameState.tempGold += Math.floor(baseGold / 2);
					msg = `宝箱！ ${Math.floor(baseGold / 2)}G`;
				}

				if (loot) {
					if (gameState.inventory.length < getMaxCapacity()) {
						gameState.inventory.push(loot);
						msg = `宝箱！ ${baseGold}G & ${loot.n}`;
						gameState.tempGold += baseGold;
						addLog(`宝箱から獲得：${loot.n}`, 'log-sys');
						if (loot.rarityLabel === 'レジェンダリー') {
							setTimeout(() => showNotify({
								type: 'legendary',
								icon: '🌟',
								label: 'レジェンダリー入手',
								title: loot.n,
								sub: `宝箱から伝説の装備を入手しました！<br><span style="color:#ff9800;font-size:0.9rem;">★★★★ ${loot.rarityLabel}</span>`,
							}), 600)
						}
					} else {
						msg = `宝箱！ ${baseGold}G (鞄が一杯でアイテムを諦めた...)`;
						gameState.tempGold += baseGold;
						addLog(`鞄が一杯でアイテムを諦めた...`, 'log-red');
					}
				}
				
				disp.innerHTML = `<span style="color:var(--gold)">${msg}</span>`
				if(!lootRoll >= 0.25 && !lootRoll < 0.30) addLog(`${baseGold}G獲得。`, 'log-gold');
			} else {
				const p = gameState.party[0]
				p.hp = Math.max(0, p.hp - 25)
				disp.innerHTML = `<span style="color:var(--accent-red)">罠！</span> -25HP`
				addLog(`罠：-25HP`, 'log-red')
				if (p.hp <= 0) handleDeath()
			}
			if (!gameState.stairsFound) {
				const pS = [0.2, 0.4, 0.6, 0.8, 0.9][Math.min(gameState.exploreCount - 1, 4)]
				if (Math.random() < pS) {
					gameState.stairsFound = true
					document.getElementById('btn-next-floor').classList.remove('hidden')
					addLog('階段発見。', 'log-sys')
					disp.innerHTML += `<br><span style="color:var(--accent-blue)">▼ 階段</span>`
				}
			}
			updateUI()
		}

		function openBossRematchModal() {
			const c = document.getElementById('modal-content')
			c.innerHTML = `
				<div style="text-align:center; padding:20px;">
					<h2>ボス再戦</h2>
					<p style="color:var(--text-dim); margin-bottom:15px;">このフロアのボスは倒されました。<br>再戦しますか？それとも通常探索を行いますか？</p>
					<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
						<button class="btn-action btn-red" onclick="closeModal(); exploreCountAndBattle();">再戦する</button>
						<button class="btn-action btn-blue" onclick="closeModal(); exploreRandomEvent();">通常探索</button>
					</div>

		function exploreCountAndBattle() {
			if (!gameState.inDungeon) return
			gameState.exploreCount++
			startBattle(true)
		}

		function explore() {
			if (!gameState.inDungeon) return
			const isBossFloor = BOSS_DATA[gameState.floor]
			if (isBossFloor) {
				if (!gameState.bossDefeated.includes(gameState.floor)) {
					gameState.exploreCount++
					startBattle()
					return
				} else {
					openBossRematchModal()
					return
				}
			}
			// ── チュートリアル中の探索処理 ──
			if (tutState.active && tutState.phase === 'B') {
				const _ts = TUT_STEPS[tutState.stepIdx]
				if (_ts && _ts.hook === 'explore') {
					_tutClearHighlight()
					if (tutState.stepIdx === 2) {
						// 最初の探索: スライム固定戦闘を開始し、戦闘説明(step3)へ
						tutState.stepIdx = 3
						tutState.phase = 'A'
						_tutForceBattle()
						setTimeout(_tutPhaseA, 500)
					} else {
						// 2回目の探索: Tier1武器を宝箱として確定ドロップ
						_tutDropChestWeapon()
						tutState.stepIdx++
						tutState.phase = 'A'
						setTimeout(_tutPhaseA, 300)
					}
					return
				}
			}
			exploreRandomEvent()
		}

		function startBattle(forceBoss = false) {
			playBGM('battle');
			battle.active = true
			battle.isProcessing = false
			battle.enemies = []
			battle.enemyDebuffs = []
			battle.buffs = []
			battle.shields = []
			battle.guardIdx = -1
			battle.enemyDots = []
			battle.partyRegens = []
			battle.enemyStatus = []
			battle.mpCostDown = []
			battle.partyDots = []
			battle.enemyDots = []
			battle.partyRegens = []
			battle.enemyStatus = []
			battle.mpCostDown = []
			battle.activeUnitIndex = 0
			// ── タレント: battle_start（アナライズ等）──
			gameState.party.forEach(member => {
				if (member.hp <= 0 || !member.talents) return
				Object.values(member.talents).forEach(t => {
					if (!t || t.trigger !== 'battle_start') return
					if (t.effect && t.effect.debuff) {
						const aliveE = battle.enemies.filter(e => e.hp > 0)
						aliveE.forEach(e => battle.enemyDebuffs.push({ eId: e.id, stat: t.effect.debuff.stat, val: t.effect.debuff.val, skillName: t.n }))
						addLog(`📊 ${member.name}の${t.n}：敵全体 ${t.effect.debuff.stat}-${Math.floor(t.effect.debuff.val*100)}%！`, 'log-e-atk')
					}
				})
			})
			battle.turnCycle = 0
			battle.remainingHits = 0
			gameState.party.forEach((p, pIdx) => {
				p.skillCooldowns = {}
				// 防壁エンチャント: 戦闘開始時シールド付与
				const _bFs = getFinalStats(p)
				if (_bFs._enchantBarrier && p.hp > 0) {
					const _shieldAmt = Math.floor(_bFs.maxHp * _bFs._enchantBarrier)
					const _existShield = battle.shields.find(s => s.pIdx === pIdx)
					if (_existShield) { _existShield.val += _shieldAmt }
					else battle.shields.push({ pIdx, val: _shieldAmt })
					addLog(`🔰 ${p.name}の防壁が発動！ ${_shieldAmt} シールドを付与！`, 'log-sys')
				}
			})
			if (BOSS_DATA[gameState.floor] && (!gameState.bossDefeated.includes(gameState.floor) || forceBoss)) {
				const bossData = BOSS_DATA[gameState.floor]
				const boss = { ...bossData, id: 0 }
				boss.maxHp = boss.hp
				battle.enemies.push(boss)
				addLog('ボス出現！', 'log-red')
				if (autoFarm.active) { stopAutoFarm('ボスフロアに到達'); return }
			} else {
				const _maxEnemies = gameState.floor >= 30 ? 5 : gameState.floor >= 20 ? 4 : 3
				let count = Math.min(_maxEnemies, Math.floor(Math.random() * Math.min(_maxEnemies, gameState.floor)) + 1)
				let available = MONSTERS.filter(m => m.minFloor <= gameState.floor && gameState.floor <= m.maxFloor)
				if (available.length === 0) available = MONSTERS
				for (let i = 0; i < count; i++) {
					const b = available[Math.floor(Math.random() * available.length)]
					const variance = b.variance || 0.1
					const roll = 1 + (Math.random() * 2 - 1) * variance
					const enemy = { ...b, id: i,
						hp:   Math.floor(b.hp   * roll), maxHp: Math.floor(b.hp * roll),
						mp:   b.mp || 0, maxMp: b.mp || 0,
						atk:  Math.floor(b.atk  * roll), def: Math.floor(b.def * roll),
						mdef: Math.floor(b.mdef * roll), exp: Math.floor(b.exp * roll),
						gold: Math.floor(b.gold * roll)
					}
					applyEliteTraits(enemy)
					battle.enemies.push(enemy)
					if (enemy._isElite) {
						const trDesc = enemy.eliteTraits.map(t=>t.desc).join(' / ')
						addLog(`✨ ${enemy.eliteTier}個体出現！ [${enemy.name}] — ${trDesc}`, enemy.eliteTier==='Legend' ? 'log-gold' : enemy.eliteTier==='Rare' ? 'log-sys' : 'log-p-atk')
					}
				}
			}
			document.getElementById('dungeon-ui').classList.add('hidden')
			document.getElementById('battle-view').classList.remove('hidden')
			updateBattleUI()
			// 前衛/後衛の状況をログに表示
			const _fN = gameState.party.filter(p=>p.row==='front'&&p.hp>0).map(p=>p.name).join('・')
			const _bN = gameState.party.filter(p=>p.row==='back' &&p.hp>0).map(p=>p.name).join('・')
			fxBattleStart()
			if (_fN) addLog(`⚔️ 前衛: ${_fN}`, 'log-sys')
			if (_bN) addLog(`🏹 後衛: ${_bN}（前衛が全滅するまで守られる）`, 'log-sys')
			setTurn('player')
		}

		function setTurn(side, unitIndex = 0) {
			battle.turn = side
			battle.activeUnitIndex = unitIndex
			battle.isProcessing = false
			battle.remainingHits = 0
			updateBattleUI()
			const isPlayerTurn = side === 'player'
			document.getElementById('atk-btn').disabled = !isPlayerTurn
			document.getElementById('skl-btn').disabled = !isPlayerTurn
			document.getElementById('battle-skill-menu').classList.add('hidden')
			if (isPlayerTurn) {
				const p = gameState.party[battle.activeUnitIndex]
				if (p.skillCooldowns) {
					for (let k in p.skillCooldowns) {
						if (p.skillCooldowns[k] > 0) p.skillCooldowns[k]--
					}
				}
				// 凍結チェック：凍結中なら行動スキップ
				const freezeDot = (battle.partyDots||[]).find(d=>d.pIdx===battle.activeUnitIndex&&d.type==='freeze')
				if (freezeDot) {
					document.getElementById('battle-msg').innerText = `${p.name}は凍結中！行動不能！`
					addLog(`❄ ${p.name}は凍結中で行動不能！`, 'log-e-atk')
					setTimeout(() => { if (battle.active && battle.turn === 'player') nextTurn() }, 800)
					return
				}
				document.getElementById('battle-msg').innerText = `${p.name}の行動`
				// オート周回中：自動でアクションを実行
				if (autoFarm.active && battle.active) {
					const _autoDelay = autoFarm.speed === 'fast' ? 150 : autoFarm.speed === 'slow' ? 900 : 400
					setTimeout(_autoFarmDoPlayerAction, _autoDelay)
				}
			} else {
				document.getElementById('battle-msg').innerText = '敵の行動...'
			}
		}

		function nextTurn() {
			if (battle.turn === 'player') {
				let nextIdx = battle.activeUnitIndex + 1
				while (nextIdx < gameState.party.length) {
					if (gameState.party[nextIdx].hp > 0) {
						setTurn('player', nextIdx)
						return
					}
					nextIdx++
				}
				setTurn('enemy')
				// シールドのターン経過減衰
				battle.shields = (battle.shields||[]).filter(s => { s.turns--; return s.turns > 0 })
				battle.guardIdx = -1
				battle._guardDmgMul = 1.0
				battle._guardCounter = null
				// ── タレント: turn_start（エンジェル・ブレス等）──
				gameState.party.forEach(member => {
					if (member.hp <= 0 || !member.talents) return
					Object.values(member.talents).forEach(t => {
						if (!t || t.trigger !== 'turn_start') return
						if (t.effect.regenPct) {
							const fs = getFinalStats(member)
							const healAmt = Math.floor(fs.maxHp * t.effect.regenPct)
							gameState.party.forEach(m => { if (m.hp > 0) m.hp = Math.min(getFinalStats(m).maxHp, m.hp + healAmt) })
							addLog(`✨ ${member.name}の${t.n}：味方全体HP+${healAmt}`, 'log-sys')
						}
					})
				})
				// ── タレント: battle_start（アナライズ等）は startBattle で処理済み ──
				setTimeout(enemyTurn, 500)
			}
		}

		// 遠距離武器かどうかを判定
		function isRangedWeapon(p) {
			return !!(p.equip && p.equip.weapon && p.equip.weapon.ranged)
		}
		// 武器の射程を返す（long=後衛でもペナルティなし, short=後衛からペナルティあり）
		function getWeaponRange(p) {
			if (!p.equip || !p.equip.weapon) return 'short'
			const w = p.equip.weapon
			if (w.range) return w.range
			if (w.ranged || w.dType === 'magic') return 'long'
			return 'short'
		}

		// スキルが全体攻撃かどうかを判定
		function isAoeSkill(s) {
			return s && (s.target === 'all' || s.target === 'aoe' || s.target === 'all_enemy')
		}

		// スキルの射程を返す
		// range:'melee' = 物理単体（後衛ペナルティあり）
		// range:'ranged' = 魔法単体（後衛でも届く）
		// range:'any' = 全体・バフ・回復など（射程無限）
		function getSkillRange(s) {
			if (!s || s.range) return s ? s.range : 'any'
			if (s.type === 'passive') return 'any'
			if (s.target === 'all' || s.eTarget === 'all') return 'any'
			if (['heal','buff','regen','shield','guard','mpcost','revive','debuff','poison','bleed','stun','freeze'].includes(s.type)) return 'any'
			if (s.type === 'atk') return s.dType === 'magic' ? 'ranged' : 'melee'
			return 'any'
		}

		// 後衛からスキルを使うときにペナルティがかかるか
		function isSkillBackPenalty(p, s) {
			if (p.row !== 'back') return false
			const rng = getSkillRange(s)
			if (rng !== 'melee') return false   // any/ranged はペナルティなし
			if (isRangedWeapon(p)) return false  // 弓装備なら近接スキルも届く
			return true
		}

				function playerAttack() {
			if (battle.isProcessing || battle.turn !== 'player') return
			if (battle.targeting !== null) return
			const p = gameState.party[battle.activeUnitIndex]
			if (p.hp <= 0) {
				battle.isProcessing = false
				nextTurn()
				return
			}
			
			if (battle.remainingHits <= 0) {
				battle.remainingHits = (p.equip.weapon && p.equip.weapon.hits) ? p.equip.weapon.hits : 1;
			}
			
			const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
			if (!aliveEnemies.length) {
				battle.remainingHits = 0;
				battle.isProcessing = false
				nextTurn()
				return
			}
			
			if (aliveEnemies.length > 1) {
				battle.targeting = 'attack'
				updateBattleUI()
				document.getElementById('battle-msg').innerText = `ターゲットを選択 (${battle.remainingHits})`
				return
			}
			executeAttack(aliveEnemies[0])
		}

		function executeAttack(target) {
			const p = gameState.party[battle.activeUnitIndex]
			battle.isProcessing = true
			battle.targeting = null
			let dType = 'physical'
			if (p.equip.weapon && p.equip.weapon.dType) {
				dType = p.equip.weapon.dType
			}
			playSE('attack');
			const _damageMult = getEnemyDamageMult(target.id, dType)
			// ── 回避判定（敵が回避できるか）──
			const _pFs0 = getFinalStats(p)
			const _evasionRoll = rollEvasion(_pFs0.agi, _pFs0.luk, target.agi || 10, target.luk || 5)
			const res = calcTacticalDamage(_pFs0, target.def, target.mdef, p.lv, false, dType)
			res.val = Math.floor(res.val * _damageMult)
			// 後衛からshort射程武器での攻撃はダメージ-20%（射程ペナルティ）
			const _isBackPenalty = (p.row === 'back' && getWeaponRange(p) === 'short')
			if (_isBackPenalty) res.val = Math.floor(res.val * 0.8)
			const _rowNote = _isBackPenalty ? ' <span style=\"font-size:0.72em;color:#aaa;\">(後衛-20%)</span>' : ''
			// 武器のonHitエフェクト処理（後で setTimeout 内で適用）
			const _weapEff = p.equip && p.equip.weapon && p.equip.weapon.effect ? p.equip.weapon.effect : null
		const _wRangeLog = getWeaponRange(p) === 'long'
			? `<span style="font-size:0.68em;padding:0 3px;background:rgba(96,165,250,0.12);border:1px solid #3a5a8a;border-radius:3px;color:#60a5fa;margin-left:2px;">🏹遠距離</span>`
			: `<span style="font-size:0.68em;padding:0 3px;background:rgba(251,146,60,0.12);border:1px solid #8a4a1a;border-radius:3px;color:#fb923c;margin-left:2px;">⚔️近接</span>`
		const _atkVerb = getAttackVerb(p.name, target.name, p.equip && p.equip.weapon, dType, res.crit)
		if (_evasionRoll) {
			// 回避成功
			const _eCard = getEnemyCardEl(target)
			if (_eCard) { fxText(...Object.values(getElCenter(_eCard)).slice(0,2).concat([0]), '💨 MISS', '#60a5fa', '0.85rem') }
			addLog(`${p.name}の攻撃 → <b style="color:#60a5fa;">💨 ${target.name}に回避された！</b>`, 'log-sys')
		} else {
		addLog(`${_atkVerb}！ <b>${res.val}</b>ダメージ ${res.crit ? '★<b>会心</b>' : ''}${_rowNote}${_wRangeLog} <span style="font-size:0.75em; color:${dType==='magic'?'#a78bfa':'#fb923c'}; border:1px solid ${dType==='magic'?'#7c5cbf':'#c2622a'}; border-radius:3px; padding:0 3px;">${dType==='magic'?'特殊':'物理'}</span>`, res.crit ? 'log-crit' : 'log-p-atk')
		// パーティクルエフェクト
		;(() => {
			const _tgtCard = getEnemyCardEl(target)
			if (getWeaponRange(p) === 'long' && dType !== 'magic') fxArrowAttack(_tgtCard, res.val, res.crit)
			else if (dType === 'magic') fxMagicAttack(_tgtCard, res.val, res.crit)
			else fxPhysicalAttack(_tgtCard, res.val, res.crit)
		})()
			setTimeout(() => {
				target.hp = Math.max(0, target.hp - res.val)
				// 復讐する：反射
				if (target._reflectChance && target.hp > 0 && Math.random() < target._reflectChance) {
					const reflectDmg = Math.floor(res.val * target._reflectPct)
					const reflectTarget = gameState.party[battle.activeUnitIndex]
					if (reflectTarget && reflectTarget.hp > 0) {
						applyDamageToPartyMember(reflectTarget, reflectDmg, 'log-e-atk')
						addLog(`💢 ${target.name}がダメージを反射！ ${reflectTarget.name}に${reflectDmg}！`, 'log-e-atk')
					}
				}
				// 呪われし：攻撃時毒付与（スタック方式）

		function useBattleSkill(s, lv) {
			const p = gameState.party[battle.activeUnitIndex]
			const _pIdxCheck = gameState.party.indexOf(p)
			const _discCheck = (battle.mpCostDown||[]).find(m=>m.pIdx===_pIdxCheck)
			const _pFsCheck = getFinalStats(p)
			const _subReduceCheck = (_pFsCheck._mpCostReduce || 0) / 100
			let _checkCost = _discCheck ? Math.max(0, Math.floor(s.cost*(1-_discCheck.val))) : s.cost
			if (_subReduceCheck > 0) _checkCost = Math.max(0, Math.floor(_checkCost * (1 - _subReduceCheck)))
			if (p.hp <= 0 || p.mp < _checkCost) return
			// 敵単体対象スキル（atk/状態異常系）: 複数敵がいるときターゲット選択
			const _needsEnemyTarget = ((s.type === 'atk' || s.type === 'atk_dot' || s.type === 'atk_debuff') && s.target === 'single') ||
				(['poison','bleed','stun','freeze'].includes(s.type) && s.eTarget === 'single')
			if (_needsEnemyTarget) {
				const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
				if (aliveEnemies.length === 0) return
				if (aliveEnemies.length > 1) {
					// 後衛+近接スキルはターゲット選択なし・先頭自動
					if (isSkillBackPenalty(p, s)) {
						document.getElementById('battle-skill-menu').classList.add('hidden')
						executeSkill(s, aliveEnemies[0], lv)
						return
					}
					battle.targeting = 'skill'
					battle.pendingSkill = s
					battle.pendingSkillLv = lv
					document.getElementById('battle-skill-menu').classList.add('hidden')
					updateBattleUI()
					document.getElementById('battle-msg').innerText = 'ターゲットを選んでください'
					return
				}
			}
			// 単体サポート系スキルのターゲット選択
			// heal/shield/buff/regen/mpcostのsingleかつself:trueでないものはターゲット選択へ
			const _isSupportSingle = s.target === 'single' && !s.self
				&& ['heal','shield','buff','regen','mpcost'].includes(s.type)
			if (_isSupportSingle) {
				battle.targeting = 'heal'  // 味方ターゲット選択モードを共用
				battle.pendingSkill = s
				battle.pendingSkillLv = lv

				updateBattleUI()
				document.getElementById('battle-msg').innerText = s.revive
					? '蘇生対象を選択（戦闘不能のみ）'
					: '対象を選択'
				return
			}
			executeSkill(s, null, lv)
		}

		function executeSkill(s, explicitTarget = null, lv = null) {

			let _effCost = _mpDisc ? Math.max(0, Math.floor(s.cost*(1-_mpDisc.val))) : s.cost
			if (_subMpReduce > 0) _effCost = Math.max(0, Math.floor(_effCost * (1 - _subMpReduce)))
			if (_mpDisc) { battle.mpCostDown = battle.mpCostDown.filter(m=>m.pIdx!==_pIdx); addLog(`MPコスト軽減！ ${_effCost}MP消費（元${s.cost}MP）`, 'log-sys') }
			p.mp -= _effCost
			battle.isProcessing = true
			battle.targeting = null
			battle.pendingSkill = null
			battle.pendingSkillLv = null
