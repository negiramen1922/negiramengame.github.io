						? gameState.party.filter(m=>m.hp>0).map(m=>gameState.party.indexOf(m))
						: [gameState.party.indexOf(_regenTarget)]
					// 再生バフの緑エフェクト
					targets.forEach((idx, ti) => {
						const _rc = getPartyCardEl(idx)
						if (_rc) setTimeout(() => fxSkillEffect(_rc, 'regen', '', 0, false), ti * 80)
					})
					targets.forEach(idx => {
						const ex = (battle.partyRegens||[]).find(r => r.pIdx===idx)
						if (ex) { ex.turns = Math.max(ex.turns, s.turns); ex.val = Math.max(ex.val, s.val) }
						else battle.partyRegens.push({ pIdx: idx, val: s.val, turns: s.turns })
					})
					const tname = s.target==='all' ? '味方全体' : _regenTarget.name
					addLog(`${p.name}の再生付与！ ${tname}に${s.turns}ターン間のリジェネを付与！`, 'log-sys')

				// ── MPコスト軽減バフ ──
				} else if (s.type === 'mpcost') {
					const targets = s.target === 'all' ? gameState.party.map((_,i)=>i) : [gameState.party.indexOf(explicitTarget||p)]
					targets.forEach(idx => {
						battle.mpCostDown = (battle.mpCostDown||[]).filter(m=>m.pIdx!==idx)
						battle.mpCostDown.push({ pIdx: idx, val: s.val })
					})
					const tname = s.target==='all'?'味方全体':(explicitTarget||p).name
					addLog(`${p.name}のMP軽減付与！ ${tname}の次のスキルMPコスト${Math.floor(s.val*100)}%減！`, 'log-sys')

				// ── 毒（最大3スタック・各3ターン）──
				} else if (s.type === 'poison') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const existing = (battle.enemyDots||[]).filter(d=>d.eId===e.id&&d.type==='poison')
						if (existing.length < 3) {
							battle.enemyDots.push({ eId: e.id, type: 'poison', turns: 3 })
						} else {
							// 残りターンが少ない方を更新
							const weakest = existing.reduce((a,b) => a.turns < b.turns ? a : b)
							weakest.turns = 3
						}
					})
					const stackCount = ets.length === 1 ? (battle.enemyDots||[]).filter(d=>d.eId===ets[0].id&&d.type==='poison').length : '?'
					addLog(`${p.name}が毒を付与！ 最大HP×5%/ターン（現在${stackCount}スタック）`, 'log-e-atk')

				// ── 出血（ターン経過でダメージ増加 2→4→6→8→10%）──
				} else if (s.type === 'bleed') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const ex = (battle.enemyDots||[]).find(d=>d.eId===e.id&&d.type==='bleed')
						if (ex) { ex.turns = Math.max(ex.turns, 5); } // 継続中はターン延長
						else battle.enemyDots.push({ eId: e.id, type: 'bleed', turns: 5, stack: 1 })
					})
					addLog(`${p.name}が出血を付与！ ダメージ増加型（2→4→6→8→10%/ターン）`, 'log-e-atk')

				// ── 気絶 (stun)：ボスは耐性あり ──
				} else if (s.type === 'stun') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					let stunApplied = 0
					ets.forEach(e => {
						// ボスは気絶耐性：完全無効ではなく1ターン限定
						const effectiveTurns = e.isBoss ? 1 : s.turns
						const ex = (battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='stun')
						if (ex) ex.turns = Math.max(ex.turns, effectiveTurns)
						else battle.enemyStatus.push({ eId: e.id, type: 'stun', turns: effectiveTurns })
						stunApplied++
						if (e.isBoss) addLog(`👑 ${e.name}はボス耐性で気絶を${effectiveTurns}ターンに短縮！`, 'log-sys')
					})
					if (stunApplied > 0) addLog(`${p.name}が気絶を付与！ 行動不能＆物理ダメージ+30%！`, 'log-e-atk')

				// ── フリーズ (freeze)：ボスは1ターン限定耐性 ──
				} else if (s.type === 'freeze') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					let freezeApplied = 0
					ets.forEach(e => {
						// ボスは凍結耐性：完全無効ではなく1ターン限定
						const effectiveTurns = e.isBoss ? 1 : s.turns
						const ex = (battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='freeze')
						if (ex) ex.turns = Math.max(ex.turns, effectiveTurns)
						else battle.enemyStatus.push({ eId: e.id, type: 'freeze', turns: effectiveTurns })
						freezeApplied++
						if (e.isBoss) addLog(`👑 ${e.name}はボス耐性で凍結を${effectiveTurns}ターンに短縮！`, 'log-sys')
					})
					if (freezeApplied > 0) addLog(`${p.name}がフリーズを付与！ 行動不能＆特殊ダメージ+30%！`, 'log-e-atk')
				// ── 攻撃＋DOT複合（atk_dot）──
				} else if (s.type === 'atk_dot') {
					playSE(s.dType === 'magic' ? 'magic' : 'attack')
					const aliveE2 = battle.enemies.filter(e => e.hp > 0)
					if (!aliveE2.length) { winBattle(); battle.isProcessing = false; return }
					const _targets2 = s.target === 'all' ? aliveE2 : (explicitTarget ? [explicitTarget] : [aliveE2[0]])
					const fs2 = getFinalStats(p)
					const _atkStat2 = s.dType === 'magic' ? fs2.matk : fs2.str
					const _pen2 = isSkillBackPenalty(p, s) ? 0.8 : 1.0
					_targets2.forEach((t, ti) => {
						const _sm2 = getEnemyDamageMult(t.id, s.dType)
						const _td2  = s.ignoreDef ? 0 : t.def
						const _tmd2 = s.ignoreDef ? 0 : t.mdef
						const res2 = calcTacticalDamage({ ...fs2, str: _atkStat2 * s.pow, matk: _atkStat2 * s.pow }, _td2, _tmd2, p.lv, false, s.dType)
						if (s.criForce) { res2.crit = true; res2.val = Math.floor(res2.val * (1.6 + (s.criMultBonus||0) + (fs2._criMultBonus||0))) }
						res2.val = Math.floor(res2.val * _sm2 * _pen2)
						t.hp = Math.max(0, t.hp - res2.val)
						addLog(`${t.name}に <b>${res2.val}</b>ダメージ`, 'log-p-atk')
						const _tc2 = getEnemyCardEl(t)
						setTimeout(() => fxSkillEffect(_tc2, 'atk', s.dType, res2.val, res2.crit), ti * 100)
					})
					const _dotAlive = _targets2.filter(t => t.hp > 0)
					if (s.dot === 'poison') {
						_dotAlive.forEach(e => { const ex=(battle.enemyDots||[]).filter(d=>d.eId===e.id&&d.type==='poison'); if(ex.length<3) battle.enemyDots.push({eId:e.id,type:'poison',turns:s.dotTurns||3}); else {const w=ex.reduce((a,b)=>a.turns<b.turns?a:b);w.turns=s.dotTurns||3} })
						addLog('☠ 毒を付与！', 'log-e-atk')
					} else if (s.dot === 'bleed') {
						_dotAlive.forEach(e => { const ex=(battle.enemyDots||[]).find(d=>d.eId===e.id&&d.type==='bleed'); if(ex) ex.turns=Math.max(ex.turns,s.dotTurns||4); else battle.enemyDots.push({eId:e.id,type:'bleed',turns:s.dotTurns||4,stack:1}) })
						addLog('🩸 出血を付与！', 'log-e-atk')
					} else if (s.dot === 'stun') {
						_dotAlive.forEach(e => { const eff=e.isBoss?1:s.dotTurns||1; const ex=(battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='stun'); if(ex) ex.turns=Math.max(ex.turns,eff); else battle.enemyStatus.push({eId:e.id,type:'stun',turns:eff}); if(e.isBoss) addLog(`👑 ${e.name}ボス耐性で気絶${eff}Tに短縮`,'log-sys') })
						addLog('⚡ 気絶を付与！', 'log-e-atk')
					} else if (s.dot === 'freeze') {
						_dotAlive.forEach(e => { const eff=e.isBoss?1:s.dotTurns||2; const ex=(battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='freeze'); if(ex) ex.turns=Math.max(ex.turns,eff); else battle.enemyStatus.push({eId:e.id,type:'freeze',turns:eff}); if(e.isBoss) addLog(`👑 ${e.name}ボス耐性で凍結${eff}Tに短縮`,'log-sys') })
						addLog('❄ 凍結を付与！', 'log-e-atk')
					}
					if (s.secondDot === 'bleed') {
						_dotAlive.forEach(e => { const ex=(battle.enemyDots||[]).find(d=>d.eId===e.id&&d.type==='bleed'); if(ex) ex.turns=Math.max(ex.turns,s.secondDotTurns||3); else battle.enemyDots.push({eId:e.id,type:'bleed',turns:s.secondDotTurns||3,stack:1}) })
						addLog('🩸 追加：出血を付与！', 'log-e-atk')
					}

				// ── 攻撃＋デバフ複合（atk_debuff）──
				} else if (s.type === 'atk_debuff') {
					playSE(s.dType === 'magic' ? 'magic' : 'attack')
					const aliveE3 = battle.enemies.filter(e => e.hp > 0)
					if (!aliveE3.length) { winBattle(); battle.isProcessing = false; return }
					const _targets3 = s.target === 'all' ? aliveE3 : (explicitTarget ? [explicitTarget] : [aliveE3[0]])
					const fs3 = getFinalStats(p)
					const _atkStat3 = s.dType === 'magic' ? fs3.matk : fs3.str
					const _pen3 = isSkillBackPenalty(p, s) ? 0.8 : 1.0
					_targets3.forEach((t, ti) => {
						const _sm3 = getEnemyDamageMult(t.id, s.dType)
						const _td3  = s.ignoreDef ? 0 : t.def
						const _tmd3 = s.ignoreDef ? 0 : t.mdef
						const res3 = calcTacticalDamage({ ...fs3, str: _atkStat3 * s.pow, matk: _atkStat3 * s.pow }, _td3, _tmd3, p.lv, false, s.dType)
						if (s.criForce) { res3.crit = true; res3.val = Math.floor(res3.val * (1.6 + (s.criMultBonus||0) + (fs3._criMultBonus||0))) }
						res3.val = Math.floor(res3.val * _sm3 * _pen3)
						if (s.instakillChance && !t.isBoss && Math.random() < s.instakillChance) { res3.val = t.hp; addLog(`💀 即死発動！`, 'log-crit') }
						t.hp = Math.max(0, t.hp - res3.val)
						addLog(`${t.name}に <b>${res3.val}</b>ダメージ${res3.crit?' ★会心':''}`, 'log-p-atk')
						const _tc3 = getEnemyCardEl(t)
						setTimeout(() => fxSkillEffect(_tc3, 'atk', s.dType, res3.val, res3.crit), ti * 100)
						if (t.hp <= 0) gameState.party.forEach(pm => { if (pm.hp > 0) fireTalentOnKill(pm) })
					})
					const _dbAlive = _targets3.filter(t => t.hp > 0)
					if (s.debuff && _dbAlive.length > 0) {
						_dbAlive.forEach(t => battle.enemyDebuffs.push({ eId: t.id, stat: s.debuff.stat, val: s.debuff.val, skillName: s.n }))
						addLog(`↓ ${s.debuff.stat} -${Math.floor(s.debuff.val*100)}% を付与！`, 'log-e-atk')
					}
					// secondDebuff（二重デバフ）
					if (s.secondDebuff && _dbAlive.length > 0) {
						_dbAlive.forEach(t => battle.enemyDebuffs.push({ eId: t.id, stat: s.secondDebuff.stat, val: s.secondDebuff.val, skillName: s.n }))
						addLog(`↓ ${s.secondDebuff.stat} -${Math.floor(s.secondDebuff.val*100)}% も付与！`, 'log-e-atk')
					}
					if (s.buffDispel) { battle.buffs = []; addLog('✗ 敵のバフを全解除！', 'log-e-atk') }

				// ── 多段攻撃（atk_multi）──
				} else if (s.type === 'atk_multi') {
					playSE(s.dType === 'magic' ? 'magic' : 'attack')
					const aliveE4 = battle.enemies.filter(e => e.hp > 0)
					if (!aliveE4.length) { winBattle(); battle.isProcessing = false; return }
					const fs4 = getFinalStats(p)
					const _atkStat4 = s.dType === 'magic' ? fs4.matk : fs4.str
					const _pen4 = isSkillBackPenalty(p, s) ? 0.8 : 1.0
					const totalHits = s.hits || 2
					let totalDmg = 0
					for (let h = 0; h < totalHits; h++) {
						const t4 = aliveE4[Math.floor(Math.random() * aliveE4.length)]
						if (!t4 || t4.hp <= 0) continue
						const _sm4 = getEnemyDamageMult(t4.id, s.dType)
						const _td4  = s.ignoreDef ? 0 : t4.def
						const _tmd4 = s.ignoreDef ? 0 : t4.mdef
						const res4 = calcTacticalDamage({ ...fs4, str: _atkStat4 * s.pow, matk: _atkStat4 * s.pow }, _td4, _tmd4, p.lv, false, s.dType)
						res4.val = Math.floor(res4.val * _sm4 * _pen4)
						t4.hp = Math.max(0, t4.hp - res4.val)
						totalDmg += res4.val
						const _tc4 = getEnemyCardEl(t4)
						setTimeout(() => fxSkillEffect(_tc4, 'atk', s.dType, res4.val, res4.crit), h * 80)
					}
					addLog(`${totalHits}連撃！ 合計 <b>${totalDmg}</b>ダメージ`, 'log-p-atk')

				}
				updateBattleUI()
				if (battle.enemies.every(e => e.hp <= 0)) winBattle()
				else {
					battle.isProcessing = false
					nextTurn()
				}
			}, 300)
		}

		function selectEnemyTarget(index) {
			if (battle.targeting !== 'attack' && battle.targeting !== 'skill') return
			if (index < 0 || index >= battle.enemies.length) return
			const target = battle.enemies[index]
			if (target.hp <= 0) return
			// 射程チェック：short武器で敵後衛を直接狙う場合、前衛が残っていれば不可
			if (battle.targeting === 'attack') {
				const p = gameState.party[battle.activeUnitIndex]
				const wRange = p ? getWeaponRange(p) : 'short'
				if (wRange === 'short' && target.row === 'back') {
					const aliveFront = battle.enemies.filter(e => e.hp > 0 && e.row !== 'back')
					if (aliveFront.length > 0) {
						showMsg('⚔️ 短射程武器では前衛を倒すまで後衛を攻撃できません！')
						playSE('error')
						return
					}
				}
				executeAttack(target)
			} else if (battle.targeting === 'skill' && battle.pendingSkill) {
				executeSkill(battle.pendingSkill, target, battle.pendingSkillLv)
			}
		}

		function selectPartyTarget(index) {
			if (battle.targeting !== 'heal') return;
			const target = gameState.party[index];
			const ps = battle.pendingSkill;

			// 蘇生スキル（revive:true）→ 死亡者のみ対象
			if (ps && ps.revive) {
				if (target.hp > 0) {
					showMsg('生存している味方には使えません');
					playSE('error');
					return;
				}
			} else {
				// 通常サポートスキル → 生存者のみ対象
				if (target.hp <= 0) {
					showMsg('戦闘不能の味方には使えません');
					playSE('error');
					return;
				}
			}

			executeSkill(ps, target, battle.pendingSkillLv);
		}

						// ═══ DoT / 状態異常システム ═══

		// 敵のDoT・状態異常をプレイヤーターン開始時に処理
		function tickEnemyEffects() {
			if (!battle.active) return
			let anyEffect = false
			for (const e of battle.enemies.filter(en => en.hp > 0)) {
				// ── 毒（スタック別に処理、各スタック最大3ターン×最大3スタック）──
				const poisonDots = (battle.enemyDots||[]).filter(d => d.eId === e.id && d.type === 'poison')
				for (const d of poisonDots) {
					const hpDmg = Math.floor(e.maxHp * 0.05)
					e.hp = Math.max(1, e.hp - hpDmg)
					addLog(`☠ 毒が <b>${e.name}</b> に ${hpDmg} ダメージ！（スタック${poisonDots.indexOf(d)+1}）`, 'log-e-atk')
					d.turns--
					anyEffect = true
				}
				// ── 出血（1スタック：턴 경과마다 増加 2→4→6→8→10%）──
				const bleedDot = (battle.enemyDots||[]).find(d => d.eId === e.id && d.type === 'bleed')
				if (bleedDot) {
					// bleedDot.stack: 経過ターン数(1～5)でダメージ率決定
					if (!bleedDot.stack) bleedDot.stack = 1
					const bleedPct = Math.min(0.10, bleedDot.stack * 0.02)
					const bleedDmg = Math.floor(e.maxHp * bleedPct)
					e.hp = Math.max(1, e.hp - bleedDmg)
					addLog(`🩸 出血が <b>${e.name}</b> に ${bleedDmg} ダメージ！（${Math.floor(bleedPct*100)}%）`, 'log-e-atk')
					bleedDot.stack = Math.min(5, bleedDot.stack + 1)
					bleedDot.turns--
					anyEffect = true
				}
			}
			battle.enemyDots = (battle.enemyDots||[]).filter(d => d.turns > 0)
			// エリート特性 onTurnStart（不壊：毎ターン回復等）
			for (const e of battle.enemies.filter(en => en.hp > 0 && en._isElite)) {
				for (const tr of (e.eliteTraits||[])) {
					if (tr.onTurnStart) {
						const before = e.hp
						tr.onTurnStart(e)
						if (e.hp !== before) addLog(`✨ ${e.name}が ${e.hp - before} HP回復！`, 'log-sys')
					}
				}
			}
			// 状態異常のターン減衰
			const before = (battle.enemyStatus||[]).length
			battle.enemyStatus = (battle.enemyStatus||[]).map(s => ({...s, turns: s.turns-1})).filter(s => s.turns > 0)
			if (before > (battle.enemyStatus||[]).length) addLog('状態異常が解除された！', 'log-sys')
			if (anyEffect) updateBattleUI()
		}

		// 味方のリジェネをプレイヤーターン開始時に処理
		function tickPartyRegens() {
			if (!battle.active) return
			let healed = false
			for (let i = 0; i < gameState.party.length; i++) {
				const p = gameState.party[i]
				if (p.hp <= 0) continue
				const regens = (battle.partyRegens||[]).filter(r => r.pIdx === i)
				for (const r of regens) {
					const fs = getFinalStats(p)
					const amt = Math.floor(fs.maxHp * r.val)
					p.hp = Math.min(fs.maxHp, p.hp + amt)
					addLog(`💚 再生が ${p.name} のHPを ${amt} 回復！`, 'log-sys')
					r.turns--
					healed = true
				}
				// 再生エンチャント（防具）
				const _rFs = getFinalStats(p)
				if (_rFs._enchantRegen) {
					const _rAmt = Math.floor(_rFs.maxHp * _rFs._enchantRegen)
					if (_rAmt > 0) {
						p.hp = Math.min(_rFs.maxHp, p.hp + _rAmt)
						addLog(`💚 再生エンチャント：${p.name} が ${_rAmt} 回復！`, 'log-sys')
						healed = true
					}
				}
			}
			battle.partyRegens = (battle.partyRegens||[]).filter(r => r.turns > 0)
			if (healed) updateBattleUI()
		}

		// ─────────────────────────────────────────────
		// 味方へのDoT（poison/bleed/freeze）をターン開始時に処理
		function tickPartyDots() {
			if (!battle.active) return
			let anyEffect = false
			const dots = battle.partyDots || []
			for (const d of dots) {
				const p = gameState.party[d.pIdx]
				if (!p || p.hp <= 0) { d.turns = 0; continue }
				const fs = getFinalStats(p)
				if (d.type === 'poison') {
					// 毒：maxHp×5%/ターン
					const dmg = Math.floor(fs.maxHp * 0.05)
					applyDamageToPartyMember(p, dmg, 'log-e-atk')
					addLog(`☠ 毒が ${p.name} に ${dmg} ダメージ！`, 'log-e-atk')
					d.turns--
					anyEffect = true
				} else if (d.type === 'bleed') {
					// 出血：maxHp×5%/ターン（固定）
					const dmg = Math.floor(fs.maxHp * 0.05)
					applyDamageToPartyMember(p, dmg, 'log-e-atk')
					addLog(`🩸 出血が ${p.name} に ${dmg} ダメージ！`, 'log-e-atk')
					d.turns--
					anyEffect = true
				} else if (d.type === 'freeze') {
					// 凍結：行動不能（nextTurnでスキップ判定）、ターン経過で解除
					addLog(`❄ ${p.name}は凍結中！ 行動不能！`, 'log-e-atk')
					d.turns--
					anyEffect = true
				}
			}
			battle.partyDots = dots.filter(d => d.turns > 0)
			if (anyEffect) {
				updateBattleUI()
				if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
			}
		}

		// 敵が気絶またはフリーズ中か
		function isEnemyStunned(eId) {
			return (battle.enemyStatus||[]).some(s => s.eId === eId && (s.type === 'stun' || s.type === 'freeze'))
		}

		// ダメージ倍率（気絶=物理+30%, フリーズ=特殊+30%）
		function getEnemyDamageMult(eId, dtype) {
			let m = 1.0
			;(battle.enemyStatus||[]).filter(s => s.eId === eId).forEach(s => {
				if (s.type === 'stun'   && dtype === 'physical') m += 0.30
				if (s.type === 'freeze' && dtype === 'magic')    m += 0.30
			})
			return m
		}

		// シールド・ガードを考慮してパーティメンバーにダメージを与える共通関数
		function applyDamageToPartyMember(targetP, dmgVal, logTag) {
			// ── 防具エンチャント: 耐性（ダメージカット） ──
			const _aFs = getFinalStats(targetP)
			if (_aFs._enchantResist && dmgVal > 0) {
				const _cut = Math.floor(dmgVal * _aFs._enchantResist)
				dmgVal = Math.max(1, dmgVal - _cut)
			}
			// ── 防具エンチャント: 不屈（即死耐久） ──
			if (_aFs._enchantTenacity && targetP.hp > 0 && dmgVal >= targetP.hp) {
				if (Math.random() < _aFs._enchantTenacity) {
					addLog(`💪 不屈発動！ ${targetP.name} がHP1で耐えた！`, 'log-sys')
					targetP.hp = 1
					const _pCrd = getPartyCardEl(gameState.party.indexOf(targetP))
					if (_pCrd) { fxCardGlow(_pCrd, 'fx-hit-glow-red', 500) }
					updateBattleUI()
					return
				}
			}
			// ── 防具エンチャント: 反射 ──
			if (_aFs._enchantReflect && Math.random() < _aFs._enchantReflect) {
				const _refDmg = Math.floor(dmgVal * 0.30)
				if (_refDmg > 0 && battle.enemies.length > 0) {
					const _refTarget = battle.enemies.find(e => e.hp > 0)
					if (_refTarget) {
						_refTarget.hp = Math.max(0, _refTarget.hp - _refDmg)
						addLog(`💢 反射！ ${_refDmg} ダメージを跳ね返した！`, 'log-p-atk')
						const _eTgt = getEnemyCardEl(_refTarget)
						if (_eTgt) fxPhysicalAttack(_eTgt, _refDmg, false)
					}
				}
			}
			// 被ダメパーティクル
			;(() => {
				const _pIdx = gameState.party.indexOf(targetP)
				const _pCard = getPartyCardEl(_pIdx)
				if (_pCard) { fxCardShake(_pCard); fxCardGlow(_pCard, 'fx-hit-glow-red', 350); const {x,y}=getElCenter(_pCard); fxText(x, y-10, `-${dmgVal}`, '#f87171', '1rem') }
			})()
			const tIdx = gameState.party.indexOf(targetP)
			let remaining = dmgVal
			// ガード：別のキャラがすべて肩代わり
			if (battle.guardIdx >= 0 && battle.guardIdx !== tIdx) {
				const guardian = gameState.party[battle.guardIdx]
				if (guardian && guardian.hp > 0) {
					// ガードキャラのシールドを先に消費
					const gShield = battle.shields.find(s => s.pIdx === battle.guardIdx)
					if (gShield) {
						const absorbed = Math.min(gShield.val, remaining)
						gShield.val -= absorbed
						remaining -= absorbed
						if (gShield.val <= 0) battle.shields = battle.shields.filter(s => s !== gShield)
						if (absorbed > 0) addLog(`${guardian.name}のシールドが ${absorbed} を吸収！`, 'log-sys')
					}
					if (remaining > 0) {
						const _gMul = battle._guardDmgMul || 1.0
						const _gDmg = Math.floor(remaining * _gMul)
						guardian.hp = Math.max(0, guardian.hp - _gDmg)
						addLog(`${guardian.name}が身代わり！ ${_gDmg}ダメージを肩代わり`, 'log-sys')
						// counterPow: 身代わり後カウンター
						if (battle._guardCounter && battle._guardCounter.pIdx === battle.guardIdx) {
							const _gc = battle._guardCounter
							const _gcFs = getFinalStats(guardian)
							const _gcAtk = _gc.dType === 'magic' ? _gcFs.matk : _gcFs.str
							const _gcDmg = Math.floor(_gcAtk * _gc.pow)
							const _gcTgt = battle.enemies.find(e => e.hp > 0)
							if (_gcTgt && _gcDmg > 0) {
								_gcTgt.hp = Math.max(0, _gcTgt.hp - _gcDmg)
								addLog(`⚡ ${guardian.name}の反撃！ ${_gcTgt.name}に${_gcDmg}ダメージ！`, 'log-p-atk')
							}
						}
					}
					return
				}
			}
			// シールド消費
			const shield = battle.shields.find(s => s.pIdx === tIdx)
			if (shield) {
				const absorbed = Math.min(shield.val, remaining)
				shield.val -= absorbed
				remaining -= absorbed
				if (shield.val <= 0) battle.shields = battle.shields.filter(s => s !== shield)
				if (absorbed > 0) addLog(`${targetP.name}のシールドが ${absorbed} を吸収！`, 'log-sys')
			}
			// 残りダメージをHP適用
			if (remaining > 0) targetP.hp = Math.max(0, targetP.hp - remaining)
			// ── タレント: on_hit（被ダメ時）──
			if (remaining > 0 && targetP.hp > 0) {
				fireTalentOnHit(targetP, remaining, null)
			}
		}
		async function enemyTurn() {
			if (!battle.active) return
			battle.turnCycle = (battle.turnCycle || 0) + 1
			const aliveParty = gameState.party.filter(p => p.hp > 0)
			if (aliveParty.length === 0) {
				handleDeath()
				return
			}
			for (let e of battle.enemies) {
				if (e.hp <= 0) continue
				// 気絶/フリーズ中は行動不能
				if (isEnemyStunned(e.id)) {
					addLog(`⚡ ${e.name} は行動不能！`, 'log-sys')
					continue
				}

				// 前衛がいれば前衛のみ、前衛が全滅したら後衛を攻撃（射程longの敵は後衛も狙える）
				const aliveFront = aliveParty.filter(p => p.row === 'front')
				let attackPool
				if (e.range === 'long') {
					// long射程: 前衛がいても後衛を狙える（前衛がいれば前衛優先75%）
					if (aliveFront.length > 0 && Math.random() < 0.75) {
						attackPool = aliveFront
					} else {
						attackPool = aliveParty
					}
				} else {
					// short射程: 前衛がいれば必ず前衛のみ攻撃
					attackPool = aliveFront.length > 0 ? aliveFront : aliveParty
				}
				const targetIndex = Math.floor(Math.random() * attackPool.length)
				const targetP = attackPool[targetIndex]

				// ===== ボス固有行動パターン =====

				// 5Fボス：草原の大粘体スライム（修正版：係数1.8、4ターンごと）

				let isGoldrasPattern = e.name === '猛毒菌王マルボロス'
				// 20Fボス：冥刃の死神デスリーパー

				// ・HPが50%以下で「死神の降臨」→全ステータス1.2倍

				// ・HP33%以下で「絶命の刺突」→全体に固定500ダメージ

				// ・5ターンごと「丸呑み」→単体HP×60%固定削り
				// ・HP50%以下で「狂乱」→毎ターン自己回復(maxHP×0.02)+ATK上昇

							applyDamageToPartyMember(t, res.val, 'log-e-atk')
							addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#a78bfa; border:1px solid #7c5cbf; border-radius:3px; padding:0 3px;\">特殊</span>`, 'log-e-atk')
						}
						updateBattleUI()
						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
						continue
					}
					// 3ターンごと「原初の咆哮」（全体超強力魔法）
					if (battle.turnCycle % 3 === 0) {
						playSE('magic');
						addLog('根源滅竜ヒュドラの原初の咆哮！ 七つの頭が咆える！', 'log-e-atk')
						const akDmg = Math.floor(e.atk * 4.0)
						const aliveAK3 = gameState.party.filter(p => p.hp > 0)
						for (let t of aliveAK3) {
							const ds = getFinalStats(t)
							const res = calcTacticalDamage({ str: 0, matk: akDmg, cri: 0.30, multiplier: 1.0 }, ds.vit, ds.mdef, t.lv, true, 'magic')
							applyDamageToPartyMember(t, res.val, 'log-e-atk')
							addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#a78bfa; border:1px solid #7c5cbf; border-radius:3px; padding:0 3px;\">特殊</span>`, 'log-e-atk')
						}
						updateBattleUI()
						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
						continue
					}
					// 通常攻撃（強攻撃30%）
					playSE('enemy_attack');
					const hyIsStrong = Math.random() < 0.30
					const dAK = getFinalStats(targetP)
					// 回避判定（プレイヤー側が回避できるか）
					const _evAK = rollEvasion(e.agi || 10, e.luk || 5, dAK.agi, dAK.luk, dAK._evaBonus || 0)
					if (_evAK) {
						const _pCrd = getPartyCardEl(gameState.party.indexOf(targetP))
						if (_pCrd) { const {x,y}=getElCenter(_pCrd); fxText(x, y-14, '💨 回避', '#60a5fa', '0.85rem') }
						addLog(`💨 ${targetP.name}は${e.name}の攻撃を<b style="color:#60a5fa;">回避</b>した！`, 'log-sys')
					} else {
					const resAK = calcTacticalDamage({ str: e.atk * (hyIsStrong ? 2.5 : 1.0), matk: 0, cri: 0.20, multiplier: 1.0 }, dAK.vit, dAK.mdef, 1, true, 'physical')
					applyDamageToPartyMember(targetP, resAK.val, 'log-e-atk')
					const hyLabel = hyIsStrong ? '根源の断（強撃）！' : '根源の爪'
					addLog(`根源滅竜ヒュドラの${hyLabel} ${targetP.name}に${resAK.val}ダメージ <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
					} // end evasion check

				} else {
					// ── 通常モンスターのスキル判定 ──
					if (e.skills && e.skills.length > 0 && !e.isBoss) {
						const roll = Math.random()
						let cumChance = 0
						let usedSkill = null
						for (const sk of e.skills) {
							cumChance += sk.chance
							if (roll < cumChance) { usedSkill = sk; break }
						}
						if (usedSkill) {
							playSE('magic')
							const alivePSk = gameState.party.filter(p => p.hp > 0)
							const aliveFrontSk = alivePSk.filter(p => p.row === 'front')
							const poolSk = e.range === 'long' ? alivePSk : (aliveFrontSk.length > 0 ? aliveFrontSk : alivePSk)
							const tgSk = poolSk[Math.floor(Math.random() * poolSk.length)]
							if (usedSkill.target === 'all') {
								addLog(`✨ ${e.name}の${usedSkill.msg || usedSkill.name}`, 'log-e-atk')
								const targets = [...alivePSk]
								for (const t of targets) {
									if (usedSkill.type === 'poison') {
										const pIdx = gameState.party.indexOf(t)
										const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='poison')
										if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'poison',turns:3,src:'enemy'})
										addLog(`☠ ${t.name}が毒状態に！`, 'log-e-atk')
									} else if (usedSkill.type === 'curse' || usedSkill.type === 'bleed') {
										const pIdx = gameState.party.indexOf(t)
										const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='bleed')
										if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'bleed',turns:3,src:'enemy'})
										addLog(`🩸 ${t.name}が<b style="color:#f87171;">出血</b>状態に！`, 'log-e-atk')
									} else if (usedSkill.type === 'freeze') {
										const pIdx = gameState.party.indexOf(t)
										const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='freeze')
										if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'freeze',turns:1,src:'enemy'})
										addLog(`❄ ${t.name}が<b style="color:#93c5fd;">凍結</b>！ 次のターン行動不能！`, 'log-e-atk')
									} else {
										const ds = getFinalStats(t)
										const dType = usedSkill.type === 'magic' ? 'magic' : 'physical'
										const res = calcTacticalDamage({str: dType==='physical'?Math.floor(e.atk*usedSkill.mult):0, matk: dType==='magic'?Math.floor(e.atk*usedSkill.mult):0, cri:0.05, multiplier:1.0}, ds.vit, ds.mdef, 1, true, dType)
										applyDamageToPartyMember(t, res.val, 'log-e-atk')
										addLog(`${t.name}に${res.val}ダメージ <span style="font-size:0.75em; color:${dType==='magic'?'#a78bfa':'#fb923c'}; border:1px solid ${dType==='magic'?'#7c5cbf':'#c2622a'}; border-radius:3px; padding:0 3px;">${dType==='magic'?'特殊':'物理'}</span>`, 'log-e-atk')
									}
								}
							} else {
								// single target
								if (usedSkill.type === 'poison') {
									const pIdx = gameState.party.indexOf(tgSk)
									const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='poison')
									if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'poison',turns:3,src:'enemy'})
									addLog(`✨ ${e.name}の${usedSkill.msg||usedSkill.name} → ${tgSk.name}が毒状態に！`, 'log-e-atk')
								} else if (usedSkill.type === 'drain') {
									const ds = getFinalStats(tgSk)
									const res = calcTacticalDamage({str:Math.floor(e.atk*usedSkill.mult),matk:0,cri:0.05,multiplier:1.0}, ds.vit, ds.mdef, 1, true, 'physical')
									applyDamageToPartyMember(tgSk, res.val, 'log-e-atk')
									const healAmt = Math.floor(res.val * 0.5)
									e.hp = Math.min(e.maxHp, e.hp + healAmt)
									addLog(`✨ ${e.name}の${usedSkill.msg||usedSkill.name} → ${tgSk.name}に${res.val}ダメージ、HP+${healAmt}回復！`, 'log-e-atk')
								} else if (usedSkill.type === 'curse' || usedSkill.type === 'bleed') {
									const pIdx = gameState.party.indexOf(tgSk)
									const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='bleed')
									if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'bleed',turns:3,src:'enemy'})
									addLog(`✨ ${e.name}の${usedSkill.msg||usedSkill.name} → ${tgSk.name}が<b style="color:#f87171;">出血</b>状態に！`, 'log-e-atk')
								} else if (usedSkill.type === 'freeze') {
									const pIdx = gameState.party.indexOf(tgSk)
									const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='freeze')
									if (!ex) (battle.partyDots=battle.partyDots||[]).push({pIdx,type:'freeze',turns:1,src:'enemy'})
									addLog(`✨ ${e.name}の${usedSkill.msg||usedSkill.name} → ${tgSk.name}が<b style="color:#93c5fd;">凍結</b>！ 次のターン行動不能！`, 'log-e-atk')
								} else {
									const dType = usedSkill.type === 'magic' ? 'magic' : 'physical'
									const ds = getFinalStats(tgSk)
									// 回避判定（単体スキルのみ）
									const _evSk = rollEvasion(e.agi||10, e.luk||5, ds.agi, ds.luk, ds._evaBonus || 0)
									if (_evSk) {
										const _skPCrd = getPartyCardEl(gameState.party.indexOf(tgSk))
										if (_skPCrd) { const {x,y}=getElCenter(_skPCrd); fxText(x, y-14, '💨 回避', '#60a5fa', '0.85rem') }
										addLog(`💨 ${tgSk.name}は${e.name}の${usedSkill.name}を<b style="color:#60a5fa;">回避</b>！`, 'log-sys')
									} else {
									const res = calcTacticalDamage({str: dType==='physical'?Math.floor(e.atk*usedSkill.mult):0, matk: dType==='magic'?Math.floor(e.atk*usedSkill.mult):0, cri:0.05,multiplier:1.0}, ds.vit, ds.mdef, 1, true, dType)
									applyDamageToPartyMember(tgSk, res.val, 'log-e-atk')
									addLog(`✨ ${e.name}の${usedSkill.msg||usedSkill.name} → ${tgSk.name}に${res.val}ダメージ <span style="font-size:0.75em; color:${dType==='magic'?'#a78bfa':'#fb923c'}; border:1px solid ${dType==='magic'?'#7c5cbf':'#c2622a'}; border-radius:3px; padding:0 3px;">${dType==='magic'?'特殊':'物理'}</span>`, 'log-e-atk')
									} // end skill evasion
								}
							}
							updateBattleUI()
							if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
							continue
						}
					}
					// フェンリル：HP50%以下で怒りの咆哮（1回のみ）→AGI×2
					if (e.name === '蒼牙の古狼フェンリル' && e.hp <= e.maxHp * 0.5 && !e.fenrirRage) {
						e.fenrirRage = true
						e.agi = Math.floor(e.agi * 2.0)
						addLog('蒼牙の古狼フェンリルが怒りの咆哮！ 速度が大幅上昇！', 'log-e-atk')
					}
					if (e.name === '蒼牙の古狼フェンリル' && battle.turnCycle % 2 === 0) {
						if (e.fenrirNextSkill === undefined) e.fenrirNextSkill = 0
						const skillId = e.fenrirNextSkill
						e.fenrirNextSkill = skillId === 0 ? 1 : 0

						if (skillId === 0) {
							playSE('enemy_attack');
							addLog('蒼牙の古狼フェンリルが吠える！ 能力が上昇！', 'log-sys')
							if (e.baseAtk === undefined) {
								e.baseAtk = e.atk
								e.baseAgi = e.agi
							}
							// 修正: 上限キャップを追加
							e.atk = Math.min(Math.floor(e.baseAtk * 1.5), Math.floor(e.atk * 1.3))
							e.agi = Math.min(Math.floor(e.baseAgi * 2.0), Math.floor(e.agi * 1.5))
							continue
						} else {
							playSE('enemy_attack');
							addLog('蒼牙の古狼フェンリルのハリケーン！', 'log-e-atk')
							const fenrirAtk = Math.floor(e.atk * 1.2)
							const fenrirStats = { cri: 0.05, multiplier: 1.0, matk: 0, str: fenrirAtk }
							const aliveParty = gameState.party.filter(p => p.hp > 0)
							for (let t of aliveParty) {
								const defenderStats = getFinalStats(t)
								const res = calcTacticalDamage(fenrirStats, defenderStats.vit, defenderStats.mdef, t.lv, true, 'physical')
								applyDamageToPartyMember(t, res.val, 'log-e-atk')
								addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
							}
							updateBattleUI()
							if (gameState.party.every(p => p.hp <= 0)) {
								handleDeath()
								return
							}
							continue
						}
					}
					playSE('enemy_attack');
					const defenderStats = getFinalStats(targetP)
					const defenderDef = defenderStats.vit ?? 0
					const defenderMDef = defenderStats.mdef ?? 0

					let currentAtk = e.atk
					battle.enemyDebuffs.forEach(d => {
						if (d.stat === 'atk') {
							currentAtk = d.val >= 1 ? currentAtk - d.val : Math.floor(currentAtk * (1 - d.val));
						}
					})
					currentAtk = Math.max(1, currentAtk)

					const res = calcTacticalDamage({ str: currentAtk, multiplier: 1.0, cri: 0.05, matk: 0 }, defenderDef, defenderMDef, 1, true, 'physical')
					applyDamageToPartyMember(targetP, res.val, 'log-e-atk')
					// 呪われし：敵攻撃時に毒付与
					if (e._poisonOnHit && targetP.hp > 0) {
						const pIdx = gameState.party.indexOf(targetP)
						const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='poison')
						if (!ex) (battle.partyDots = battle.partyDots||[]).push({ pIdx, type: 'poison', turns: 3, src: 'enemy' })
						addLog(`☠ ${e.name}の呪いで ${targetP.name} に毒！`, 'log-e-atk')
					}
					addLog(`${e.name}の攻撃：${targetP.name}に${res.val}ダメージ` + ` <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
				}

				updateBattleUI()
				if (gameState.party.every(p => p.hp <= 0)) {
					handleDeath()
					return
				}
				await new Promise(r => setTimeout(r, 600))
			}
			const nextStartIdx = gameState.party.findIndex(p => p.hp > 0)
			setTurn('player', nextStartIdx >= 0 ? nextStartIdx : 0)
			// 敵DoT/状態異常 & 味方リジェネのティック（プレイヤーターン開始時）
			tickEnemyEffects()
			tickPartyDots()
			tickPartyRegens()
			if (!battle.active) return
		}

		
		// ═══════════════════════════════════════════════════
		//   オート周回システム
		//   - 通常攻撃のみで現在フロアを繰り返し周回
		//   - HP が最大値の 25% を切ったら自動停止
		//   - ボスフロアでは開始不可
		// ═══════════════════════════════════════════════════

		function toggleAutoFarm() {
			if (autoFarm.active) {
				stopAutoFarm('手動停止')
			} else {
				beginAutoFarm()
			}
		}

		function toggleAfMenu() {
			const dd = document.getElementById('af-dropdown')
			if (!dd) return
			const isOpen = dd.style.display !== 'none'
			dd.style.display = isOpen ? 'none' : 'block'
		}
		// ドロップダウン外クリックで閉じる
		document.addEventListener('click', function(e) {
			const wrap = document.getElementById('af-header-wrap')
			const dd = document.getElementById('af-dropdown')
			if (wrap && dd && !wrap.contains(e.target)) dd.style.display = 'none'
		}, true)

		function _afHeaderShow(show) {
			const w = document.getElementById('af-header-wrap')
			if (w) w.style.display = show ? 'flex' : 'none'
		}

		function setAutoFarmSpeed(speed) {
			if (autoFarm.active) return
			autoFarm.speed = speed
			const map = { slow: 'af-btn-slow', normal: 'af-btn-normal', fast: 'af-btn-fast' }
			Object.entries(map).forEach(([s, id]) => {
				const el = document.getElementById(id)
				if (el) el.style.opacity = s === speed ? '1.0' : '0.5'
			})
		}

		function setAutoFarmSkills() {
			if (autoFarm.active) return
			autoFarm.useSkills = !autoFarm.useSkills
			const btn = document.getElementById('af-btn-skills')
			if (btn) btn.textContent = autoFarm.useSkills ? '✅ON' : '❌OFF'
		}

		function setAutoFarmHP(threshold) {
			if (autoFarm.active) return
			autoFarm.hpThreshold = threshold
			const map = { 0.10: 'af-hp-10', 0.25: 'af-hp-25', 0.50: 'af-hp-50' }
			Object.entries(map).forEach(([v, id]) => {
				const el = document.getElementById(id)
				if (el) el.style.opacity = parseFloat(v) === threshold ? '1.0' : '0.5'
			})
		}

				function beginAutoFarm() {
			if (battle.active) { showMsg('戦闘中は開始できません'); return }
			if (gameState.party.length === 0) { showMsg('パーティが空です'); return }
			if (!gameState.inDungeon) { showMsg('ダンジョン内でのみ使用できます'); return }
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				showMsg('ボス戦フロアでは周回できません'); return
			}
			if (gameState.party.every(p => p.hp <= 0)) { showMsg('全員戦闘不能です'); return }

			autoFarm.active = true
			autoFarm.floor  = gameState.floor
			autoFarm.kills  = 0
			autoFarm.gold   = 0
			autoFarm.exp    = 0

			_autoFarmSetButtonState(true)
			_autoFarmLockUI(true)
			addLog(`⚙ オート周回を開始しました [${autoFarm.floor}F]`, 'log-sys')
			_autoFarmUpdateDisplay()
			// すぐに戦闘開始
			_autoFarmNextBattle()
		}

		function stopAutoFarm(reason) {
			if (!autoFarm.active) return
			autoFarm.active = false
			if (autoFarm.timerId) { clearTimeout(autoFarm.timerId); autoFarm.timerId = null }
			_autoFarmSetButtonState(false)
			_autoFarmLockUI(false)
			addLog(`⚙ 周回停止 [${reason}]  ${autoFarm.kills}戦 / ${autoFarm.gold}G / ${autoFarm.exp}EXP`, 'log-sys')
			_autoFarmUpdateDisplay()
			// 戦闘中だった場合はダンジョン画面に戻す
			if (battle.active) {
				battle.active = false
				battle.turn = null
				setTimeout(() => {
					if (!gameState.inDungeon) return
					playBGM('dungeon')
					document.getElementById('battle-view').classList.add('hidden')
					document.getElementById('dungeon-ui').classList.remove('hidden')
					updateUI()
				}, 200)
			}
		}

		// ── ヘルパー：ボタン表示を切替 ──
		function _autoFarmSetButtonState(running) {
			const btn = document.getElementById('btn-auto-farm')
			if (!btn) return
			const dd = document.getElementById('af-dropdown')
			const statsRow = document.getElementById('af-stats-row')
			if (running) {
				btn.textContent = '⏹ 停止'
				btn.style.background = 'linear-gradient(135deg,#dc2626,#7f1d1d)'
				btn.style.borderColor = '#991b1b'
				if (dd) dd.style.display = 'none'
				if (statsRow) statsRow.style.display = 'block'
			} else {
				btn.textContent = '⚙ オート'
				btn.style.background = 'linear-gradient(135deg,#7c3aed,#4338ca)'
				btn.style.borderColor = '#5b21b6'
				if (statsRow) statsRow.style.display = 'none'
			}
		}

		// ── ヘルパー：探索/帰還ボタンの enabled/disabled ──
		function _autoFarmLockUI(lock) {
			const ids = ['btn-explore', 'btn-retreat', 'btn-next-floor']
			ids.forEach(id => {
				const el = document.getElementById(id)
				if (el) el.disabled = lock
			})
			// 戦闘ボタンも手動操作ロック
			const atkBtn = document.getElementById('atk-btn')
			const sklBtn = document.getElementById('skl-btn')
			if (atkBtn) atkBtn.style.opacity = lock ? '0.4' : '1'
			if (sklBtn) sklBtn.style.opacity = lock ? '0.4' : '1'
		}

		// ── ヘルパー：event-display に周回状況を表示 ──
		function _autoFarmUpdateDisplay() {
			// ヘッダー統計を更新
			const sk = document.getElementById('af-stat-kills')
			const sg = document.getElementById('af-stat-gold')
			const se = document.getElementById('af-stat-exp')
			if (sk) sk.textContent = autoFarm.kills + '戦'
			if (sg) sg.textContent = autoFarm.gold + 'G'
			if (se) se.textContent = autoFarm.exp + 'EXP'
			// event-display は周回中のみ表示
			const disp = document.getElementById('event-display')
			if (!disp) return
			if (autoFarm.active) {
				const speedLabel = autoFarm.speed === 'fast' ? '⚡速' : autoFarm.speed === 'slow' ? '🐢遅' : '▶標準'
				disp.innerHTML = `<div style="line-height:1.5;font-size:0.82rem;">
					<span style="color:#a78bfa;font-weight:bold;">⚙ 周回中 [${autoFarm.floor}F]</span>
					<span style="color:#555;font-size:0.68rem;margin-left:6px;">${speedLabel}</span><br>
					<span style="color:#4ade80;">${autoFarm.kills}戦</span>
					<span style="color:#444;"> | </span>
					<span style="color:var(--gold);">${autoFarm.gold}G</span>
					<span style="color:#444;"> | </span>
					<span style="color:#60a5fa;">${autoFarm.exp}EXP</span>
				</div>`
			} else {
				disp.textContent = '不気味な静寂...'
			}
		}

		// ── _autoFarmNextBattle: 実際の戦闘画面を使って次の戦闘を開始 ──
		function _autoFarmNextBattle() {
			if (!autoFarm.active || !gameState.inDungeon) return
			// ボスフロアに来た場合は停止
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				stopAutoFarm('ボスフロアに到達')
				return
			}
			// 生存チェック
			const alive = gameState.party.filter(p => p.hp > 0)
			if (alive.length === 0) { stopAutoFarm('全員戦闘不能'); return }
			const minRatio = Math.min(...alive.map(p => p.hp / getFinalStats(p).maxHp))
			if (minRatio <= autoFarm.hpThreshold) {
				stopAutoFarm(`HP危険域 (${Math.round(minRatio*100)}%以下)`)
				return
			}
			// 通常探索イベント（罠・宝箱など）をスキップして直接戦闘
			startBattle(false)
		}

		// ── 自動行動: プレイヤーターンを自動で実行 ──
		function _autoFarmDoPlayerAction() {
			if (!autoFarm.active || !battle.active || battle.isProcessing) return
			if (battle.turn !== 'player') return
			const p = gameState.party[battle.activeUnitIndex]
			if (!p || p.hp <= 0) { nextTurn(); return }

			// スキルを使うかどうか判断
			if (autoFarm.useSkills) {
				const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
				const jobSkills = jobKey ? JOB_DATA[jobKey].skills : null
				if (jobSkills) {
					const MILESTONES_LOCAL = [2,5,7,10,12,15,17,20,25,30,33,35,38,40,43,45,48,50]
					for (const lv of MILESTONES_LOCAL) {
						const sIdx = p.learnedSkills[lv]
						if (sIdx === undefined) continue
						const s = jobSkills[lv]?.[sIdx]
						if (!s || s.type === 'passive') continue
						const cd = (p.skillCooldowns && p.skillCooldowns[lv]) || 0
						if (cd > 0) continue
						// MPコスト確認
						const pIdxAf = gameState.party.indexOf(p)
						const disc = (battle.mpCostDown||[]).find(m=>m.pIdx===pIdxAf)
						const eff = disc ? Math.max(0,Math.floor(s.cost*(1-disc.val))) : s.cost
						if (p.mp < eff) continue
						// オート優先度スキップ（passive,guard,mpcost は手動判断が難しいためスキップ）
						if (s.type === 'guard') continue
						// HP回復は自身 or 全体
						if (s.type === 'heal') {
							const needHeal = gameState.party.some(m => m.hp > 0 && m.hp / getFinalStats(m).maxHp < 0.6)
							if (!needHeal) continue
						}
						// 再生は MP が余っているときだけ
						if (s.type === 'regen') {
							const hasRegen = (battle.partyRegens||[]).some(r => r.pIdx===gameState.party.indexOf(p) && r.turns > 1)
							if (hasRegen) continue
						}
						// shield / buff は一定周期で使う（毎ターン無駄に使わない）
						if (s.type === 'shield' || s.type === 'buff') {
							const hasShield = (battle.shields||[]).find(sh=>sh.pIdx===gameState.party.indexOf(p))
							if (s.type === 'shield' && hasShield && hasShield.turns > 1) continue
						}
						// スキル実行
						const aliveE = battle.enemies.filter(e=>e.hp>0)
						const needsTarget = (s.type === 'atk' || s.type === 'atk_dot' || s.type === 'atk_debuff' || s.type === 'atk_multi' || s.type === 'poison' || s.type === 'bleed' || s.type === 'stun' || s.type === 'freeze') && s.target !== 'all' && s.eTarget !== 'all' && aliveE.length > 1
						const needsPartyTarget = s.type === 'heal' && s.target === 'single'
						battle.targeting = null
						battle.pendingSkill = null
						if (needsTarget) {
							// 射程チェック：短射程なら前衛の敵のみ対象
							let _afSkPool = aliveE
							if (getWeaponRange(p) === 'short') {
								const _afFront = aliveE.filter(e => e.row !== 'back')
								if (_afFront.length > 0) _afSkPool = _afFront
							}
							const tgt = _afSkPool.reduce((a,b) => a.hp < b.hp ? a : b)
							executeSkill(s, tgt, lv)
						} else if (needsPartyTarget) {
							// 最もHP%が低い生存メンバー
							const tgt = gameState.party.filter(m=>m.hp>0).reduce((a,b) => (a.hp/getFinalStats(a).maxHp) < (b.hp/getFinalStats(b).maxHp) ? a : b)
							executeSkill(s, tgt, lv)
						} else {
							executeSkill(s, null, lv)
						}
						return
					}
				}
			}
			// スキルなし → 通常攻撃
			const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
			if (!aliveEnemies.length) return
			battle.remainingHits = (p.equip?.weapon?.hits) || 1
			// 射程チェック：短射程武器＋後衛は前衛の敵のみ狙う
			const _afWRange = getWeaponRange(p)
			let _afTargetPool = aliveEnemies
			if (_afWRange === 'short') {
				const _frontAlive = aliveEnemies.filter(e => e.row !== 'back')
				if (_frontAlive.length > 0) _afTargetPool = _frontAlive
			}
			const target = _afTargetPool.reduce((a,b) => a.hp < b.hp ? a : b)
			executeAttack(target)
		}

		// ── handleDeath をオート周回でフックする ──

function winBattle() {
			playSE('win');
			battle.active = false
			battle.turn = null
			battle.remainingHits = 0
			let g = 0,
				x = 0
			battle.enemies.forEach(e => {
				const _eliteMult = e._isElite
					? (e.eliteTier === 'Legend' ? 3.0 : e.eliteTier === 'Rare' ? 2.0 : 1.5)
					: 1.0
				g += Math.floor(e.gold * _eliteMult)
				x += Math.floor(e.exp  * _eliteMult)
				if (e.isBoss) {
					const wasSmithUnlocked = gameState.bossDefeated.includes(20)
					gameState.bossDefeated.push(gameState.floor)
					gameState.stairsFound = true
					if (!wasSmithUnlocked && gameState.floor === 20) {
						setTimeout(() => showNotify({
							type: 'unlock',
							icon: '🔨',
							label: '新施設解禁',
							title: '鍛冶屋が開店した！',
							sub: '第20層のボスを討伐したことで、街に<b style="color:#f9a825;">鍛冶屋</b>が開店しました！<br>装備品に <b style="color:#60a5fa;">エンチャント</b> を付与してさらに強化できます。',
						}), 1200)
					}
				}
			})
			gameState.tempGold += g
			// ゴールドボーナス（全パーティのgoldBonusを平均）
			const _aliveParty = gameState.party.filter(p => p.hp > 0)
			if (_aliveParty.length > 0) {
				const _goldBonusPct = _aliveParty.reduce((sum, p) => sum + (getFinalStats(p)._goldBonus || 0), 0) / _aliveParty.length
				if (_goldBonusPct > 0) gameState.tempGold += Math.floor(g * _goldBonusPct / 100)
			}
			gameState.party.forEach(p => {
				if (p.hp <= 0) return  // 死亡中は経験値なし
				const _pFs = getFinalStats(p)
				const _expBonusPct = _pFs._expBonus || 0
				const _expGain = _expBonusPct > 0 ? Math.floor(x * (1 + _expBonusPct / 100)) : x
				p.exp += _expGain
				while (p.exp >= p.nextExp) levelUp(p)
			})
			addLog(`⚔️ 勝利！ ${g}G / ${x}EXP 獲得。`, 'log-gold')
			fxVictory()
			// 秘宝を抱く：最高到達Tierのレジェンダリー確定ドロップ
			battle.enemies.forEach(e => {
				if (e._legendDrop && gameState.inventory.length < getMaxCapacity()) {
					const types = ['weapon','armor','acc']
					const t = types[Math.floor(Math.random()*types.length)]
					// 最高到達フロアに対応したショップの最高Tier
					const shopMaxTier = Math.min(5, Math.floor((gameState.maxFloor - 1) / 10) + 1)
					let pool = SHOP_ITEMS[t].filter(i => i.tier === shopMaxTier)
					if (pool.length === 0) pool = SHOP_ITEMS[t].filter(i => i.tier <= shopMaxTier)
					if (pool.length > 0) {
						const base = { ...pool[Math.floor(Math.random()*pool.length)], type: t, locked: false }
						// レジェンダリー確定ドロップ
						base.rarityLabel = 'レジェンダリー'
						base.rarityColor = '#ff9800'
						// サブ効果を4つ付与
						const SUB_POOL = [
							{ n: 'HP+', k: 'maxHp', min: 20, max: 80 }, { n: 'MP+', k: 'maxMp', min: 10, max: 40 },
							{ n: 'ATK+', k: 'str', min: 10, max: 50 }, { n: 'MATK+', k: 'matk', min: 10, max: 50 },
							{ n: 'DEF+', k: 'vit', min: 8, max: 30 }, { n: 'AGI+', k: 'agi', min: 5, max: 20 },
							{ n: 'LUK+', k: 'luk', min: 5, max: 15 },
						]
						base.subEffects = []
						const used = new Set()
						while (base.subEffects.length < 4) {
							const sub = SUB_POOL[Math.floor(Math.random()*SUB_POOL.length)]
							if (used.has(sub.k)) continue
							used.add(sub.k)
							base.subEffects.push({ n: sub.n, k: sub.k, v: sub.min + Math.floor(Math.random()*(sub.max-sub.min+1)) })
						}
						// ステータスをレジェンダリー倍率(2.5倍)で強化
						if (base.s) {
							for (let k in base.s) {
								if (typeof base.s[k] === 'number' && k !== 'cap' && k !== 'cri') {
									base.s[k] = Math.floor(base.s[k] * 2.5)
								}
							}
						}
						gameState.inventory.push(base)
						addLog(`✨✨ ${e.name}から伝説の秘宝 【Tier${shopMaxTier} レジェンダリー ${base.n}】 を入手！`, 'log-gold')
						setTimeout(() => showNotify({
							type: 'legendary',
							icon: '👑',
							label: 'レジェンダリー入手',
							title: base.n,
							sub: `<b style="color:#f9a825;">${e.name}</b> から伝説の秘宝を入手！<br><span style="color:#ff9800;">Tier${shopMaxTier} ★★★★ レジェンダリー</span>`,
						}), 800)
					}
				}
			})
			// オート周回の累計に加算
			if (autoFarm.active) { autoFarm.gold += g; autoFarm.exp += x }
			setTimeout(() => {
				// 全滅処理（handleDeath）が先に走った場合は何もしない
				if (!gameState.inDungeon) return
				playBGM('dungeon');
				document.getElementById('battle-view').classList.add('hidden')
				document.getElementById('dungeon-ui').classList.remove('hidden')
				if (gameState.stairsFound) {
					document.getElementById('btn-next-floor').classList.remove('hidden')
				}
				updateUI()
				tutHook('battle_win')
				// オート周回中なら次の戦闘を自動開始
				if (autoFarm.active) {
					autoFarm.kills++
					_autoFarmUpdateDisplay()
					const _alive = gameState.party.filter(p => p.hp > 0)
					if (_alive.length === 0) { stopAutoFarm('全員戦闘不能'); return }
					const _minR = Math.min(..._alive.map(p => p.hp / getFinalStats(p).maxHp))
					if (_minR <= autoFarm.hpThreshold) { stopAutoFarm(`HP危険域 (${Math.round(_minR*100)}%以下)`); return }
					const _delay = autoFarm.speed === 'fast' ? 300 : autoFarm.speed === 'slow' ? 1500 : 700
					autoFarm.timerId = setTimeout(_autoFarmNextBattle, _delay)
				}
			}, 500)
		}

		let _notifyTimer = null
		function showNotify({ type, icon, label, title, sub, autoClose = 0 }) {
			// type: 'legendary' | 'unlock' | 'hire'
			const overlay = document.getElementById('notify-overlay')
			const box     = document.getElementById('notify-box')
			if (!overlay || !box) return
			document.getElementById('notify-icon').textContent  = icon  || ''
			document.getElementById('notify-label').textContent = label || ''
			document.getElementById('notify-label').style.color = type === 'legendary' ? '#ff9800' : type === 'hire' ? '#4ade80' : '#60a5fa'
			document.getElementById('notify-title').textContent = title || ''
			document.getElementById('notify-title').style.color = type === 'legendary' ? '#ff9800' : type === 'hire' ? '#4ade80' : '#60a5fa'
			document.getElementById('notify-sub').innerHTML     = sub   || ''
			box.className = type || ''
			overlay.style.display = 'flex'
			requestAnimationFrame(() => requestAnimationFrame(() => box.classList.add('active')))
			// SE再生
			if (type === 'legendary') playSE('legendary')
			else if (type === 'unlock') playSE('unlock')
			else if (type === 'hire')   playSE('win')
			if (_notifyTimer) clearTimeout(_notifyTimer)
			if (autoClose > 0) _notifyTimer = setTimeout(closeNotify, autoClose)
		}
		function closeNotify() {
			const overlay = document.getElementById('notify-overlay')
			const box     = document.getElementById('notify-box')
			if (!box) return
			box.classList.remove('active')
			setTimeout(() => { if (overlay) overlay.style.display = 'none' }, 350)
		}

		// 習得可能スキルがあるか判定
		function hasLearnableSkill(p) {
			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
			if (!jobKey) return false
			const tree = JOB_DATA[jobKey].skills
			return MILESTONES.some(lv => {
				if (!tree[lv]) return false
				if (p.lv < lv) return false
				if (p.learnedSkills[lv] !== undefined) return false
				// enhance の場合: 対応する target_lv のスキルを習得済みなら表示対象
				const candidates = tree[lv]
				const hasVisible = candidates.some(s => {
					if (s.type === 'enhance') {
						const tl = p.learnedSkills[s.target_lv]
						return tl !== undefined && tl === s.option
					}
					return true
				})
				return hasVisible
			})
		}

				function levelUp(p) {
			const prevMaxMember = getMaxMemberCount()
			p.lv++
			p.exp -= p.nextExp
			p.nextExp = Math.floor(p.nextExp * 1.55)
			const fs = getFinalStats(p)
			p.hp = fs.maxHp
			p.mp = fs.maxMp
			addLog(`${p.name}が Lv.${p.lv} に上がった！`, 'log-sys')
			// 雇用枠解禁チェック
			const newMaxMember = getMaxMemberCount()
			if (newMaxMember > prevMaxMember) {
				const thresholds = { 2: 'Lv10', 4: 'Lv20', 6: 'Lv30', 8: 'Lv50' }
				const label = thresholds[newMaxMember] || `Lv${p.lv}`
				setTimeout(() => showNotify({
					type: 'hire',
					icon: '🎉',
					label: '仲間解禁',
					title: `仲間を雇えるようになった！`,
					sub: `<b style="color:#4ade80;">${p.name}</b> が ${label} に到達！<br>ギルドで最大 <b style="color:#fde68a;">${newMaxMember}人</b> まで雇えるようになりました。`,

		function confirmImportChar() {
			const code = document.getElementById('import-code').value
			if (!code) {
				showMsg('コードを入力してください')
				playSE('error')
				return
			}
			try {
				const json = decodeURIComponent(escape(atob(code)))
				const char = JSON.parse(json)

				if (!char.name || !char.job) {
					throw new Error('Invalid data')
				}

				const allMembersTotal = gameState.party.length + (gameState.guildBench||[]).length
				if (allMembersTotal >= getMaxMemberCount()) {
					showMsg(getNextHireRequirement() || '上限に達しています')
					playSE('error')
					return
				}

				if (!char.equip) char.equip = { weapon: null, armor: null, acc: null, runes: [] }
				if (!char.equip.runes) char.equip.runes = []
				// 受取日時を _meta に記録
				const _rNow = new Date()
				const _rDate = _rNow.getFullYear() + '/' + String(_rNow.getMonth()+1).padStart(2,'0') + '/' + String(_rNow.getDate()).padStart(2,'0') + ' ' + String(_rNow.getHours()).padStart(2,'0') + ':' + String(_rNow.getMinutes()).padStart(2,'0')
				char._meta = char._meta || {}
				char._meta.receivedAt = _rDate
				if (char.equip.runes.length > 3) char.equip.runes = char.equip.runes.slice(0, 3)

				const fs = getFinalStats(char)
				char.hp = fs.maxHp
				char.mp = fs.maxMp

				if (gameState.party.length < 4) {
					gameState.party.push(char)
					addLog(`${char.name}(インポート)がパーティに加わりました！`, 'log-sys')
				} else {
					gameState.guildBench = gameState.guildBench || []
					gameState.guildBench.push(char)
					addLog(`${char.name}(インポート)がギルド待機に加わりました。`, 'log-sys')
				}
				save_game()
				updateUI()
				// インポート成功後に meta 情報を表示
				const _m = char._meta || {}
				const _metaHtml = [
					_m.createdAt  ? `<span style="color:#666;">作成日：</span><span style="color:#aaa;">${_m.createdAt}</span>` : '',
					_m.sharedAt   ? `<span style="color:#666;">共有日：</span><span style="color:#4ade80;">${_m.sharedAt}</span>` : '',
					_m.shareCount ? `<span style="color:#666;">共有回数：</span><span style="color:#f9a825;">第${_m.shareCount}回</span>` : '',
					_m.receivedAt ? `<span style="color:#666;">受取日：</span><span style="color:#60a5fa;">${_m.receivedAt}</span>` : '',
					_m.gameVer    ? `<span style="color:#666;">Ver：</span><span style="color:#888;">${_m.gameVer}</span>` : '',
				].filter(Boolean).join('<br>')
				const c2 = document.getElementById('modal-content')
				c2.innerHTML = `
					<div style="text-align:center;padding:12px 0 6px;">
						<div style="font-size:2rem;margin-bottom:6px;">✅</div>
						<h2 style="margin:0 0 10px;color:#4ade80;">雇用完了！</h2>
						<div style="font-size:0.95rem;font-weight:bold;color:#eee;margin-bottom:8px;">${char.name} <span style="color:#888;font-size:0.8rem;">${char.job} Lv${char.lv}</span></div>

					<button onclick="openGuild('manage')" class="btn-action btn-blue" style="width:100%;padding:11px;">← メンバー管理へ</button>`

		function learnSkill(pIdx, lv, sIdx) {
			if (battle.active) { showMsg('⚠️ 戦闘中はスキルを習得できません'); playSE('error'); return; }
			const p = gameState.party[pIdx]
			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
			const tree = JOB_DATA[jobKey] ? JOB_DATA[jobKey].skills : null
			if (!tree) return
			const s = tree[lv] ? tree[lv][sIdx] : null
			if (!s) return

			// enhance: 強化パラメータをキャラ側の skillUpgrades に保存（JOB_DATAは変更しない）
			if (s.type === 'enhance') {
				p.learnedSkills[lv] = sIdx
				p.skillUpgrades = p.skillUpgrades || {}
				// choices形式: sIdx が choices内の選択インデックス
				if (s.choices && s.choices[sIdx]) {
					const chosen = s.choices[sIdx]
					p.skillUpgrades[s.target_lv] = { ...chosen.upgrade, _enhanceName: chosen.n }
					addLog(`【強化】${p.name}がスキルを強化した：${chosen.n}`, 'log-sys')
				} else {
					// 旧形式フォールバック
					p.skillUpgrades[s.target_lv] = { ...s.upgrade, _enhanceName: s.n }
					addLog(`【強化】${p.name}がスキルを強化した：${s.n}`, 'log-sys')
				}
			} else if (s.type === 'talent') {
				p.learnedSkills[lv] = sIdx  // talent記録
				p.talents = p.talents || {}
				p.talents[s.n] = s  // タレント辞書に格納
				addLog(`【タレント習得】${p.name}：${s.n} - ${s.d}`, 'log-sys')
			} else {
				p.learnedSkills[lv] = sIdx
				addLog(`【スキル習得】${p.name}：${s.n || s.d}`, 'log-sys')
			}
			updateUI()
			openTraining(pIdx)
		}

		function fireTalentOnKill(p) {
			const talents = p.talents || {}
			const fs = getFinalStats(p)
			Object.values(talents).forEach(t => {
				if (!t || t.trigger !== 'on_kill') return
				const ef = t.effect || {}
				// HP回復
				if (ef.healPct && p.hp > 0) {
					const amt = Math.floor(fs.maxHp * ef.healPct)
					p.hp = Math.min(fs.maxHp, p.hp + amt)
					addLog(`✨ ${p.name}「${t.n}」発動！ HP+${amt}`, 'log-sys')
					const _c = getPartyCardEl(gameState.party.indexOf(p))
					if (_c) { const {x,y}=getElCenter(_c); fxText(x, y-14, `+${amt}HP`, '#4ade80', '0.85rem') }
				}
				// MP回復
				if (ef.mpRecoverPct && p.hp > 0) {
					const amt = Math.floor(fs.maxMp * ef.mpRecoverPct)
					p.mp = Math.min(fs.maxMp, p.mp + amt)
					addLog(`✨ ${p.name}「${t.n}」発動！ MP+${amt}`, 'log-sys')
					const _c = getPartyCardEl(gameState.party.indexOf(p))
					if (_c) { const {x,y}=getElCenter(_c); fxText(x, y-14, `+${amt}MP`, '#38bdf8', '0.85rem') }
				}
			})
		}

		function fireTalentOnHit(p, dmgDealt, attacker) {
			const talents = p.talents || {}
			Object.values(talents).forEach(t => {
				if (!t || t.trigger !== 'on_hit') return
				const ef = t.effect || {}
				// カウンター攻撃
				if (ef.counterChance && attacker && Math.random() < ef.counterChance && p.hp > 0) {
					const fs = getFinalStats(p)
					const atkStat = ef.dType === 'magic' ? fs.matk : fs.str
					const ctrDmg = Math.max(1, Math.floor(atkStat * ef.counterPow))
					attacker.hp = Math.max(0, attacker.hp - ctrDmg)
					addLog(`⚡ ${p.name}「${t.n}」カウンター！ ${attacker.name}に${ctrDmg}ダメージ！`, 'log-p-atk')
					const _ec = getEnemyCardEl(attacker)
					if (_ec) fxPhysicalAttack(_ec, ctrDmg, false)
				}
				// MDEF デバフ付与
				if (ef.mdefDebuffChance && attacker && Math.random() < ef.mdefDebuffChance && attacker.hp > 0) {
					const existing = (battle.enemyDebuffs||[]).find(d => d.stat === 'mdef')
					if (!existing) {
						(battle.enemyDebuffs = battle.enemyDebuffs || []).push({ stat: 'mdef', val: ef.mdefDebuffVal })
						addLog(`✨ ${p.name}「${t.n}」発動！ 敵MDEF-${Math.floor(ef.mdefDebuffVal*100)}%！`, 'log-sys')
					}
				}
				// MPダメージ吸収（マナ・シールド: ダメージの一部をMPで肩代わり）
				if (ef.mpAbsorbPct && p.hp > 0 && p.mp > 0) {
					const absorbed = Math.min(Math.floor(dmgDealt * ef.mpAbsorbPct), p.mp)
					if (absorbed > 0) {
						p.mp -= absorbed
						p.hp = Math.min(getFinalStats(p).maxHp, p.hp + absorbed)
						addLog(`💙 ${p.name}「${t.n}」発動！ ${absorbed}ダメージをMPで軽減！`, 'log-sys')
					}
				}
			})
		}

		function executeSkillReset(pIdx) {
			const p = gameState.party[pIdx]
			if (gameState.gold < SKILL_RESET_COST) { showMsg('ゴールドが不足しています'); return }
			gameState.gold -= SKILL_RESET_COST
			// スキルデータをすべてクリア
			p.learnedSkills = {}
			p.skillUpgrades = {}
			p.talents = {}
			// 装備スキルもクリア（習得済みスキルがなくなるため）
			p.equippedSkills = []
			save_game()
			updateUI()
			addLog(`🔄 ${p.name} のスキルツリーをリセットしました。(${SKILL_RESET_COST.toLocaleString()}G)`, 'log-sys')
			openTraining(pIdx)

		function addEquippedSkill(pIdx, lv, sIdx) {
			const p = gameState.party[pIdx]
			p.equippedSkills = p.equippedSkills || []
			if (p.equippedSkills.length >= 5) return
			if (p.equippedSkills.some(e => e.lv === Number(lv) && e.sIdx === Number(sIdx))) return
			// s は保存せず lv と sIdx のみ保存（セーブ後も JOB_DATA から復元可能）
			p.equippedSkills.push({ lv: Number(lv), sIdx: Number(sIdx) })
			save_game(true)
			openSkillEquip(pIdx)
		}

		// equippedSkillsのエントリからスキルオブジェクトを取得（強化適用済み）
		function resolveEquippedSkill(p, entry) {
			if (!entry) return null
			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
			if (!jobKey) return null
			const skills = JOB_DATA[jobKey].skills
			if (!skills[entry.lv]) return null
			const base = skills[entry.lv][entry.sIdx]
			if (!base) return null
			// skillUpgrades があれば上書きを合成して返す（JOB_DATAは汚染しない）
			const upg = p.skillUpgrades && p.skillUpgrades[entry.lv]
			if (upg) return { ...base, ...upg }
			return base
		}

		// 任意の lv/sIdx からスキルオブジェクトを取得（強化適用済み）
		function resolveSkill(p, lv, sIdx) {
			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
			if (!jobKey) return null
			const skills = JOB_DATA[jobKey].skills
			const base = skills[lv] ? skills[lv][sIdx] : null
			if (!base) return null
			const upg = p.skillUpgrades && p.skillUpgrades[lv]
			if (upg) return { ...base, ...upg }
			return base
		}

		function removeEquippedSkill(pIdx, slotIdx) {
			const p = gameState.party[pIdx]
			p.equippedSkills = p.equippedSkills || []
			p.equippedSkills.splice(slotIdx, 1)
			save_game(true)
			openSkillEquip(pIdx)
		}

			const existing = document.getElementById('_toast_el')
			if (existing) existing.remove()
			const el = document.createElement('div')
			el.id = '_toast_el'
			el.style.cssText = `position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99999;
				background:#111;border:1px solid ${color};border-radius:8px;
				padding:8px 18px;color:${color};font-size:0.88rem;font-weight:bold;
				box-shadow:0 4px 20px rgba(0,0,0,0.8);pointer-events:none;
				animation:_toastIn 0.2s ease;white-space:nowrap;`
			el.textContent = msg
			document.body.appendChild(el)
			setTimeout(() => {
				el.style.transition = 'opacity 0.3s'
				el.style.opacity = '0'
				setTimeout(() => el.remove(), 350)
			}, duration)
		}

		function showEnchantPopup({ success, result, itemName, prevEnchant, cost }) {
			const overlay = document.getElementById('enchant-popup-overlay')
			const box     = document.getElementById('enchant-popup-box')
			const icon    = document.getElementById('enchant-popup-icon')
			const title   = document.getElementById('enchant-popup-title')
			const sub     = document.getElementById('enchant-popup-sub')
			const detail  = document.getElementById('enchant-popup-detail')
			const costEl  = document.getElementById('enchant-popup-cost')
			const parts   = document.getElementById('enchant-particles')
			if (!overlay) return

			// 前の状態をリセット
			box.className = ''
			box.classList.remove('enchant-appear','enchant-shake')
			parts.innerHTML = ''
			icon.innerHTML = title.innerHTML = sub.innerHTML = detail.innerHTML = costEl.textContent = ''

			if (success && result) {
				// ─── 成功 ───────────────────────────────────────────────
				const lvColors = { 1:'#a0a0a0', 2:'#60a5fa', 3:'#f0c060' }
				const lvColor  = lvColors[result.level] || '#f9a825'
				const lvLabels = { 1:'NORMAL', 2:'✦ RARE ✦', 3:'★ LEGENDARY ★' }
				const lvLabel  = lvLabels[result.level] || ''

				box.classList.add('success')
				void box.offsetWidth // reflow
				box.classList.add('enchant-appear')

				icon.innerHTML = `<div style="font-size:3.2rem;line-height:1.1;animation:enchantPulse 1.4s ease infinite;color:${lvColor};">${result.icon||'✨'}</div>`

				title.innerHTML = `<div style="font-size:1.35rem;font-weight:bold;letter-spacing:1px;color:${lvColor};margin-bottom:4px;">【 ${result.name} 】</div>
					<div style="font-size:0.68rem;padding:3px 14px;display:inline-block;border-radius:20px;background:${lvColor}22;border:1px solid ${lvColor}88;color:${lvColor};letter-spacing:3px;">${lvLabel}</div>`

				// リロール矢印 or 新規付与
				const arrowHtml = prevEnchant
					? `<div style="font-size:0.82rem;color:#666;margin-bottom:6px;">
						<span style="text-decoration:line-through;color:#444;">${prevEnchant.icon||''} ${prevEnchant.name}</span>

						<span style="color:${lvColor};">${result.icon||''} ${result.name}</span>

					<div style="font-size:0.82rem;color:#b0b0b0;">
						<span style="color:#666;">対象：</span><b style="color:#ddd;">${itemName}</b>
					</div></div>`

				// エフェクト説明（val%に置換）
				const allEnch = [...(ENCHANT_DATA.weapon||[]),...(ENCHANT_DATA.armor||[])]
				const meta    = allEnch.find(e => e.id === result.id)
				if (meta) {
					const pct = Math.round(result.val * 100)
					const descText = meta.desc.replace('〇', `${pct}`)
					detail.innerHTML = `<div style="background:rgba(255,255,255,0.04);border:1px solid ${lvColor}33;
						border-radius:10px;padding:10px 14px;font-size:0.8rem;color:#b0b0b0;line-height:1.6;margin-top:12px;">
						${meta.icon} <b style="color:${lvColor};">${result.name}</b><br>
						<span style="color:#888;">${descText}</span>
					</div>`
				}

				// パーティクル生成
				const pCount  = result.level === 3 ? 20 : result.level === 2 ? 10 : 5
				const pEmojis = result.level === 3 ? ['★','✦','🌟','⭐','💫'] : ['✨','💫','⚡']
				for (let i = 0; i < pCount; i++) {
					const p = document.createElement('div')
					p.style.cssText = [
						'position:absolute',
						`left:${5+Math.random()*90}%`,
						`bottom:${Math.random()*60+10}%`,
						`font-size:${0.6+Math.random()*1.2}rem`,
						`animation:enchantFloat ${1.0+Math.random()*1.8}s ease ${Math.random()*0.9}s both`,
						'pointer-events:none',
						`color:${lvColor}`,
					].join(';')
					p.textContent = pEmojis[Math.floor(Math.random()*pEmojis.length)]
					parts.appendChild(p)
				}

				playSE(result.level === 3 ? 'critical' : 'win')

			} else {
				// ─── 失敗 ───────────────────────────────────────────────
				box.classList.add('failure')
				void box.offsetWidth
				setTimeout(() => { box.classList.add('enchant-shake'); setTimeout(()=>box.classList.remove('enchant-shake'),450) }, 80)

				icon.innerHTML  = '<div style="font-size:3.2rem;line-height:1.1;color:#444;">💨</div>'
				title.innerHTML = '<div style="font-size:1.2rem;font-weight:bold;color:#555;letter-spacing:1px;">エンチャント失敗</div>'

					? `<div style="margin-top:10px;font-size:0.8rem;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:8px;padding:8px 12px;color:#555;">

				sub.innerHTML    = `<div style="margin-top:8px;color:#4a4a4a;font-size:0.85rem;">魔力が霧散してしまった…</div>`

		// サブステータスリロール結果モーダル
		function showSubRerollResult(item, prevSubs, cost, idx, filterType) {
			const c = document.getElementById('modal-content')
			const nameColor = item.rarityColor || '#eee'
			const statLabel = { maxHp:'HP+', maxMp:'MP+', str:'ATK+', matk:'MATK+', vit:'DEF+', mdef:'MDEF+', agi:'AGI+', luk:'LUK+', cri:'CRI+' }
			// before / after 比較表示
			const newSubs = item.subEffects || []
			const rows = Math.max(prevSubs.length, newSubs.length)
			let compareHtml = ''
			for (let i = 0; i < rows; i++) {
				const prev = prevSubs[i]
				const next = newSubs[i]
				const prevStr = prev ? `${prev.n} +${prev.k === 'cri' ? (prev.v * 100).toFixed(0) + '%' : prev.v}` : '—'
				const nextStr = next ? `${next.n} +${next.k === 'cri' ? (next.v * 100).toFixed(0) + '%' : next.v}` : '—'
				const changed = prev && next && (prev.k !== next.k || prev.v !== next.v)
				const improved = changed && next && prev && next.k === prev.k && next.v > prev.v
				const newStat  = changed && next && (!prev || next.k !== prev.k)
				compareHtml += `
					<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #111;font-size:0.82rem;">
						<span style="flex:1;color:#666;text-decoration:line-through;">${prevStr}</span>
						<span style="color:#555;">→</span>
						<span style="flex:1;color:${newStat?'#60a5fa':improved?'#4ade80':'#eee'};font-weight:${(newStat||improved)?'bold':'normal'};">
							${nextStr}${newStat?' 🆕':improved?' ↑':''}
						</span>
					</div>`
			}
			c.innerHTML = `
				<div style="text-align:center;margin-bottom:14px;">
					<div style="font-size:2rem;margin-bottom:4px;">🎲</div>
					<div style="font-size:0.72rem;color:#aaa;letter-spacing:2px;margin-bottom:4px;">サブステータス リロール</div>
					<div style="font-size:1rem;font-weight:bold;color:${nameColor};">${item.n}</div>
					<div style="font-size:0.7rem;color:#888;margin-top:2px;">-${cost.toLocaleString()}G</div>
				</div>
				<div style="background:#0d0d0d;border-radius:8px;padding:4px 12px;margin-bottom:14px;">
					<div style="display:flex;font-size:0.7rem;color:#555;padding:4px 0;gap:6px;">
						<span style="flex:1;">変更前</span>
						<span style="color:#555;">　</span>
						<span style="flex:1;">変更後</span>
					</div>
					${compareHtml}
				</div>
				<div style="display:flex;gap:8px;">
					<button onclick="openSmithModal('${filterType}')" class="btn-action btn-blue" style="flex:1;padding:10px;font-size:0.88rem;">← 鍛冶屋へ</button>
					<button onclick="executeSubReroll(${idx},'${filterType}')" class="btn-action" style="flex:1;padding:10px;font-size:0.88rem;background:linear-gradient(135deg,#1a0a40,#3a1a80);border-color:#7c3aed;color:#c4b5fd;">🎲 再リロール</button>
				</div>`
			openModalWrapper()
		}

				function executeEnchant(inventoryIdx, filterType = 'all') {
			const item = gameState.inventory[inventoryIdx]
			if (!item) return
			const cost = getEnchantCost(item.tier)
			if (gameState.gold < cost) { showMsg('ゴールドが不足しています。'); return }

			const prevEnchant = item.enchant ? { ...item.enchant } : null
			const itemName = item.n
			gameState.gold -= cost
			const result = rollEnchant(item.type)

			if (result) {
				item.enchant = result
				const verb = prevEnchant ? 'リロール' : '付与'
				addLog(`🔨 鍛冶屋：${itemName} に [${result.name}] を${verb}！ (${cost.toLocaleString()}G消費)`, 'log-gold')
				save_game(); updateUI()
				openSmithModal(filterType)
				// モーダル描画完了後にポップアップ表示
				setTimeout(() => showEnchantPopup({ success: true, result, itemName, prevEnchant, cost }), 50)
			} else {
				delete item.enchant
				addLog(`🔨 鍛冶屋：エンチャント失敗… (${cost.toLocaleString()}G消費)`, 'log-sys')
				save_game(); updateUI()
				openSmithModal(filterType)
				setTimeout(() => showEnchantPopup({ success: false, result: null, itemName, prevEnchant, cost }), 50)
			}
		}

					const cnt = counts[t.key] ?? 0
