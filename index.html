		function _updateHbStats() {
			var el = document.getElementById('hb-stats-area')
			if (!el || !gameState) return
			// データ作成日（gameStateに記録、なければ今日）
			if (!gameState.createdAt) gameState.createdAt = new Date().toLocaleDateString('ja-JP')
			var totalExp = 0, totalKills = 0
			if (gameState.party) {
				gameState.party.forEach(function(p) {
					totalExp += (p.exp || 0)
				})
			}
			// 総プレイ時間（秒）
			var playSec = gameState.playSeconds || 0
			var ph = Math.floor(playSec / 3600)
			var pm = Math.floor((playSec % 3600) / 60)
			var playStr = ph > 0 ? ph + '時間' + pm + '分' : pm + '分'
			var gold = (gameState.gold || 0) + (gameState.inDungeon ? (gameState.tempGold || 0) : 0)
			var maxFloor = gameState.maxFloor || 1
			var bossCount = (gameState.bossDefeated || []).length
			var itemCount = (gameState.inventory || []).length
			var partyCount = (gameState.party || []).length
			var maxLv = 0
			if (gameState.party) gameState.party.forEach(function(p){ if ((p.lv||1) > maxLv) maxLv = p.lv||1 })
			el.innerHTML =
				'<div style="display:grid;grid-template-columns:auto 1fr;gap:2px 12px;">'
				+ '<span style="color:#555;">データ作成日</span><span style="color:#eee;">' + gameState.createdAt + '</span>'
				+ '<span style="color:#555;">プレイ時間</span><span style="color:#eee;">' + playStr + '</span>'
				+ '<span style="color:#555;">最高到達</span><span style="color:var(--accent-red);">' + maxFloor + 'F</span>'
				+ '<span style="color:#555;">ボス討伐</span><span style="color:var(--gold);">' + bossCount + '体</span>'
				+ '<span style="color:#555;">所持金</span><span style="color:var(--gold);">' + gold.toLocaleString() + 'G</span>'
				+ '<span style="color:#555;">パーティ</span><span style="color:#eee;">' + partyCount + '人 (最高Lv.' + maxLv + ')</span>'
				+ '<span style="color:#555;">アイテム</span><span style="color:#eee;">' + itemCount + '個</span>'
				+ '</div>'
		}
		function _updateHbDaily() {
			var el = document.getElementById('hb-daily-area')
			if (!el) return
			var state = getDailyState()
			var today = getTodayStr()
			var alreadyClaimed = state && state.lastDate === today
			var streakDisp = 1
			if (state) {
				var last = new Date(state.lastDate)
				var now  = new Date(today)
				var diff = Math.round((now - last) / 86400000)
				streakDisp = diff <= 1 ? (state.streak || 1) : 1
			}
			if (alreadyClaimed) streakDisp = state.streak || 1
			var currentDayIdx = ((streakDisp - 1) % 7)

			// ミニカレンダー（7マス）
			var miniGrid = DAILY_REWARDS.map(function(r, i) {
				var isPast   = i < currentDayIdx
				var isToday  = i === currentDayIdx
				var isFuture = i > currentDayIdx
				var cellClass = 'hb-daily-cell'
				if (isPast)    cellClass += ' past'
				else if (isToday && r.special) cellClass += ' today special'
				else if (isToday)  cellClass += ' today'
				else           cellClass += ' future'
				var checkMark = isPast ? '<div class="dc-check">✓</div>' : ''
				var todayMark = isToday && alreadyClaimed ? '<div class="dc-check">✓</div>' : ''
				return '<div class="' + cellClass + '">'
					+ '<div class="dc-day">D' + r.day + '</div>'
					+ '<div class="dc-icon">' + r.icon + '</div>'
					+ checkMark + todayMark
					+ '</div>'
			}).join('')

			// ステータス表示
			var cardClass = 'hb-daily-card' + (alreadyClaimed ? ' claimed' : '')
			var statusHtml = alreadyClaimed
				? '<div style="font-size:0.72rem;color:#4ade80;text-align:center;padding:4px 0;">✅ 本日受取済み</div>'
				: '<div style="font-size:0.72rem;color:#60a5fa;text-align:center;padding:4px 0;font-weight:bold;">🎁 本日のボーナスが未受け取り！</div>'

			// デイリーボタンのスタイル更新
			var btn = document.getElementById('hb-daily-btn')
			if (btn) {
				if (!alreadyClaimed) {
					btn.style.borderColor = '#f59e0b'
					btn.style.color = '#f9a825'
					btn.style.background = '#1a1000'
				} else {
					btn.style.borderColor = ''
					btn.style.color = ''
					btn.style.background = ''
				}
			}

			el.innerHTML = '<div class="' + cardClass + '">'
				+ '<div class="hb-daily-streak">連続ログイン <b>' + streakDisp + '日目</b></div>'
				+ '<div class="hb-daily-grid">' + miniGrid + '</div>'
				+ statusHtml
				+ '</div>'
		}
		function closeHbMenu() {
			var panel = document.getElementById('hb-panel')
			var overlay = document.getElementById('hb-overlay')
			var btn = document.getElementById('hb-btn')
			if (panel) panel.classList.remove('open')
			if (overlay) overlay.classList.remove('open')
			if (btn) btn.classList.remove('open')
		}
		function _updateHbPartyList() {
			var el = document.getElementById('hb-party-list')
			if (!el || !gameState || !gameState.party) return
			el.innerHTML = gameState.party.map(function(p, i) {
				var fs = getFinalStats(p)
				var hp = Math.floor((p.hp / fs.maxHp) * 100)
				var mp = Math.floor((p.mp / fs.maxMp) * 100)
				var exp = Math.floor((p.exp / p.nextExp) * 100)
				var hc = hp > 50 ? 'var(--hp-color)' : hp > 25 ? 'var(--gold)' : '#f87171'
				var rc = p.row === 'front' ? '#f87171' : '#60a5fa'
				var rl = p.row === 'front' ? '⚔️前衛' : '🏹後衛'
				var wn = p.equip.weapon ? (p.equip.weapon.n || '素手') : '素手'
				var an = p.equip.armor  ? (p.equip.armor.n  || 'なし') : 'なし'
				var tb = hasLearnableSkill(p) ? '<span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:50%;margin-left:4px;vertical-align:middle;"></span>' : ''
				return '<div class="char-card" style="margin-bottom:10px;">'
					+ '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'
					+ '<div><b style="font-size:0.92rem;">' + p.name + '</b><span style="font-size:0.72rem;color:#888;margin-left:6px;">Lv.' + p.lv + ' ' + p.job + '</span></div>'
					+ '<span style="font-size:0.7rem;padding:2px 8px;background:' + rc + '22;border:1px solid ' + rc + ';color:' + rc + ';border-radius:10px;">' + rl + '</span>'
					+ '</div>'
					+ '<div style="margin-bottom:5px;">'
					+ '<div style="display:flex;justify-content:space-between;font-size:0.65rem;margin-bottom:1px;"><span style="color:#f87171;">HP</span><span style="color:' + hc + ';">' + p.hp + '/' + fs.maxHp + '</span></div>'
					+ '<div class="bar-bg" style="height:5px;"><div class="bar-fill" style="background:' + hc + ';width:' + hp + '%"></div></div>'
					+ '<div style="display:flex;justify-content:space-between;font-size:0.65rem;margin-top:2px;margin-bottom:1px;"><span style="color:#60a5fa;">MP</span><span style="color:#aaa;">' + p.mp + '/' + fs.maxMp + '</span></div>'
					+ '<div class="bar-bg" style="height:3px;"><div class="bar-fill" style="background:var(--mp-color);width:' + mp + '%"></div></div>'
					+ '<div class="bar-bg" style="height:2px;margin-top:2px;"><div class="bar-fill" style="background:var(--exp-color);width:' + exp + '%"></div></div>'
					+ '</div>'
					+ '<div style="font-size:0.7rem;color:#aaa;margin-bottom:4px;">物攻<b>' + Math.floor(fs.str) + '</b> 特攻<b>' + Math.floor(fs.matk) + '</b> 物耐<b>' + Math.floor(fs.vit) + '</b> 特耐<b>' + Math.floor(fs.mdef) + '</b></div>'
					+ '<div style="font-size:0.65rem;color:#666;margin-bottom:8px;"><div>⚔️ ' + wn + '</div><div>🛡️ ' + an + '</div></div>'
					+ '<div style="display:flex;gap:6px;">'
					+ '<button class="btn-icon" style="flex:1;padding:8px 4px;font-size:0.8rem;" onclick="closeHbMenu();setTimeout(function(){openCharDetailModal(' + i + ')},150)">詳細</button>'
					+ '<div style="position:relative;flex:1;">'
					+ '<button class="btn-icon" style="width:100%;padding:8px 4px;font-size:0.8rem;" onclick="closeHbMenu();setTimeout(function(){openTraining(' + i + ')},150)">育成' + tb + '</button>'
					+ '</div>'
					+ '</div>'
					+ '</div>'
			}).join('')
		}

		
		// プレイ時間カウンター（毎秒）
		setInterval(function() {
			if (gameState) gameState.playSeconds = (gameState.playSeconds || 0) + 1
		}, 1000)

		
		// ═══════════════════════════════════════════════════════
		// デイリーログインボーナスシステム
		// ═══════════════════════════════════════════════════════

		const DAILY_REWARDS = [
			{ day: 1, icon: '💰', label: 'ゴールド',      type: 'gold',  value: 500,   desc: '500G' },
			{ day: 2, icon: '💰', label: 'ゴールド',      type: 'gold',  value: 1000,  desc: '1,000G' },
			{ day: 3, icon: '⚗️', label: 'アイテム抽選', type: 'item',  value: 1,     desc: 'ランダム装備（コモン〜レア）' },
			{ day: 4, icon: '💰', label: 'ゴールド',      type: 'gold',  value: 2000,  desc: '2,000G' },
			{ day: 5, icon: '💰', label: 'ゴールド',      type: 'gold',  value: 3000,  desc: '3,000G' },
			{ day: 6, icon: '⚗️', label: 'アイテム抽選', type: 'item',  value: 1,     desc: 'ランダム装備（アンコモン〜エピック）' },
			{ day: 7, icon: '🌟', label: '豪華報酬',      type: 'gold',  value: 8000,  desc: '8,000G ＋ ランダム装備（レア以上確定）', special: true },
		]

		function getDailyState() {
			try { return JSON.parse(localStorage.getItem('abyss_daily') || 'null') } catch { return null }
		}
		function saveDailyState(state) {
			try { localStorage.setItem('abyss_daily', JSON.stringify(state)) } catch {}
		}
		function getTodayStr() {
			const d = new Date()
			return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
		}
		function hasDailyBonus() {
			const s = getDailyState()
			if (!s) return true
			return s.lastDate !== getTodayStr()
		}

		function _dailyGiveItem(minTier, maxTier, minRarity) {
			const types = ['weapon','armor','acc']
			const t = types[Math.floor(Math.random() * types.length)]
			let pool = (SHOP_ITEMS[t] || []).filter(i => i.tier >= minTier && i.tier <= maxTier)
			if (pool.length === 0) pool = SHOP_ITEMS[t] || []
			if (pool.length === 0) return null
			const base = { ...pool[Math.floor(Math.random() * pool.length)], type: t, locked: false }
			const rarityTable = [
				{ label:'レジェンダリー', color:'#ff9800', weight: minRarity === 'rare' ? 3  : minRarity === 'epic' ? 8  : 1  },
				{ label:'エピック',       color:'#c084fc', weight: minRarity === 'rare' ? 15 : minRarity === 'epic' ? 40 : 5  },
				{ label:'レア',           color:'#60a5fa', weight: minRarity === 'rare' ? 40 : minRarity === 'epic' ? 0  : 20 },
				{ label:'アンコモン',     color:'#4ade80', weight: minRarity === 'rare' ? 42 : minRarity === 'epic' ? 52 : 40 },
				{ label:'コモン',         color:'#aaa',    weight: minRarity === 'rare' ? 0  : minRarity === 'epic' ? 0  : 34 },
			].filter(r => r.weight > 0)
			const totalW = rarityTable.reduce((s, r) => s + r.weight, 0)
			let roll = Math.random() * totalW
			let rarity = rarityTable[rarityTable.length - 1]
			for (const r of rarityTable) { roll -= r.weight; if (roll <= 0) { rarity = r; break } }
			base.rarityLabel = rarity.label
			base.rarityColor = rarity.color
			const subCount = { 'コモン':0, 'アンコモン':1, 'レア':2, 'エピック':3, 'レジェンダリー':4 }[rarity.label] || 0
			if (subCount > 0) {
				const SUB_POOL = ['maxHp','maxMp','str','matk','vit','mdef','agi','luk']
				const subVals = { maxHp:[20,80], maxMp:[10,40], str:[8,40], matk:[8,40], vit:[6,25], mdef:[6,25], agi:[4,15], luk:[4,12] }
				base.subEffects = []
				const used = new Set()
				while (base.subEffects.length < subCount) {
					const k = SUB_POOL[Math.floor(Math.random() * SUB_POOL.length)]
					if (used.has(k)) continue
					used.add(k)
					const [mn, mx] = subVals[k]
					base.subEffects.push({ n: k.replace('maxHp','HP+').replace('maxMp','MP+').replace('str','ATK+').replace('matk','MATK+').replace('vit','DEF+').replace('mdef','MDEF+').replace('agi','AGI+').replace('luk','LUK+'), k, v: mn + Math.floor(Math.random() * (mx - mn + 1)) })
				}
			}
			gameState.inventory.push(base)
			return base
		}

		function claimDailyBonus() {
			const state = getDailyState()
			const today = getTodayStr()
			let streak = 1
			if (state) {
				const last = new Date(state.lastDate)
				const now  = new Date(today)
				const diff = Math.round((now - last) / 86400000)
				streak = diff === 1 ? (state.streak || 1) + 1 : 1
			}
			const dayIdx = ((streak - 1) % 7)
			const reward = DAILY_REWARDS[dayIdx]
			const gotItems = []
			if (reward.type === 'gold' || reward.special) {
				gameState.gold += reward.value
			}
			if (reward.type === 'item') {
				const minR = dayIdx <= 2 ? 'common' : 'rare'
				const item = _dailyGiveItem(1, Math.min(3, Math.ceil(gameState.maxFloor/10)+1), minR)
				if (item) gotItems.push(item)
			}
			if (reward.special) {
				const item = _dailyGiveItem(1, Math.min(4, Math.ceil(gameState.maxFloor/10)+1), 'rare')
				if (item) gotItems.push(item)
			}
			saveDailyState({ lastDate: today, streak })
			save_game(true)
			return { reward, streak, dayIdx, gotItems }
		}

		function openDailyBonus() {
			const state = getDailyState()
			const today = getTodayStr()
			const alreadyClaimed = state && state.lastDate === today
			let streakDisp = 1
			if (state) {
				const last = new Date(state.lastDate)
				const now  = new Date(today)
				const diff = Math.round((now - last) / 86400000)
				streakDisp = diff <= 1 ? (state.streak || 1) : 1
			}
			if (alreadyClaimed) streakDisp = state.streak || 1
			const currentDayIdx = ((streakDisp - 1) % 7)
			const calHtml = DAILY_REWARDS.map((r, i) => {
				const isPast   = i < currentDayIdx
				const isToday  = i === currentDayIdx
				const isFuture = i > currentDayIdx
				const bg     = isToday  ? (r.special ? '#1a1000' : '#0a1828') : isPast ? '#0a0f0a' : '#0a0a0a'
				const bdr    = isToday  ? (r.special ? '#f59e0b' : '#60a5fa') : isPast ? '#22c55e' : '#222'
				const opacity = isFuture ? '0.45' : '1'
				const checkMark   = isPast ? '<div style="font-size:0.7rem;color:#22c55e;">✓ 受取済</div>' : ''
				const todayMark   = isToday && !alreadyClaimed ? '<div style="font-size:0.65rem;color:#60a5fa;font-weight:bold;">← 本日</div>' : ''
				const claimedMark = isToday && alreadyClaimed  ? '<div style="font-size:0.65rem;color:#22c55e;">✓ 受取済</div>' : ''
				return '<div style="text-align:center;padding:8px 4px;border-radius:6px;border:1px solid ' + bdr + ';background:' + bg + ';opacity:' + opacity + ';' + (r.special?'box-shadow:0 0 6px #f59e0b44;':'') + '">'
					+ '<div style="font-size:0.65rem;color:#555;margin-bottom:2px;">Day' + r.day + '</div>'
					+ '<div style="font-size:1.2rem;">' + r.icon + '</div>'
					+ '<div style="font-size:0.65rem;color:#aaa;margin-top:2px;line-height:1.3;">' + r.desc + '</div>'
					+ checkMark + todayMark + claimedMark
					+ '</div>'
			}).join('')
			const c = document.getElementById('modal-content')
			c.innerHTML = '<div style="text-align:center;padding:8px 0 4px;">'
				+ '<div style="font-size:1.8rem;margin-bottom:4px;">🎁</div>'
				+ '<h2 style="margin:0 0 4px;color:#f9a825;">デイリーボーナス</h2>'
				+ '<div style="font-size:0.78rem;color:#888;margin-bottom:12px;">連続ログイン <span style="color:#f9a825;font-weight:bold;">' + streakDisp + '日目</span></div>'
				+ '</div>'
				+ '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;">' + calHtml + '</div>'
				+ (alreadyClaimed
					? '<div style="text-align:center;padding:10px;background:#0a1a0a;border:1px solid #1a3a1a;border-radius:8px;margin-bottom:12px;font-size:0.82rem;color:#4ade80;">✅ 本日のボーナスは受け取り済みです</div>'
					: '<button onclick="executeDailyBonus()" class="btn-action btn-blue" style="width:100%;padding:14px;font-size:1rem;margin-bottom:10px;background:linear-gradient(135deg,#1a3a6a,#0a2040);border-color:#60a5fa;">🎁 ボーナスを受け取る</button>'
				)
				+ '<button onclick="closeModal()" class="btn-action btn-red" style="width:100%;padding:10px;font-size:0.9rem;">閉じる</button>'
			openModalWrapper()
		}

		function executeDailyBonus() {
			const { reward, streak, dayIdx, gotItems } = claimDailyBonus()
			playSE('daily')
			const itemRows = gotItems.map(item =>
				'<div style="display:flex;align-items:center;gap:8px;background:#0a1020;border:1px solid ' + (item.rarityColor||'#333') + '44;border-radius:6px;padding:8px 10px;margin-top:6px;">'
				+ '<span style="color:' + (item.rarityColor||'#aaa') + ';font-size:0.8rem;font-weight:bold;">' + (item.rarityLabel||'') + '</span>'
				+ '<span style="color:#eee;font-size:0.82rem;">' + (item.n||'装備') + '</span>'
				+ '</div>'
			).join('')
			const c = document.getElementById('modal-content')
			c.innerHTML = '<div style="text-align:center;padding:12px 0 8px;">'
				+ '<div style="font-size:2.5rem;margin-bottom:6px;">' + reward.icon + '</div>'
				+ '<h2 style="margin:0 0 4px;color:#f9a825;">ボーナス受取！</h2>'
				+ '<div style="font-size:0.78rem;color:#888;margin-bottom:14px;">連続 <span style="color:#f9a825;font-weight:bold;">' + streak + '日目</span></div>'
				+ (reward.type === 'gold' || reward.special
					? '<div style="font-size:1.4rem;color:#f9a825;font-weight:bold;margin-bottom:6px;">+' + reward.value.toLocaleString() + 'G</div>'
					: ''
				)
				+ itemRows
				+ '</div>'
				+ '<button onclick="closeModal()" class="btn-action btn-blue" style="width:100%;margin-top:14px;padding:12px;">OK</button>'
			updateUI()
			openModalWrapper()
			addLog('🎁 デイリーボーナス受取！ ' + (reward.type==='gold'||reward.special?'+'+reward.value.toLocaleString()+'G':'') + (gotItems.length?' ＋装備x'+gotItems.length:''), 'log-gold')
			// メニューが開いていればデイリーエリアも更新
			var _hbP = document.getElementById('hb-panel')
			if (_hbP && _hbP.classList.contains('open')) { _updateHbDaily() }
		}

		</script>



		<!-- ═══ バフ/デバフ詳細ポップアップ ═══ -->
		<div id="status-detail-popup" onclick="closeStatusDetail()" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;">
			<div id="status-detail-card" onclick="event.stopPropagation()" style="background:#1a1a2e;border:1px solid #444;border-radius:10px;padding:16px 20px;max-width:280px;width:88%;box-shadow:0 0 24px rgba(0,0,0,0.8);position:relative;">
				<button onclick="closeStatusDetail()" style="position:absolute;top:8px;right:10px;background:none;border:none;color:#888;font-size:1.1rem;cursor:pointer;line-height:1;">✕</button>
				<div id="status-detail-icon" style="font-size:1.8rem;text-align:center;margin-bottom:6px;"></div>
				<div id="status-detail-name" style="font-size:1rem;font-weight:bold;text-align:center;margin-bottom:8px;"></div>
				<div id="status-detail-body" style="font-size:0.82rem;color:#ccc;line-height:1.6;"></div>
			</div>
		</div>
	<div id="modal-layer" class="modal-overlay hidden">
		<div class="modal" id="modal-content"></div>
	</div>
</body>
