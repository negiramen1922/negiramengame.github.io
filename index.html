				{ key: 'tier',    label: 'Tier順' },
				{ key: 'price',   label: '価格順' },
				{ key: 'locked',  label: 'ロック優先' },
				{ key: 'trash',   label: '🗑ゴミ箱' },
			]
			const sortHtml = `<div style="display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap;">
				<span style="font-size:0.75rem;color:#666;align-self:center;margin-right:2px;">並び替え:</span>
				${sortOpts.map(s => {
					const active = sortType === s.key
					return `<button onclick="openShopSell('','${filterType}','${s.key}')"
						style="padding:3px 9px;font-size:0.75rem;border-radius:12px;
						border:1px solid ${active?'var(--gold)':'#333'};
						background:${active?'rgba(255,196,0,0.15)':'#111'};
						color:${active?'var(--gold)':'#777'};cursor:pointer;">${s.label}</button>`
				}).join('')}
			</div>`

			let sellable = filterType === 'all'
				? sellableAll.map((item) => ({ item, idx: gameState.inventory.indexOf(item) }))
				: sellableAll.filter(item => item.type === filterType).map(item => ({ item, idx: gameState.inventory.indexOf(item) }))
			if (sortType === 'tier')   sellable.sort((a, b) => (b.item.tier||0) - (a.item.tier||0))
			if (sortType === 'price')  sellable.sort((a, b) => (b.item.p||0) - (a.item.p||0))
			if (sortType === 'locked') sellable.sort((a, b) => (b.item.locked ? 1 : 0) - (a.item.locked ? 1 : 0))
			if (sortType === 'trash')  { sellable = sellable.filter(({item}) => item.trash) }

			c.innerHTML = `
				<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
					<h2 style="margin:0;">💰 アイテム売却</h2>
					<span style="color:var(--gold);font-weight:bold;">${gameState.gold.toLocaleString()}G</span>
				</div>
				${successHtml}
				<div style="font-size:0.78rem;color:#aaa;margin:0 0 8px;background:#1a1a1a;border-radius:6px;padding:7px 10px;border-left:3px solid #f59e0b;">
					💡 チェックして <b style="color:#f87171;">選択売却</b>　🔒ロックしたアイテムは選択不可
				</div>
				${tabHtml}${sortHtml}
				<div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;">
					<button onclick="_sellSelectAll()" style="padding:5px 10px;font-size:0.78rem;background:#1a2a1a;border:1px solid #4caf50;color:#4caf50;border-radius:6px;cursor:pointer;">✅ 全選択</button>
					<button onclick="_sellClearAll()" style="padding:5px 10px;font-size:0.78rem;background:#2a1a1a;border:1px solid #888;color:#aaa;border-radius:6px;cursor:pointer;">☐ 全解除</button>
					<button onclick="_sellSelectTrash()" style="padding:5px 10px;font-size:0.78rem;background:#1a0a0a;border:1px solid #f8717166;color:#f87171;border-radius:6px;cursor:pointer;">🗑 ゴミ箱選択</button>
					<div id="sell-summary" style="flex:1;text-align:right;font-size:0.82rem;color:#aaa;"></div>
				</div>
				<div id="sell-list" style="display:flex;flex-direction:column;gap:6px;max-height:38vh;overflow-y:auto;padding-right:3px;"></div>
				<div style="margin-top:10px;">
					<button id="sell-checked-btn" onclick="_sellCheckedItems('${filterType}','${sortType}')"
						style="width:100%;padding:11px;font-size:0.9rem;font-weight:bold;background:linear-gradient(135deg,#7c1a1a,#c0392b);border:1px solid #e74c3c;color:#fff;border-radius:6px;cursor:pointer;opacity:0.4;pointer-events:none;">
						🗑️ 選択した0件を売却（0G）
					</button>
				</div>
				<button onclick="_sellReturnToBag ? (()=>{_sellReturnToBag=false;openInventory()})() : openShopMenu()" class="btn-action btn-red" style="margin-top:8px;width:100%;">← 戻る</button>`
			openModalWrapper()

			// ─── アイテムリスト描画 ───
			const list = document.getElementById('sell-list')
			window._sellCurrentSellable = sellable // スコープ保持

			function _renderSellList() {
				list.innerHTML = ''
				if (sellable.length === 0) {
					list.innerHTML = '<p style="text-align:center;padding:20px;color:#666;">売却できる装備がありません</p>'
					return
				}
				sellable.forEach(({ item, idx }) => {
					const div = document.createElement('div')
					const isChecked = _sellChecked.has(idx)
					const isLocked = item.locked
					const sellPrice = Math.max(1, Math.floor((item.p || 100) * 0.4))
					const nameColor = item.rarityColor || '#eee'
					const itemName = getItemDisplayName(item)
					let subText = ''
					if (item.subEffects && item.subEffects.length > 0) {
						subText = `<div style="font-size:0.72rem;color:var(--accent-blue);margin:2px 0;">◆ ${item.subEffects.map(e=>e.n+'+'+(e.k==='cri'?(e.v*100)+'%':e.v)).join(' / ')}</div>`
					}
					const tierHtml = item.tier ? `<div style="margin-top:1px;">${tierLabel(item.tier)}</div>` : ''
					const typeIcons = { weapon:'⚔️', armor:'🛡️', acc:'💍', rune:'🔮' }
					const typeBadge = item.type ? `<span style="font-size:0.68rem;color:#555;margin-right:3px;">${typeIcons[item.type]||''}</span>` : ''
					const wTypeBadge = item.weaponType ? `<span style="font-size:0.65rem;padding:0 3px;background:#1a2030;border:1px solid #334;border-radius:3px;color:#7aa;margin-left:3px;">${item.weaponType}</span>` : ''
					const aTypeBadge = item.armorType ? `<span style="font-size:0.65rem;padding:0 3px;background:#1a1a20;border:1px solid #334;border-radius:3px;color:#a9a;margin-left:3px;">${item.armorType}</span>` : ''
					const accTypeBadge = item.accType ? `<span style="font-size:0.65rem;padding:0 3px;background:#201a1a;border:1px solid #443;border-radius:3px;color:#aa9;margin-left:3px;">${item.accType}</span>` : ''
					const rangeBadge = item.range === 'long' ? '<span style="font-size:0.65rem;padding:0 3px;background:rgba(96,165,250,0.12);border:1px solid #60a5fa;border-radius:3px;color:#60a5fa;margin-left:3px;">🏹遠距離</span>' : ''
					const lockIcon = isLocked ? '🔒' : '🔓'
					const lockStyle = isLocked ? 'border-color:var(--gold);color:var(--gold);' : ''
					const isTrash = item.trash
					div.style.cssText = `display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid ${isChecked?'#e74c3c':isTrash?'#ef444466':'#2a2a2a'};background:${isChecked?'rgba(231,76,60,0.08)':isTrash?'rgba(239,68,68,0.04)':'#0f0f0f'};border-radius:8px;cursor:${isLocked?'default':'pointer'};transition:border-color 0.15s,background 0.15s;`
					div.innerHTML = `
						<div style="flex-shrink:0;">
							<input type="checkbox" data-idx="${idx}" ${isChecked?'checked':''} ${isLocked?'disabled':''} style="width:18px;height:18px;accent-color:#e74c3c;cursor:${isLocked?'not-allowed':'pointer'};">
						</div>
						<div style="flex:1;min-width:0;" onclick="${isLocked?'':'_toggleSellCheck('+idx+')'}" >
							<div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;">
								${typeBadge}<b style="color:${nameColor};font-size:0.88rem;">${itemName}</b>${wTypeBadge}${aTypeBadge}${accTypeBadge}${rangeBadge}
							</div>
							${tierHtml}
							<div style="font-size:0.76rem;color:#888;margin-top:1px;">${item.d}</div>
							${subText}
							<div style="font-size:0.76rem;color:${isChecked?'#f87171':'var(--gold)'};margin-top:2px;">${isLocked?'🔒 ロック中':('売値: '+sellPrice.toLocaleString()+'G')}</div>
						</div>
						<div style="flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:center;">
							<button class="btn-icon" style="font-size:0.75rem;padding:3px 6px;${lockStyle}" onclick="toggleLock(${idx});openShopSell('','${filterType}','${sortType}')" title="ロック切替">${lockIcon}</button>
						</div>`
					div.querySelector('input[type=checkbox]')?.addEventListener('change', e => {
						_toggleSellCheck(idx); e.stopPropagation()
					})
					list.appendChild(div)
				})
				_updateSellSummary()
			}
			_renderSellList()
		}

		function _toggleSellCheck(idx) {
			const item = gameState.inventory[idx]
			if (!item || item.locked) return
			if (_sellChecked.has(idx)) _sellChecked.delete(idx)
			else _sellChecked.add(idx)
			// チェックボックスUIを更新
			const cb = document.querySelector(`input[data-idx="${idx}"]`)
			if (cb) cb.checked = _sellChecked.has(idx)
			const row = cb?.closest('div[style*="display:flex;align-items:center"]')
			if (row) {
				const checked = _sellChecked.has(idx)
				row.style.borderColor = checked ? '#e74c3c' : '#2a2a2a'
				row.style.background = checked ? 'rgba(231,76,60,0.08)' : '#0f0f0f'
				// 売値テキスト更新
				const priceEl = row.querySelector('[style*="売値"]') || Array.from(row.querySelectorAll('div')).find(d=>d.textContent.includes('売値'))
				if (priceEl) {
					const sellPrice = Math.max(1, Math.floor(((gameState.inventory[idx]?.p)||100)*0.4))
					priceEl.style.color = checked ? '#f87171' : 'var(--gold)'
				}
			}
			_updateSellSummary()
		}

		function _updateSellSummary() {
			const validIdxs = [..._sellChecked].filter(i => gameState.inventory[i] && !gameState.inventory[i].locked)
			const total = validIdxs.reduce((s,i) => s + Math.max(1, Math.floor(((gameState.inventory[i]?.p)||100)*0.4)), 0)
			const cnt = validIdxs.length
			const summary = document.getElementById('sell-summary')
			if (summary) summary.innerHTML = cnt > 0 ? `<span style="color:#f87171;font-weight:bold;">${cnt}件選択中</span> <span style="color:var(--gold);">${total.toLocaleString()}G</span>` : '<span style="color:#555;">未選択</span>'
			const btn = document.getElementById('sell-checked-btn')
			if (btn) {
				btn.textContent = `🗑️ 選択した${cnt}件を売却（${total.toLocaleString()}G）`
				if (cnt > 0) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto' }
				else { btn.style.opacity = '0.35'; btn.style.pointerEvents = 'none' }
			}
		}

		function _sellSelectAll() {
			const sellable = window._sellCurrentSellable || []
			sellable.forEach(({item, idx}) => { if (!item.locked) _sellChecked.add(idx) })
			// チェックボックスを全て更新
			document.querySelectorAll('#sell-list input[type=checkbox]').forEach(cb => {
				const idx = parseInt(cb.dataset.idx)
				const item = gameState.inventory[idx]
				if (item && !item.locked) { cb.checked = true; const row = cb.closest('div[style*="align-items:center"]'); if(row){row.style.borderColor='#e74c3c';row.style.background='rgba(231,76,60,0.08)'} }
			})
			_updateSellSummary()
		}

		function _sellSelectTrash() {
			const sellable = window._sellCurrentSellable || []
			sellable.forEach(({item, idx}) => {
				if (!item.locked && item.trash) _sellChecked.add(idx)
			})
			document.querySelectorAll('#sell-list input[type=checkbox]').forEach(cb => {
				const idx = parseInt(cb.dataset.idx)
				const item = gameState.inventory[idx]
				if (item && !item.locked && item.trash) {
					cb.checked = true
					const row = cb.closest('div[style*="border-radius:8px"]')
					if (row) { row.style.borderColor='#e74c3c'; row.style.background='rgba(231,76,60,0.08)' }
				}
			})
			_updateSellSummary()
		}

		function _sellClearAll() {
			_sellChecked.clear()
			document.querySelectorAll('#sell-list input[type=checkbox]').forEach(cb => {
				cb.checked = false; const row = cb.closest('div[style*="align-items:center"]'); if(row){row.style.borderColor='#2a2a2a';row.style.background='#0f0f0f'}
			})
			_updateSellSummary()
		}

		function _sellCheckedItems(filterType, sortType) {
			const validIdxs = [..._sellChecked].filter(i => gameState.inventory[i] && !gameState.inventory[i].locked)
			if (validIdxs.length === 0) { showMsg('売却するアイテムが選択されていません。'); return }
			const sorted = validIdxs.sort((a,b) => b - a) // 後ろから削除
			let total = 0; let count = 0; const names = []
			sorted.forEach(idx => {
				const item = gameState.inventory[idx]
				if (!item) return
				const sp = Math.max(1, Math.floor((item.p||100)*0.4))
				total += sp; count++; names.push(item.n)
				gameState.inventory.splice(idx, 1)
			})
			gameState.gold += total
			save_game(); updateUI()
			addLog(`🗑️ ${count}件を売却！ 合計 ${total.toLocaleString()}G 獲得。`, 'log-gold')
			openShopSell(`✅ ${count}件を売却しました（合計 ${total.toLocaleString()}G）`, filterType, sortType)
		}

		function shopSellItem(idx) {
			const item = gameState.inventory[idx]
			if (!item) return
			if (item.locked) { addLog(`${item.n}はロック中のため売却できません。`, 'log-red'); return }
			const sellPrice = Math.max(1, Math.floor((item.p || 100) * 0.4))
			gameState.gold += sellPrice
			gameState.inventory.splice(idx, 1)
			addLog(`${item.n}を${sellPrice}Gで売却しました。`, 'log-gold')
			openShopSell(`✅ ${item.n} を ${sellPrice}G で売却しました！`)
		}
		function bulkSellItems(filterType = 'all', sortType = 'default') {
			const targets = gameState.inventory.filter(item => item.type !== 'item' && !item.locked && (filterType === 'all' || item.type === filterType))
			if (targets.length === 0) { showMsg('売却できるアイテムがありません。'); return }
			const total = targets.reduce((s, i) => s + Math.max(1, Math.floor((i.p||100)*0.4)), 0)
			const count = targets.length
			gameState.inventory = gameState.inventory.filter(item => !targets.includes(item))
			gameState.gold += total
			save_game(); updateUI()
			addLog(`🗑️ ${count}件のアイテムを一括売却！ 合計 ${total.toLocaleString()}G 獲得。`, 'log-gold')
			openShopSell(`✅ ${count}件を一括売却しました（合計 ${total.toLocaleString()}G）`, filterType, sortType)
		}

		function buyItem(cat, id, qty = 1, fromBulk = false) {
			const itemData = SHOP_ITEMS[cat].find(i => i.id === id)
			if (!itemData) return
			const maxCap = getMaxCapacity()
			const available = maxCap - gameState.inventory.length
			const actualQty = Math.min(qty, available)
			if (actualQty <= 0) { showMsg('カバンが一杯です。'); playSE('error'); return }
			const totalCost = itemData.p * actualQty
			if (gameState.gold < totalCost) { showMsg('お金が足りません。'); playSE('error'); return }

			gameState.gold -= totalCost
			const boughtItems = []
			for (let i = 0; i < actualQty; i++) {
				const newItem = applyShopRarity({ ...itemData, type: cat, locked: false })
				gameState.inventory.push(newItem)
				boughtItems.push(newItem)
			}
			addLog(`${itemData.n} ×${actualQty} を購入しました（${totalCost.toLocaleString()}G）。`, 'log-sys')
			save_game(true)
			updateUI()

			// 1個購入かつ装備可能なら装備誘導モーダル
			if (!fromBulk && actualQty === 1 && cat !== 'item') {
				const newIdx = gameState.inventory.length - 1
				const c = document.getElementById('modal-content')
				const item = boughtItems[0]
				const nameColor = item.rarityColor || '#eee'
				c.innerHTML = `
					<div style="text-align:center; padding:14px 0 8px;">
						<div style="font-size:1.5rem; margin-bottom:6px;">🛍️</div>
						<h2 style="margin:0 0 4px; color:#4ade80;">購入完了！</h2>
						<div style="font-size:0.85rem; color:#888; margin-bottom:14px;">${totalCost.toLocaleString()}G を支払いました</div>
					</div>
					<div style="background:#0a0f0a; border:1px solid #1a3a1a; border-radius:8px; padding:12px 14px; margin-bottom:14px;">
						<div style="font-weight:bold; color:${nameColor}; font-size:0.95rem; margin-bottom:4px;">${getItemDisplayName(item)}</div>
						<div style="font-size:0.8rem; color:#888;">${item.d}</div>
						${item.subEffects && item.subEffects.length > 0 ? `<div style="font-size:0.75rem; color:var(--accent-blue); margin-top:4px;">◆ ${item.subEffects.map(e => _fmtSub(e)).join(' / ')}</div>` : ''}
					</div>
					<div style="display:flex; flex-direction:column; gap:8px;">
						<button onclick="closeModal(); setTimeout(()=>selectTarget(${newIdx}), 100)" class="btn-action btn-green" style="padding:12px; font-size:0.95rem;">⚔️ すぐに装備する</button>
						<div style="display:flex; gap:8px;">
							<button onclick="openShopList('${cat}')" class="btn-action btn-blue" style="flex:1; padding:10px; font-size:0.85rem;">🛒 ショップに戻る</button>
							<button onclick="openInventory()" class="btn-action" style="flex:1; padding:10px; font-size:0.85rem; background:#222; border-color:#555;">👜 カバンへ</button>
						</div>
						<button onclick="closeModal()" class="btn-action btn-red" style="padding:10px; font-size:0.85rem;">閉じる</button>
					</div>`
				openModalWrapper()
			} else {
				openShopList(cat, true)
			}
		}
		// まとめ買いダイアログ
		function openBulkBuyDialog(cat, id, maxQty) {
			const itemData = SHOP_ITEMS[cat].find(i => i.id === id)
			if (!itemData) return

					<h2 style="margin:0 0 4px;">まとめ買い</h2>
					<div style="font-size:0.88rem; color:#aaa; margin-bottom:14px;">${itemData.n}</div>
				</div>
				<div style="background:#0a0a0a; border:1px solid #222; border-radius:8px; padding:12px 14px; margin-bottom:14px;">

					</div>
					<div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.85rem; color:#aaa;">

					</div>
				</div>
				<div style="margin-bottom:14px;">

						<button onclick="_bulkQtyChange(-1)" style="padding:6px 12px; background:#1a1a1a; border:1px solid #444; color:#eee; border-radius:6px; cursor:pointer; font-size:0.9rem;">-1</button>
						<input id="bulk-qty" type="number" value="1" min="1" max="${maxQty}"

							oninput="_bulkQtyUpdate(${maxQty})">
						<button onclick="_bulkQtyChange(1)" style="padding:6px 12px; background:#1a1a1a; border:1px solid #444; color:#eee; border-radius:6px; cursor:pointer; font-size:0.9rem;">+1</button>
						<button onclick="_bulkQtyChange(5)" style="padding:6px 12px; background:#1a1a1a; border:1px solid #444; color:#eee; border-radius:6px; cursor:pointer; font-size:0.9rem;">+5</button>
					</div>
					<div id="bulk-total" style="text-align:right; font-size:0.82rem; color:var(--gold); margin-top:8px; font-weight:bold;">合計: ${itemData.p.toLocaleString()}G</div>
				</div>
				<div style="display:flex; gap:8px;">
					<button onclick="openShopList('${cat}')" class="btn-action" style="flex:1; padding:12px; font-size:0.9rem; background:#222; border-color:#555;">戻る</button>
					<button onclick="_execBulkBuy('${cat}','${id}',${maxQty})" class="btn-action btn-green" style="flex:2; padding:12px; font-size:0.95rem;">購入する</button>
				</div>`
			window._bulkItemPrice = itemData.p
			window._bulkMaxQty = maxQty
			openModalWrapper()
		}
		function _bulkQtyChange(delta) {
			const el = document.getElementById('bulk-qty')
			if (!el) return
			const max = window._bulkMaxQty || 99
			el.value = Math.max(1, Math.min(max, (parseInt(el.value)||1) + delta))
			_bulkQtyUpdate(max)
		}
		function _bulkQtyUpdate(max) {
			const el = document.getElementById('bulk-qty')
			const totalEl = document.getElementById('bulk-total')
			if (!el || !totalEl) return
			const qty = Math.max(1, Math.min(max, parseInt(el.value)||1))
			el.value = qty
			const price = window._bulkItemPrice || 0
			totalEl.textContent = `合計: ${(price * qty).toLocaleString()}G`
			totalEl.style.color = gameState.gold >= price * qty ? 'var(--gold)' : '#f87171'
		}
		function _execBulkBuy(cat, id, maxQty) {
			const el = document.getElementById('bulk-qty')
			const qty = Math.max(1, Math.min(maxQty, parseInt(el ? el.value : 1)||1))
			buyItem(cat, id, qty, true)
		}
		function toggleLock(idx) {
			const item = gameState.inventory[idx]
			if (!item) return
			item.locked = !item.locked
			openInventory()
		}

		function toggleTrash(idx) {
			const item = gameState.inventory[idx]
			if (!item) return
			if (item.locked) { showMsg('ロック中はゴミ箱マークを付けられません'); return }
			item.trash = !item.trash
			openInventory()
		}

			gameState.inventory = gameState.inventory.filter(i => !(i.trash && !i.locked))

		function sellItem(idx, force = false) {
			const item = gameState.inventory[idx]
			if (!item) return
			if (!force && item.locked) {
				const c = document.getElementById('modal-content')
				c.innerHTML = `<div style="text-align:center; padding:20px;">
					<h2 style="color:var(--accent-red)">アイテムロック</h2>
					<p style="margin-bottom:20px; font-size:1rem;">ロックされている「${item.n}」を売却しますか？</p>

					</div>
				</div>`
				openModalWrapper()
				return
			}
			const basePrice = item.p || 50
			const sellPrice = Math.floor(basePrice / 2)
			gameState.gold += sellPrice
			gameState.inventory.splice(idx, 1)

		function equipFromWarehouse(idx, filter = 'all') {
			const item = gameState.guildWarehouse[idx]
			if (!item) return
			if (gameState.inventory.length >= getMaxCapacity()) {
				showMsg('カバンが満杯です。先にカバンを整理してください。')
				playSE('error')
				return
			}
			gameState.guildWarehouse.splice(idx, 1)
			gameState.inventory.push(item)
			save_game(true)
			selectTarget(gameState.inventory.length - 1)
		}

		function storeToWarehouse(idx, filter = 'all', sort = 'default') {
			const item = gameState.inventory[idx]
			if (!item) return
			if (item.type === 'item') { showMsg('消耗品は倉庫に預けられません。'); return }
			if (gameState.guildWarehouse.length >= gameState.guildWarehouseCap) {
				showMsg('ギルド倉庫が満杯です。')
				playSE('error')
				return
			}
			const _storedName = item.n || 'アイテム'
			gameState.inventory.splice(idx, 1)
			gameState.guildWarehouse.push(item)
			save_game(true)
			updateUI()
			openInventory(filter, sort)
			showToast('🏦 倉庫に預けました：' + _storedName, '#a78bfa')
		}

		function withdrawFromWarehouse(idx, filter = 'all') {
			const item = gameState.guildWarehouse[idx]
			if (!item) return
			if (gameState.inventory.length >= getMaxCapacity()) {
				showMsg('カバンが満杯です。先にカバンを整理してください。')
				playSE('error')
				return
			}
			gameState.guildWarehouse.splice(idx, 1)
			gameState.inventory.push(item)
			save_game(true)
			updateUI()
			openGuildWarehouse(filter)
		}

		function expandBag(slots, cost) {
			if (gameState.inDungeon) { showMsg('ダンジョン内ではカバンを拡張できません。'); return }
			if (gameState.gold < cost) {
				showMsg(`ゴールドが不足しています。（必要: ${cost.toLocaleString()}G）`)
				playSE('error')
				return
			}
			gameState.gold -= cost
			gameState.bagExpansion = (gameState.bagExpansion ?? 0) + slots
			save_game()
			updateUI()
			openInventory()
			addLog(`カバンを${slots}枠拡張しました！ 残金: ${gameState.gold.toLocaleString()}G`, 'log-sys')
		}

		function expandWarehouse(slots, cost) {
			if (gameState.gold < cost) {
				showMsg(`ゴールドが不足しています。（必要: ${cost.toLocaleString()}G）`)
				playSE('error')
				return
			}
			gameState.gold -= cost
			gameState.guildWarehouseCap += slots
			save_game()
			updateUI()
			openGuildWarehouse()
			addLog(`ギルド倉庫を${slots}枠拡張しました。（残金: ${gameState.gold.toLocaleString()}G）`, 'log-sys')
		}
		// ────────────────────────────────────────────────────────────────

		function selectTarget(idx) {
			_tutClearHighlight()  // チュートリアルハイライトを解除
			const item = gameState.inventory[idx]
			const c = document.getElementById('modal-content')
			c.innerHTML = `<h2>使用対象の選択</h2><div id="target-list" style="display:grid; gap:12px;"></div><button onclick="openInventory()" class="btn-action btn-red" style="margin-top:20px; width:100%;">戻る</button>`
			const tl = document.getElementById('target-list')
			gameState.party.forEach((p, pIdx) => {
				const btn = document.createElement('button')
				btn.className = 'btn-action btn-blue'
				btn.innerText = `${p.name}`
				btn.onclick = () => {
					if (item.type === 'item') useItem(idx, pIdx)
					else equipItem(idx, pIdx)
				}
				tl.appendChild(btn)
			})
		}
		function useItem(idx, pIdx) {
			playSE('item');
			const item = gameState.inventory[idx]
			const p = gameState.party[pIdx]
			const fs = getFinalStats(p)
			if (item.e.hp) p.hp = Math.min(fs.maxHp, p.hp + item.e.hp)
			if (item.e.hpPct) {
				const healAmount = Math.floor(fs.maxHp * item.e.hpPct)
				p.hp = Math.min(fs.maxHp, p.hp + healAmount)
			}
			if (item.e.mp) p.mp = Math.min(fs.maxMp, p.mp + item.e.mp)
			if (item.e.mpPct) {
				const recoverMp = Math.floor(fs.maxMp * item.e.mpPct)
				p.mp = Math.min(fs.maxMp, p.mp + recoverMp)
			}
			// 回復量テキスト生成
			const _iHp = item.e.hp || (item.e.hpPct ? Math.floor(getFinalStats(p).maxHp * item.e.hpPct) : 0)
			const _iMp = item.e.mp || (item.e.mpPct ? Math.floor(getFinalStats(p).maxMp * item.e.mpPct) : 0)
			let _iLog = `${p.name}は${item.n}を飲んだ`
			if (_iHp > 0 && _iMp > 0) _iLog += `。HPが <b>${_iHp}</b>、MPが <b>${_iMp}</b> 回復した！`
			else if (_iHp > 0) _iLog += `。HPが <b>${_iHp}</b> 回復した！`
			else if (_iMp > 0) _iLog += `。MPが <b>${_iMp}</b> 回復した！`
			else _iLog += '。'
			addLog(_iLog, 'log-sys')
			// アイテムパーティクル
			;(() => {
				const _pCard = getPartyCardEl(pIdx)
				if (_pCard) {
					if (_iHp > 0) fxHeal(_pCard, _iHp)
					if (_iMp > 0) { const {x:_mpX,y:_mpY}=getElCenter(_pCard); fxBurst(_mpX, _mpY, '#818cf8', 50); fxParticles(_mpX, _mpY, '#a78bfa', 10, 40, 600); fxText(_mpX, _mpY - 10, `+${_iMp}MP`, '#818cf8', '1.1rem') }
				}
			})()
			gameState.inventory.splice(idx, 1)
			updateUI()
			closeModal()
			if (battle.active) {
				setTurn('enemy')
				setTimeout(enemyTurn, 500)
			}
		}
		function unequipSlot(pIdx, slotType) {
			const p = gameState.party[pIdx]
			const item = p.equip[slotType]
			if (!item) return
			// カバンに空きがなければ外せない
			if (gameState.inventory.length >= getMaxCapacity()) {
				showMsg('カバンがいっぱいです。先にアイテムを売却してください。')
				playSE('error')
				return
			}
			p.equip[slotType] = null
			gameState.inventory.push(item)
			addLog(`${p.name}の${item.n}を外した。`, 'log-sys')
			// HP/MPが最大値を超えないよう調整
			const fs = getFinalStats(p)
			if (p.hp > fs.maxHp) p.hp = fs.maxHp
			if (p.mp > fs.maxMp) p.mp = fs.maxMp
			updateUI()
			openCharDetailModal(pIdx)
		}

		function unequipRune(pIdx, rIdx) {
			const p = gameState.party[pIdx]
			if (!p || !p.equip || !p.equip.runes || !p.equip.runes[rIdx]) return
			const maxCap = getMaxCapacity()
			if (gameState.inventory.length >= maxCap) {
				showMsg('カバンが一杯で外せません。')
				playSE('error')
				return
			}
			const rune = p.equip.runes.splice(rIdx, 1)[0]
			gameState.inventory.push(rune)
			addLog(`${p.name}のルーン：${rune.n}を外しました。`, 'log-sys')
			updateUI()
			openCharDetailModal(pIdx)
		}
		function openRuneSwapModal(pIdx, invIdx) {
			const p = gameState.party[pIdx]
			const newRune = gameState.inventory[invIdx]
			const c = document.getElementById('modal-content')
			let html = `<h2>ルーンの交換</h2><p style="font-size:0.9rem; margin-bottom:10px;">交換するルーンを選んでください。</p>`
			html += `<div style="display:grid; gap:10px; margin-bottom:20px;">`
			p.equip.runes.forEach((r, slot) => {
				const borderColor = r.color || (r.element==='fire'?'#e91e63':r.element==='earth'?'#4caf50':'#00bcd4');
				html += `
					<div style="background:#111; padding:12px; border:2px solid ${borderColor}; display:flex; justify-content:space-between; align-items:center; border-radius:10px;">
						<div style="flex:1">
							<div style="color:${r.rarityColor || '#fff'}; font-weight:bold;">${r.n}</div>
							<div style="font-size:0.8rem; color:#888;">${r.d}</div>
						</div>
						<button class="btn-action btn-red" style="width:auto; padding:10px 20px; font-size:0.9rem; margin-bottom:0;" onclick="confirmRuneSwap(${pIdx}, ${invIdx}, ${slot})">交換</button>
					</div>`
			})
			html += `</div><button class="btn-action btn-blue" style="width:100%; margin-bottom:0;" onclick="closeModal()">キャンセル</button>`
			c.innerHTML = html
			openModalWrapper()
		}
		function confirmRuneSwap(pIdx, invIdx, slot) {
			const p = gameState.party[pIdx]
			if (!p.equip || !Array.isArray(p.equip.runes) || p.equip.runes.length <= slot) {
				showMsg('エラー：交換に失敗しました。')
				playSE('error')
				return
			}
			const newRune = gameState.inventory.splice(invIdx, 1)[0]
			const oldRune = p.equip.runes.splice(slot, 1)[0]
			if (oldRune) gameState.inventory.push(oldRune)
			p.equip.runes.push(newRune)
			addLog(`${p.name}のルーンを交換：${oldRune.n} → ${newRune.n}`, 'log-sys')
			updateUI()
			closeModal()
			openCharDetailModal(pIdx)
		}
		function equipItem(idx, pIdx) {
			const item = gameState.inventory[idx]
			const p = gameState.party[pIdx]
			if (item.type === 'rune') {
				if (!p.equip.runes) p.equip.runes = []
				if (p.equip.runes.length >= 3) {
					openRuneSwapModal(pIdx, idx)
					return
				}
				p.equip.runes.push(item)
				gameState.inventory.splice(idx, 1)
				addLog(`${p.name}が${item.n}を装着した。`, 'log-sys')
				updateUI()
				openInventory()
				return
			}
			const old = p.equip[item.type]
			p.equip[item.type] = item
			gameState.inventory.splice(idx, 1)
			if (old) gameState.inventory.push(old)
			addLog(`${p.name}が${item.n}を装備した。`, 'log-sys')
			updateUI()
			openInventory()
		}
		// 雇用可能な総人数上限（パーティ+待機合計）
		function getMaxMemberCount() {
			const allMembers = [...gameState.party, ...(gameState.guildBench||[])]
			if (allMembers.length === 0) return 1
			const maxLv = Math.max(...allMembers.map(p => p.lv || 1))
			if (maxLv >= 50) return 8   // Lv50 以降は上限8人
			if (maxLv >= 30) return 6
			if (maxLv >= 20) return 4
			if (maxLv >= 10) return 2
			return 1
		}

		// 雇用次の説明文
		function getNextHireRequirement() {
			const allMembers = [...gameState.party, ...(gameState.guildBench||[])]
			const maxLv = allMembers.length > 0 ? Math.max(...allMembers.map(p => p.lv || 1)) : 1
			const total = allMembers.length
			const max = getMaxMemberCount()
			if (total < max) return null
			if (maxLv < 10)  return 'Lv10 到達で2人目を雇用可能'
			if (maxLv < 20)  return 'Lv20 到達で4人まで雇用可能'
			if (maxLv < 30)  return 'Lv30 到達で6人まで雇用可能'
			if (maxLv < 50)  return 'Lv50 到達で8人まで雇用可能'
			return '上限（8人）に達しています'
		}

		// パーティに参加させる（待機→パーティ）
		function activateMember(benchIdx) {
			if (gameState.inDungeon) { showMsg('ダンジョン中はメンバー変更できません'); return }
			if (gameState.party.length >= 4) { showMsg('パーティは最大4人です。先に誰かを待機させてください'); return }
			const member = gameState.guildBench.splice(benchIdx, 1)[0]
			const fs = getFinalStats(member)
			if (member.hp <= 0 || member.hp === undefined) { member.hp = fs.maxHp; member.mp = fs.maxMp }
			gameState.party.push(member)
			save_game(); updateUI()
			openGuild()
		}

		// パーティから待機させる（パーティ→待機）
		function benchMember(partyIdx) {
			if (gameState.inDungeon) { showMsg('ダンジョン中はメンバー変更できません'); return }
			if (gameState.party.length <= 1) { showMsg('パーティは最低1人必要です'); return }
			const member = gameState.party.splice(partyIdx, 1)[0]
			gameState.guildBench = gameState.guildBench || []
			gameState.guildBench.push(member)
			save_game(); updateUI()
			openGuild()
		}

			const maxTotal = getMaxMemberCount()
			const canHire = allMembers.length < maxTotal
			const nextReq = getNextHireRequirement()
			const inDungeon = gameState.inDungeon

			// ── ジョブアイコン
			const jobIcon = j => ({'ウォリアー':'⚔️','パラディン':'🛡️','ウィザード':'🔮','レンジャー':'🗡️','スペルナイト':'⚔️✨','アーチャー':'🏹','プリースト':'✨','アルケミスト':'⚗️'}[j]||'👤')

			// ── タブ
			const tabHtml = `<div style="display:flex;gap:6px;margin-bottom:14px;">
				<button onclick="openGuild('manage')" style="flex:1;padding:8px;border-radius:6px;border:1px solid ${tab==='manage'?'#60a5fa':'#333'};background:${tab==='manage'?'rgba(96,165,250,0.15)':'#111'};color:${tab==='manage'?'#60a5fa':'#888'};cursor:pointer;font-size:0.85rem;">👥 メンバー管理</button>
				<button onclick="openGuild('hire')" style="flex:1;padding:8px;border-radius:6px;border:1px solid ${tab==='hire'?'#4ade80':'#333'};background:${tab==='hire'?'rgba(74,222,128,0.12)':'#111'};color:${tab==='hire'?'#4ade80':'#888'};cursor:pointer;font-size:0.85rem;">➕ 仲間を雇う</button>
			</div>`

			// ── メンバー管理タブ
			let manageHtml = ''
			if (tab === 'manage') {
				// パーティ

		// ─── Phase A: 説明モーダル ───────────────────────────
		function _tutPhaseA() {
			_tutClearHighlight()
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s) { _tutFinish(); return }
			// skipExplain:true のステップは説明モーダルを飛ばして直接ハイライトへ
			if (s.skipExplain) { _tutAdvanceToHighlight(); return }
			const total = TUT_STEPS.length
			const num   = tutState.stepIdx + 1
			const isLast = !!s.isLast

			// プログレスドット
			const dots = TUT_STEPS.map((_,i) =>
				`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px;
				background:${i < num ? '#6366f1' : i === tutState.stepIdx ? '#60a5fa' : '#333'};"></span>`
			).join('')

			const c = document.getElementById('modal-content')
			c.innerHTML = `
				<div style="padding:2px 0 8px;">
					<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
						<span style="font-size:0.68rem;color:#555;letter-spacing:2px;">TUTORIAL ${num} / ${total}</span>
						<button onclick="closeModal();tutState.active=false;_tutClearHighlight();" style="
							background:none;border:none;color:#444;cursor:pointer;font-size:0.8rem;padding:2px 6px;
						">✕ スキップ</button>
					</div>
					<div style="display:flex;gap:3px;margin-bottom:18px;">
						${TUT_STEPS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<tutState.stepIdx?'#6366f1':i===tutState.stepIdx?'#818cf8':'#222'};transition:background 0.3s;"></div>`).join('')}
					</div>
					<div style="font-size:0.9rem;line-height:1.8;color:#ddd;">${s.explain}</div>
					<button id="tut-ok-btn" onclick="_tutPhaseAOK()" style="
						margin-top:20px; width:100%; padding:14px;
						border-radius:8px; border:none;
						background:linear-gradient(135deg,#4338ca,#6366f1);
						color:#fff; font-size:1rem; font-weight:bold; cursor:pointer;
						letter-spacing:1px;
					">${isLast ? '🌑 冒険を始める！' : 'わかった！ ▶'}</button>
				</div>`
			document.getElementById('modal-layer').classList.remove('hidden')
		}

		function _tutPhaseAOK() {
			closeModal()
			_tutAdvanceToHighlight()
		}

		// フェーズAのOKまたはskipExplainで呼ばれる共通処理
		function _tutAdvanceToHighlight() {
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s) { _tutFinish(); return }

			if (s.isLast) { _tutFinish(); return }

			// targetIdがある → Phase B（ハイライト）
			if (s.targetId) {
				tutState.phase = 'B'
				// step8 (inventory): カバンを自動で開いてから内部ボタンをハイライト
				if (s.hook === 'inventory_closed') {
					openInventory()  // カバンを開く（openInventory内でハイライトも実行）
				} else {
					_tutHighlight(s.targetId, s.hint)
				}
			} else if (s.hook) {
				// targetIdなし・hookあり → hookを待つだけ
				tutState.phase = 'B'
			} else {
				// targetIdなし・hookなし → 次のステップへ
				tutState.stepIdx++
				setTimeout(_tutPhaseA, 100)
			}
		}

		// ─── Phase B: ハイライト＋暗幕 ───────────────────────
		function _tutHighlight(targetId, hint) {
			_tutClearHighlight()
			const el = document.getElementById(targetId)
			if (!el) return

			// 暗幕（全画面をブロック）
			const mask = document.createElement('div')
			mask.id = 'tut-mask'
			mask.style.cssText = `
				position:fixed;inset:0;
				background:rgba(0,0,0,0.78);
				z-index:8000;pointer-events:all;
			`
			document.body.appendChild(mask)

			// ターゲット要素をz-index最前面に浮かせてクリック可能に
			el._tutSavedStyle = el.getAttribute('style') || ''
			el.style.position = 'relative'
			el.style.zIndex   = '8100'
			el.style.boxShadow = '0 0 0 3px #6366f1, 0 0 20px #6366f1aa, 0 0 40px #6366f144'
			el.style.borderRadius = '8px'
			el.dataset.tutActive = '1'
			// アニメーション用クラス
			el.classList.add('tut-pulse')

			// ヒントラベル（ボタンの直上）
			if (hint) {
				const lbl = document.createElement('div')
				lbl.id = 'tut-hint-lbl'
				lbl.style.cssText = `
					position:fixed;z-index:8200;
					background:#6366f1;color:#fff;
					padding:5px 14px;border-radius:16px;
					font-size:0.85rem;font-weight:bold;
					pointer-events:none;white-space:nowrap;
					box-shadow:0 2px 12px #0008;
				`
				lbl.textContent = hint
				document.body.appendChild(lbl)

				const _pos = () => {
					const r = el.getBoundingClientRect()
					lbl.style.left = Math.max(8, r.left + r.width/2 - lbl.offsetWidth/2) + 'px'
					lbl.style.top  = (r.top - lbl.offsetHeight - 10) + 'px'
				}
				_pos(); setTimeout(_pos, 60)
				// ラベルをゆらす
				let _bounce = 0
				lbl._ti = setInterval(() => {
					_bounce = !_bounce
					lbl.style.transform = _bounce ? 'translateY(-4px)' : 'translateY(0)'
				}, 500)
			}
		}

		// モーダル内ボタン用ハイライト（暗幕なし・パルスのみ）
		// モーダルが既に他操作をブロックしているので暗幕は不要
		function _tutHighlightInModal(targetId, hint) {
			// 既存ハイライトをクリア（暗幕のみ除去）
			const mask = document.getElementById('tut-mask')
			if (mask) mask.remove()
			const oldLbl = document.getElementById('tut-hint-lbl')
			if (oldLbl) { clearInterval(oldLbl._ti); oldLbl.remove() }

			const el = document.getElementById(targetId)
			if (!el) { console.warn('[TUT] element not found:', targetId); return }

			// ボタン自体にパルスを当てる
			el._tutSavedStyle = el.getAttribute('style') || ''
			el.style.boxShadow = '0 0 0 3px #6366f1, 0 0 20px #6366f1aa'
			el.style.borderRadius = '8px'
			el.dataset.tutActive = '1'
			el.classList.add('tut-pulse')

			// ヒントラベルをボタンの上に表示
			if (hint) {
				const lbl = document.createElement('div')
				lbl.id = 'tut-hint-lbl'
				lbl.style.cssText = `
					position:fixed;z-index:9500;
					background:#6366f1;color:#fff;
					padding:5px 14px;border-radius:16px;
					font-size:0.85rem;font-weight:bold;
					pointer-events:none;white-space:nowrap;
					box-shadow:0 2px 12px #0008;
				`
				lbl.textContent = hint
				document.body.appendChild(lbl)
				const _pos = () => {
					const r = el.getBoundingClientRect()
					if (r.width === 0) return  // 要素が非表示なら何もしない
					lbl.style.left = Math.max(8, r.left + r.width/2 - lbl.offsetWidth/2) + 'px'
					lbl.style.top  = (r.top - lbl.offsetHeight - 10) + 'px'
				}
				_pos(); setTimeout(_pos, 60)
				let _b = 0
				lbl._ti = setInterval(() => {
					_b = !_b
					lbl.style.transform = _b ? 'translateY(-4px)' : 'translateY(0)'
				}, 500)
			}
		}

				function _tutClearHighlight() {
			const mask = document.getElementById('tut-mask')
			if (mask) mask.remove()
			const lbl = document.getElementById('tut-hint-lbl')
			if (lbl) { clearInterval(lbl._ti); lbl.remove() }
			// ハイライト中の要素を戻す
			document.querySelectorAll('[data-tut-active]').forEach(el => {
				el.setAttribute('style', el._tutSavedStyle || '')
				delete el._tutSavedStyle
				el.removeAttribute('data-tut-active')
				el.classList.remove('tut-pulse')
			})
		}

		function _tutFinish() {
			tutState.active = false
			tutState._inventoryOpen = false
			_tutClearHighlight()
			closeModal()
			addLog('✅ チュートリアル完了！冒険の準備ができました。', 'log-sys')
			// キャラクリエイト画面へ（新規プレイヤー向け）
			setTimeout(() => {
				if (gameState.party.length === 0) {
					openFirstCharModal()
				}
			}, 400)
		}

		// ─── フック（各ゲーム処理から呼ぶ）──────────────────
		function tutHook(event) {
			if (!tutState.active) return
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s || s.hook !== event) return
			// battle_win / confirm_retreat / gold_closed はモーダル中でも受付
			const _phaseSkip = ['battle_win','confirm_retreat','gold_closed','inventory_closed']
			if (!_phaseSkip.includes(event) && tutState.phase !== 'B') return
			_tutClearHighlight()
			tutState.stepIdx++
			tutState.phase = 'A'
			// inventory_closed は town 画面でカバンが閉じた後なので即表示
			const _delay = event === 'inventory_closed' ? 200 : 600
			setTimeout(_tutPhaseA, _delay)
		}

		function enterDungeon() {
			if (gameState.party.length === 0) {
				openGuild()
				return
			}
			// 解放済み開始フロアを計算（倒したボスの次の階層）
			const unlockedFloors = [1]
			Object.keys(BOSS_DATA).forEach(f => {
				const floor = parseInt(f)
				if (gameState.bossDefeated.includes(floor)) {
					unlockedFloors.push(floor + 1)
				}
			})
			// チュートリアル中は強制1F・モーダル一切スキップ
			if (tutState.active) { startDungeonFromFloor(1); return }
			// 選択肢が1Fのみなら即スタート
			if (unlockedFloors.length === 1) {
				startDungeonFromFloor(1)
				return
			}
			// 複数の開始フロアがある場合はモーダルで選択させる
			openFloorSelectModal(unlockedFloors)
		}

			document.getElementById('modal-layer').classList.remove('hidden')
			// チュートリアル：btn-retreatが押された → 帰還確認モーダルの「戻る」をハイライト
			if (tutState.active && tutState.phase === 'B') {
				const _s = TUT_STEPS[tutState.stepIdx]
				if (_s && _s.hook === 'retreated') {
					_tutClearHighlight()

					tutState.phase = 'B' // すぐにB（ハイライト待ち）

						_tutHighlightInModal('tut-confirm-retreat-btn', '👆 戻る')
					}))
				}
			}
		}
		function confirmRetreat() {
			_tutClearHighlight()
			closeModal()
			playBGM('town');
			const gained = gameState.tempGold
			gameState.gold += gained
			gameState.tempGold = 0
			gameState.inDungeon = false
			recoverParty()
			save_game()
			returnToTown()
			addLog('ダンジョンから帰還しました。', 'log-sys')
			// ゴールド表示モーダル
			const content = document.getElementById('modal-content')
			const _closeId = tutState.active ? 'id="tut-gold-close-btn"' : ''
			const _closeFn = tutState.active ? '_tutGoldClose()' : 'closeModal()'
			content.innerHTML = `<div style="text-align:center;padding:20px;"><h2>帰還報告</h2><p style="font-size:1.2rem;color:var(--gold)">獲得金額: ${gained}G</p><button ${_closeId} class="btn-action btn-blue" style="width:100%;" onclick="${_closeFn}">閉じる</button></div>`
			document.getElementById('modal-layer').classList.remove('hidden')
			// チュートリアル：「戻る」が押された → ゴールドモーダルの「閉じる」をハイライト
			if (tutState.active && tutState.phase === 'B') {

				if (_s && _s.hook === 'confirm_retreat') {
					tutState.stepIdx++   // → step7 (gold_closed)
					tutState.phase = 'B'
					requestAnimationFrame(() => requestAnimationFrame(() => {
						_tutHighlightInModal('tut-gold-close-btn', '👆 閉じる')
					}))
				}
			}
		}

			_tutClearHighlight()

			if (tutState.active) {
				const _s = TUT_STEPS[tutState.stepIdx]
				if (_s && _s.hook === 'gold_closed') {
					tutState.stepIdx++

			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)

		function openSkillDetailModal(s, lv) {
			const TYPE_COLOR = {
				atk:'#f97316',atk_dot:'#e55',atk_debuff:'#f43f5e',atk_multi:'#fb923c',
				buff:'#22d3ee',debuff:'#a78bfa',heal:'#4ade80',shield:'#facc15',
				guard:'#fb923c',regen:'#86efac',mpcost:'#38bdf8',poison:'#84cc16',
				bleed:'#f87171',stun:'#fcd34d',freeze:'#93c5fd',passive:'#6b7280',
				enhance:'#f59e0b',talent:'#c084fc'
			}
			const TYPE_LABEL = {
				atk:'攻撃', atk_dot:'攻撃+状態異常', atk_debuff:'攻撃+デバフ', atk_multi:'多段攻撃',
				buff:'バフ', debuff:'デバフ', heal:'回復', shield:'シールド',
				guard:'ガード', regen:'再生', mpcost:'MP軽減', poison:'毒',
				bleed:'出血', stun:'気絶', freeze:'凍結', passive:'パッシブ',
				enhance:'スキル強化', talent:'タレント'
			}
			const col = TYPE_COLOR[s.type] || '#888'
			const label = TYPE_LABEL[s.type] || s.type
			const statMap = { str:'物攻', matk:'特攻', vit:'物耐', mdef:'特耐', hp:'HP', mp:'MP', agi:'速度', luk:'幸運', cri:'会心' }

			let effectHtml = ''
			if (s.type === 'atk' || s.type === 'atk_dot' || s.type === 'atk_debuff' || s.type === 'atk_multi') {
				const dtype = s.dType === 'magic' ? '✨ 魔法' : '⚔️ 物理'
				const aoe = s.target === 'all' ? '全体' : '単体'
				const hits = s.type === 'atk_multi' ? `${s.hits||2}連撃` : ''
				effectHtml += `<div class="sd-row"><span class="sd-k">攻撃種別</span><span class="sd-v">${dtype} / ${aoe}${hits}</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">威力倍率</span><span class="sd-v" style="color:#f97316;">×${s.pow || 1.0}倍${s.type==='atk_multi'?'/hit':''}</span></div>`
				if (s.type === 'atk_dot' && s.dot) {
					const dotN = {poison:'☠ 毒', bleed:'🩸 出血', stun:'⚡ 気絶', freeze:'❄ 凍結'}[s.dot] || s.dot
					effectHtml += `<div class="sd-row"><span class="sd-k">追加効果</span><span class="sd-v" style="color:#f87171;">${dotN} ${s.dotTurns||3}ターン</span></div>`
				}
				if (s.type === 'atk_debuff' && s.debuff) {
					effectHtml += `<div class="sd-row"><span class="sd-k">デバフ</span><span class="sd-v" style="color:#a78bfa;">${statMap[s.debuff.stat]||s.debuff.stat} -${Math.floor(s.debuff.val*100)}%</span></div>`
				}
			} else if (s.type === 'heal') {
				effectHtml += `<div class="sd-row"><span class="sd-k">回復対象</span><span class="sd-v">${s.target==='all'?'味方全体':'単体'}</span></div>`
				if (s.val) effectHtml += `<div class="sd-row"><span class="sd-k">回復量</span><span class="sd-v" style="color:#4ade80;">MaxHP×${Math.floor(s.val*100)}%</span></div>`

				effectHtml += `<div class="sd-row"><span class="sd-k">強化対象</span><span class="sd-v">${s.target==='all'?'味方全体':'自身'}</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">効果</span><span class="sd-v" style="color:#22d3ee;">${statMap[s.stat]||s.stat} +${Math.floor(s.val*100)}%</span></div>`
				if (s.turns) effectHtml += `<div class="sd-row"><span class="sd-k">持続</span><span class="sd-v">${s.turns}ターン</span></div>`
			} else if (s.type === 'debuff') {
				effectHtml += `<div class="sd-row"><span class="sd-k">対象</span><span class="sd-v">${s.eTarget==='all'?'敵全体':'敵単体'}</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">効果</span><span class="sd-v" style="color:#a78bfa;">${statMap[s.stat]||s.stat} -${Math.floor(s.val*100)}%</span></div>`
				if (s.turns) effectHtml += `<div class="sd-row"><span class="sd-k">持続</span><span class="sd-v">${s.turns}ターン</span></div>`
			} else if (s.type === 'shield') {
				effectHtml += `<div class="sd-row"><span class="sd-k">シールド量</span><span class="sd-v" style="color:#facc15;">MaxHP×${Math.floor(s.val*100)}%</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">持続</span><span class="sd-v">${s.turns||2}ターン</span></div>`
			} else if (s.type === 'regen') {
				effectHtml += `<div class="sd-row"><span class="sd-k">対象</span><span class="sd-v">${s.target==='all'?'味方全体':'単体'}</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">回復量</span><span class="sd-v" style="color:#86efac;">毎T MaxHP×${Math.floor(s.val*100)}%</span></div>`
				effectHtml += `<div class="sd-row"><span class="sd-k">持続</span><span class="sd-v">${s.turns}ターン</span></div>`
			} else if (s.type === 'guard') {
				effectHtml += `<div class="sd-row"><span class="sd-k">効果</span><span class="sd-v">1T 味方全体へのダメージを肩代わり</span></div>`
			} else if (s.type === 'mpcost') {
				effectHtml += `<div class="sd-row"><span class="sd-k">効果</span><span class="sd-v">次スキルMPコスト -${Math.floor(s.val*100)}%</span></div>`
			} else if (['poison','bleed','stun','freeze'].includes(s.type)) {

		function renderEnemyCard(e, i, isTargeting) {

		function updateBattleUI() {
			const container = document.getElementById('enemy-container')
			const isTargeting = battle.targeting === 'attack' || battle.targeting === 'skill'
			// 前衛・後衛で分けてレンダリング
			const frontEnemies = battle.enemies.map((e,i)=>({e,i})).filter(({e})=> e.row !== 'back')
			const backEnemies  = battle.enemies.map((e,i)=>({e,i})).filter(({e})=> e.row === 'back')
			const hasFrontE = frontEnemies.some(({e})=>e.hp>0)
			const hasBackE  = backEnemies.some(({e})=>e.hp>0)
			let html = '<div style="display:flex;flex-direction:column;gap:6px;width:100%;">'
			// 敵: 後衛が奥(上)→前衛が手前(下)
			if (hasBackE) {
				html += `<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">${backEnemies.map(({e,i})=>renderEnemyCard(e,i,isTargeting)).join('')}</div>`
			}
			if (hasFrontE) {
				html += `<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">${frontEnemies.map(({e,i})=>renderEnemyCard(e,i,isTargeting)).join('')}</div>`

					const hpPct = Math.max(0, (p.hp/fs.maxHp)*100)
					const mpPct = Math.max(0, (p.mp/fs.maxMp)*100)
					const bufTags = (()=>{
						const rg=(battle.partyRegens||[]).find(r=>r.pIdx===pIdx)
						const mc=(battle.mpCostDown||[]).find(m=>m.pIdx===pIdx)

						const pdFreeze=(battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='freeze')
						const partyBufs=(battle.buffs||[]).filter(b=>b.pIdx===pIdx)
						const SC = 'cursor:pointer;font-size:0.58rem;padding:0 4px;border-radius:3px;border:1px solid;line-height:1.6;'
						let t=''
						// バフアイコン（スキル起因）
						partyBufs.forEach(b => {
							const key='buff_'+b.stat
							const pct=b.val>=1?`+${b.val}`:`+${Math.round(b.val*100)}%`
							t+=`<span onclick="event.stopPropagation();showStatusDetail('${key}','${pct}')" style="${SC}background:rgba(251,146,60,0.15);color:#fb923c;border-color:#fb923c66;" title="${b.skillName||'バフ'}">↑${(b.skillName||'バフ').replace(/['"]/g,'')}</span>`
						})
						if(rg) t+=`<span onclick="event.stopPropagation();showStatusDetail('regen','${rg.turns}T残')" style="${SC}background:rgba(74,222,128,0.15);color:#4ade80;border-color:#4ade8066;">💚${rg.turns}T</span>`
						if(mc) t+=`<span onclick="event.stopPropagation();showStatusDetail('mpcost','')" style="${SC}background:rgba(129,140,248,0.15);color:#818cf8;border-color:#818cf866;">💧MP軽減</span>`
						if(shieldData) t+=`<span onclick="event.stopPropagation();showStatusDetail('shield','${shieldData.val}')" style="${SC}background:rgba(96,211,148,0.15);color:#60d394;border-color:#60d39466;">🔷${shieldData.val}</span>`
						if(isGuarding) t+=`<span onclick="event.stopPropagation();showStatusDetail('guard','')" style="${SC}background:rgba(251,146,60,0.15);color:#fb923c;border-color:#fb923c66;">🛡身代わり</span>`
						if(pdPoison) t+=`<span onclick="event.stopPropagation();showStatusDetail('party_poison','${pdPoison.turns}T残')" style="${SC}background:rgba(134,239,172,0.15);color:#86efac;border-color:#86efac66;">☠${pdPoison.turns}T</span>`
						if(pdBleed) t+=`<span onclick="event.stopPropagation();showStatusDetail('party_bleed','${pdBleed.turns}T残')" style="${SC}background:rgba(248,113,113,0.15);color:#f87171;border-color:#f8717166;">🩸${pdBleed.turns}T</span>`
						if(pdFreeze) t+=`<span onclick="event.stopPropagation();showStatusDetail('party_freeze','')" style="${SC}background:rgba(147,197,253,0.15);color:#93c5fd;border-color:#93c5fd66;">❄行動不能</span>`
						return t?`<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:3px;">${t}</div>`:''
					})()
					return `<div class="battle-unit-box ${isCurrent?'active-turn':''} ${cursorClass}" data-pidx="${i}" style="border-color:${rowBorderColor};${p.hp<=0?'opacity:0.4;filter:grayscale(1);':''}" ${clickable}>
						<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
							<div style="display:flex;align-items:center;gap:3px;justify-content:center;">
								${rowBadge}
							</div>
							<span style="font-weight:bold;font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;">${p.name}</span>
							<div style="width:100%;">
								<div style="display:flex;justify-content:space-between;font-size:0.66rem;margin-bottom:2px;">
									<span style="color:#f87171;">HP</span>
									<span style="color:${p.hp/fs.maxHp>0.5?'#ccc':p.hp/fs.maxHp>0.25?'var(--gold)':'#f87171'}">${p.hp}<span style="color:#444;">/${fs.maxHp}</span></span>
								</div>
								<div class="bar-bg" style="height:5px;"><div class="bar-fill" style="background:var(--hp-color);width:${hpPct}%"></div></div>
								<div style="display:flex;justify-content:space-between;font-size:0.62rem;margin-top:3px;margin-bottom:1px;">
									<span style="color:#60a5fa;">MP</span>
									<span style="color:#aaa;">${p.mp}<span style="color:#444;">/${fs.maxMp}</span></span>
								</div>
								<div class="bar-bg" style="height:3px;"><div class="bar-fill" style="background:var(--mp-color);width:${mpPct}%"></div></div>
							</div>
							${bufTags}
						</div>
					</div>`
				}
				// プレイヤー: 前衛(上段) → 後衛(下段) ── row未設定は'front'扱い
				gameState.party.forEach(p => { if (!p.row) p.row = 'front' })
				const frontParty = gameState.party.map((p,i)=>({p,i})).filter(({p})=>p.row==='front')
				const backParty  = gameState.party.map((p,i)=>({p,i})).filter(({p})=>p.row==='back')
				const rowSep = '<div style="border-top:1px dashed #2a2a2a;margin:2px 0;"></div>'
				let pHtml = '<div style="display:flex;flex-direction:column;gap:4px;width:100%;">'
				// 前衛行（常に表示）
				pHtml += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:20px;">'
				if (frontParty.length > 0) {
					pHtml += frontParty.map(({p,i})=>renderPartyCard(p,i)).join('')
				} else {
					pHtml += '<span style="font-size:0.65rem;color:#333;align-self:center;padding:4px 8px;">⚔️ 前衛なし</span>'
				}
				pHtml += '</div>'
				// 後衛行（常に表示）
				pHtml += rowSep
				pHtml += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:20px;">'
				if (backParty.length > 0) {
					pHtml += backParty.map(({p,i})=>renderPartyCard(p,i)).join('')
				} else {
					pHtml += '<span style="font-size:0.65rem;color:#333;align-self:center;padding:4px 8px;">🏹 後衛なし</span>'
				}
				pHtml += '</div>'
				pHtml += '</div>'
				partyContainer.innerHTML = pHtml
			}
		}
		function toggleRow(idx) {
			if (battle.active) {
				showMsg('⚠️ 戦闘中は前衛・後衛を変更できません')
				playSE('error')
				return
			}
			const p = gameState.party[idx]
			if (!p) return
			p.row = (p.row === 'front') ? 'back' : 'front'
			addLog(`${p.name} を ${p.row === 'front' ? '⚔️ 前衛' : '🏹 後衛'} に変更しました。`, 'log-sys')
			updateUI()
		}

		// ═══════════════════════════════════════════════
		//   FX SYSTEM — パーティクル・演出エンジン
		// ═══════════════════════════════════════════════
		const fxLayer = () => document.getElementById('fx-layer')

		// パーティカードをpIdx(party配列index)で正確に取得
		function getPartyCardEl(pIdx) {
			const byId = document.querySelector(`#party-battle-container .battle-unit-box[data-pidx="${pIdx}"]`)
			if (byId) return byId
			const cards = document.querySelectorAll('#party-battle-container .battle-unit-box')
			return Array.from(cards)[pIdx] || null
		}

		// 敵カードをeid(battle.enemiesのid)で正確に取得
		function getEnemyCardEl(e) {
			const byId = document.querySelector(`#enemy-container .battle-unit-box[data-eid="${e.id}"]`)
			if (byId) return byId
			// フォールバック：非hiddenカードから indexOf で取得
			const cards = document.querySelectorAll('#enemy-container .battle-unit-box')
			const vis = Array.from(cards).filter(el => !el.classList.contains('hidden'))
			return vis[0] || null
		}

		// 基本パーティクル放出（色・個数・位置指定）
		function fxParticles(x, y, color, count = 12, spread = 60, duration = 600) {
			const layer = fxLayer(); if (!layer) return
			for (let i = 0; i < count; i++) {
				const el = document.createElement('div')
				el.className = 'fx-particle'
				const angle = Math.random() * Math.PI * 2
				const dist  = spread * (0.4 + Math.random() * 0.6)
				const dx = Math.cos(angle) * dist
				const dy = Math.sin(angle) * dist - spread * 0.3
				const size = 4 + Math.random() * 8
				el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};--dx:${dx}px;--dy:${dy}px;animation-duration:${duration * (0.6+Math.random()*0.7)}ms;`
				layer.appendChild(el)
				setTimeout(() => el.remove(), duration * 1.5)
			}
		}

		// スラッシュエフェクト（剣・斧など）
		function fxSlash(x, y, color = '#fb923c', count = 3) {
			const layer = fxLayer(); if (!layer) return
			for (let i = 0; i < count; i++) {
				const el = document.createElement('div')
				el.className = 'fx-slash'
				const rot = -30 + i * 25 + (Math.random() - 0.5) * 15
				const len = 40 + Math.random() * 30
				el.style.cssText = `left:${x - len/2}px;top:${y}px;width:${len}px;height:${3 + i}px;background:linear-gradient(90deg, transparent, ${color}, transparent);border-radius:2px;--rot:${rot}deg;animation-delay:${i*40}ms;`
				layer.appendChild(el)
				setTimeout(() => el.remove(), 600)
			}
		}

		// バースト円（魔法・爆発）
		function fxBurst(x, y, color, size = 60) {
			const layer = fxLayer(); if (!layer) return
			const el = document.createElement('div')
			el.className = 'fx-burst'
			el.style.cssText = `left:${x - size/2}px;top:${y - size/2}px;width:${size}px;height:${size}px;background:radial-gradient(circle, ${color}88 0%, ${color}22 60%, transparent 100%);border:2px solid ${color};`
			layer.appendChild(el)
			setTimeout(() => el.remove(), 500)
		}

		// テキストポップ（ダメージ数値・CRITICAL等）
		function fxText(x, y, text, color = '#fff', size = '1.1rem') {
			const layer = fxLayer(); if (!layer) return
			const el = document.createElement('div')
			el.className = 'fx-text'
			el.style.cssText = `left:${x}px;top:${y}px;color:${color};font-size:${size};`
			el.textContent = text
			layer.appendChild(el)
			setTimeout(() => el.remove(), 1000)
		}

		// スクリーンフラッシュ
		function fxScreenFlash(color = '#fff') {
			const layer = fxLayer(); if (!layer) return
			const el = document.createElement('div')
			el.className = 'fx-screen-flash'
			el.style.background = color
			layer.appendChild(el)
			setTimeout(() => el.remove(), 300)
		}

		// カードグロー効果（一時的に光らせる）
		function fxCardGlow(cardEl, glowClass, duration = 400) {
			if (!cardEl) return
			cardEl.classList.add(glowClass)
			setTimeout(() => cardEl.classList.remove(glowClass), duration)
		}

		// カードシェイク
		function fxCardShake(cardEl) {
			if (!cardEl) return
			cardEl.classList.add('fx-shake')
			setTimeout(() => cardEl.classList.remove('fx-shake'), 350)
		}

		// 要素の中央座標取得
		function getElCenter(el) {
			if (!el) return { x: window.innerWidth/2, y: window.innerHeight/2 }
			const r = el.getBoundingClientRect()
			return { x: r.left + r.width/2, y: r.top + r.height/2 }
		}

		// ── 合成エフェクト ──────────────────────────────

		// 物理攻撃（剣）
		function fxPhysicalAttack(targetEl, damage, isCrit) {
			const { x, y } = getElCenter(targetEl)
			fxSlash(x, y, isCrit ? '#fbbf24' : '#fb923c', isCrit ? 4 : 2)
			fxParticles(x, y, isCrit ? '#fbbf24' : '#fb923c', isCrit ? 18 : 10, isCrit ? 70 : 50, 500)
			fxText(x, y - 10, isCrit ? `★${damage}!!` : `-${damage}`, isCrit ? '#fbbf24' : '#f87171', isCrit ? '1.4rem' : '1.1rem')
			if (isCrit) fxScreenFlash('rgba(251,191,36,0.12)')
			fxCardGlow(targetEl, isCrit ? 'fx-hit-glow-gold' : 'fx-hit-glow-red', 350)
			fxCardShake(targetEl)
		}

		// 魔法攻撃
		function fxMagicAttack(targetEl, damage, isCrit) {
			const { x, y } = getElCenter(targetEl)
			fxBurst(x, y, isCrit ? '#e879f9' : '#818cf8', isCrit ? 80 : 55)
			fxParticles(x, y, isCrit ? '#e879f9' : '#a78bfa', isCrit ? 20 : 14, 65, 650)
			// 魔法陣風リング
			for (let i = 0; i < (isCrit ? 3 : 2); i++) {
				setTimeout(() => fxBurst(x, y, isCrit ? '#e879f9' : '#818cf8', 40 + i * 20), i * 80)
			}
			fxText(x, y - 10, isCrit ? `✦${damage}!!` : `✦${damage}`, isCrit ? '#e879f9' : '#a78bfa', isCrit ? '1.4rem' : '1.1rem')
			if (isCrit) fxScreenFlash('rgba(232,121,249,0.1)')
			fxCardGlow(targetEl, isCrit ? 'fx-hit-glow-purple' : 'fx-hit-glow-purple', 400)
			fxCardShake(targetEl)
		}

		// 弓矢攻撃
		function fxArrowAttack(targetEl, damage, isCrit) {
			const { x, y } = getElCenter(targetEl)
			// 細い線パーティクル
			fxParticles(x, y, isCrit ? '#fbbf24' : '#60a5fa', isCrit ? 16 : 8, 55, 500)
			fxSlash(x, y, isCrit ? '#fbbf24' : '#60a5fa', 2)
			fxText(x, y - 10, isCrit ? `🏹${damage}!!` : `🏹${damage}`, isCrit ? '#fbbf24' : '#60a5fa', isCrit ? '1.3rem' : '1rem')
			fxCardGlow(targetEl, isCrit ? 'fx-hit-glow-gold' : 'fx-hit-glow-blue', 350)
			fxCardShake(targetEl)
		}

		// 回復エフェクト
		function fxHeal(targetEl, amount) {
			const { x, y } = getElCenter(targetEl)
			fxBurst(x, y, '#4ade80', 60)
			fxParticles(x, y, '#4ade80', 14, 50, 700)
			// 上昇するキラキラ
			for (let i = 0; i < 6; i++) {
				setTimeout(() => {
					const ox = (Math.random()-0.5) * 50
					fxParticles(x + ox, y, '#86efac', 3, 20, 500)
				}, i * 80)
			}
			fxText(x, y - 10, `+${amount}`, '#4ade80', '1.2rem')
			fxCardGlow(targetEl, 'fx-hit-glow-green', 500)
		}

		// スキルエフェクト（スキルタイプ別）
		function fxSkillEffect(targetEl, skillType, skillDType, damage, isCrit) {
			const { x, y } = getElCenter(targetEl)
			if (skillType === 'atk') {
				if (skillDType === 'magic') fxMagicAttack(targetEl, damage, isCrit)
				else fxPhysicalAttack(targetEl, damage, isCrit)
			} else if (skillType === 'heal') {
				fxHeal(targetEl, damage)
			} else if (skillType === 'buff') {
				fxBurst(x, y, '#fbbf24', 55)
				fxParticles(x, y, '#fcd34d', 12, 45, 600)
				fxText(x, y - 10, '⬆', '#fbbf24', '1.5rem')
				fxCardGlow(targetEl, 'fx-hit-glow-gold', 450)
			} else if (skillType === 'debuff') {
				fxBurst(x, y, '#f97316', 50)
				fxParticles(x, y, '#fb923c', 10, 40, 500)
				fxText(x, y - 10, '⬇', '#f97316', '1.4rem')
			} else if (skillType === 'poison') {
				fxBurst(x, y, '#a3e635', 48)
				fxParticles(x, y, '#bef264', 12, 45, 600)
				fxText(x, y - 10, '☠', '#a3e635', '1.3rem')
				fxCardShake(targetEl)
			} else if (skillType === 'bleed') {
				fxParticles(x, y, '#f87171', 14, 50, 550)
				fxText(x, y - 10, '🩸', '#f87171', '1.3rem')
				fxCardShake(targetEl)
			} else if (skillType === 'stun') {
				fxBurst(x, y, '#f97316', 55)
				fxParticles(x, y, '#fdba74', 14, 55, 500)
				fxText(x, y - 10, '⚡', '#f97316', '1.5rem')

		// ═══════════════════════════════════════════════
		//   武器タイプ別・文脈別 ログ文生成
		// ═══════════════════════════════════════════════
		function getAttackVerb(attacker, target, weapon, dType, isCrit) {
			const wn = weapon ? weapon.n || '' : ''
			const isRanged = weapon && weapon.range === 'long'
			// 武器名から種別を推定
			const isSword   = /剣|刃|ブレード|ソード|大剣|覇剣|光剣/.test(wn)
			const isAxe     = /斧|アックス|鎚|ハンマー|鉄鎚/.test(wn)
			const isSpear   = /槍|スピア|穿牙|槍/.test(wn)
			const isMagicWp = /杖|書|術書|魔道|詠唱|呪術/.test(wn) || dType === 'magic'
			const isBow     = /弓|弩|矢|砲|吹き矢/.test(wn) || isRanged
			const isDagger  = /短剣|双刃|血刃|刺/.test(wn)

			if (isBow || (isRanged && !isMagicWp)) {
				const verbs = [`${attacker}は${target}に矢を放った`, `${attacker}は${target}を狙い射った`, `${attacker}の一矢が${target}を貫いた`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			if (isMagicWp) {
				const verbs = [`${attacker}は${target}に魔法を放った`, `${attacker}の呪文が${target}を直撃した`, `${attacker}は${target}に魔力を叩きつけた`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			if (isAxe) {
				const verbs = [`${attacker}は${target}に斧を叩きつけた`, `${attacker}の豪腕が${target}を強打した`, `${attacker}は${target}を斧で薙ぎ払った`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			if (isSpear) {
				const verbs = [`${attacker}は${target}に槍を突き立てた`, `${attacker}の穂先が${target}を穿った`, `${attacker}は${target}を槍で薙いだ`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			if (isDagger) {
				const verbs = [`${attacker}は${target}に素早く斬りつけた`, `${attacker}の短刃が${target}を切り裂いた`, `${attacker}は${target}の隙を突いた`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			// デフォルト剣
			if (isCrit) {
				const verbs = [`${attacker}は${target}を鋭く斬り裂いた！`, `${attacker}の必殺の一閃が${target}を捉えた！`, `${attacker}は${target}の急所を斬りつけた！`]
				return verbs[Math.floor(Math.random()*verbs.length)]
			}
			const verbs = [`${attacker}は${target}を斬りつけた`, `${attacker}は${target}に剣を振るった`, `${attacker}の刃が${target}を裂いた`]
			return verbs[Math.floor(Math.random()*verbs.length)]
		}

		function getSkillVerb(attacker, target, skill) {
			const sn = skill.n
			const isAoe = skill.target === 'all' || skill.eTarget === 'all'
			const targetStr = isAoe ? '全敵' : (target ? target.name : '敵')
			if (skill.type === 'heal') {
				if (isAoe) return `${attacker}は仲間全員に${sn}を使った`
				return `${attacker}は${targetStr}に${sn}を使った`
			}
			if (skill.type === 'buff') {
				if (isAoe) return `${attacker}は仲間全員に${sn}を発動した`
				return `${attacker}は${sn}で自身を強化した`
			}
			if (skill.type === 'guard') return `${attacker}は${sn}で仲間を守る構えをとった`
			if (skill.type === 'shield') return `${attacker}は${sn}でシールドを展開した`
			if (skill.type === 'debuff') return `${attacker}は${sn}で${targetStr}を弱体化させた`
			if (skill.type === 'poison') return `${attacker}は${sn}で${targetStr}を毒に冒した`
			if (skill.type === 'bleed') return `${attacker}は${sn}で${targetStr}を出血させた`
			if (skill.type === 'stun') return `${attacker}は${sn}で${targetStr}を気絶させた`
			if (skill.type === 'freeze') return `${attacker}は${sn}で${targetStr}を凍てつかせた`
			if (skill.type === 'regen') return `${attacker}は${sn}で${targetStr}に再生の力を与えた`
			if (skill.type === 'atk') {
				if (skill.dType === 'magic') {
					if (isAoe) return `${attacker}は${sn}で全体に魔法を放った`
					return `${attacker}は${targetStr}に${sn}を唱えた`
				}
				if (isAoe) return `${attacker}は${sn}で全体を薙ぎ払った`
				return `${attacker}は${targetStr}に${sn}を叩きこんだ`
			}
			if (skill.type === 'atk_dot') {
				if (skill.dType === 'magic') return `${attacker}は${sn}で${targetStr}に魔法攻撃＋状態異常を与えた`
				return `${attacker}は${sn}で${targetStr}に攻撃＋状態異常を与えた`
			}
			if (skill.type === 'atk_debuff') {
				return `${attacker}は${sn}で${targetStr}を攻撃し弱体化させた`
			}
			if (skill.type === 'atk_multi') {
				return `${attacker}は${sn}で${skill.hits || 2}連撃を放った`
			}
			if (skill.type === 'talent') return `${attacker}のタレント${sn}が発動！`
			if (skill.type === 'enhance') return `${attacker}が${sn}でスキルを強化した`
			return `${attacker}は${sn}を使った`
		}

		// ログ一覧をメインとモーダルで同期して管理
		const _logStore = []
		function addLog(m, cls = '') {
			_logStore.push({ m, cls })
			// メインlog-area
			const l = document.getElementById('log-area')
			const d = document.createElement('div')
			d.className = `log-entry ${cls}`
			d.innerHTML = `> ${m}`
			l.appendChild(d)
			l.scrollTop = l.scrollHeight
			// モーダルが開いていれば同期
			const mc = document.getElementById('log-modal-content')
			if (mc && document.getElementById('log-modal-overlay').classList.contains('active')) {
				const md = document.createElement('div')
				md.className = `log-entry ${cls}`
				md.innerHTML = `> ${m}`
				mc.appendChild(md)
				mc.scrollTop = mc.scrollHeight
			}
		}
		function openLogModal() {
			const overlay = document.getElementById('log-modal-overlay')
			const mc = document.getElementById('log-modal-content')
			mc.innerHTML = ''
			_logStore.forEach(({ m, cls }) => {
				const d = document.createElement('div')
				d.className = `log-entry ${cls}`
				d.innerHTML = `> ${m}`
				mc.appendChild(d)
			})
			overlay.classList.add('active')
			mc.scrollTop = mc.scrollHeight
		}
		function closeLogModal() {
			document.getElementById('log-modal-overlay').classList.remove('active')
		}
