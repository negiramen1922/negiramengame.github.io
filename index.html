<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Abyss Redive ver2.22</title>
		<style>
		:root {
			--bg-dark: #0d0d0d;
			--panel-bg: #1a1a1a;
			--border-color: #333;
			--text-main: #e0e0e0;
			--text-dim: #999;
			--accent-green: #4caf50;
			--accent-blue: #2196f3;
			--accent-purple: #9c27b0;
			--accent-red: #e91e63;
			--gold: #ffc107;
			--hp-color: #ff5252;
			--mp-color: #448aff;
			--exp-color: #9c27b0;
			--transition: all 0.1s ease;
		}
		
		* {
			box-sizing: border-box;
			word-break: break-word;
			overflow-wrap: break-word;
		}

		body {
			background-color: #000;
			color: var(--text-main);
			font-family: "Segoe UI", sans-serif;
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			height: 100dvh;
			overflow: hidden;
		}
		#game-wrapper {
			width: 100%;
			max-width: 1200px;
			height: 100%;
			max-height: 100dvh;
			background-color: var(--bg-dark);
			border: 1px solid var(--border-color);
			display: flex;
			flex-direction: column;
			position: relative;
		}
		header {
			height: auto;
			min-height: 50px;
			background: #151515;
			border-bottom: 1px solid var(--border-color);
			display: flex;
			align-items: center;
			padding: 5px 15px;
			justify-content: space-between;
			flex-shrink: 0;
			flex-wrap: wrap;
			gap: 8px;
		}
		.header-left,
		.header-right {
			display: flex;
			gap: 10px;
			align-items: center;
			flex-wrap: wrap;
		}
		.stat-badge {
			display: flex;
			align-items: center;
			gap: 4px;
			font-weight: bold;
			font-size: 0.9rem;
			cursor: pointer;
			white-space: nowrap;
		}
		#main-container {
			flex: 1;
			display: grid;
			grid-template-columns: 1fr 340px;
			overflow: hidden;
			min-height: 0;
		}
		#viewport {
			padding: 10px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: radial-gradient(circle at center, #1e1e1e 0%, #0d0d0d 100%);
			position: relative;
			overflow-y: auto;
			width: 100%;
		}
		aside {
			background: #111;
			border-left: 1px solid var(--border-color);
			padding: 10px;
			overflow-y: auto;
		}
		#log-area {
			height: 150px;
			flex-shrink: 0;
			background: #050505;
			border-top: 1px solid var(--border-color);
			padding: 10px 20px;
			overflow-y: auto;
			font-family: "Consolas", monospace;
			font-size: 0.9rem;
		}
		.log-entry {
			margin-bottom: 2px;
			line-height: 1.4;
			border-bottom: 1px solid #111;
		}
		.log-p-atk { color: #fff; }
		.log-e-atk { color: var(--accent-red); }
		.log-crit { color: var(--gold); font-weight: bold; }
		.log-sys { color: #8bc34a; }
		.log-gold { color: var(--gold); }
		.log-red { color: var(--accent-red); }

		button {
			font-family: inherit;
			transition: var(--transition);
			cursor: pointer;
			border: none;
			outline: none;
			white-space: normal;
			line-height: 1.3;
		}
		button:disabled {
			opacity: 0.2;
			cursor: not-allowed;
			filter: grayscale(1);
		}
		
		.btn-icon {
			padding: 10px 14px;
			border-radius: 4px;
			border: 1px solid #444;
			background: #222;
			color: #eee;
			font-size: 0.95rem;
		}
header .btn-icon {
			padding: 8px 10px;
			font-size: 0.85rem;
		}
		.btn-action {
			padding: 16px;
			font-size: clamp(1rem, 4vw, 1.1rem);
			font-weight: bold;
			border-radius: 8px;
			color: white;
			text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
			width: 100%;
			margin-bottom: 0;
			min-height: 54px;
			flex-shrink: 0;
		}		
		.btn-green { background: var(--accent-green); }
		@keyframes tut-pulse-anim {
			0%,100% { box-shadow: 0 0 0 3px #6366f1, 0 0 16px #6366f1aa; }
			50%     { box-shadow: 0 0 0 5px #818cf8, 0 0 32px #818cf8cc; }
		}
		.tut-pulse { animation: tut-pulse-anim 1s ease-in-out infinite !important; }
		#dungeon-ui {
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 100%;
		}
		.btn-blue { background: var(--accent-blue); }
		.btn-purple { background: var(--accent-purple); }
		.btn-red { background: var(--accent-red); }

		.modal-overlay {
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, 0.9);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1000;
		}
		.modal {
			background: var(--panel-bg);
			border: 1px solid var(--accent-blue);
			padding: 20px;
			width: 98%;
			max-width: 700px;
			border-radius: 12px;
			max-height: 90vh;
			max-height: 90dvh;
			overflow-y: auto;
		}
		.active-turn {
			border-color: var(--accent-green) !important;
			box-shadow: 0 0 15px var(--accent-green);
			transform: translateY(-3px);
		}
		.bar-bg {
			width: 100%;
			height: 8px;
			background: #000;
			border-radius: 3px;
			margin: 4px 0;
			border: 1px solid #333;
			overflow: hidden;
		}
		.bar-fill {
			height: 100%;
			transition: width 0.2s ease;
		}
		.char-card {
			background: #1a1a1a;
			border: 1px solid #333;
			padding: 12px;
			margin-bottom: 10px;
			border-radius: 8px;
		}
		.enemy-container {
			display: flex;
			flex-direction: column;
			gap: 4px;
			justify-content: center;
			min-height: 100px;
			width: 100%;
			margin-bottom: 10px;
			padding: 6px;
			background: rgba(0,0,0,0.2);
			border-radius: 8px;
			border: 1px solid #222;
		}
		.party-formation-label {
			width: 100%;
			text-align: center;
			font-size: 0.7rem;
			letter-spacing: 0.1em;
			padding-bottom: 2px;
			margin-bottom: 2px;
		}
		.cursor-pointer {
			cursor: pointer;
		}
		.targeting-active {
			animation: pulse-border 1.5s infinite;
		}
		@keyframes pulse-border {
			0% { border-color: #444; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
			70% { border-color: #4caf50; box-shadow: 0 0 10px 5px rgba(76, 175, 80, 0); }
			100% { border-color: #444; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
		}
		.battle-unit-box {
			flex: 1 1 calc(50% - 16px);
			min-width: 140px;
			max-width: 200px;
			background: #151515;
			border: 2px solid #444;
			padding: 10px;
			border-radius: 8px;
			text-align: center;
			font-size: 0.9rem;
		}
		.party-battle-container {
			display: flex;
			gap: 8px;
			justify-content: center;
			margin-bottom: 10px;
			flex-wrap: wrap;
			width: 100%;
		}
		.hidden {
			display: none !important;
		}
		.skill-milestone {
			border: 1px solid #333;
			padding: 8px;
			border-radius: 8px;
			background: #111;
			margin-bottom: 8px;
		}
		.skill-milestone h3 {
			margin: 0 0 8px 0;
			font-size: 0.85rem;
			color: var(--accent-purple);
			border-bottom: 1px solid #222;
		}
		.skill-options {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}
		.skill-card {
			border: 1px solid #444;
			padding: 10px;
			border-radius: 6px;
			text-align: left;
			background: #1a1a1a;
			font-size: 0.8rem;
			position: relative;
		}
		.skill-card b {
			display: block;
			color: #fff;
			margin-bottom: 4px;
			font-size: 0.9rem;
		}
		.skill-card small {
			color: var(--text-dim);
			display: block;
			line-height: 1.3;
		}
		.skill-card.available {
			border-color: var(--accent-blue);
			cursor: pointer;
		}
		.skill-card.available:hover {
			background: #252525;
			border-color: #fff;
		}
		.skill-card.selected {
			border-color: var(--accent-green);
			background: rgba(76, 175, 80, 0.15);
			box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.2);
		}
		.skill-card.locked {
			opacity: 0.3;
			pointer-events: none;
		}

		@media (max-width: 900px) {
			#main-container {
				grid-template-columns: 1fr;
				grid-template-rows: 1fr 40%;
			}
			aside {
				border-left: none;
				border-top: 1px solid var(--border-color);
				padding: 10px;
			}
			.stat-badge {
				font-size: 0.8rem;
			}
			header .btn-icon {
				padding: 5px 8px;
				font-size: 0.8rem;
			}
		}

		@media (max-width: 600px) {
			#log-area {
				height: 120px;
				font-size: 0.85rem;
				padding: 8px 12px;
			}
			.battle-unit-box {
				flex: 1 1 calc(50% - 10px);
				padding: 6px;
				font-size: 0.8rem;
				min-width: 120px;
			}
			.char-card {
				padding: 10px;
			}
			.char-card div[style*="font-size:0.6rem"] {
				font-size: 0.75rem !important;
				line-height: 1.4;
			}
			.skill-options {
				grid-template-columns: 1fr !important;
			}
		}

		@media (max-height: 600px) {
			#log-area {
				height: 80px;
			}
			.modal {
				max-height: 95vh;
			}
			#viewport {
				padding: 5px;
			}
		}
		</style>
	</head>
	<body>
		<div id="game-wrapper">
			<header>
				<div class="header-left">
					<div class="stat-badge">
						<span style="color:var(--gold)">💰</span>
						<span id="h-gold">0</span>
					</div>
					<div class="stat-badge" style="color:var(--accent-blue)">
						<span>🏰</span>
						<span id="h-max-floor">1F</span>
					</div>
					<button class="btn-icon" onclick="openInventory()" id="header-bag-btn" style="display:flex; align-items:center; gap:6px;" title="カバン">
						<span style="color:var(--accent-red)">👜</span> <span id="h-cap">0</span>/<span id="h-max-cap">15</span><span id="h-lv-bonus" style="font-size:0.7rem; color:#7dc; display:none;"> (+Lv)</span>
					</button>
					
				</div>
				
				<div class="header-right" style="display:flex; align-items:center; gap:6px;">
					<!-- オート周回ヘッダーUI -->
					<div id="af-header-wrap" style="display:none; position:relative; align-items:center; gap:5px; flex-direction:column;">
						<div style="display:flex; align-items:center; gap:5px;">
							<button id="btn-auto-farm"
								onclick="toggleAutoFarm()"
								style="padding:5px 11px; font-size:0.78rem; font-weight:bold;
									background:linear-gradient(135deg,#7c3aed,#4338ca);
									border:1px solid #5b21b6; color:#fff; border-radius:8px; cursor:pointer;
									white-space:nowrap;">⚙ オート</button>
							<button onclick="toggleAfMenu()"
								style="padding:5px 8px; font-size:0.78rem;
									background:#1a1a2e; border:1px solid #444; color:#aaa;
									border-radius:8px; cursor:pointer;" title="オート設定">▼</button>
						</div>
						<div id="af-stats-row" style="display:none; font-size:0.68rem; color:#aaa; text-align:center; line-height:1.4;">
							<span style="color:#4ade80;" id="af-stat-kills">0戦</span>
							<span style="color:#444;"> | </span>
							<span style="color:var(--gold);" id="af-stat-gold">0G</span>
							<span style="color:#444;"> | </span>
							<span style="color:#60a5fa;" id="af-stat-exp">0EXP</span>
						</div>
						<!-- 設定ドロップダウン -->
						<div id="af-dropdown" style="display:none; position:absolute; top:100%; right:0; z-index:200;
							background:#1a1a2e; border:1px solid #444; border-radius:10px;
							padding:12px; min-width:200px; margin-top:4px; box-shadow:0 4px 20px rgba(0,0,0,0.8);">
							<div style="font-size:0.75rem; color:#888; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:6px; font-weight:bold;">⚙ オート周回 設定</div>
							<!-- 速度 -->
							<div style="font-size:0.72rem; color:#aaa; margin-bottom:4px;">速度</div>
							<div style="display:flex; gap:5px; margin-bottom:10px;">
								<button id="af-btn-slow"   onclick="setAutoFarmSpeed('slow')"   style="flex:1; padding:4px; font-size:0.72rem; border-radius:5px; border:1px solid #444; background:#111; color:#aaa; cursor:pointer; opacity:0.5;">🐢遅</button>
								<button id="af-btn-normal" onclick="setAutoFarmSpeed('normal')" style="flex:1; padding:4px; font-size:0.72rem; border-radius:5px; border:1px solid #444; background:#111; color:#aaa; cursor:pointer; opacity:1.0;">▶標準</button>
								<button id="af-btn-fast"   onclick="setAutoFarmSpeed('fast')"   style="flex:1; padding:4px; font-size:0.72rem; border-radius:5px; border:1px solid #444; background:#111; color:#aaa; cursor:pointer; opacity:0.5;">⚡速</button>
							</div>
							<!-- スキル使用 -->
							<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
								<span style="font-size:0.72rem; color:#aaa;">スキル使用</span>
								<button id="af-btn-skills" onclick="setAutoFarmSkills()"
									style="padding:3px 10px; font-size:0.72rem; border-radius:5px; border:1px solid #444; background:#111; color:#aaa; cursor:pointer;">✅ON</button>

							<div style="font-size:0.72rem; color:#aaa; margin-bottom:4px;">HP危険域（この%以下で停止）</div>

								<button id="af-hp-25" onclick="setAutoFarmHP(0.25)" style="flex:1; padding:4px; font-size:0.72rem; border-radius:5px; border:1px solid #444; background:#111; color:#aaa; cursor:pointer; opacity:1.0;">25%</button>

			<div id="main-container">

					<div id="town-ui">

					<div id="dungeon-ui" class="hidden">

							<button id="btn-retreat" class="btn-action btn-red" onclick="retreat()">街に戻る</button>

				</div>

				</aside>
			</div>

			<div id="log-area"></div>
			<div id="modal-layer" class="modal-overlay hidden">
				<div class="modal" id="modal-content"></div>
			</div>
		</div>

		<script>
		console.log('Game Initialized')

		// ==========================================
		// オーディオシステム (BGM & SE)
		// ==========================================
		const AudioContext = window.AudioContext || window.webkitAudioContext;
		let audioCtx = null;
		let masterGain = null;
		let isMuted = false;
		let currentBGM = null;
		let bgmNodes = [];
		let bgmInterval = null;

		function initAudio() {
			if(audioCtx) return;
			audioCtx = new AudioContext();
			masterGain = audioCtx.createGain();
			masterGain.gain.value = 0.1; // 全体音量
			masterGain.connect(audioCtx.destination);
		}

		function toggleMute() {
			initAudio();
			isMuted = !isMuted;
			masterGain.gain.value = isMuted ? 0 : 0.1;
			document.getElementById('btn-mute').innerText = isMuted ? '🔇' : '🔊';
			if (!isMuted && audioCtx.state === 'suspended') {
				audioCtx.resume();
			}
		}

		// 画面のどこかをクリックしたらオーディオ再生許可＆クリック音
		document.addEventListener('click', (e) => {
			initAudio();
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume();
			}
			const target = e.target.closest('button, .cursor-pointer, .stat-badge, .skill-card.available');
			if(target && !target.disabled && target.id !== 'btn-mute') {
				playSE('click');
			}
		});

		function playSE(type) {
			if(!audioCtx || isMuted) return;
			const t = audioCtx.currentTime;
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.connect(gain);
			gain.connect(masterGain);

			if (type === 'click') {
				osc.type = 'sine';
				osc.frequency.setValueAtTime(800, t);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
				osc.start(t);
				osc.stop(t + 0.05);
			} else if (type === 'attack') { // 物理攻撃
				osc.type = 'square';
				osc.frequency.setValueAtTime(800, t);
				osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
				osc.start(t);
				osc.stop(t + 0.1);
			} else if (type === 'enemy_attack') { // 敵の攻撃ダメージ
				osc.type = 'sawtooth';
				osc.frequency.setValueAtTime(200, t);
				osc.frequency.linearRampToValueAtTime(50, t + 0.15);
				gain.gain.setValueAtTime(0.5, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.15);
				osc.start(t);
				osc.stop(t + 0.15);
			} else if (type === 'heal' || type === 'item') { // 回復・アイテム
				osc.type = 'sine';
				osc.frequency.setValueAtTime(400, t);
				osc.frequency.linearRampToValueAtTime(800, t + 0.2);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.2);
				osc.start(t);
				osc.stop(t + 0.2);
			} else if (type === 'magic') { // 魔法
				osc.type = 'sine';
				osc.frequency.setValueAtTime(600, t);
				osc.frequency.linearRampToValueAtTime(1200, t + 0.3);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.3);
				osc.start(t);
				osc.stop(t + 0.3);
			} else if (type === 'debuff') { // デバフ
				osc.type = 'triangle';
				osc.frequency.setValueAtTime(400, t);
				osc.frequency.linearRampToValueAtTime(100, t + 0.3);
				gain.gain.setValueAtTime(0.4, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.3);
				osc.start(t);
				osc.stop(t + 0.3);
			} else if (type === 'error') { // エラー
				osc.type = 'sawtooth';
				osc.frequency.setValueAtTime(150, t);
				gain.gain.setValueAtTime(0.3, t);
				gain.gain.linearRampToValueAtTime(0.01, t + 0.1);
				osc.start(t);
				osc.stop(t + 0.1);
			} else if (type === 'win') { // 勝利ファンファーレ
				[400, 500, 600, 800].forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.type = 'square';
					o.connect(g);
					g.connect(masterGain);
					let startTime = t + i * 0.1;
					o.frequency.setValueAtTime(freq, startTime);
					g.gain.setValueAtTime(0.2, startTime);
					g.gain.linearRampToValueAtTime(0.01, startTime + 0.2);
					o.start(startTime);
					o.stop(startTime + 0.2);
				});
			}
		}

		function playBGM(scene) {
			if(!audioCtx) initAudio();
			if(currentBGM === scene) return;
			
			stopBGM();
			currentBGM = scene;
			
			if(isMuted) return;

			const t = audioCtx.currentTime;
			
			if(scene === 'town') {
				const freqs = [261.63, 329.63, 392.00]; // C E G
				freqs.forEach(f => {
					const osc = audioCtx.createOscillator();
					const gain = audioCtx.createGain();
					osc.type = 'sine';
					osc.frequency.value = f;
					
					const lfo = audioCtx.createOscillator();
					lfo.type = 'sine';
					lfo.frequency.value = 0.2;
					const lfoGain = audioCtx.createGain();
					lfoGain.gain.value = 0.1;
					lfo.connect(lfoGain);
					lfoGain.connect(gain.gain);
					
					gain.gain.setValueAtTime(0.01, t);
					gain.gain.linearRampToValueAtTime(0.15, t + 2);
					
					osc.connect(gain);
					gain.connect(masterGain);
					osc.start();
					lfo.start();
					bgmNodes.push({osc, gain, lfo});
				});
			} else if (scene === 'dungeon') {
				const freqs = [65.41, 73.42]; // C2, D2
				freqs.forEach(f => {
					const osc = audioCtx.createOscillator();
					const gain = audioCtx.createGain();
					osc.type = 'triangle';
					osc.frequency.value = f;
					
					gain.gain.setValueAtTime(0.01, t);
					gain.gain.linearRampToValueAtTime(0.2, t + 2);
					
					osc.connect(gain);
					gain.connect(masterGain);
					osc.start();
					bgmNodes.push({osc, gain});
				});
			} else if (scene === 'battle') {
				let step = 0;
				const sequence = [130.81, 130.81, 146.83, 155.56, 130.81, 0, 116.54, 130.81]; 
				
				bgmInterval = setInterval(() => {
					if(isMuted) return;
					const freq = sequence[step % sequence.length];
					if(freq > 0) {
						const osc = audioCtx.createOscillator();
						const gain = audioCtx.createGain();
						osc.type = 'square';
						
						const time = audioCtx.currentTime;
						osc.frequency.setValueAtTime(freq, time);
						gain.gain.setValueAtTime(0.15, time);
						gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
						
						osc.connect(gain);
						gain.connect(masterGain);
						osc.start(time);
						osc.stop(time + 0.15);
					}
					step++;
				}, 150);
			}
		}

		function stopBGM() {
			const t = audioCtx ? audioCtx.currentTime : 0;
			bgmNodes.forEach(node => {
				if(node.gain) {
					node.gain.gain.cancelScheduledValues(t);
					node.gain.gain.linearRampToValueAtTime(0.01, t + 0.5);
				}
				setTimeout(() => {
					if(node.osc) node.osc.stop();
					if(node.lfo) node.lfo.stop();
					if(node.osc) node.osc.disconnect();
					if(node.gain) node.gain.disconnect();
				}, 600);
			});
			bgmNodes = [];
			if(bgmInterval) {
				clearInterval(bgmInterval);
				bgmInterval = null;
			}
			currentBGM = null;
		}

		function generateRune() {
			const currentTier = Math.min(8, Math.floor((gameState.maxFloor - 1) / 10) + 1);
			const isPct = Math.random() > 0.5;
            
			// 8属性の定義（全ステータス網羅）
			const elements = [
				{ id: 'fire',   n: '緋',   color: '#e91e63', stat: 'str' },   // 物理攻撃
				{ id: 'magic',  n: '紫苑', color: '#9c27b0', stat: 'matk' },  // 特殊攻撃
				{ id: 'earth',  n: '琥珀', color: '#ff9800', stat: 'vit' },   // 物理耐性
				{ id: 'water',  n: '瑠璃', color: '#2196f3', stat: 'mdef' },  // 特殊耐性
				{ id: 'life',   n: '翡翠', color: '#4caf50', stat: 'hp' },    // 最大HP
				{ id: 'spirit', n: '蒼',   color: '#00bcd4', stat: 'mp' },    // 最大MP
				{ id: 'wind',   n: '迅',   color: '#8bc34a', stat: 'agi' },   // 速度
				{ id: 'star',   n: '煌',   color: '#ffc107', stat: 'luk' }    // 幸運・会心
			];
			const el = elements[Math.floor(Math.random() * elements.length)];

			// 煌(star)の場合は幸運か会心に分岐
			let targetStat = el.stat;
			if (el.id === 'star') {
				targetStat = Math.random() > 0.5 ? 'luk' : 'cri';
			}

			let val = 0;
			let statKey = targetStat;
			let d = '';

			if (targetStat === 'cri') {
				val = Math.floor(Math.random() * 5 + 1) + currentTier * 2; 
				d = `会心+${val}%`;
				val = val / 100;
			} else {
				const statNameMap = {str:'物攻', matk:'特攻', vit:'物耐', mdef:'特耐', agi:'速度', luk:'幸運', hp:'HP', mp:'MP'};
				if (isPct) {
					val = Math.floor(Math.random() * 3 + 1) + currentTier * 2; 
					statKey = targetStat + 'Pct';
					d = `${statNameMap[targetStat]} ${val}%UP`;
				} else {
					let base = Math.floor(Math.random() * 20) + 10; 
					if (targetStat === 'hp') base *= 5; 
					if (targetStat === 'mp') base *= 2;
					val = base * (currentTier * currentTier); 
					d = `${statNameMap[targetStat]} +${val}`;
				}
			}

			// 色情報(color)も持たせておくことでUI描画が綺麗になります
			let rune = { id: 'r_' + Date.now() + Math.random(), n: `${el.n}のルーン`, d: d, type: 'rune', element: el.id, color: el.color, s: {}, locked: false };
			rune.s[statKey] = val;
			return applyRarity(rune);
		}

		function rollEliteTier() {
			const r = Math.random()
			let cum = 0
			for (const t of ELITE_TIERS) {
				cum += t.rate
				if (r < cum) return t
			}
			return null
		}

		function applyEliteTraits(e) {
			const tierObj = rollEliteTier()
			if (!tierObj) return e

			// 二つ名個数を決定
			let count = 0
			const cr = Math.random()
			for (const row of TITLE_COUNT_TABLE) {
				if (cr < row.cumRate) { count = row.count; break }
			}
			if (count === 0) count = 1

			// 特性プールからランダムに count 個選ぶ（重複なし）
			const pool = [...(ELITE_TRAITS[tierObj.tier] || [])]
			const chosen = []
			while (chosen.length < count && pool.length > 0) {
				const idx = Math.floor(Math.random() * pool.length)
				chosen.push(pool.splice(idx, 1)[0])
			}
			if (chosen.length === 0) return e

			// 特性を適用
			chosen.forEach(tr => tr.apply(e))

			// 名前に二つ名を付加
			const titleStr = chosen.map(tr => tr.title).join('')
			e.name = titleStr + e.name
			e.eliteTier   = tierObj.tier
			e.eliteColor  = tierObj.color
			e.eliteLabelBg = tierObj.labelColor
			e.eliteTraits  = chosen
			e._isElite     = true

			// HP等の再整合
			if (e.hp > e.maxHp) e.maxHp = e.hp

			return e
		}

		function applyRarity(item) {
			if (item.type === 'item') return item;
			const currentFloor = gameState.inDungeon ? gameState.floor : 50; 
			const r = Math.random();
			let rarity;
			let subCount = 0;

			if (currentFloor <= 5) {
				if (r < 0.9) { rarity = { label: 'コモン', color: '#ffffff', mul: 1.0 }; subCount = 0; }
				else { rarity = { label: 'アンコモン', color: '#4caf50', mul: 1.15 }; subCount = 1; }
			} else if (currentFloor <= 10) {
				if (r < 0.6) { rarity = { label: 'コモン', color: '#ffffff', mul: 1.0 }; subCount = 0; }
				else if (r < 0.9) { rarity = { label: 'アンコモン', color: '#4caf50', mul: 1.15 }; subCount = 1; }
				else { rarity = { label: 'レア', color: '#2196f3', mul: 1.4 }; subCount = 2; }
			} else if (currentFloor <= 20) {
				if (r < 0.6) { rarity = { label: 'コモン', color: '#ffffff', mul: 1.0 }; subCount = 0; }
				else if (r < 0.8) { rarity = { label: 'アンコモン', color: '#4caf50', mul: 1.15 }; subCount = 1; }
				else if (r < 0.94) { rarity = { label: 'レア', color: '#2196f3', mul: 1.4 }; subCount = 2; }
				else { rarity = { label: 'エピック', color: '#9c27b0', mul: 1.8 }; subCount = 3; }
			} else {
				if (r < 0.60) { rarity = { label: 'コモン', color: '#ffffff', mul: 1.0 }; subCount = 0; }
				else if (r < 0.80) { rarity = { label: 'アンコモン', color: '#4caf50', mul: 1.15 }; subCount = 1; }
				else if (r < 0.90) { rarity = { label: 'レア', color: '#2196f3', mul: 1.4 }; subCount = 2; }
				else if (r < 0.96) { rarity = { label: 'エピック', color: '#9c27b0', mul: 1.8 }; subCount = 3; }
				else { rarity = { label: 'レジェンダリー', color: '#ff9800', mul: 2.5 }; subCount = 4; }
			}

			item.rarityLabel = rarity.label;
			item.rarityColor = rarity.color;
			if (item.s) {
				for (let k in item.s) {
					if (typeof item.s[k] === 'number' && k !== 'cap' && k !== 'cri') {
						item.s[k] = Math.floor(item.s[k] * rarity.mul);
					}
				}
			}
			// 【削除またはコメントアウトする行】
			// if (item.m) item.m = Number((item.m * rarity.mul).toFixed(2));

			item.subEffects = [];
			const subPool = [
				{ k: 'str', n: '物理攻撃', v: 4 },
				{ k: 'vit', n: '物理耐性', v: 4 },
				{ k: 'matk', n: '特殊攻撃', v: 4 },
				{ k: 'mdef', n: '特殊耐性', v: 4 },
				{ k: 'agi', n: '速度', v: 3 },
				{ k: 'luk', n: '幸運', v: 5 },
				{ k: 'hp', n: 'HP', v: 40 },
				{ k: 'mp', n: 'MP', v: 20 },
				{ k: 'cri', n: '会心', v: 0.03 }
			];
			for(let i=0; i<subCount; i++) {
				const eff = subPool[Math.floor(Math.random()*subPool.length)];
				item.subEffects.push({...eff});
			}

			return item;
		}

		function getFinalStats(p) {
			let job = Object.values(JOB_DATA).find(j => j.name === p.job)
			if (!job) {
				const legacyMap = { 戦士: 'Warrior', 騎士: 'Paladin', 魔術師: 'Wizard', 探索者: 'Ranger' }
				if (legacyMap[p.job] && JOB_DATA[legacyMap[p.job]]) {
					job = JOB_DATA[legacyMap[p.job]]
					p.job = job.name
				} else {
					console.warn('Job data not found for character:', p)
					return { maxHp: 100, maxMp: 10, str: 10, matk: 5, vit: 5, mdef: 5, agi: 5, luk: 5, cri: 0.05, multiplier: 1.0 }
				}
			}
			let lvMod = (p.lv ?? 1) - 1
			let fs = {
				maxHp: Math.floor(job.base.hp + job.grow.hp * lvMod),
				maxMp: Math.floor(job.base.mp + job.grow.mp * lvMod),
				str: job.base.str + job.grow.str * lvMod,
				matk: job.base.matk + job.grow.matk * lvMod,
				vit: job.base.vit + job.grow.vit * lvMod,
				mdef: job.base.mdef + job.grow.mdef * lvMod,
				agi: job.base.agi + job.grow.agi * lvMod,
				luk: job.base.luk + job.grow.luk * lvMod,
				cri: job.base.cri + job.grow.cri * lvMod,
				multiplier: 1.0,
			}

			const applySubEffects = (item) => {
				if (!item || !item.subEffects) return;
				item.subEffects.forEach(eff => {
					let key = eff.k;
					if (key === 'hp') key = 'maxHp';
					if (key === 'mp') key = 'maxMp';
					if (fs[key] !== undefined) fs[key] += eff.v;
				});
			};

			if (p.equip.weapon) {
				for (let k in p.equip.weapon.s) fs[k] += p.equip.weapon.s[k]
				fs.multiplier = p.equip.weapon.m || 1.0
				applySubEffects(p.equip.weapon);
			}
			if (p.equip.armor) {
				for (let k in p.equip.armor.s) fs[k] += p.equip.armor.s[k]
				applySubEffects(p.equip.armor);
			}
			gameState.party.forEach(m => {
				if (m.equip && m.equip.acc && m.equip.acc.s) {
					for (let k in m.equip.acc.s) {
						let val = m.equip.acc.s[k]
						if (k === 'cap') continue
						if (k.endsWith('Pct')) {
							let statKey = k.substring(0, k.length - 3)
							if (fs[statKey] !== undefined) {
								fs[statKey] += Math.floor(fs[statKey] * (val / 100))
							}
						} else {
							fs[k] = (fs[k] || 0) + val
						}
					}
					applySubEffects(m.equip.acc);
				}
			})
			if (p.equip && p.equip.runes) {
				// 8属性＋旧データ(ice)のカウント準備
				let counts = { fire:0, magic:0, earth:0, water:0, life:0, spirit:0, wind:0, star:0, ice:0 };
				p.equip.runes.forEach(r => {
					if (counts[r.element] !== undefined) counts[r.element]++
				})
				
				// セットボーナス適用
				if (counts.fire >= 3) fs.str = Math.floor(fs.str * 1.15);
				if (counts.magic >= 3) fs.matk = Math.floor(fs.matk * 1.15);
				if (counts.earth >= 3) fs.vit = Math.floor(fs.vit * 1.15);
				if (counts.water >= 3) fs.mdef = Math.floor(fs.mdef * 1.15);
				if (counts.life >= 3) fs.maxHp = Math.floor(fs.maxHp * 1.20);
				if (counts.spirit >= 3 || counts.ice >= 3) fs.maxMp = Math.floor(fs.maxMp * 1.20); // 旧データ救済
				if (counts.wind >= 3) fs.agi = Math.floor(fs.agi * 1.15);
				if (counts.star >= 3) {
					fs.luk = Math.floor(fs.luk * 1.20);
					fs.cri += 0.05; // 会心率+5%
				}

				p.equip.runes.forEach(rune => {
					if (rune.s) {
						for (let k in rune.s) {
							let val = rune.s[k]
							if (k.endsWith('Pct')) {
								let statKey = k.substring(0, k.length - 3)
								if (statKey === 'hp') statKey = 'maxHp'
								if (statKey === 'mp') statKey = 'maxMp'
								if (fs[statKey] !== undefined) {
									fs[statKey] += Math.floor(fs[statKey] * (val / 100))
								}
							} else {
								if (k === 'hp') fs.maxHp += val
								else if (k === 'mp') fs.maxMp += val
								else fs[k] = (fs[k] || 0) + val
							}
						}
					}
					applySubEffects(rune);
				})
			}
			for (let lv in p.learnedSkills) {
				const sIdx = p.learnedSkills[lv]
				const skill = job.skills[lv][sIdx]
				if (skill.type === 'passive') {
					if (skill.stat === 'hp') fs.maxHp += skill.val
					else if (skill.stat === 'mp') fs.maxMp += skill.val
					else fs[skill.stat] += skill.val
				}
			}
			battle.buffs
				.filter(b => b.pIdx === gameState.party.indexOf(p))
				.forEach(b => {
					if(fs[b.stat] !== undefined) {
						if (b.val >= 1) fs[b.stat] += b.val;
						else fs[b.stat] = Math.floor(fs[b.stat] * (1 + b.val));
					}
				})
			fs.cri = Math.min(fs.cri, 0.5)
			return fs
		}

		function getMaxCapacity() {
			let base = 15
			// 全キャラのLv÷5の合計（1キャラ5Lvごとに+1枠）
			gameState.party.forEach(p => {
				base += Math.floor(p.lv / 5)
			})
			// アクセサリーのカバン拡張
			gameState.party.forEach(p => {
				if (p.equip && p.equip.acc && p.equip.acc.s && p.equip.acc.s.cap) {
					base += p.equip.acc.s.cap
				}
			})
			// ゴールドで購入した拡張枠
			base += gameState.bagExpansion ?? 0
			return base
		}

		function getBagCapBreakdown() {
			const base = 15
			let lvBonus = 0
			gameState.party.forEach(p => { lvBonus += Math.floor(p.lv / 5) })
			let accBonus = 0
			gameState.party.forEach(p => {
				if (p.equip?.acc?.s?.cap) accBonus += p.equip.acc.s.cap
			})
			const expand = gameState.bagExpansion ?? 0
			return { base, lvBonus, accBonus, expand, total: base + lvBonus + accBonus + expand }
		}

		function calcTacticalDamage(attackerStats, defenderDef, defenderMDef, lv, isEnemy = false, dType = 'physical') {
			let currentDef = dType === 'physical' ? defenderDef : defenderMDef
			if (!isEnemy) {
				battle.enemyDebuffs.forEach(d => {
					if (dType === 'physical' && d.stat === 'def') {
						currentDef = d.val >= 1 ? currentDef - d.val : Math.floor(currentDef * (1 - d.val));
					} else if (dType === 'magic' && d.stat === 'mdef') {
						currentDef = d.val >= 1 ? currentDef - d.val : Math.floor(currentDef * (1 - d.val));
					}
				})
			}
			currentDef = Math.max(0, currentDef)
			let atkStat = dType === 'magic' ? attackerStats.matk : attackerStats.str
			let atk = atkStat * attackerStats.multiplier
			let baseDamage = atk * (100 / (100 + currentDef))
			let isCrit = Math.random() < attackerStats.cri
			let damage = isCrit ? baseDamage * 1.6 : baseDamage
			let finalDamage = Math.floor(damage * (0.9 + Math.random() * 0.2))
			return { val: Math.max(lv * 1, finalDamage), crit: isCrit }
		}

		function load_game() {
			try {
				const pid = window.projectId || 'default_game'
				const saveKey = 'game_' + pid
				const data = localStorage.getItem(saveKey)
				if (data) {
					const parsed = JSON.parse(data)
					parsed.gold = parsed.gold ?? 0
					parsed.floor = parsed.floor ?? 1
					parsed.inDungeon = parsed.inDungeon ?? false
					parsed.party = parsed.party ?? []
					parsed.inventory = parsed.inventory ?? []
					parsed.tempGold = parsed.tempGold ?? 0
					parsed.exploreCount = parsed.exploreCount ?? 0
					parsed.stairsFound = parsed.stairsFound ?? false
					parsed.bossDefeated = parsed.bossDefeated ?? []
					parsed.maxFloor = parsed.maxFloor ?? 1
					parsed.guildWarehouse = parsed.guildWarehouse ?? (parsed.guildStorage ?? [])
					parsed.guildWarehouseCap = parsed.guildWarehouseCap ?? (parsed.guildStorageCap ?? 50)
					parsed.bagExpansion = parsed.bagExpansion ?? 0
					parsed.party.forEach(p => {
						if (p.job === '戦士') p.job = 'ウォリアー'
						else if (p.job === '騎士') p.job = 'パラディン'
						else if (p.job === '魔術師') p.job = 'ウィザード'
						else if (p.job === '探索者') p.job = 'レンジャー'
						p.equip = p.equip ?? { weapon: null, armor: null, acc: null, runes: [] }
						p.learnedSkills = p.learnedSkills ?? {}
						p.row = p.row ?? 'front'
						p.skillCooldowns = p.skillCooldowns || {}
						p.exp = p.exp ?? 0
						p.nextExp = p.nextExp ?? 100
						p.lv = p.lv ?? 1
						if (p.hp === undefined || p.mp === undefined) {
							const fs = getFinalStats(p)
							p.hp = p.hp ?? fs.maxHp
							p.mp = p.mp ?? fs.maxMp
						}
					})
					gameState = parsed
					console.log('Game loaded')
					return true
				}
			} catch (e) {
				console.error(e)
			}
			return false
		}

		function exploreRandomEvent() {
			if (!gameState.inDungeon) return
			gameState.exploreCount++
			const disp = document.getElementById('event-display')
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				startBattle()
				return
			}
			const r = Math.random()
			if (r < 0.6) {
				startBattle()
			} else if (r < 0.9) {
				let baseGold = Math.floor(Math.random() * 80 * gameState.floor) + 60;
				let msg = `宝箱！`;
				
				const lootRoll = Math.random();
				let loot = null;

				// 現在の階層からTierを算出 (10階層ごとにTierアップ、最大Tier5)
				const currentTier = Math.min(8, Math.floor((gameState.floor - 1) / 10) + 1);

				if (lootRoll < 0.25) { // ゴールド 25%
					gameState.tempGold += baseGold;
					msg = `宝箱！ ${baseGold}G`;
				} else if (lootRoll < 0.30) { // 大当たりゴールド 5%
					let jackpot = baseGold * 5 + 500;
					gameState.tempGold += jackpot;
					msg = `<span style="color:var(--gold); font-weight:bold;">✨大当たり宝箱✨ ${jackpot}G!!</span>`;
					addLog(`大当たり！ ${jackpot}G獲得！`, 'log-gold');
				} else if (lootRoll < 0.42) { // 武器 12%
					// 現在のTier以下の武器のみプールにする
					const pool = SHOP_ITEMS.weapon.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'weapon', locked: false });
				} else if (lootRoll < 0.54) { // 防具 12%
					const pool = SHOP_ITEMS.armor.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'armor', locked: false });
				} else if (lootRoll < 0.60) { // 汎用 6%
					const pool = SHOP_ITEMS.acc.filter(i => i.tier <= currentTier);
					loot = applyRarity({ ...pool[Math.floor(Math.random() * pool.length)], type: 'acc', locked: false });
				} else if (lootRoll < 0.70) { // アイテム 10%
					// アイテムは1つ上のTierまで出やすくする（救済措置）
					const pool = SHOP_ITEMS.item.filter(i => i.tier <= currentTier + 1);
					loot = { ...pool[Math.floor(Math.random() * pool.length)], type: 'item', locked: false };
				} else if (lootRoll < 0.90) { // ルーン 20%
					loot = generateRune();
				} else { // 残り 10% その他(小銭のみ)
					gameState.tempGold += Math.floor(baseGold / 2);
					msg = `宝箱！ ${Math.floor(baseGold / 2)}G`;
				}

				if (loot) {
					if (gameState.inventory.length < getMaxCapacity()) {
						gameState.inventory.push(loot);
						msg = `宝箱！ ${baseGold}G & ${loot.n}`;
						gameState.tempGold += baseGold;
						addLog(`宝箱から獲得：${loot.n}`, 'log-sys');
					} else {
						msg = `宝箱！ ${baseGold}G (鞄が一杯でアイテムを諦めた...)`;
						gameState.tempGold += baseGold;
						addLog(`鞄が一杯でアイテムを諦めた...`, 'log-red');
					}
				}
				
				disp.innerHTML = `<span style="color:var(--gold)">${msg}</span>`
				if(!lootRoll >= 0.25 && !lootRoll < 0.30) addLog(`${baseGold}G獲得。`, 'log-gold');
			} else {
				const p = gameState.party[0]
				p.hp = Math.max(0, p.hp - 25)
				disp.innerHTML = `<span style="color:var(--accent-red)">罠！</span> -25HP`
				addLog(`罠：-25HP`, 'log-red')
				if (p.hp <= 0) handleDeath()
			}
			if (!gameState.stairsFound) {
				const pS = [0.2, 0.4, 0.6, 0.8, 0.9][Math.min(gameState.exploreCount - 1, 4)]
				if (Math.random() < pS) {
					gameState.stairsFound = true
					document.getElementById('btn-next-floor').classList.remove('hidden')
					addLog('階段発見。', 'log-sys')
					disp.innerHTML += `<br><span style="color:var(--accent-blue)">▼ 階段</span>`
				}
			}
			updateUI()
		}

			c.innerHTML = `

					<h2>ボス再戦</h2>

		function exploreCountAndBattle() {
			if (!gameState.inDungeon) return
			gameState.exploreCount++
			startBattle(true)
		}

		function explore() {
			if (!gameState.inDungeon) return
			const isBossFloor = BOSS_DATA[gameState.floor]
			if (isBossFloor) {
				if (!gameState.bossDefeated.includes(gameState.floor)) {
					gameState.exploreCount++
					startBattle()
					return
				} else {
					openBossRematchModal()
					return
				}
			}
			// ── チュートリアル中の探索処理 ──
			if (tutState.active && tutState.phase === 'B') {
				const _ts = TUT_STEPS[tutState.stepIdx]
				if (_ts && _ts.hook === 'explore') {
					_tutClearHighlight()
					if (tutState.stepIdx === 2) {
						// 最初の探索: スライム固定戦闘を開始し、戦闘説明(step3)へ
						tutState.stepIdx = 3
						tutState.phase = 'A'
						_tutForceBattle()
						setTimeout(_tutPhaseA, 500)
					} else {
						// 2回目の探索: Tier1武器を宝箱として確定ドロップ
						_tutDropChestWeapon()
						tutState.stepIdx++
						tutState.phase = 'A'
						setTimeout(_tutPhaseA, 300)
					}
					return
				}
			}
			exploreRandomEvent()
		}

		function startBattle(forceBoss = false) {
			playBGM('battle');
			battle.active = true
			battle.isProcessing = false
			battle.enemies = []
			battle.enemyDebuffs = []
			battle.buffs = []
			battle.shields = []
			battle.guardIdx = -1
			battle.enemyDots = []
			battle.partyRegens = []
			battle.enemyStatus = []
			battle.mpCostDown = []
			battle.enemyDots = []
			battle.partyRegens = []
			battle.enemyStatus = []
			battle.mpCostDown = []
			battle.activeUnitIndex = 0
			battle.turnCycle = 0
			battle.remainingHits = 0
			gameState.party.forEach(p => {
				p.skillCooldowns = {}
			})
			if (BOSS_DATA[gameState.floor] && (!gameState.bossDefeated.includes(gameState.floor) || forceBoss)) {
				const bossData = BOSS_DATA[gameState.floor]
				const boss = { ...bossData, id: 0 }
				boss.maxHp = boss.hp
				battle.enemies.push(boss)
				addLog('ボス出現！', 'log-red')
				if (autoFarm.active) { stopAutoFarm('ボスフロアに到達'); return }
			} else {
				let count = Math.min(3, Math.floor(Math.random() * Math.min(3, gameState.floor)) + 1)
				let available = MONSTERS.filter(m => m.minFloor <= gameState.floor && gameState.floor <= m.maxFloor)
				if (available.length === 0) available = MONSTERS
				for (let i = 0; i < count; i++) {
					const b = available[Math.floor(Math.random() * available.length)]
					const variance = b.variance || 0.1
					const roll = 1 + (Math.random() * 2 - 1) * variance
					const enemy = { ...b, id: i,
						hp:   Math.floor(b.hp   * roll), maxHp: Math.floor(b.hp * roll),
						mp:   b.mp || 0, maxMp: b.mp || 0,
						atk:  Math.floor(b.atk  * roll), def: Math.floor(b.def * roll),
						mdef: Math.floor(b.mdef * roll), exp: Math.floor(b.exp * roll),
						gold: Math.floor(b.gold * roll)
					}
					applyEliteTraits(enemy)
					battle.enemies.push(enemy)
					if (enemy._isElite) {
						const trDesc = enemy.eliteTraits.map(t=>t.desc).join(' / ')
						addLog(`✨ ${enemy.eliteTier}個体出現！ [${enemy.name}] — ${trDesc}`, enemy.eliteTier==='Legend' ? 'log-gold' : enemy.eliteTier==='Rare' ? 'log-sys' : 'log-p-atk')
					}
				}
			}
			document.getElementById('dungeon-ui').classList.add('hidden')
			document.getElementById('battle-view').classList.remove('hidden')
			updateBattleUI()
			// 前衛/後衛の状況をログに表示
			const _fN = gameState.party.filter(p=>p.row==='front'&&p.hp>0).map(p=>p.name).join('・')
			const _bN = gameState.party.filter(p=>p.row==='back' &&p.hp>0).map(p=>p.name).join('・')
			if (_fN) addLog(`⚔️ 前衛: ${_fN}`, 'log-sys')
			if (_bN) addLog(`🏹 後衛: ${_bN}（前衛が全滅するまで守られる）`, 'log-sys')
			setTurn('player')
		}

		function setTurn(side, unitIndex = 0) {
			battle.turn = side
			battle.activeUnitIndex = unitIndex
			battle.isProcessing = false
			battle.remainingHits = 0
			updateBattleUI()
			const isPlayerTurn = side === 'player'
			document.getElementById('atk-btn').disabled = !isPlayerTurn
			document.getElementById('skl-btn').disabled = !isPlayerTurn
			document.getElementById('battle-skill-menu').classList.add('hidden')
			if (isPlayerTurn) {
				const p = gameState.party[battle.activeUnitIndex]
				if (p.skillCooldowns) {
					for (let k in p.skillCooldowns) {
						if (p.skillCooldowns[k] > 0) p.skillCooldowns[k]--
					}
				}
				document.getElementById('battle-msg').innerText = `${p.name}の行動`
				// オート周回中：自動でアクションを実行
				if (autoFarm.active && battle.active) {
					const _autoDelay = autoFarm.speed === 'fast' ? 150 : autoFarm.speed === 'slow' ? 900 : 400
					setTimeout(_autoFarmDoPlayerAction, _autoDelay)
				}
			} else {
				document.getElementById('battle-msg').innerText = '敵の行動...'
			}
		}

		function nextTurn() {
			if (battle.turn === 'player') {
				let nextIdx = battle.activeUnitIndex + 1
				while (nextIdx < gameState.party.length) {
					if (gameState.party[nextIdx].hp > 0) {
						setTurn('player', nextIdx)
						return
					}
					nextIdx++
				}
				setTurn('enemy')
				// シールドのターン経過減衰
				battle.shields = (battle.shields||[]).filter(s => { s.turns--; return s.turns > 0 })
				battle.guardIdx = -1
				setTimeout(enemyTurn, 500)
			}
		}

		// 遠距離武器かどうかを判定
		function isRangedWeapon(p) {
			return !!(p.equip && p.equip.weapon && p.equip.weapon.ranged)
		}
		// 武器の射程を返す（long=後衛でもペナルティなし, short=後衛からペナルティあり）
		function getWeaponRange(p) {
			if (!p.equip || !p.equip.weapon) return 'short'
			const w = p.equip.weapon
			if (w.range) return w.range
			if (w.ranged || w.dType === 'magic') return 'long'
			return 'short'
		}

		// スキルが全体攻撃かどうかを判定
		function isAoeSkill(s) {
			return s && (s.target === 'all' || s.target === 'aoe' || s.target === 'all_enemy')
		}

				function playerAttack() {
			if (battle.isProcessing || battle.turn !== 'player') return
			if (battle.targeting !== null) return
			const p = gameState.party[battle.activeUnitIndex]
			if (p.hp <= 0) {
				battle.isProcessing = false
				nextTurn()
				return
			}
			
			if (battle.remainingHits <= 0) {
				battle.remainingHits = (p.equip.weapon && p.equip.weapon.hits) ? p.equip.weapon.hits : 1;
			}
			
			const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
			if (!aliveEnemies.length) {
				battle.remainingHits = 0;
				battle.isProcessing = false
				nextTurn()
				return
			}
			
			if (aliveEnemies.length > 1) {
				battle.targeting = 'attack'
				updateBattleUI()
				document.getElementById('battle-msg').innerText = `ターゲットを選択 (${battle.remainingHits})`
				return
			}
			executeAttack(aliveEnemies[0])
		}

		function executeAttack(target) {
			const p = gameState.party[battle.activeUnitIndex]
			battle.isProcessing = true
			battle.targeting = null
			let dType = 'physical'
			if (p.equip.weapon && p.equip.weapon.dType) {
				dType = p.equip.weapon.dType
			}
			playSE('attack');
			const _damageMult = getEnemyDamageMult(target.id, dType)
			const res = calcTacticalDamage(getFinalStats(p), target.def, target.mdef, p.lv, false, dType)
			res.val = Math.floor(res.val * _damageMult)
			// 後衛からshort射程武器での攻撃はダメージ-20%（射程ペナルティ）
			const _isBackPenalty = (p.row === 'back' && getWeaponRange(p) === 'short')
			if (_isBackPenalty) res.val = Math.floor(res.val * 0.8)
			const _rowNote = _isBackPenalty ? ' <span style=\"font-size:0.72em;color:#aaa;\">(後衛-20%)</span>' : ''
			// 武器のonHitエフェクト処理（後で setTimeout 内で適用）
			const _weapEff = p.equip && p.equip.weapon && p.equip.weapon.effect ? p.equip.weapon.effect : null
			const _rangeNote = getWeaponRange(p) === 'long'
			? `<span style="font-size:0.7em;color:#60a5fa;border:1px solid #3a5a8a;border-radius:3px;padding:0 3px;margin-left:2px;">遠距離</span>`
			: `<span style="font-size:0.7em;color:#fb923c;border:1px solid #8a4a1a;border-radius:3px;padding:0 3px;margin-left:2px;">近接</span>`
		addLog(`${p.name}の攻撃：${res.val}ダメージ ${res.crit ? '★会心' : ''}${_rowNote}${_rangeNote} <span style="font-size:0.75em; color:${dType==='magic'?'#a78bfa':'#fb923c'}; border:1px solid ${dType==='magic'?'#7c5cbf':'#c2622a'}; border-radius:3px; padding:0 3px;">${dType==='magic'?'特殊':'物理'}</span>`, res.crit ? 'log-crit' : 'log-p-atk')
			setTimeout(() => {
				target.hp = Math.max(0, target.hp - res.val)
				// 復讐する：反射
				if (target._reflectChance && target.hp > 0 && Math.random() < target._reflectChance) {
					const reflectDmg = Math.floor(res.val * target._reflectPct)
					const reflectTarget = gameState.party[battle.activeUnitIndex]
					if (reflectTarget && reflectTarget.hp > 0) {
						applyDamageToPartyMember(reflectTarget, reflectDmg, 'log-e-atk')
						addLog(`💢 ${target.name}がダメージを反射！ ${reflectTarget.name}に${reflectDmg}！`, 'log-e-atk')
					}
				}
				// 呪われし：攻撃時毒付与
				if (target._poisonOnHit && target.hp > 0) {
					const ex = (battle.enemyDots||[]).find(d=>d.eId===target.id&&d.type==='poison')
					if (!ex) battle.enemyDots.push({ eId: target.id, type: 'poison', turns: 3 })
					addLog(`☠ 反呪！ ${target.name}に毒を付与！`, 'log-e-atk')
				}
				// 武器のonHitエフェクト
				if (_weapEff && target.hp > 0 && Math.random() < _weapEff.chance) {
					if (_weapEff.type === 'poison') {
						const _ex = (battle.enemyDots||[]).find(d=>d.eId===target.id&&d.type==='poison')
						if (!_ex) battle.enemyDots.push({ eId: target.id, type: 'poison', turns: 3 })
						addLog(`☠ 武器効果：${target.name}に毒付与！`, 'log-sys')
					} else if (_weapEff.type === 'bleed') {
						const _ex = (battle.enemyDots||[]).find(d=>d.eId===target.id&&d.type==='bleed')
						if (!_ex) battle.enemyDots.push({ eId: target.id, type: 'bleed', turns: 3 })
						addLog(`🩸 武器効果：${target.name}に出血付与！`, 'log-sys')
					} else if (_weapEff.type === 'stun') {
						const _ex = (battle.enemyStatus||[]).find(s=>s.eId===target.id&&s.type==='stun')
						if (!_ex) battle.enemyStatus.push({ eId: target.id, type: 'stun', turns: 1 })
						addLog(`⚡ 武器効果：${target.name}が気絶！`, 'log-sys')
					} else if (_weapEff.type === 'freeze') {
						const _ex = (battle.enemyStatus||[]).find(s=>s.eId===target.id&&s.type==='freeze')
						if (!_ex) battle.enemyStatus.push({ eId: target.id, type: 'freeze', turns: 1 })
						addLog(`❄ 武器効果：${target.name}が凍結！`, 'log-sys')
					}
				}
				updateBattleUI()
				
				battle.remainingHits--;
				const aliveEnemies = battle.enemies.filter(e => e.hp > 0);
				
				if (battle.remainingHits > 0 && aliveEnemies.length > 0) {
					battle.isProcessing = false;
					if (autoFarm.active) {
						const _nextTgt = aliveEnemies.reduce((a, b) => a.hp < b.hp ? a : b)
						executeAttack(_nextTgt)
					} else {
						playerAttack();
					}
				} else {
					battle.remainingHits = 0;
					if (battle.enemies.every(e => e.hp <= 0)) winBattle()
					else {
						battle.isProcessing = false
						nextTurn()
					}
				}
			}, 200)
		}

		function useBattleSkill(s, lv) {
			const p = gameState.party[battle.activeUnitIndex]
			const _pIdxCheck = gameState.party.indexOf(p)
			const _discCheck = (battle.mpCostDown||[]).find(m=>m.pIdx===_pIdxCheck)
			const _checkCost = _discCheck ? Math.max(0, Math.floor(s.cost*(1-_discCheck.val))) : s.cost
			if (p.hp <= 0 || p.mp < _checkCost) return
			// 敵単体対象スキル（atk/状態異常系）: 複数敵がいるときターゲット選択
			const _needsEnemyTarget = (s.type === 'atk' && s.target === 'single') ||
				(['poison','bleed','stun','freeze'].includes(s.type) && s.eTarget === 'single')
			if (_needsEnemyTarget) {
				const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
				if (aliveEnemies.length === 0) return
				if (aliveEnemies.length > 1) {
					battle.targeting = 'skill'
					battle.pendingSkill = s
					battle.pendingSkillLv = lv
					document.getElementById('battle-skill-menu').classList.add('hidden')
					updateBattleUI()
					document.getElementById('battle-msg').innerText = 'ターゲットを選んでください'
					return
				}
			}
			if (s.type === 'heal' && s.target === 'single') {
				battle.targeting = 'heal'
				battle.pendingSkill = s
				battle.pendingSkillLv = lv
				document.getElementById('battle-skill-menu').classList.add('hidden')
				updateBattleUI()
				document.getElementById('battle-msg').innerText = '回復対象を選択'
				return
			}
			executeSkill(s, null, lv)
		}

		function executeSkill(s, explicitTarget = null, lv = null) {
			const p = gameState.party[battle.activeUnitIndex]
			if (p !== gameState.party[battle.activeUnitIndex]) return
			const _pIdx = gameState.party.indexOf(p)
			const _mpDisc = (battle.mpCostDown||[]).find(m=>m.pIdx===_pIdx)
			const _effCost = _mpDisc ? Math.max(0, Math.floor(s.cost*(1-_mpDisc.val))) : s.cost
			if (_mpDisc) { battle.mpCostDown = battle.mpCostDown.filter(m=>m.pIdx!==_pIdx); addLog(`MPコスト軽減！ ${_effCost}MP消費（元${s.cost}MP）`, 'log-sys') }
			p.mp -= _effCost
			battle.isProcessing = true
			battle.targeting = null
			battle.pendingSkill = null
			battle.pendingSkillLv = null
			const skillMenu = document.getElementById('battle-skill-menu')
			if (!skillMenu.classList.contains('hidden')) skillMenu.classList.add('hidden')

			if (lv !== null) {
				p.skillCooldowns = p.skillCooldowns || {}
				p.skillCooldowns[lv] = 2
			}

			if (s.type === 'atk') {
				if (s.dType === 'magic') playSE('magic');
				else playSE('attack');
			} else if (s.type === 'heal') {
					const targets = s.target === 'all' ? gameState.party : [explicitTarget || p];
					const casterFs = getFinalStats(p); // 発動者(自分)のステータス
					
					targets.forEach(tc => {
						const targetFs = getFinalStats(tc); // 対象のステータス
						let healAmt = 0;

						// ▼ 参照元(scale)に応じた計算式の分岐
						if (s.scale === 'self_hp') {
							// 自身の最大HP依存（パラディン向け）
							healAmt = Math.floor(casterFs.maxHp * s.val);
						} else if (s.scale === 'target_hp') {
							// 対象の最大HP依存（割合回復）
							healAmt = Math.floor(targetFs.maxHp * s.val);
						} else {
							// デフォルトはMATK依存（プリースト向け / valが10以上の旧データは固定値扱い）
							healAmt = s.val >= 10 ? s.val : Math.floor(casterFs.matk * s.val * 3);
						}

						// 死亡者には蘇生系のみ、生存者には回復系のみ適用
						if((tc.hp > 0 && s.n !== '蘇生' && s.n !== '奇跡の復活') || 
						   (tc.hp <= 0 && (s.n === '蘇生' || s.n === '奇跡の復活'))) {
							tc.hp = Math.min(targetFs.maxHp, tc.hp + healAmt);
						}
					});
					const targetName = targets.length > 1 ? '味方全体' : targets[0].name;
					addLog(`${p.name}の回復スキル！ ${targetName}を癒やした。`, 'log-sys')
				playSE('heal');
			} else if (s.type === 'debuff') {
				playSE('debuff');
			} else if (s.type === 'buff') {
				playSE('heal');
			}

			addLog(`${p.name}のスキル：${s.n}`, 'log-sys')
			setTimeout(() => {
				if (s.type === 'atk') {
					const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
					if (aliveEnemies.length === 0) {
						winBattle()
						battle.isProcessing = false
						return
					}
					const target = explicitTarget || (s.target === 'all' ? null : aliveEnemies[0])
					const targets = s.target === 'all' ? aliveEnemies : target ? [target] : []
					const fs = getFinalStats(p)
					const skillDType = s.dType || 'physical'
					const atkStat = skillDType === 'magic' ? fs.matk : fs.str
					targets.forEach(t => {
						const _sm = getEnemyDamageMult(t.id, skillDType)
						const res = calcTacticalDamage({ ...fs, str: atkStat * s.pow, matk: atkStat * s.pow }, t.def, t.mdef, p.lv, false, skillDType)
						res.val = Math.floor(res.val * _sm)
						t.hp = Math.max(0, t.hp - res.val)
						// 復讐する：反射
						if (t._reflectChance && t.hp > 0 && Math.random() < t._reflectChance) {
							const rd = Math.floor(res.val * t._reflectPct)
							if (p.hp > 0) { applyDamageToPartyMember(p, rd, 'log-e-atk'); addLog(`💢 ${t.name}がダメージを反射！ ${p.name}に${rd}！`, 'log-e-atk') }
						}
						addLog(`${t.name}に ${res.val}ダメージ <span style="font-size:0.75em; color:${skillDType==='magic'?'#a78bfa':'#fb923c'}; border:1px solid ${skillDType==='magic'?'#7c5cbf':'#c2622a'}; border-radius:3px; padding:0 3px;">${skillDType==='magic'?'特殊':'物理'}</span>`, 'log-p-atk')
					})
					} else if (s.type === 'heal') {
					const targets = s.target === 'all' ? gameState.party : [explicitTarget || p];
					const fs = getFinalStats(p); // 発動者(プリースト等)のステータスを取得
					
					// 魔法攻撃力(MATK) × スキル倍率(val) で回復量を計算
					// 旧データ(固定値10以上)の場合はそのまま固定値回復として扱う
					const healAmt = s.val >= 10 ? s.val : Math.floor(fs.matk * s.val * 3); // MATKの低い序盤でも使えるよう3倍補正
					
					targets.forEach(tc => {
						const tFs = getFinalStats(tc);
						if(tc.hp > 0 || s.n === '蘇生' || s.n === '奇跡の復活') {
							tc.hp = Math.min(tFs.maxHp, tc.hp + healAmt);
						}
					});
					const targetName = targets.length > 1 ? '味方全体' : targets[0].name;
					addLog(`${p.name}の祈り！ ${targetName}を ${healAmt} 回復！`, 'log-sys')
				} else if (s.type === 'debuff') {
					battle.enemyDebuffs.push({ stat: s.stat, val: s.val })
					addLog('敵を弱体化！', 'log-e-atk')
				} else if (s.type === 'buff') {
					const targets = s.target === 'all' ? gameState.party.map((_, i) => i) : [gameState.party.indexOf(p)]
					targets.forEach(idx => {
						battle.buffs.push({ pIdx: idx, stat: s.stat, val: s.val })
					})
					addLog('能力を強化！', 'log-sys')
				} else if (s.type === 'shield') {
					const fs = getFinalStats(p)
					const shieldAmt = Math.floor(fs.maxHp * s.val)
					const targetPeople = s.target === 'all' ? gameState.party.filter(m => m.hp > 0).map((_, i) => gameState.party.indexOf(gameState.party.filter(m=>m.hp>0)[i])) : [gameState.party.indexOf(p)]
					targetPeople.forEach(idx => {
						// 既存シールドはスタックせず上書き（より大きい方を採用）
						const existing = battle.shields.find(s => s.pIdx === idx)
						if (existing) { existing.val = Math.max(existing.val, shieldAmt); existing.turns = 3 }
						else battle.shields.push({ pIdx: idx, val: shieldAmt, turns: 3 })
					})
					const tName = s.target === 'all' ? '味方全体' : p.name
					addLog(`${p.name}のシールド展開！ ${tName}に ${shieldAmt} のシールドを付与！`, 'log-sys')
				} else if (s.type === 'guard') {
					const pIdx = gameState.party.indexOf(p)
					battle.guardIdx = pIdx
					addLog(`${p.name}が身代わりの構え！ 1ターン、味方全員へのダメージを肩代わりする！`, 'log-sys')

				// ── 再生バフ ──
				} else if (s.type === 'regen') {
					const targets = s.target === 'all' ? gameState.party.filter(m=>m.hp>0).map((_,i)=>gameState.party.indexOf(gameState.party.filter(m=>m.hp>0)[i])) : [gameState.party.indexOf(p)]
					targets.forEach(idx => {
						const ex = (battle.partyRegens||[]).find(r => r.pIdx===idx)
						if (ex) { ex.turns = Math.max(ex.turns, s.turns); ex.val = Math.max(ex.val, s.val) }
						else battle.partyRegens.push({ pIdx: idx, val: s.val, turns: s.turns })
					})
					const tname = s.target==='all'?'味方全体':p.name
					addLog(`${p.name}の再生付与！ ${tname}に${s.turns}ターン間のリジェネを付与！`, 'log-sys')

				// ── MPコスト軽減バフ ──
				} else if (s.type === 'mpcost') {
					const targets = s.target === 'all' ? gameState.party.map((_,i)=>i) : [gameState.party.indexOf(explicitTarget||p)]
					targets.forEach(idx => {
						battle.mpCostDown = (battle.mpCostDown||[]).filter(m=>m.pIdx!==idx)
						battle.mpCostDown.push({ pIdx: idx, val: s.val })
					})
					const tname = s.target==='all'?'味方全体':(explicitTarget||p).name
					addLog(`${p.name}のMP軽減付与！ ${tname}の次のスキルMPコスト${Math.floor(s.val*100)}%減！`, 'log-sys')

				// ── 毒 ──
				} else if (s.type === 'poison') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const ex = (battle.enemyDots||[]).find(d=>d.eId===e.id&&d.type==='poison')
						if (ex) ex.turns = Math.max(ex.turns, s.turns)
						else battle.enemyDots.push({ eId: e.id, type: 'poison', turns: s.turns })
					})
					addLog(`${p.name}が毒を付与！ ${s.turns}ターン間、毎ターンHP最大HP×3%＆MP最大MP×3%を蝕む！`, 'log-e-atk')

				// ── 出血 ──
				} else if (s.type === 'bleed') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const ex = (battle.enemyDots||[]).find(d=>d.eId===e.id&&d.type==='bleed')
						if (ex) ex.turns = Math.max(ex.turns, s.turns)
						else battle.enemyDots.push({ eId: e.id, type: 'bleed', turns: s.turns })
					})
					addLog(`${p.name}が出血を付与！ ${s.turns}ターン間、毎ターン最大HP×5%を出血させる！`, 'log-e-atk')

				// ── 気絶 (stun) ──
				} else if (s.type === 'stun') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const ex = (battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='stun')
						if (ex) ex.turns = Math.max(ex.turns, s.turns)
						else battle.enemyStatus.push({ eId: e.id, type: 'stun', turns: s.turns })
					})
					addLog(`${p.name}が気絶を付与！ ${s.turns}ターン行動不能＆物理ダメージ+30%！`, 'log-e-atk')

				// ── フリーズ (freeze) ──
				} else if (s.type === 'freeze') {
					const aliveE = battle.enemies.filter(e=>e.hp>0)
					const ets = s.eTarget==='all' ? aliveE : (explicitTarget ? [explicitTarget] : [aliveE[0]])
					ets.forEach(e => {
						const ex = (battle.enemyStatus||[]).find(d=>d.eId===e.id&&d.type==='freeze')
						if (ex) ex.turns = Math.max(ex.turns, s.turns)
						else battle.enemyStatus.push({ eId: e.id, type: 'freeze', turns: s.turns })
					})
					addLog(`${p.name}がフリーズを付与！ ${s.turns}ターン行動不能＆特殊ダメージ+30%！`, 'log-e-atk')
				}
				updateBattleUI()
				if (battle.enemies.every(e => e.hp <= 0)) winBattle()
				else {
					battle.isProcessing = false
					nextTurn()
				}
			}, 300)
		}

		function selectEnemyTarget(index) {
			if (battle.targeting !== 'attack' && battle.targeting !== 'skill') return
			if (index < 0 || index >= battle.enemies.length) return
			const target = battle.enemies[index]
			if (target.hp <= 0) return
			// 射程チェック：short武器で敵後衛を直接狙う場合、前衛が残っていれば不可
			if (battle.targeting === 'attack') {
				const p = gameState.party[battle.activeUnitIndex]
				const wRange = p ? getWeaponRange(p) : 'short'
				if (wRange === 'short' && target.row === 'back') {
					const aliveFront = battle.enemies.filter(e => e.hp > 0 && e.row !== 'back')
					if (aliveFront.length > 0) {
						showMsg('⚔️ 短射程武器では前衛を倒すまで後衛を攻撃できません！')
						playSE('error')
						return
					}
				}
				executeAttack(target)
			} else if (battle.targeting === 'skill' && battle.pendingSkill) {
				executeSkill(battle.pendingSkill, target, battle.pendingSkillLv)
			}
		}

		function selectPartyTarget(index) {
			if (battle.targeting !== 'heal') return;
			const target = gameState.party[index];

			// 死者への通常回復、生者への蘇生を防ぐ
			if (target.hp <= 0 && battle.pendingSkill.n !== '蘇生') {
				showMsg('戦闘不能の味方には使えません');
				playSE('error');
				return;
			} else if (target.hp > 0 && battle.pendingSkill.n === '蘇生') {
				showMsg('生存している味方には使えません');
				playSE('error');
				return;
			}

			executeSkill(battle.pendingSkill, target, battle.pendingSkillLv);
		}

						// ═══ DoT / 状態異常システム ═══

		// 敵のDoT・状態異常をプレイヤーターン開始時に処理
		function tickEnemyEffects() {
			if (!battle.active) return
			let anyEffect = false
			for (const e of battle.enemies.filter(en => en.hp > 0)) {
				// DoT（毒・出血）
				const dots = (battle.enemyDots||[]).filter(d => d.eId === e.id)
				for (const d of dots) {
					if (d.type === 'poison') {
						const hpDmg = Math.floor(e.maxHp * 0.03)
						const mpDmg = Math.floor((e.maxMp||50) * 0.03)
						e.hp = Math.max(1, e.hp - hpDmg)
						e.mp = Math.max(0, (e.mp||0) - mpDmg)
						addLog(`☠ 毒が <b>${e.name}</b> に ${hpDmg} ダメージ！（MP-${mpDmg}）`, 'log-e-atk')
					} else if (d.type === 'bleed') {
						const dmg = Math.floor(e.maxHp * 0.05)
						e.hp = Math.max(1, e.hp - dmg)
						addLog(`🩸 出血が <b>${e.name}</b> に ${dmg} ダメージ！`, 'log-e-atk')
					}
					d.turns--
					anyEffect = true
				}
			}
			battle.enemyDots = (battle.enemyDots||[]).filter(d => d.turns > 0)
			// エリート特性 onTurnStart（不壊：毎ターン回復等）
			for (const e of battle.enemies.filter(en => en.hp > 0 && en._isElite)) {
				for (const tr of (e.eliteTraits||[])) {
					if (tr.onTurnStart) {
						const before = e.hp
						tr.onTurnStart(e)
						if (e.hp !== before) addLog(`✨ ${e.name}が ${e.hp - before} HP回復！`, 'log-sys')
					}
				}
			}
			// 状態異常のターン減衰
			const before = (battle.enemyStatus||[]).length
			battle.enemyStatus = (battle.enemyStatus||[]).map(s => ({...s, turns: s.turns-1})).filter(s => s.turns > 0)
			if (before > (battle.enemyStatus||[]).length) addLog('状態異常が解除された！', 'log-sys')
			if (anyEffect) updateBattleUI()
		}

		// 味方のリジェネをプレイヤーターン開始時に処理
		function tickPartyRegens() {
			if (!battle.active) return
			let healed = false
			for (let i = 0; i < gameState.party.length; i++) {
				const p = gameState.party[i]
				if (p.hp <= 0) continue
				const regens = (battle.partyRegens||[]).filter(r => r.pIdx === i)
				for (const r of regens) {
					const fs = getFinalStats(p)
					const amt = Math.floor(fs.maxHp * r.val)
					p.hp = Math.min(fs.maxHp, p.hp + amt)
					addLog(`💚 再生が ${p.name} のHPを ${amt} 回復！`, 'log-sys')
					r.turns--
					healed = true
				}
			}
			battle.partyRegens = (battle.partyRegens||[]).filter(r => r.turns > 0)
			if (healed) updateBattleUI()
		}

		// 敵が気絶またはフリーズ中か
		function isEnemyStunned(eId) {
			return (battle.enemyStatus||[]).some(s => s.eId === eId && (s.type === 'stun' || s.type === 'freeze'))
		}

		// ダメージ倍率（気絶=物理+30%, フリーズ=特殊+30%）
		function getEnemyDamageMult(eId, dtype) {
			let m = 1.0
			;(battle.enemyStatus||[]).filter(s => s.eId === eId).forEach(s => {
				if (s.type === 'stun'   && dtype === 'physical') m += 0.30
				if (s.type === 'freeze' && dtype === 'magic')    m += 0.30
			})
			return m
		}

		// シールド・ガードを考慮してパーティメンバーにダメージを与える共通関数
		function applyDamageToPartyMember(targetP, dmgVal, logTag) {
			const tIdx = gameState.party.indexOf(targetP)
			let remaining = dmgVal
			// ガード：別のキャラがすべて肩代わり
			if (battle.guardIdx >= 0 && battle.guardIdx !== tIdx) {
				const guardian = gameState.party[battle.guardIdx]
				if (guardian && guardian.hp > 0) {
					// ガードキャラのシールドを先に消費
					const gShield = battle.shields.find(s => s.pIdx === battle.guardIdx)
					if (gShield) {
						const absorbed = Math.min(gShield.val, remaining)
						gShield.val -= absorbed
						remaining -= absorbed
						if (gShield.val <= 0) battle.shields = battle.shields.filter(s => s !== gShield)
						if (absorbed > 0) addLog(`${guardian.name}のシールドが ${absorbed} を吸収！`, 'log-sys')
					}
					if (remaining > 0) {
						guardian.hp = Math.max(0, guardian.hp - remaining)
						addLog(`${guardian.name}が身代わり！ ${remaining}ダメージを肩代わり`, 'log-sys')
					}
					return
				}
			}
			// シールド消費
			const shield = battle.shields.find(s => s.pIdx === tIdx)
			if (shield) {
				const absorbed = Math.min(shield.val, remaining)
				shield.val -= absorbed
				remaining -= absorbed
				if (shield.val <= 0) battle.shields = battle.shields.filter(s => s !== shield)
				if (absorbed > 0) addLog(`${targetP.name}のシールドが ${absorbed} を吸収！`, 'log-sys')
			}
			// 残りダメージをHP適用
			if (remaining > 0) targetP.hp = Math.max(0, targetP.hp - remaining)
		}
		async function enemyTurn() {
			if (!battle.active) return
			battle.turnCycle = (battle.turnCycle || 0) + 1
			const aliveParty = gameState.party.filter(p => p.hp > 0)
			if (aliveParty.length === 0) {
				handleDeath()
				return
			}
			for (let e of battle.enemies) {
				if (e.hp <= 0) continue
				// 気絶/フリーズ中は行動不能
				if (isEnemyStunned(e.id)) {
					addLog(`⚡ ${e.name} は行動不能！`, 'log-sys')
					continue
				}

				// 前衛がいれば前衛のみ、前衛が全滅したら後衛を攻撃（射程longの敵は後衛も狙える）
				const aliveFront = aliveParty.filter(p => p.row === 'front')
				let attackPool
				if (e.range === 'long') {
					// long射程: 前衛がいても後衛を狙える（前衛がいれば前衛優先75%）
					if (aliveFront.length > 0 && Math.random() < 0.75) {
						attackPool = aliveFront
					} else {
						attackPool = aliveParty
					}
				} else {
					// short射程: 前衛がいれば必ず前衛のみ攻撃
					attackPool = aliveFront.length > 0 ? aliveFront : aliveParty
				}
				const targetIndex = Math.floor(Math.random() * attackPool.length)
				const targetP = attackPool[targetIndex]

				// ===== ボス固有行動パターン =====

				// 5Fボス：ジャイアントスライム（修正版：係数1.8、4ターンごと）
				let isGiantSlimePattern = e.name === 'ジャイアントスライム' && battle.turnCycle % 4 === 0

				// 15Fボス：鋼鉄の魔将ゴルドラス
				// ・3ターンごと「鋼鉄の衝撃」→全体に物理ATK×2.2の全体攻撃
				// ・偶数ターン「鉄壁の構え」→自身DEFを1.4倍に強化（上限×2.0まで）
				let isGoldrasPattern = e.name === '鋼鉄の魔将ゴルドラス'
				// 20Fボス：闇竜ヴァルナクス
				// ・3ターンごと「闇炎ブレス」→全体に魔法ATK×2.5のダメージ
				// ・HPが50%以下で形態変化し全ステータス1.2倍
				let isValnaxPattern = e.name === '闇竜ヴァルナクス'
				// 25Fボス：深淵魔王ゼラファル
				// ・毎ターン通常攻撃
				// ・4ターンごと「深淵の呪詛」→全体ATK×1.5魔法ダメージ+敵全体の特耐15%ダウン
				// ・HP33%以下で「絶望の叫び」→全体に固定300ダメージ
				let isZerafarPattern = e.name === '深淵魔王ゼラファル'
				// 30Fボス：虚無神アビサリオン
				// ・3ターンごと「虚無の侵食」→全体に魔法ATK×3.0（最強全体魔法）
				// ・5ターンごと「存在消去」→ランダム1人を即死級ダメージ（HP×0.9）
				// ・HP50%以下で「位相転換」→毎ターン自己回復(maxHP×0.02)
				let isAbyssalionPattern = e.name === '虚無神アビサリオン'
				// 35Fボス：奈落皇帝ガルガデス
				// ・毎ターン通常攻撃（高ATK）
				// ・3ターンごと「奈落崩落」→全体物理ATK×2.5
				// ・HP50%以下で「皇帝の激昂」→ATKとAGIが1.3倍に上昇（1回のみ）
				let isGargadesPattern = e.name === '奈落皇帝ガルガデス'
				// 40Fボス：星食らいの神獣ヴォラティア
				// ・3ターンごと「星食いの咆哮」→全体魔法ATK×2.0
				// ・4ターンごと「重力圧壊」→全体物理ATK×3.0、命中時DEF-15%デバフ
				// ・HP33%以下で「星々の終末」→毎ターン全体固定ダメージ500
				let isVolatiaPattern = e.name === '星食らいの神獣ヴォラティア'
				// 45Fボス：深淵の創造神ルキファリス
				// ・4ターンごと「創世の光」→全体魔法ATK×3.5（超強力）
				// ・HP66%以下で「第二形態」→全能力1.2倍（1回のみ）
				// ・HP33%以下で「第三形態」→さらに全能力1.15倍・毎ターン自己回復(maxHP×0.015)
				let isLucifarisPattern = e.name === '深淵の創造神ルキファリス'
				// 50Fボス：原初神アルケーネシア
				// ・3ターンごと「原初の怒り」→全体魔法ATK×4.0（最終ボス最強技）
				// ・5ターンごと「存在根絶」→全体HP×0.8の固定削り
				// ・HP50%以下で「神の領域」→毎ターン自己回復(maxHP×0.025)＋ATK1.5倍(1回のみ)
				// ・HP25%以下で「終焉の鐘」→全体固定1000ダメージを毎ターン追加
				let isArkenesiaPattern = e.name === '原初神アルケーネシア'

				if (isGiantSlimePattern) {
					playSE('enemy_attack');
					const oldDef = e.def
					const oldMDef = e.mdef
					e.def = 5
					e.mdef = 5
					const dmgVal = e.atk * 1.8  // 修正: 3.0→1.8
					const defenderStats = getFinalStats(targetP)
					const res = calcTacticalDamage({ str: 0, matk: dmgVal, cri: 0.15, multiplier: 1.0 }, defenderStats.vit, defenderStats.mdef, 1, true, 'magic')
					applyDamageToPartyMember(targetP, res.val, 'log-e-atk')
					addLog(`ジャイアントスライムの酸液放出！ ${targetP.name}に${res.val}ダメージ <span style=\"font-size:0.75em; color:#a78bfa; border:1px solid #7c5cbf; border-radius:3px; padding:0 3px;\">特殊</span>`, 'log-e-atk')
					e.def = oldDef
					e.mdef = oldMDef

				} else if (isGoldrasPattern) {
					// 偶数ターン：鉄壁の構え（DEF強化）
					if (battle.turnCycle % 2 === 0 && battle.turnCycle % 3 !== 0) {
						playSE('debuff');
						if (e.baseDef === undefined) e.baseDef = e.def
						e.def = Math.min(Math.floor(e.baseDef * 2.0), Math.floor(e.def * 1.4))
						addLog('鋼鉄の魔将ゴルドラスが鉄壁の構えをとった！ DEFが上昇！', 'log-sys')
						continue
					}
					// 3ターンごと：鋼鉄の衝撃（全体物理）
					if (battle.turnCycle % 3 === 0) {
						playSE('enemy_attack');
						addLog('鋼鉄の魔将ゴルドラスの鋼鉄の衝撃！', 'log-e-atk')
						const goldrasAtk = Math.floor(e.atk * 2.2)
						const alivePG = gameState.party.filter(p => p.hp > 0)
						for (let t of alivePG) {
							const ds = getFinalStats(t)
							const res = calcTacticalDamage({ str: goldrasAtk, matk: 0, cri: 0.1, multiplier: 1.0 }, ds.vit, ds.mdef, t.lv, true, 'physical')
							applyDamageToPartyMember(t, res.val, 'log-e-atk')
							addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
						}
						updateBattleUI()
						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
						continue
					}
					// 通常攻撃（上記以外）
					playSE('enemy_attack');
					const dGS = getFinalStats(targetP)
					const resGS = calcTacticalDamage({ str: e.atk, matk: 0, cri: 0.08, multiplier: 1.0 }, dGS.vit, dGS.mdef, 1, true, 'physical')
					applyDamageToPartyMember(targetP, resGS.val, 'log-e-atk')
					addLog(`${e.name}の攻撃：${targetP.name}に${resGS.val}ダメージ` + ` <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')

				} else if (isValnaxPattern) {
					// HP50%以下で形態変化（1回のみ）
					if (e.hp <= e.maxHp * 0.5 && !e.phaseChanged) {
						e.phaseChanged = true
						e.atk = Math.floor(e.atk * 1.2)
						e.def = Math.floor(e.def * 1.2)
						e.mdef = Math.floor(e.mdef * 1.2)
						e.agi = Math.floor(e.agi * 1.2)
						addLog('闇竜ヴァルナクスが真の力を解放した！ 全能力が上昇！', 'log-e-atk')
					}
					// 3ターンごと：闇炎ブレス（全体魔法）
					if (battle.turnCycle % 3 === 0) {
						playSE('magic');
						addLog('闇竜ヴァルナクスの闇炎ブレス！', 'log-e-atk')
						const valnaxDmg = Math.floor(e.atk * 2.5)
						const alivePV = gameState.party.filter(p => p.hp > 0)
						for (let t of alivePV) {
							const ds = getFinalStats(t)
							const res = calcTacticalDamage({ str: 0, matk: valnaxDmg, cri: 0.15, multiplier: 1.0 }, ds.vit, ds.mdef, t.lv, true, 'magic')
							applyDamageToPartyMember(t, res.val, 'log-e-atk')
							addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#a78bfa; border:1px solid #7c5cbf; border-radius:3px; padding:0 3px;\">特殊</span>`, 'log-e-atk')
						}
						updateBattleUI()
						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
						continue
					}
					// 通常攻撃
					playSE('enemy_attack');
					const dVN = getFinalStats(targetP)
					const resVN = calcTacticalDamage({ str: e.atk, matk: 0, cri: 0.1, multiplier: 1.0 }, dVN.vit, dVN.mdef, 1, true, 'physical')
					applyDamageToPartyMember(targetP, resVN.val, 'log-e-atk')
					addLog(`${e.name}の攻撃：${targetP.name}に${resVN.val}ダメージ` + ` <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')

				} else if (isZerafarPattern) {
					// HP33%以下で「絶望の叫び」（全体固定ダメージ）
					if (e.hp <= e.maxHp * 0.33 && battle.turnCycle % 5 === 0) {
						playSE('enemy_attack');
						addLog('深淵魔王ゼラファルの絶望の叫び！ 虚無が全てを侵食する！', 'log-e-atk')
						const alivePZ2 = gameState.party.filter(p => p.hp > 0)
						for (let t of alivePZ2) {
							applyDamageToPartyMember(t, 300, 'log-e-atk')

						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }

						addLog('深淵魔王ゼラファルの深淵の呪詛！', 'log-e-atk')
						const zerafarDmg = Math.floor(e.atk * 1.5)
						const alivePZ = gameState.party.filter(p => p.hp > 0)
						for (let t of alivePZ) {
							const ds = getFinalStats(t)
							const res = calcTacticalDamage({ str: 0, matk: zerafarDmg, cri: 0.2, multiplier: 1.0 }, ds.vit, ds.mdef, t.lv, true, 'magic')
							applyDamageToPartyMember(t, res.val, 'log-e-atk')
							addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#a78bfa; border:1px solid #7c5cbf; border-radius:3px; padding:0 3px;\">特殊</span>`, 'log-e-atk')
						}
						battle.enemyDebuffs.push({ stat: 'mdef', val: 0.15 })
						addLog('パーティ全体の特耐が15%低下した！', 'log-e-atk')
						updateBattleUI()
						if (gameState.party.every(p => p.hp <= 0)) { handleDeath(); return }
						continue
					}
					// 通常攻撃
					playSE('enemy_attack');
					const dZF = getFinalStats(targetP)

								const defenderStats = getFinalStats(t)
								const res = calcTacticalDamage(fenrirStats, defenderStats.vit, defenderStats.mdef, t.lv, true, 'physical')
								applyDamageToPartyMember(t, res.val, 'log-e-atk')
								addLog(`${t.name}に ${res.val}ダメージ <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
							}
							updateBattleUI()
							if (gameState.party.every(p => p.hp <= 0)) {
								handleDeath()
								return
							}
							continue
						}
					}
					playSE('enemy_attack');
					const defenderStats = getFinalStats(targetP)
					const defenderDef = defenderStats.vit ?? 0
					const defenderMDef = defenderStats.mdef ?? 0

					let currentAtk = e.atk
					battle.enemyDebuffs.forEach(d => {
						if (d.stat === 'atk') {
							currentAtk = d.val >= 1 ? currentAtk - d.val : Math.floor(currentAtk * (1 - d.val));
						}
					})
					currentAtk = Math.max(1, currentAtk)

					const res = calcTacticalDamage({ str: currentAtk, multiplier: 1.0, cri: 0.05, matk: 0 }, defenderDef, defenderMDef, 1, true, 'physical')
					applyDamageToPartyMember(targetP, res.val, 'log-e-atk')
					// 呪われし：敵攻撃時に毒付与
					if (e._poisonOnHit && targetP.hp > 0) {
						const pIdx = gameState.party.indexOf(targetP)
						const ex = (battle.partyDots||[]).find(d=>d.pIdx===pIdx&&d.type==='poison')
						if (!ex) (battle.partyDots = battle.partyDots||[]).push({ pIdx, type: 'poison', turns: 3, src: 'enemy' })
						addLog(`☠ ${e.name}の呪いで ${targetP.name} に毒！`, 'log-e-atk')
					}
					addLog(`${e.name}の攻撃：${targetP.name}に${res.val}ダメージ` + ` <span style=\"font-size:0.75em; color:#fb923c; border:1px solid #c2622a; border-radius:3px; padding:0 3px;\">物理</span>`, 'log-e-atk')
				}

				updateBattleUI()
				if (gameState.party.every(p => p.hp <= 0)) {
					handleDeath()
					return
				}
				await new Promise(r => setTimeout(r, 600))
			}
			const nextStartIdx = gameState.party.findIndex(p => p.hp > 0)
			setTurn('player', nextStartIdx >= 0 ? nextStartIdx : 0)
			// 敵DoT/状態異常 & 味方リジェネのティック（プレイヤーターン開始時）
			tickEnemyEffects()
			tickPartyRegens()
			if (!battle.active) return
		}

		
		// ═══════════════════════════════════════════════════
		//   オート周回システム
		//   - 通常攻撃のみで現在フロアを繰り返し周回
		//   - HP が最大値の 25% を切ったら自動停止
		//   - ボスフロアでは開始不可
		// ═══════════════════════════════════════════════════

		function toggleAutoFarm() {
			if (autoFarm.active) {
				stopAutoFarm('手動停止')
			} else {
				beginAutoFarm()
			}
		}

		function toggleAfMenu() {
			const dd = document.getElementById('af-dropdown')
			if (!dd) return
			const isOpen = dd.style.display !== 'none'
			dd.style.display = isOpen ? 'none' : 'block'
		}
		// ドロップダウン外クリックで閉じる
		document.addEventListener('click', function(e) {
			const wrap = document.getElementById('af-header-wrap')

		function setAutoFarmSpeed(speed) {
			if (autoFarm.active) return
			autoFarm.speed = speed
			const map = { slow: 'af-btn-slow', normal: 'af-btn-normal', fast: 'af-btn-fast' }
			Object.entries(map).forEach(([s, id]) => {
				const el = document.getElementById(id)
				if (el) el.style.opacity = s === speed ? '1.0' : '0.5'
			})
		}

		function setAutoFarmSkills() {
			if (autoFarm.active) return
			autoFarm.useSkills = !autoFarm.useSkills
			const btn = document.getElementById('af-btn-skills')
			if (btn) btn.textContent = autoFarm.useSkills ? '✅ON' : '❌OFF'
		}

		function setAutoFarmHP(threshold) {
			if (autoFarm.active) return
			autoFarm.hpThreshold = threshold
			const map = { 0.10: 'af-hp-10', 0.25: 'af-hp-25', 0.50: 'af-hp-50' }
			Object.entries(map).forEach(([v, id]) => {
				const el = document.getElementById(id)
				if (el) el.style.opacity = parseFloat(v) === threshold ? '1.0' : '0.5'
			})
		}

				function beginAutoFarm() {
			if (battle.active) { showMsg('戦闘中は開始できません'); return }
			if (gameState.party.length === 0) { showMsg('パーティが空です'); return }
			if (!gameState.inDungeon) { showMsg('ダンジョン内でのみ使用できます'); return }
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				showMsg('ボス戦フロアでは周回できません'); return
			}
			if (gameState.party.every(p => p.hp <= 0)) { showMsg('全員戦闘不能です'); return }

			autoFarm.active = true
			autoFarm.floor  = gameState.floor
			autoFarm.kills  = 0
			autoFarm.gold   = 0
			autoFarm.exp    = 0

			_autoFarmSetButtonState(true)
			_autoFarmLockUI(true)
			addLog(`⚙ オート周回を開始しました [${autoFarm.floor}F]`, 'log-sys')
			_autoFarmUpdateDisplay()
			// すぐに戦闘開始
			_autoFarmNextBattle()
		}

		function stopAutoFarm(reason) {
			if (!autoFarm.active) return
			autoFarm.active = false
			if (autoFarm.timerId) { clearTimeout(autoFarm.timerId); autoFarm.timerId = null }
			_autoFarmSetButtonState(false)
			_autoFarmLockUI(false)
			addLog(`⚙ 周回停止 [${reason}]  ${autoFarm.kills}戦 / ${autoFarm.gold}G / ${autoFarm.exp}EXP`, 'log-sys')
			_autoFarmUpdateDisplay()
			// 戦闘中だった場合はダンジョン画面に戻す
			if (battle.active) {
				battle.active = false
				battle.turn = null
				setTimeout(() => {
					playBGM('dungeon')
					document.getElementById('battle-view').classList.add('hidden')
					document.getElementById('dungeon-ui').classList.remove('hidden')
					updateUI()
				}, 200)
			}
		}

		// ── ヘルパー：ボタン表示を切替 ──
		function _autoFarmSetButtonState(running) {
			const btn = document.getElementById('btn-auto-farm')
			if (!btn) return
			const dd = document.getElementById('af-dropdown')
			const statsRow = document.getElementById('af-stats-row')

				btn.textContent = '⏹ 停止'
				btn.style.background = 'linear-gradient(135deg,#dc2626,#7f1d1d)'
				btn.style.borderColor = '#991b1b'
				if (dd) dd.style.display = 'none'
				if (statsRow) statsRow.style.display = 'block'
			} else {
				btn.textContent = '⚙ オート'
				btn.style.background = 'linear-gradient(135deg,#7c3aed,#4338ca)'
				btn.style.borderColor = '#5b21b6'
				if (statsRow) statsRow.style.display = 'none'
			}
		}

		// ── ヘルパー：探索/帰還ボタンの enabled/disabled ──
		function _autoFarmLockUI(lock) {
			const ids = ['btn-explore', 'btn-retreat', 'btn-next-floor']
			ids.forEach(id => {
				const el = document.getElementById(id)
				if (el) el.disabled = lock
			})
			// 戦闘ボタンも手動操作ロック
			const atkBtn = document.getElementById('atk-btn')
			const sklBtn = document.getElementById('skl-btn')
