			if (sklBtn) sklBtn.style.opacity = lock ? '0.4' : '1'
		}

		// ── ヘルパー：event-display に周回状況を表示 ──
		function _autoFarmUpdateDisplay() {
			// ヘッダー統計を更新
			const sk = document.getElementById('af-stat-kills')
			const sg = document.getElementById('af-stat-gold')
			const se = document.getElementById('af-stat-exp')
			if (sk) sk.textContent = autoFarm.kills + '戦'
			if (sg) sg.textContent = autoFarm.gold + 'G'
			if (se) se.textContent = autoFarm.exp + 'EXP'
			// event-display は周回中のみ表示
			const disp = document.getElementById('event-display')
			if (!disp) return
			if (autoFarm.active) {
				const speedLabel = autoFarm.speed === 'fast' ? '⚡速' : autoFarm.speed === 'slow' ? '🐢遅' : '▶標準'
				disp.innerHTML = `<div style="line-height:1.5;font-size:0.82rem;">
					<span style="color:#a78bfa;font-weight:bold;">⚙ 周回中 [${autoFarm.floor}F]</span>
					<span style="color:#555;font-size:0.68rem;margin-left:6px;">${speedLabel}</span><br>
					<span style="color:#4ade80;">${autoFarm.kills}戦</span>
					<span style="color:#444;"> | </span>
					<span style="color:var(--gold);">${autoFarm.gold}G</span>
					<span style="color:#444;"> | </span>
					<span style="color:#60a5fa;">${autoFarm.exp}EXP</span>
				</div>`
			} else {
				disp.textContent = '不気味な静寂...'
			}
		}

		// ── _autoFarmNextBattle: 実際の戦闘画面を使って次の戦闘を開始 ──
		function _autoFarmNextBattle() {
			if (!autoFarm.active || !gameState.inDungeon) return
			// ボスフロアに来た場合は停止
			if (BOSS_DATA[gameState.floor] && !gameState.bossDefeated.includes(gameState.floor)) {
				stopAutoFarm('ボスフロアに到達')
				return
			}
			// 生存チェック
			const alive = gameState.party.filter(p => p.hp > 0)
			if (alive.length === 0) { stopAutoFarm('全員戦闘不能'); return }
			const minRatio = Math.min(...alive.map(p => p.hp / getFinalStats(p).maxHp))
			if (minRatio <= autoFarm.hpThreshold) {
				stopAutoFarm(`HP危険域 (${Math.round(minRatio*100)}%以下)`)
				return
			}
			// 通常探索イベント（罠・宝箱など）をスキップして直接戦闘
			startBattle(false)
		}

		// ── 自動行動: プレイヤーターンを自動で実行 ──
		function _autoFarmDoPlayerAction() {
			if (!autoFarm.active || !battle.active || battle.isProcessing) return
			if (battle.turn !== 'player') return
			const p = gameState.party[battle.activeUnitIndex]
			if (!p || p.hp <= 0) { nextTurn(); return }

			// スキルを使うかどうか判断
			if (autoFarm.useSkills) {
				const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
				const jobSkills = jobKey ? JOB_DATA[jobKey].skills : null
				if (jobSkills) {
					const MILESTONES_LOCAL = [2,5,7,10,12,15,17,20,25,30,33,35,38,40,43,45,48,50]
					for (const lv of MILESTONES_LOCAL) {
						const sIdx = p.learnedSkills[lv]
						if (sIdx === undefined) continue
						const s = jobSkills[lv]?.[sIdx]
						if (!s || s.type === 'passive') continue
						const cd = (p.skillCooldowns && p.skillCooldowns[lv]) || 0
						if (cd > 0) continue
						// MPコスト確認
						const pIdxAf = gameState.party.indexOf(p)
						const disc = (battle.mpCostDown||[]).find(m=>m.pIdx===pIdxAf)
						const eff = disc ? Math.max(0,Math.floor(s.cost*(1-disc.val))) : s.cost
						if (p.mp < eff) continue
						// オート優先度スキップ（passive,guard,mpcost は手動判断が難しいためスキップ）
						if (s.type === 'guard') continue
						// HP回復は自身 or 全体
						if (s.type === 'heal') {
							const needHeal = gameState.party.some(m => m.hp > 0 && m.hp / getFinalStats(m).maxHp < 0.6)
							if (!needHeal) continue
						}
						// 再生は MP が余っているときだけ
						if (s.type === 'regen') {
							const hasRegen = (battle.partyRegens||[]).some(r => r.pIdx===gameState.party.indexOf(p) && r.turns > 1)
							if (hasRegen) continue
						}
						// shield / buff は一定周期で使う（毎ターン無駄に使わない）
						if (s.type === 'shield' || s.type === 'buff') {
							const hasShield = (battle.shields||[]).find(sh=>sh.pIdx===gameState.party.indexOf(p))
							if (s.type === 'shield' && hasShield && hasShield.turns > 1) continue
						}
						// スキル実行
						const aliveE = battle.enemies.filter(e=>e.hp>0)
						const needsTarget = (s.type === 'atk' || s.type === 'poison' || s.type === 'bleed' || s.type === 'stun' || s.type === 'freeze') && s.target !== 'all' && s.eTarget !== 'all' && aliveE.length > 1
						const needsPartyTarget = s.type === 'heal' && s.target === 'single'
						battle.targeting = null
						battle.pendingSkill = null
						if (needsTarget) {
							// 射程チェック：短射程なら前衛の敵のみ対象
							let _afSkPool = aliveE
							if (getWeaponRange(p) === 'short') {
								const _afFront = aliveE.filter(e => e.row !== 'back')
								if (_afFront.length > 0) _afSkPool = _afFront
							}
							const tgt = _afSkPool.reduce((a,b) => a.hp < b.hp ? a : b)
							executeSkill(s, tgt, lv)
						} else if (needsPartyTarget) {
							// 最もHP%が低い生存メンバー
							const tgt = gameState.party.filter(m=>m.hp>0).reduce((a,b) => (a.hp/getFinalStats(a).maxHp) < (b.hp/getFinalStats(b).maxHp) ? a : b)
							executeSkill(s, tgt, lv)
						} else {
							executeSkill(s, null, lv)
						}
						return
					}
				}
			}
			// スキルなし → 通常攻撃
			const aliveEnemies = battle.enemies.filter(e => e.hp > 0)
			if (!aliveEnemies.length) return
			battle.remainingHits = (p.equip?.weapon?.hits) || 1
			// 射程チェック：短射程武器＋後衛は前衛の敵のみ狙う
			const _afWRange = getWeaponRange(p)
			let _afTargetPool = aliveEnemies
			if (_afWRange === 'short') {
				const _frontAlive = aliveEnemies.filter(e => e.row !== 'back')
				if (_frontAlive.length > 0) _afTargetPool = _frontAlive
			}
			const target = _afTargetPool.reduce((a,b) => a.hp < b.hp ? a : b)
			executeAttack(target)
		}

		// ── handleDeath をオート周回でフックする ──

function winBattle() {
			playSE('win');
			battle.active = false
			battle.turn = null
			battle.remainingHits = 0
			let g = 0,
				x = 0
			battle.enemies.forEach(e => {
				const _eliteMult = e._isElite
					? (e.eliteTier === 'Legend' ? 3.0 : e.eliteTier === 'Rare' ? 2.0 : 1.5)
					: 1.0
				g += Math.floor(e.gold * _eliteMult)
				x += Math.floor(e.exp  * _eliteMult)
				if (e.isBoss) {
					gameState.bossDefeated.push(gameState.floor)
					gameState.stairsFound = true
				}
			})
			gameState.tempGold += g
			gameState.party.forEach(p => {
				p.exp += x
				while (p.exp >= p.nextExp) levelUp(p)
			})
			addLog(`勝利！ ${g}G / ${x}EXP 獲得。`, 'log-sys')
			// 秘宝を抱く：レジェンド装備確定ドロップ
			battle.enemies.forEach(e => {
				if (e._legendDrop && gameState.inventory.length < getMaxCapacity()) {
					const types = ['weapon','armor','acc']
					const t = types[Math.floor(Math.random()*types.length)]
					const pool = SHOP_ITEMS[t].filter(i => i.tier >= 7)
					if (pool.length > 0) {
						const item = applyRarity({ ...pool[Math.floor(Math.random()*pool.length)], type: t, locked: false })
						gameState.inventory.push(item)
						addLog(`✨✨ ${e.name}から伝説の秘宝 [${item.n}] を入手！`, 'log-gold')
					}
				}
			})
			// オート周回の累計に加算
			if (autoFarm.active) { autoFarm.gold += g; autoFarm.exp += x }
			setTimeout(() => {
				playBGM('dungeon');
				document.getElementById('battle-view').classList.add('hidden')
				document.getElementById('dungeon-ui').classList.remove('hidden')
				if (gameState.stairsFound) {
					document.getElementById('btn-next-floor').classList.remove('hidden')
				}
				updateUI()
				tutHook('battle_win')
				// オート周回中なら次の戦闘を自動開始
				if (autoFarm.active) {
					autoFarm.kills++
					_autoFarmUpdateDisplay()
					const _alive = gameState.party.filter(p => p.hp > 0)
					if (_alive.length === 0) { stopAutoFarm('全員戦闘不能'); return }
					const _minR = Math.min(..._alive.map(p => p.hp / getFinalStats(p).maxHp))
					if (_minR <= autoFarm.hpThreshold) { stopAutoFarm(`HP危険域 (${Math.round(_minR*100)}%以下)`); return }
					const _delay = autoFarm.speed === 'fast' ? 300 : autoFarm.speed === 'slow' ? 1500 : 700
					autoFarm.timerId = setTimeout(_autoFarmNextBattle, _delay)
				}
			}, 500)
		}

		function levelUp(p) {
			p.lv++
			p.exp -= p.nextExp
			p.nextExp = Math.floor(p.nextExp * 1.55)
			const fs = getFinalStats(p)
			p.hp = fs.maxHp
			p.mp = fs.maxMp
			addLog(`${p.name}が Lv.${p.lv} に上がった！`, 'log-sys')
		}

		function openTraining(pIdx) {
			const p = gameState.party[pIdx]
			const jobKey = Object.keys(JOB_DATA).find(k => JOB_DATA[k].name === p.job)
			const tree = JOB_DATA[jobKey].skills
			const content = document.getElementById('modal-content')
			let treeHtml = ''
			MILESTONES.forEach(lv => {
				if (!tree[lv]) return
				const learnedIdx = p.learnedSkills[lv]
				treeHtml += `<div class="skill-milestone"><h3>LEVEL ${lv}</h3><div class="skill-options">`
				tree[lv].forEach((s, sIdx) => {
					const isSelected = learnedIdx === sIdx
					const isLocked = learnedIdx !== undefined && learnedIdx !== sIdx
					const canLearn = learnedIdx === undefined && p.lv >= lv
					let detail = ''
					const statMap = {str:'物攻', matk:'特攻', vit:'物耐', mdef:'特耐', agi:'速度', luk:'幸運', atk:'攻撃', def:'防御', hp:'HP', mp:'MP', cri:'会心'}
					if (s.type === 'passive') {
						if (s.stat === 'cri') detail = `会心 +${s.val * 100}%`
						else detail = `${statMap[s.stat] || s.stat} +${s.val}`
					}
					else if (s.type === 'atk') detail = `威力:${s.pow} (MP${s.cost})`
					else if (s.type === 'heal') {
						if (s.scale === 'matk') detail = `特攻依存回復 (MP${s.cost})`
						else if (s.scale === 'self_hp') detail = `自身の最大HP${Math.floor(s.val*100)}%回復 (MP${s.cost})`
						else detail = `対象の最大HP${Math.floor(s.val*100)}%回復 (MP${s.cost})`
					}
					else if (s.type === 'buff' || s.type === 'debuff') detail = `${statMap[s.stat] || s.stat} ${Math.floor(s.val*100)}%${s.type==='buff'?'上昇':'低下'} (MP${s.cost})`
					else if (s.type === 'shield') detail = `最大HP×${Math.floor(s.val*100)}%のシールド付与 ${s.target==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else if (s.type === 'guard') detail = `1ターン、味方全員へのダメージを肩代わり (MP${s.cost})`
					else if (s.type === 'regen') detail = `${s.turns}T再生付与 最大HP×${Math.floor(s.val*100)}%/T ${s.target==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else if (s.type === 'mpcost') detail = `次スキルMPコスト${Math.floor(s.val*100)}%軽減 (MP${s.cost})`
					else if (s.type === 'poison') detail = `毒付与 ${s.turns}T [HP-3%/MP-3%/T] ${s.eTarget==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else if (s.type === 'bleed') detail = `出血付与 ${s.turns}T [HP-5%/T] ${s.eTarget==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else if (s.type === 'stun') detail = `気絶付与 ${s.turns}T [行動不能・物理+30%] ${s.eTarget==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else if (s.type === 'freeze') detail = `フリーズ付与 ${s.turns}T [行動不能・特殊+30%] ${s.eTarget==='all'?'(全体)':'(単体)'} (MP${s.cost})`
					else detail = `(MP:${s.cost})`
					treeHtml += `<div class="skill-card ${isSelected ? 'selected' : ''} ${canLearn ? 'available' : ''} ${isLocked ? 'locked' : ''}" onclick="${canLearn ? `learnSkill(${pIdx},${lv},${sIdx})` : ''}">
						<span class="skill-type-tag">${s.type}</span><b>${s.n}</b><small>${detail}</small>

		function confirmImportChar() {
			const code = document.getElementById('import-code').value
			if (!code) {
				showMsg('コードを入力してください')
				playSE('error')
				return
			}
			try {
				const json = decodeURIComponent(escape(atob(code)))
				const char = JSON.parse(json)

				if (!char.name || !char.job) {
					throw new Error('Invalid data')
				}

				let maxSlots = 1
				if (gameState.party.length > 0) {
					const leader = gameState.party[0]
					if (leader.lv >= 20) maxSlots = 3
					else if (leader.lv >= 10) maxSlots = 2
				}
				if (gameState.party.length >= maxSlots) {
					showMsg('パーティが満員です')
					playSE('error')
					return
				}

				if (!char.equip) char.equip = { weapon: null, armor: null, acc: null, runes: [] }
				if (!char.equip.runes) char.equip.runes = []
				if (char.equip.runes.length > 3) char.equip.runes = char.equip.runes.slice(0, 3)

				const fs = getFinalStats(char)
				char.hp = fs.maxHp
				char.mp = fs.maxMp

				gameState.party.push(char)
				addLog(`${char.name}を雇用しました。`, 'log-sys')
				updateUI()
				closeModal()
				showMsg('雇用完了')
			} catch (e) {
				console.error(e)
				showMsg('無効なコードです')
				playSE('error')
			}
		}

		function openShopList(cat, justBought = false) {
			const c = document.getElementById('modal-content')

			if (!gameState.shopSorts)   gameState.shopSorts = {}

			// ─── カテゴリタブ ───
			const catTabs = [

				{ key: 'acc',    label: '装飾', icon: '💍' },
				{ key: 'item',   label: '道具', icon: '🧪' },

			const catTabHtml = `<div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px;">
				${catTabs.map(t => {
					const active = cat === t.key
					const cnt = SHOP_ITEMS[t.key] ? SHOP_ITEMS[t.key].filter(i => i.tier <= maxTier).length : 0
					return `<button onclick="openShopList('${t.key}')"
						style="display:flex; align-items:center; gap:4px; padding:5px 10px; font-size:0.8rem;
						border-radius:20px; border:1px solid ${active ? 'var(--accent-blue)' : '#444'};
						background:${active ? 'rgba(66,153,225,0.25)' : '#111'};
						color:${active ? '#fff' : '#aaa'}; cursor:pointer;">
						<span>${t.icon}</span><span>${t.label}</span>
						<span style="background:${active ? 'var(--accent-blue)' : '#333'}; color:#fff;
							border-radius:10px; padding:0 5px; font-size:0.7rem; min-width:16px; text-align:center;">${cnt}</span>
					</button>`
				}).join('')}
			</div>`

			// ─── 絞り込み（武器・防具） ───
			const currentFilter = gameState.shopFilters[cat] || 'all'
			const currentSort   = gameState.shopSorts[cat]   || 'default'
			let filterHtml = ''
			if (cat === 'weapon' || cat === 'armor') {
				const activeF = type => (currentFilter === type ? 'background:var(--accent-blue); color:#fff; border-color:var(--accent-blue);' : '')
				filterHtml = `<div style="display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap;">
					<span style="font-size:0.75rem; color:#666; align-self:center; margin-right:2px;">種別:</span>
					<button class="btn-icon" style="font-size:0.75rem;${activeF('all')}" onclick="setShopFilter('${cat}','all')">全て</button>
					<button class="btn-icon" style="font-size:0.75rem;${activeF('physical')}" onclick="setShopFilter('${cat}','physical')">物理</button>
					<button class="btn-icon" style="font-size:0.75rem;${activeF('magic')}" onclick="setShopFilter('${cat}','magic')">魔法</button>
				</div>`
			}

			// ─── ソート ───
			const sortOpts = [
				{ key: 'default',    label: 'Tier↑' },
				{ key: 'tier_desc',  label: 'Tier↓' },
				{ key: 'price_asc',  label: '価格↑' },
				{ key: 'price_desc', label: '価格↓' },
			]
			const activeS = key => (currentSort === key ? 'background:rgba(255,196,0,0.2); color:var(--gold); border-color:var(--gold);' : '')
			const sortHtml = `<div style="display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap;">
				<span style="font-size:0.75rem; color:#666; align-self:center; margin-right:2px;">並び:</span>
				${sortOpts.map(s => `<button class="btn-icon" style="font-size:0.75rem;${activeS(s.key)}" onclick="setShopFilter('${cat}',undefined,'${s.key}')">${s.label}</button>`).join('')}
			</div>`

			// ─── アイテム絞り込み＆ソート ───
			let items = SHOP_ITEMS[cat].filter(i => i.tier <= maxTier);
			if (currentFilter !== 'all') items = items.filter(i => i.dType === currentFilter)
			if      (currentSort === 'tier_desc')  items = [...items].sort((a,b) => (b.tier||0) - (a.tier||0))
			else if (currentSort === 'price_asc')  items = [...items].sort((a,b) => a.p - b.p)
			else if (currentSort === 'price_desc') items = [...items].sort((a,b) => b.p - a.p)
			else items = [...items].sort((a,b) => (a.tier||0) - (b.tier||0))

			// Tier / タイプ表示ヘルパー
			const tierColors = ['','#999','#7dc','#4af','#c8f','#fa4','#f80','#f44','#f0f']
			const tierStars  = t => '★'.repeat(Math.min(t,8)) + '☆'.repeat(Math.max(0,8-t))

			const dTypeIcon  = dt => dt === 'magic' ? '<span style="color:#a78bfa; font-size:0.7rem; margin-left:2px;">✦魔法</span>' : dt === 'physical' ? '<span style="color:#fb923c; font-size:0.7rem; margin-left:2px;">✦物理</span>' : ''

			const itemCards = items.map(i => {
				const canAfford = gameState.gold >= i.p
				const topMeta = [tierBadge(i.tier), i.dType ? dTypeIcon(i.dType) : ''].filter(Boolean).join(' ')
				return `<div style="background:${canAfford ? '#1a1a1a' : '#111'}; padding:10px 12px; border-radius:8px;
					border:1px solid ${canAfford ? '#333' : '#1e1e1e'};
					display:flex; justify-content:space-between; align-items:center; gap:8px;">
					<div style="flex:1; min-width:0;">
						${topMeta ? `<div style="display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-bottom:4px;">${topMeta}</div>` : ''}
						<b style="font-size:0.92rem; color:${canAfford ? '#eee' : '#555'};">${i.n}</b>
						<div style="font-size:0.77rem; color:#666; margin-top:2px;">${i.d}${cat !== 'item' ? (i.range==='long' ? ' <span style=\"font-size:0.7rem;padding:0 4px;background:rgba(96,165,250,0.15);border:1px solid #60a5fa;border-radius:3px;color:#60a5fa;\">遠距離</span>' : ' <span style=\"font-size:0.7rem;padding:0 4px;background:rgba(251,146,60,0.15);border:1px solid #c2622a;border-radius:3px;color:#fb923c;\">近接</span>') : ''}</div>
					</div>
					<div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0;">
						<span style="color:${canAfford ? 'var(--gold)' : '#555'}; font-weight:bold; font-size:0.88rem; white-space:nowrap;">${i.p.toLocaleString()}G</span>
						<button class="btn-icon btn-green" style="padding:6px 12px; font-size:0.8rem; ${canAfford ? '' : 'opacity:0.3; cursor:not-allowed;'}"
							onclick="${canAfford ? `buyItem('${cat}','${i.id}')` : ''}">${canAfford ? '購入' : '不足'}</button>
					</div>
				</div>`
			}).join('')

			c.innerHTML = `
				<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
					<h2 style="margin:0;">ショップ</h2>
					<span style="color:var(--gold); font-weight:bold; font-size:0.9rem;">💰 ${gameState.gold.toLocaleString()}G</span>
				</div>
				<div style="font-size:0.72rem; color:#555; margin-bottom:8px;">販売上限 Tier${maxTier}（最深 ${gameState.maxFloor}F 到達）</div>
				${catTabHtml}
				${guideHtml}${filterHtml}${sortHtml}
				<div style="display:grid; gap:7px; max-height:48vh; overflow-y:auto; padding-right:2px;">
					${itemCards || '<p style="text-align:center; color:#555; padding:20px;">販売中のアイテムがありません</p>'}
				</div>
				<button onclick="closeModal()" class="btn-action btn-red" style="margin-top:12px; width:100%;">閉じる</button>`
			openModalWrapper()
		}
		function openShopSell(msg = '', filterType = 'all', sortType = 'default') {
			const c = document.getElementById('modal-content')
			const successHtml = msg ? `<div style="background:rgba(76,175,80,0.2);border:1px solid #4caf50;color:#fff;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:0.9rem;">${msg}</div>` : ''

				const stars = '★'.repeat(Math.min(tier, 8)) + '☆'.repeat(Math.max(0, 8 - tier))
				const colors = ['','#aaa','#7dc','#4af','#c8f','#fa4','#f80','#f44','#f0f']

				{ key: 'acc',    label: '装飾',   icon: '💍' },
				{ key: 'rune',   label: 'ルーン', icon: '🔮' },
			]
			const sellableAll = gameState.inventory.filter(item => item.type !== 'item')
			const counts = { all: sellableAll.length }
			tabs.slice(1).forEach(t => { counts[t.key] = sellableAll.filter(i => i.type === t.key).length })
			const tabHtml = `<div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px;">
				${tabs.map(t => {
					const active = filterType === t.key
					const cnt = counts[t.key] ?? 0
					return `<button onclick="openShopSell('','${t.key}','${sortType}')"
						style="display:flex; align-items:center; gap:4px; padding:5px 10px; font-size:0.8rem;
						border-radius:20px; border:1px solid ${active ? 'var(--accent-blue)' : '#444'};

						color:${active ? '#fff' : '#aaa'}; cursor:pointer;">
						<span>${t.icon}</span><span>${t.label}</span>
						<span style="background:${active ? 'var(--accent-blue)' : '#333'}; color:#fff;

				{ key: 'tier',    label: 'Tier順' },
				{ key: 'price',   label: '価格順' },
				{ key: 'locked',  label: 'ロック優先' },
			]
			const sortHtml = `<div style="display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap;">
				<span style="font-size:0.75rem; color:#666; align-self:center; margin-right:2px;">並び替え:</span>
				${sortOpts.map(s => {
					const active = sortType === s.key
					return `<button onclick="openShopSell('','${filterType}','${s.key}')"
						style="padding:3px 9px; font-size:0.75rem; border-radius:12px;
						border:1px solid ${active ? 'var(--gold)' : '#333'};
						background:${active ? 'rgba(255,196,0,0.15)' : '#111'};
						color:${active ? 'var(--gold)' : '#777'}; cursor:pointer;">${s.label}</button>`
				}).join('')}
			</div>`

			// ─── 絞り込み＋ソート ───
			let sellable = filterType === 'all'
				? sellableAll.map((item) => ({ item, idx: gameState.inventory.indexOf(item) }))
				: sellableAll.filter(item => item.type === filterType).map(item => ({ item, idx: gameState.inventory.indexOf(item) }))
			if (sortType === 'tier')   sellable.sort((a, b) => (b.item.tier||0) - (a.item.tier||0))
			if (sortType === 'price')  sellable.sort((a, b) => (b.item.p||0) - (a.item.p||0))

			c.innerHTML = `

					<h2 style="margin:0;">💰 アイテム売却</h2>
					<span style="color:var(--gold);font-weight:bold;">${gameState.gold.toLocaleString()}G</span>

		function shopSellItem(idx) {
			const item = gameState.inventory[idx]
			if (!item) return
			if (item.locked) { addLog(`${item.n}はロック中のため売却できません。`, 'log-red'); return }
			const sellPrice = Math.max(1, Math.floor((item.p || 100) * 0.4))
			gameState.gold += sellPrice
			gameState.inventory.splice(idx, 1)
			addLog(`${item.n}を${sellPrice}Gで売却しました。`, 'log-gold')
			openShopSell(`✅ ${item.n} を ${sellPrice}G で売却しました！`)
		}

				function buyItem(cat, id) {
			const itemData = SHOP_ITEMS[cat].find(i => i.id === id)
			if (!itemData) {
				console.error('Item not found:', id)
				return
			}
			const maxCap = getMaxCapacity()
			if (gameState.inventory.length >= maxCap) {
				showMsg('カバンが一杯です。')
				playSE('error')
				return
			}
			if (gameState.gold >= itemData.p) {
				gameState.gold -= itemData.p
				let newItem = applyRarity({ ...itemData, type: cat, locked: false })
				gameState.inventory.push(newItem)
				addLog(`${newItem.n}を購入しました。`, 'log-sys')
				openShopList(cat, true)
				updateUI()
			} else {
				showMsg('お金が足りません。')
				playSE('error')
			}
		}
		function toggleLock(idx) {
			const item = gameState.inventory[idx]
			if (!item) return
			item.locked = !item.locked
			openInventory()
		}
		function confirmSellLockedItem(idx) {
			closeModal()
			sellItem(idx, true)
		}
		function sellItem(idx, force = false) {
			const item = gameState.inventory[idx]
			if (!item) return
			if (!force && item.locked) {
				const c = document.getElementById('modal-content')
				c.innerHTML = `<div style="text-align:center; padding:20px;">
					<h2 style="color:var(--accent-red)">アイテムロック</h2>
					<p style="margin-bottom:20px; font-size:1rem;">ロックされている「${item.n}」を売却しますか？</p>
					<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
						<button class="btn-action btn-red" onclick="confirmSellLockedItem(${idx})">売却</button>
						<button class="btn-action btn-blue" onclick="closeModal()">戻る</button>
					</div>
				</div>`
				openModalWrapper()
				return
			}
			const basePrice = item.p || 50
			const sellPrice = Math.floor(basePrice / 2)
			gameState.gold += sellPrice
			gameState.inventory.splice(idx, 1)
			addLog(`${item.n}を${sellPrice}Gで売却しました。`, 'log-gold')
			updateUI()
			openInventory()
		}

		function equipFromWarehouse(idx, filter = 'all') {
			const item = gameState.guildWarehouse[idx]
			if (!item) return
			if (gameState.inventory.length >= getMaxCapacity()) {
				showMsg('カバンが満杯です。先にカバンを整理してください。')
				playSE('error')
				return
			}
			gameState.guildWarehouse.splice(idx, 1)
			gameState.inventory.push(item)
			saveState()
			selectTarget(gameState.inventory.length - 1)
		}

		function storeToWarehouse(idx, filter = 'all') {
			const item = gameState.inventory[idx]
			if (!item) return
			if (item.type === 'item') { showMsg('消耗品は倉庫に預けられません。'); return }
			if (gameState.guildWarehouse.length >= gameState.guildWarehouseCap) {
				showMsg('ギルド倉庫が満杯です。')
				playSE('error')
				return
			}
			gameState.inventory.splice(idx, 1)
			gameState.guildWarehouse.push(item)
			saveState()
			openInventory(filter)
		}

		function withdrawFromWarehouse(idx, filter = 'all') {
			const item = gameState.guildWarehouse[idx]
			if (!item) return
			if (gameState.inventory.length >= getMaxCapacity()) {
				showMsg('カバンが満杯です。先にカバンを整理してください。')
				playSE('error')
				return
			}
			gameState.guildWarehouse.splice(idx, 1)
			gameState.inventory.push(item)
			saveState()
			openGuildWarehouse(filter)
		}

		function expandBag(slots, cost) {
			if (gameState.inDungeon) { showMsg('ダンジョン内ではカバンを拡張できません。'); return }
			if (gameState.gold < cost) {
				showMsg(`ゴールドが不足しています。（必要: ${cost.toLocaleString()}G）`)
				playSE('error')
				return
			}
			gameState.gold -= cost
			gameState.bagExpansion = (gameState.bagExpansion ?? 0) + slots
			saveState()
			updateUI()
			openInventory()
			addLog(`カバンを${slots}枠拡張しました！ 残金: ${gameState.gold.toLocaleString()}G`, 'log-sys')
		}

		function expandWarehouse(slots, cost) {
			if (gameState.gold < cost) {
				showMsg(`ゴールドが不足しています。（必要: ${cost.toLocaleString()}G）`)
				playSE('error')
				return
			}
			gameState.gold -= cost
			gameState.guildWarehouseCap += slots
			saveState()
			updateUI()
			openGuildWarehouse()
			addLog(`ギルド倉庫を${slots}枠拡張しました。（残金: ${gameState.gold.toLocaleString()}G）`, 'log-sys')
		}

		function selectTarget(idx) {
			_tutClearHighlight()  // チュートリアルハイライトを解除
			const item = gameState.inventory[idx]
			const c = document.getElementById('modal-content')
			c.innerHTML = `<h2>使用対象の選択</h2><div id="target-list" style="display:grid; gap:12px;"></div><button onclick="openInventory()" class="btn-action btn-red" style="margin-top:20px; width:100%;">戻る</button>`
			const tl = document.getElementById('target-list')
			gameState.party.forEach((p, pIdx) => {
				const btn = document.createElement('button')
				btn.className = 'btn-action btn-blue'
				btn.innerText = `${p.name}`
				btn.onclick = () => {
					if (item.type === 'item') useItem(idx, pIdx)
					else equipItem(idx, pIdx)
				}
				tl.appendChild(btn)
			})
		}
		function useItem(idx, pIdx) {
			playSE('item');
			const item = gameState.inventory[idx]
			const p = gameState.party[pIdx]
			const fs = getFinalStats(p)
			if (item.e.hp) p.hp = Math.min(fs.maxHp, p.hp + item.e.hp)
			if (item.e.hpPct) {
				const healAmount = Math.floor(fs.maxHp * item.e.hpPct)
				p.hp = Math.min(fs.maxHp, p.hp + healAmount)
			}
			if (item.e.mp) p.mp = Math.min(fs.maxMp, p.mp + item.e.mp)
			if (item.e.mpPct) {
				const recoverMp = Math.floor(fs.maxMp * item.e.mpPct)
				p.mp = Math.min(fs.maxMp, p.mp + recoverMp)
			}
			addLog(`${p.name}が${item.n}を使用した。`, 'log-sys')
			gameState.inventory.splice(idx, 1)
			updateUI()
			closeModal()
			if (battle.active) {
				setTurn('enemy')
				setTimeout(enemyTurn, 500)
			}
		}
		function unequipRune(pIdx, rIdx) {
			const p = gameState.party[pIdx]
			if (!p || !p.equip || !p.equip.runes || !p.equip.runes[rIdx]) return
			const maxCap = getMaxCapacity()
			if (gameState.inventory.length >= maxCap) {
				showMsg('カバンが一杯で外せません。')
				playSE('error')
				return
			}
			const rune = p.equip.runes.splice(rIdx, 1)[0]
			gameState.inventory.push(rune)
			addLog(`${p.name}のルーン：${rune.n}を外しました。`, 'log-sys')
			updateUI()
			openCharDetailModal(pIdx)
		}
		function openRuneSwapModal(pIdx, invIdx) {
			const p = gameState.party[pIdx]
			const newRune = gameState.inventory[invIdx]
			const c = document.getElementById('modal-content')
			let html = `<h2>ルーンの交換</h2><p style="font-size:0.9rem; margin-bottom:10px;">交換するルーンを選んでください。</p>`
			html += `<div style="display:grid; gap:10px; margin-bottom:20px;">`
			p.equip.runes.forEach((r, slot) => {
				const borderColor = r.color || (r.element==='fire'?'#e91e63':r.element==='earth'?'#4caf50':'#00bcd4');
				html += `
					<div style="background:#111; padding:12px; border:2px solid ${borderColor}; display:flex; justify-content:space-between; align-items:center; border-radius:10px;">
						<div style="flex:1">
							<div style="color:${r.rarityColor || '#fff'}; font-weight:bold;">${r.n}</div>
							<div style="font-size:0.8rem; color:#888;">${r.d}</div>
						</div>
						<button class="btn-action btn-red" style="width:auto; padding:10px 20px; font-size:0.9rem; margin-bottom:0;" onclick="confirmRuneSwap(${pIdx}, ${invIdx}, ${slot})">交換</button>
					</div>`
			})
			html += `</div><button class="btn-action btn-blue" style="width:100%; margin-bottom:0;" onclick="closeModal()">キャンセル</button>`
			c.innerHTML = html
			openModalWrapper()
		}
		function confirmRuneSwap(pIdx, invIdx, slot) {
			const p = gameState.party[pIdx]
			if (!p.equip || !Array.isArray(p.equip.runes) || p.equip.runes.length <= slot) {
				showMsg('エラー：交換に失敗しました。')
				playSE('error')
				return
			}
			const newRune = gameState.inventory.splice(invIdx, 1)[0]
			const oldRune = p.equip.runes.splice(slot, 1)[0]
			if (oldRune) gameState.inventory.push(oldRune)
			p.equip.runes.push(newRune)
			addLog(`${p.name}のルーンを交換：${oldRune.n} → ${newRune.n}`, 'log-sys')
			updateUI()
			closeModal()
			openCharDetailModal(pIdx)
		}
		function equipItem(idx, pIdx) {
			const item = gameState.inventory[idx]
			const p = gameState.party[pIdx]
			if (item.type === 'rune') {
				if (!p.equip.runes) p.equip.runes = []
				if (p.equip.runes.length >= 3) {
					openRuneSwapModal(pIdx, idx)
					return
				}
				p.equip.runes.push(item)
				gameState.inventory.splice(idx, 1)
				addLog(`${p.name}が${item.n}を装着した。`, 'log-sys')
				updateUI()
				openInventory()
				return
			}
			const old = p.equip[item.type]
			p.equip[item.type] = item
			gameState.inventory.splice(idx, 1)
			if (old) gameState.inventory.push(old)
			addLog(`${p.name}が${item.n}を装備した。`, 'log-sys')
			updateUI()
			openInventory()
		}

		// ─── メイン制御 ──────────────────────────────────────
		// チュートリアル：Tier1武器を宝箱として確定ドロップ
		function _tutDropChestWeapon() {
			const tier1weapons = SHOP_ITEMS['weapon'].filter(w => w.tier === 1)
			const base = tier1weapons[Math.floor(Math.random() * tier1weapons.length)]
			const item = { ...base, type: 'weapon', locked: false }
			const disp = document.getElementById('event-display')
			if (gameState.inventory.length < getMaxCapacity()) {
				gameState.inventory.push(item)
				if (disp) disp.innerHTML = `<span style="color:var(--gold)">📦 宝箱発見！ [${item.n}] を入手！</span>`

			} else {
				if (disp) disp.innerHTML = '<span style="color:var(--accent-red)">宝箱があったが、カバンが一杯で持てなかった...</span>'
				addLog('宝箱：カバンが一杯で持ち帰れなかった。', 'log-red')
			}
			updateUI()
		}

				// チュートリアル：スライム1体だけの固定戦闘を起動する
		function _tutForceBattle() {
			const slimeBase = MONSTERS.find(m => m.name === 'スライム') || MONSTERS[0]
			playBGM('battle')
			battle.active = true
			battle.isProcessing = false
			battle.enemies = [{ ...slimeBase, id: 0, hp: slimeBase.hp, maxHp: slimeBase.hp }]
			battle.enemyDebuffs = []; battle.buffs = []; battle.shields = []; battle.guardIdx = -1
			battle.enemyDots = []; battle.partyRegens = []; battle.enemyStatus = []; battle.mpCostDown = []
			battle.activeUnitIndex = 0; battle.turnCycle = 0; battle.remainingHits = 0
			gameState.party.forEach(p => { p.skillCooldowns = {} })
			gameState.exploreCount++
			document.getElementById('dungeon-ui').classList.add('hidden')
			document.getElementById('battle-view').classList.remove('hidden')
			updateBattleUI()
			// 前衛/後衛の状況をログに表示
			const _fN = gameState.party.filter(p=>p.row==='front'&&p.hp>0).map(p=>p.name).join('・')
			const _bN = gameState.party.filter(p=>p.row==='back' &&p.hp>0).map(p=>p.name).join('・')
			if (_fN) addLog(`⚔️ 前衛: ${_fN}`, 'log-sys')
			if (_bN) addLog(`🏹 後衛: ${_bN}（前衛が全滅するまで守られる）`, 'log-sys')

			addLog('チュートリアル：スライムが現れた！', 'log-sys')

				function startInteractiveTutorial() {
			closeModal()

			tutState.stepIdx = 0

			tutState._inventoryOpen = false

		// ─── Phase A: 説明モーダル ───────────────────────────
		function _tutPhaseA() {
			_tutClearHighlight()
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s) { _tutFinish(); return }
			// skipExplain:true のステップは説明モーダルを飛ばして直接ハイライトへ
			if (s.skipExplain) { _tutAdvanceToHighlight(); return }
			const total = TUT_STEPS.length
			const num   = tutState.stepIdx + 1
			const isLast = !!s.isLast

			// プログレスドット
			const dots = TUT_STEPS.map((_,i) =>
				`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px;
				background:${i < num ? '#6366f1' : i === tutState.stepIdx ? '#60a5fa' : '#333'};"></span>`
			).join('')

			const c = document.getElementById('modal-content')
			c.innerHTML = `
				<div style="padding:2px 0 8px;">
					<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
						<span style="font-size:0.68rem;color:#555;letter-spacing:2px;">TUTORIAL ${num} / ${total}</span>
						<button onclick="closeModal();tutState.active=false;_tutClearHighlight();" style="
							background:none;border:none;color:#444;cursor:pointer;font-size:0.8rem;padding:2px 6px;
						">✕ スキップ</button>
					</div>
					<div style="display:flex;gap:3px;margin-bottom:18px;">
						${TUT_STEPS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<tutState.stepIdx?'#6366f1':i===tutState.stepIdx?'#818cf8':'#222'};transition:background 0.3s;"></div>`).join('')}
					</div>
					<div style="font-size:0.9rem;line-height:1.8;color:#ddd;">${s.explain}</div>
					<button id="tut-ok-btn" onclick="_tutPhaseAOK()" style="
						margin-top:20px; width:100%; padding:14px;
						border-radius:8px; border:none;
						background:linear-gradient(135deg,#4338ca,#6366f1);
						color:#fff; font-size:1rem; font-weight:bold; cursor:pointer;
						letter-spacing:1px;
					">${isLast ? '🌑 冒険を始める！' : 'わかった！ ▶'}</button>
				</div>`
			document.getElementById('modal-layer').classList.remove('hidden')
		}

		function _tutPhaseAOK() {
			closeModal()
			_tutAdvanceToHighlight()
		}

		// フェーズAのOKまたはskipExplainで呼ばれる共通処理
		function _tutAdvanceToHighlight() {
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s) { _tutFinish(); return }

			if (s.isLast) { _tutFinish(); return }

			// targetIdがある → Phase B（ハイライト）
			if (s.targetId) {
				tutState.phase = 'B'
				// step8 (inventory): カバンを自動で開いてから内部ボタンをハイライト
				if (s.hook === 'inventory_closed') {
					openInventory()  // カバンを開く（openInventory内でハイライトも実行）
				} else {
					_tutHighlight(s.targetId, s.hint)
				}
			} else if (s.hook) {
				// targetIdなし・hookあり → hookを待つだけ
				tutState.phase = 'B'
			} else {
				// targetIdなし・hookなし → 次のステップへ
				tutState.stepIdx++
				setTimeout(_tutPhaseA, 100)
			}
		}

		// ─── Phase B: ハイライト＋暗幕 ───────────────────────
		function _tutHighlight(targetId, hint) {
			_tutClearHighlight()
			const el = document.getElementById(targetId)
			if (!el) return

			// 暗幕（全画面をブロック）
			const mask = document.createElement('div')
			mask.id = 'tut-mask'
			mask.style.cssText = `
				position:fixed;inset:0;
				background:rgba(0,0,0,0.78);
				z-index:8000;pointer-events:all;
			`
			document.body.appendChild(mask)

			// ターゲット要素をz-index最前面に浮かせてクリック可能に
			el._tutSavedStyle = el.getAttribute('style') || ''
			el.style.position = 'relative'
			el.style.zIndex   = '8100'
			el.style.boxShadow = '0 0 0 3px #6366f1, 0 0 20px #6366f1aa, 0 0 40px #6366f144'
			el.style.borderRadius = '8px'
			el.dataset.tutActive = '1'
			// アニメーション用クラス
			el.classList.add('tut-pulse')

			// ヒントラベル（ボタンの直上）
			if (hint) {
				const lbl = document.createElement('div')
				lbl.id = 'tut-hint-lbl'
				lbl.style.cssText = `
					position:fixed;z-index:8200;
					background:#6366f1;color:#fff;
					padding:5px 14px;border-radius:16px;
					font-size:0.85rem;font-weight:bold;
					pointer-events:none;white-space:nowrap;
					box-shadow:0 2px 12px #0008;
				`
				lbl.textContent = hint
				document.body.appendChild(lbl)

				const _pos = () => {
					const r = el.getBoundingClientRect()
					lbl.style.left = Math.max(8, r.left + r.width/2 - lbl.offsetWidth/2) + 'px'
					lbl.style.top  = (r.top - lbl.offsetHeight - 10) + 'px'
				}
				_pos(); setTimeout(_pos, 60)
				// ラベルをゆらす
				let _bounce = 0
				lbl._ti = setInterval(() => {
					_bounce = !_bounce
					lbl.style.transform = _bounce ? 'translateY(-4px)' : 'translateY(0)'
				}, 500)
			}
		}

		// モーダル内ボタン用ハイライト（暗幕なし・パルスのみ）
		// モーダルが既に他操作をブロックしているので暗幕は不要
		function _tutHighlightInModal(targetId, hint) {
			// 既存ハイライトをクリア（暗幕のみ除去）
			const mask = document.getElementById('tut-mask')
			if (mask) mask.remove()
			const oldLbl = document.getElementById('tut-hint-lbl')
			if (oldLbl) { clearInterval(oldLbl._ti); oldLbl.remove() }

			const el = document.getElementById(targetId)
			if (!el) { console.warn('[TUT] element not found:', targetId); return }

			// ボタン自体にパルスを当てる
			el._tutSavedStyle = el.getAttribute('style') || ''
			el.style.boxShadow = '0 0 0 3px #6366f1, 0 0 20px #6366f1aa'
			el.style.borderRadius = '8px'
			el.dataset.tutActive = '1'
			el.classList.add('tut-pulse')

			// ヒントラベルをボタンの上に表示
			if (hint) {
				const lbl = document.createElement('div')
				lbl.id = 'tut-hint-lbl'
				lbl.style.cssText = `
					position:fixed;z-index:9500;
					background:#6366f1;color:#fff;
					padding:5px 14px;border-radius:16px;
					font-size:0.85rem;font-weight:bold;
					pointer-events:none;white-space:nowrap;
					box-shadow:0 2px 12px #0008;
				`
				lbl.textContent = hint
				document.body.appendChild(lbl)
				const _pos = () => {
					const r = el.getBoundingClientRect()
					if (r.width === 0) return  // 要素が非表示なら何もしない
					lbl.style.left = Math.max(8, r.left + r.width/2 - lbl.offsetWidth/2) + 'px'
					lbl.style.top  = (r.top - lbl.offsetHeight - 10) + 'px'
				}
				_pos(); setTimeout(_pos, 60)
				let _b = 0
				lbl._ti = setInterval(() => {
					_b = !_b
					lbl.style.transform = _b ? 'translateY(-4px)' : 'translateY(0)'
				}, 500)
			}
		}

				function _tutClearHighlight() {
			const mask = document.getElementById('tut-mask')
			if (mask) mask.remove()
			const lbl = document.getElementById('tut-hint-lbl')
			if (lbl) { clearInterval(lbl._ti); lbl.remove() }
			// ハイライト中の要素を戻す
			document.querySelectorAll('[data-tut-active]').forEach(el => {
				el.setAttribute('style', el._tutSavedStyle || '')
				delete el._tutSavedStyle
				el.removeAttribute('data-tut-active')
				el.classList.remove('tut-pulse')
			})
		}

		function _tutFinish() {
			tutState.active = false
			tutState._inventoryOpen = false
			_tutClearHighlight()
			closeModal()
			addLog('✅ チュートリアル完了！冒険の準備ができました。', 'log-sys')
			// キャラクリエイト画面へ（新規プレイヤー向け）
			setTimeout(() => {
				if (gameState.party.length === 0) {
					openFirstCharModal()
				}
			}, 400)
		}

		// ─── フック（各ゲーム処理から呼ぶ）──────────────────
		function tutHook(event) {
			if (!tutState.active) return
			const s = TUT_STEPS[tutState.stepIdx]
			if (!s || s.hook !== event) return
			// battle_win / confirm_retreat / gold_closed はモーダル中でも受付
			const _phaseSkip = ['battle_win','confirm_retreat','gold_closed','inventory_closed']
			if (!_phaseSkip.includes(event) && tutState.phase !== 'B') return
			_tutClearHighlight()
			tutState.stepIdx++
			tutState.phase = 'A'
			// inventory_closed は town 画面でカバンが閉じた後なので即表示
			const _delay = event === 'inventory_closed' ? 200 : 600
			setTimeout(_tutPhaseA, _delay)
		}

		function enterDungeon() {
			if (gameState.party.length === 0) {
				openGuild()
				return
			}
			// 解放済み開始フロアを計算（倒したボスの次の階層）
			const unlockedFloors = [1]
			Object.keys(BOSS_DATA).forEach(f => {
				const floor = parseInt(f)
				if (gameState.bossDefeated.includes(floor)) {
					unlockedFloors.push(floor + 1)
				}
			})
			// チュートリアル中は強制1F・モーダル一切スキップ
			if (tutState.active) { startDungeonFromFloor(1); return }
			// 選択肢が1Fのみなら即スタート
			if (unlockedFloors.length === 1) {
				startDungeonFromFloor(1)
				return
			}
			// 複数の開始フロアがある場合はモーダルで選択させる
			openFloorSelectModal(unlockedFloors)
		}

		function retreat() {
			if (autoFarm.active) stopAutoFarm('手動帰還')
			const c = document.getElementById('modal-content')
			// チュートリアル中は「戻る」ボタンにID付与
			const _confirmId = tutState.active ? 'id="tut-confirm-retreat-btn"' : ''
			c.innerHTML = `<div style="text-align:center;padding:20px;"><h2>街に帰還しますか？</h2><p style="color:#aaa;">獲得したゴールドを持ち帰ることができます。</p><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"><button ${_confirmId} class="btn-action btn-blue" onclick="confirmRetreat()">戻る</button><button class="btn-action btn-red" onclick="closeModal()">キャンセル</button></div></div>`
			document.getElementById('modal-layer').classList.remove('hidden')
			// チュートリアル：btn-retreatが押された → 帰還確認モーダルの「戻る」をハイライト
			if (tutState.active && tutState.phase === 'B') {
				const _s = TUT_STEPS[tutState.stepIdx]
				if (_s && _s.hook === 'retreated') {
					_tutClearHighlight()
					tutState.stepIdx++   // → step6 (confirm_retreat)
					tutState.phase = 'B' // すぐにB（ハイライト待ち）
					// モーダルのDOMが確定してからハイライト（requestAnimationFrame×2で確実に）
					requestAnimationFrame(() => requestAnimationFrame(() => {
						_tutHighlightInModal('tut-confirm-retreat-btn', '👆 戻る')
					}))
				}
			}
		}
		function confirmRetreat() {
			_tutClearHighlight()
			closeModal()
			playBGM('town');
			const gained = gameState.tempGold
			gameState.gold += gained
			gameState.tempGold = 0
			gameState.inDungeon = false
			recoverParty()
			returnToTown()
			addLog('ダンジョンから帰還しました。', 'log-sys')
			// ゴールド表示モーダル
			const content = document.getElementById('modal-content')
			const _closeId = tutState.active ? 'id="tut-gold-close-btn"' : ''
			const _closeFn = tutState.active ? '_tutGoldClose()' : 'closeModal()'
			content.innerHTML = `<div style="text-align:center;padding:20px;"><h2>帰還報告</h2><p style="font-size:1.2rem;color:var(--gold)">獲得金額: ${gained}G</p><button ${_closeId} class="btn-action btn-blue" style="width:100%;" onclick="${_closeFn}">閉じる</button></div>`
			document.getElementById('modal-layer').classList.remove('hidden')
			// チュートリアル：「戻る」が押された → ゴールドモーダルの「閉じる」をハイライト
			if (tutState.active && tutState.phase === 'B') {
				const _s = TUT_STEPS[tutState.stepIdx]
				if (_s && _s.hook === 'confirm_retreat') {
					tutState.stepIdx++   // → step7 (gold_closed)
					tutState.phase = 'B'
					requestAnimationFrame(() => requestAnimationFrame(() => {
						_tutHighlightInModal('tut-gold-close-btn', '👆 閉じる')
					}))
				}
			}
		}
		function _tutGoldClose() {
			_tutClearHighlight()
			closeModal()
			// gold_closed → step8(カバン装備説明) へ
			if (tutState.active) {
				const _s = TUT_STEPS[tutState.stepIdx]
				if (_s && _s.hook === 'gold_closed') {
					tutState.stepIdx++
					tutState.phase = 'A'
					setTimeout(_tutPhaseA, 350)
				}
			}
		}

		function toggleBattleSkillMenu() {
			const menu = document.getElementById('battle-skill-menu')
			if (menu.classList.contains('hidden')) {
				menu.classList.remove('hidden')
				const p = gameState.party[battle.activeUnitIndex]
				if (p.hp <= 0) {
					menu.classList.add('hidden')
					return
				}
				const job = Object.values(JOB_DATA).find(j => j.name === p.job)
				menu.innerHTML = ''
				;[5, 10, 15, 20, 30].forEach(lv => {
					const sIdx = p.learnedSkills[lv]
					if (sIdx === undefined) return
					const s = job.skills[lv][sIdx]
					if (s.type === 'passive') return

					const cooldownTurns = p.skillCooldowns && p.skillCooldowns[lv] ? p.skillCooldowns[lv] : 0
					const isOnCooldown = cooldownTurns > 0

					const btn = document.createElement('button')
					btn.className = 'btn-icon'
					btn.style.padding = "10px 10px";
					btn.style.height = "auto";
					btn.style.textAlign = "left";
					// スキル効果説明文を生成
					let skillDesc = ''
					const statLabelMap = { str:'物攻', matk:'特攻', vit:'物耐', mdef:'特耐', hp:'HP', mp:'MP', agi:'速度', luk:'幸運', cri:'会心', atk:'敵攻撃', def:'敵防御' }
					if (s.type === 'atk') {
						const aoe = s.target === 'all' ? '全体' : '単体'
						const dtype = s.dType === 'magic' ? '魔法' : '物理'
						skillDesc = `${aoe}に${dtype}×${s.pow}倍ダメージ`
					} else if (s.type === 'heal') {
						const aoe = s.target === 'all' ? '全体' : '単体'
						skillDesc = `${aoe}のHPを回復`
					} else if (s.type === 'buff') {
						const aoe = s.target === 'all' ? '全体' : '単体'
						const sl = statLabelMap[s.stat] || s.stat
						skillDesc = `${aoe}の${sl}を${Math.floor(s.val*100)}%強化`
					} else if (s.type === 'debuff') {
						const sl = statLabelMap[s.stat] || s.stat
						skillDesc = `敵全体の${sl}を${Math.floor(s.val*100)}%低下`
					} else if (s.type === 'shield') {
						const aoe = s.target === 'all' ? '全体' : '単体'
						skillDesc = `${aoe}に発動者最大HP×${Math.floor(s.val*100)}%のシールド付与`
					} else if (s.type === 'guard') {
						skillDesc = `1ターン、味方全員へのダメージを自分が肩代わり`
					} else if (s.type === 'regen') {
						const aoe = s.target==='all'?'全体':'単体'
						skillDesc = `${aoe}に${s.turns}ターン間、毎ターン最大HP×${Math.floor(s.val*100)}%回復`
					} else if (s.type === 'mpcost') {
						skillDesc = `単体の次のスキルMPコスト${Math.floor(s.val*100)}%軽減`
					} else if (s.type === 'poison') {
						const aoe = s.eTarget==='all'?'全体':'単体'
						skillDesc = `敵${aoe}に毒付与（${s.turns}T：HP-3%/MP-3% 毎ターン）`
					} else if (s.type === 'bleed') {
						const aoe = s.eTarget==='all'?'全体':'単体'
						skillDesc = `敵${aoe}に出血付与（${s.turns}T：HP-5% 毎ターン）`
					} else if (s.type === 'stun') {
						const aoe = s.eTarget==='all'?'全体':'単体'
						skillDesc = `敵${aoe}を気絶（${s.turns}T行動不能・物理ダメ+30%）`
					} else if (s.type === 'freeze') {
						const aoe = s.eTarget==='all'?'全体':'単体'
						skillDesc = `敵${aoe}をフリーズ（${s.turns}T行動不能・特殊ダメ+30%）`
					}
					let btnHtml = `<div style="display:flex;justify-content:space-between; align-items:center; gap:8px;"><b style="font-size:0.92rem;">${s.n}</b><span style="color:var(--accent-blue); font-size:0.8rem; white-space:nowrap;">MP${s.cost}</span></div>`
					if (skillDesc) btnHtml += `<div style="font-size:0.74rem; color:#888; margin-top:3px;">${skillDesc}</div>`
					if (isOnCooldown) btnHtml += `<div style="color:var(--accent-red); font-size:0.72rem; margin-top:2px;">⏳ 待機:${cooldownTurns}ターン</div>`
					btn.innerHTML = btnHtml

					const _pBIdx = gameState.party.indexOf(p)
					const _bDisc = (battle.mpCostDown||[]).find(m=>m.pIdx===_pBIdx)
					const _bCost = _bDisc ? Math.max(0, Math.floor(s.cost*(1-_bDisc.val))) : s.cost
					if (p.mp < _bCost || isOnCooldown) {
						btn.disabled = true
						btn.style.opacity = 0.5
					}
					btn.onclick = () => useBattleSkill(s, lv)
					menu.appendChild(btn)
				})
			} else {
				menu.classList.add('hidden')
			}
		}

					<div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:3px;">
						<span style="color:#f87171;">HP</span>
						<span style="color:${hpColor};">${e.hp} <span style="color:#444;">/ ${e.maxHp}</span></span>
					</div>
					<div class="bar-bg" style="height:7px;"><div class="bar-fill" style="background:${hpColor};width:${hpPct}%;"></div></div>
					${e.maxMp > 0 ? `<div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-top:5px;margin-bottom:3px;">
						<span style="color:#60a5fa;">MP</span>
						<span style="color:#aaa;">${e.mp} <span style="color:#444;">/ ${e.maxMp}</span></span>
					</div>
					<div class="bar-bg" style="height:5px;"><div class="bar-fill" style="background:var(--mp-color);width:${mpPct}%;"></div></div>` : ''}
				</div>
				<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
					<div style="background:#111;border:1px solid #222;border-radius:6px;padding:7px 10px;">
						<div style="font-size:0.68rem;color:#666;margin-bottom:2px;">ATK（攻撃力）</div>
						<div style="font-size:0.88rem;color:#fb923c;font-weight:bold;">${e.atk}</div>
					</div>
					<div style="background:#111;border:1px solid #222;border-radius:6px;padding:7px 10px;">
						<div style="font-size:0.68rem;color:#666;margin-bottom:2px;">AGI（速度）</div>
						<div style="font-size:0.88rem;color:#facc15;font-weight:bold;">${e.agi}</div>
					</div>
					<div style="background:#111;border:1px solid #222;border-radius:6px;padding:7px 10px;">
						<div style="font-size:0.68rem;color:#666;margin-bottom:2px;">DEF（物耐）</div>
						<div style="font-size:0.88rem;color:#34d399;font-weight:bold;">${e.def}</div>
					</div>
					<div style="background:#111;border:1px solid #222;border-radius:6px;padding:7px 10px;">
						<div style="font-size:0.68rem;color:#666;margin-bottom:2px;">MDEF（特耐）</div>
						<div style="font-size:0.88rem;color:#38bdf8;font-weight:bold;">${e.mdef}</div>
					</div>
				</div>
				${skillsHtml}
				<button onclick="closeModal()" class="btn-action btn-blue" style="margin-top:14px;width:100%;">閉じる</button>`
			openModalWrapper()
		}
		function renderEnemyCard(e, i, isTargeting) {
			const isDead = e.hp <= 0
			const clickable = isTargeting && !isDead ? `onclick="selectEnemyTarget(${i})"` : ''
			const cursorClass = isTargeting && !isDead ? 'cursor-pointer targeting-active' : ''
			const eliteBorder = e._isElite ? `border:1.5px solid ${e.eliteColor}; box-shadow:0 0 6px ${e.eliteColor}44;` : ''
			const eliteDot    = e._isElite ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${e.eliteColor};flex-shrink:0;margin-left:2px;" title="${e.eliteTier}"></span>` : ''
			const nameColor   = e._isElite ? e.eliteColor : '#e0e0e0'
			const rowBadge = e.isBoss ? '' : (e.row === 'back'
				? `<span style="font-size:0.72rem;margin-left:2px;" title="後衛">🏹</span>`
				: `<span style="font-size:0.72rem;margin-left:2px;" title="前衛">⚔️</span>`)
			const hpPct = Math.max(0, (e.hp / e.maxHp) * 100)
			const hpBarColor = e._isElite ? e.eliteColor : 'var(--hp-color)'
			const hpTextColor = e.hp/e.maxHp>0.5?'#ccc':e.hp/e.maxHp>0.25?'var(--gold)':'#f87171'
			const mpPct = e.maxMp > 0 ? Math.max(0, (e.mp / e.maxMp) * 100) : 0
			const statusTags = (()=>{ const st=(battle.enemyStatus||[]).filter(s=>s.eId===e.id); const dt=(battle.enemyDots||[]).filter(d=>d.eId===e.id); const tags=[...st.map(s=>s.type==='stun'?`<span style="background:#f97316;color:#000;font-size:0.6rem;padding:0 2px;border-radius:2px;">⚡${s.turns}T</span>`:`<span style="background:#60a5fa;color:#000;font-size:0.6rem;padding:0 2px;border-radius:2px;">❄${s.turns}T</span>`),...dt.map(d=>d.type==='poison'?`<span style="background:#a3e635;color:#000;font-size:0.6rem;padding:0 2px;border-radius:2px;">☠${d.turns}T</span>`:`<span style="background:#f87171;color:#000;font-size:0.6rem;padding:0 2px;border-radius:2px;">🩸${d.turns}T</span>`)]; return tags.length?`<div style="display:flex;gap:1px;flex-wrap:wrap;margin-top:2px;">${tags.join('')}</div>`:'' })()
			return `<div class="battle-unit-box ${isDead ? 'hidden' : ''} ${e.isBoss ? 'is-boss' : ''} ${cursorClass}" style="${isDead ? 'opacity:0' : ''}${eliteBorder}" ${clickable}>
				<div style="display:flex; align-items:center; gap:3px; margin-bottom:2px;">
					<span style="font-weight:bold; font-size:0.78rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; color:${nameColor};">${e.name}</span>
					${eliteDot}${rowBadge}
					<button onclick="event.stopPropagation();openMonsterInfo(${i})" style="flex-shrink:0;background:transparent;border:1px solid #444;border-radius:3px;color:#aaa;font-size:0.6rem;padding:0 3px;cursor:pointer;line-height:1.4;">ℹ</button>
				</div>
				<div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:2px;">
					<span style="color:#f87171;">HP</span>
					<span style="color:${hpTextColor};">${e.hp}<span style="color:#444;">/${e.maxHp}</span></span>
				</div>
				<div class="bar-bg" style="height:5px;"><div class="bar-fill" style="background:${hpBarColor}; width:${hpPct}%"></div></div>
				${e.maxMp > 0 ? `<div style="display:flex; justify-content:space-between; font-size:0.68rem; margin-top:2px; margin-bottom:1px;">
					<span style="color:#60a5fa;">MP</span>
					<span style="color:#aaa;">${e.mp}<span style="color:#444;">/${e.maxMp}</span></span>
				</div>
				<div class="bar-bg" style="height:3px;"><div class="bar-fill" style="background:var(--mp-color); width:${mpPct}%"></div></div>` : ''}
				${statusTags}
			</div>`
		}

		function updateBattleUI() {
			const container = document.getElementById('enemy-container')
			const isTargeting = battle.targeting === 'attack' || battle.targeting === 'skill'
			// 前衛・後衛で分けてレンダリング
			const frontEnemies = battle.enemies.map((e,i)=>({e,i})).filter(({e})=> e.row !== 'back')
			const backEnemies  = battle.enemies.map((e,i)=>({e,i})).filter(({e})=> e.row === 'back')
			const hasFrontE = frontEnemies.some(({e})=>e.hp>0)
			const hasBackE  = backEnemies.some(({e})=>e.hp>0)
			let html = ''
			if (hasBackE) {
				html += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;">`
				backEnemies.forEach(({e,i})=>{ html += renderEnemyCard(e,i,isTargeting) })
				html += `</div>`
			}
			if (hasFrontE) {
				html += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;">`
				frontEnemies.forEach(({e,i})=>{ html += renderEnemyCard(e,i,isTargeting) })
				html += `</div>`
			}
			if (!hasFrontE && !hasBackE && battle.enemies.length > 0) {
				html = battle.enemies.map((e,i)=>renderEnemyCard(e,i,isTargeting)).join('')
			}
			container.innerHTML = html
			if (battle.active && battle.enemies.length > 0 && battle.enemies.every(e => e.hp <= 0)) {
				container.innerHTML = '<div style="font-size:1.5rem; color:var(--gold); font-weight:bold;">勝利！</div>'
			}
			const partyContainer = document.getElementById('party-battle-container')
			if (gameState.party.length > 0) {
				const renderPartyCard = (p, i) => {
					const fs = getFinalStats(p)
					const isCurrent = battle.turn === 'player' && i === battle.activeUnitIndex
					const isHealTargeting = battle.targeting === 'heal'
					const clickable = isHealTargeting ? `onclick="selectPartyTarget(${i})"` : ''
					const cursorClass = isHealTargeting ? 'cursor-pointer targeting-active' : ''
					const wRange = getWeaponRange(p)
					const rangeBadge = wRange === 'long'
						? `<span style="font-size:0.75rem;margin-left:3px;" title="遠距離">🏹</span>`
						: `<span style="font-size:0.75rem;margin-left:3px;" title="近接">⚔️</span>`
					const pIdx = gameState.party.indexOf(p)
					const shieldData = (battle.shields||[]).find(s => s.pIdx === pIdx)
					const isGuarding = battle.guardIdx === pIdx
					return `<div class="battle-unit-box ${isCurrent ? 'active-turn' : ''} ${cursorClass}" style="${p.hp <= 0 ? 'opacity:0.5;filter:grayscale(1);' : ''}" ${clickable}>
						<div style="display:flex; align-items:center; gap:4px; margin-bottom:2px;">
							<span style="font-weight:bold; font-size:0.82rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;">${p.name}</span>
							${rangeBadge}
							${isGuarding ? '<span style="font-size:0.68rem; background:rgba(251,146,60,0.2); border:1px solid #fb923c; border-radius:3px; padding:0 4px; color:#fb923c;">🛡身代わり</span>' : ''}
						</div>
						<div style="display:flex; justify-content:space-between; font-size:0.72rem; margin-bottom:2px;">
							<span style="color:#f87171;">HP</span>
							<span style="color:${p.hp / fs.maxHp > 0.5 ? '#ccc' : p.hp / fs.maxHp > 0.25 ? 'var(--gold)' : '#f87171'};">${p.hp}<span style="color:#444;">/${fs.maxHp}</span></span>
						</div>
						<div class="bar-bg" style="height:5px;"><div class="bar-fill" style="background:var(--hp-color); width:${Math.max(0, (p.hp / fs.maxHp) * 100)}%"></div></div>
						${shieldData ? `<div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-top:2px; color:#60d394;"><span>🔷 SHD</span><span>${shieldData.val} <span style="color:#555;">(${shieldData.turns}T)</span></span></div>` : ''}
						${(()=>{ const rg=(battle.partyRegens||[]).find(r=>r.pIdx===pIdx); const mc=(battle.mpCostDown||[]).find(m=>m.pIdx===pIdx); let t=''; if(rg)t+=`<span style="background:#4ade80;color:#000;font-size:0.65rem;padding:0 3px;border-radius:2px;">💚再生${rg.turns}T</span>`; if(mc)t+=`<span style="background:#818cf8;color:#000;font-size:0.65rem;padding:0 3px;border-radius:2px;">💧MP軽減</span>`; return t?`<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;">${t}</div>`:''; })()}
						<div style="display:flex; justify-content:space-between; font-size:0.72rem; margin-top:3px; margin-bottom:2px;">
							<span style="color:#60a5fa;">MP</span>
							<span style="color:#aaa;">${p.mp}<span style="color:#444;">/${fs.maxMp}</span></span>
						</div>
						<div class="bar-bg" style="height:4px;"><div class="bar-fill" style="background:var(--mp-color); width:${Math.max(0, (p.mp / fs.maxMp) * 100)}%"></div></div>
					</div>`
				}
				// 前衛・後衛で分けてレンダリング
				const frontParty = gameState.party.map((p,i)=>({p,i})).filter(({p})=>p.row==='front')
				const backParty  = gameState.party.map((p,i)=>({p,i})).filter(({p})=>p.row==='back')
				let pHtml = ''
				if (frontParty.length > 0) {
					pHtml += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;">`
					frontParty.forEach(({p,i})=>{ pHtml += renderPartyCard(p,i) })
					pHtml += `</div>`
				}
				if (backParty.length > 0) {
					pHtml += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;">`
					backParty.forEach(({p,i})=>{ pHtml += renderPartyCard(p,i) })
					pHtml += `</div>`
				}
				partyContainer.innerHTML = pHtml
			}
		}
		function toggleRow(idx) {
			if (battle.active) {
				showMsg('⚠️ 戦闘中は前衛・後衛を変更できません')
				playSE('error')
				return
			}
			const p = gameState.party[idx]
			if (!p) return
			p.row = (p.row === 'front') ? 'back' : 'front'
			addLog(`${p.name} を ${p.row === 'front' ? '⚔️ 前衛' : '🏹 後衛'} に変更しました。`, 'log-sys')
			updateUI()
		}

				function updateUI() {
			document.getElementById('h-gold').innerText = gameState.gold + (gameState.inDungeon ? gameState.tempGold : 0)
			document.getElementById('h-max-floor').innerText = gameState.maxFloor + 'F'
			document.getElementById('h-cap').innerText = gameState.inventory.length
			document.getElementById('h-max-cap').innerText = getMaxCapacity()
			// ヘッダーのLvボーナス表示
			const bd = getBagCapBreakdown()
			const lvBonusEl = document.getElementById('h-lv-bonus')
			if (lvBonusEl) {
				if (bd.lvBonus > 0) {
					lvBonusEl.style.display = 'inline'
					lvBonusEl.title = `Lv+${bd.lvBonus}${bd.accBonus>0?' 装備+'+bd.accBonus:''}${bd.expand>0?' 拡張+'+bd.expand:''}`
				} else {
					lvBonusEl.style.display = 'none'
				}
			}
			const list = document.getElementById('party-list')
			list.innerHTML = gameState.party
				.map((p, i) => {
					const fs = getFinalStats(p)
					const expP = Math.floor((p.exp / p.nextExp) * 100)
					const wN = p.equip.weapon ? (p.equip.weapon.rarityLabel ? `[${p.equip.weapon.rarityLabel}] ${p.equip.weapon.n}` : p.equip.weapon.n) : '素手'
					const aN = p.equip.armor ? (p.equip.armor.rarityLabel ? `[${p.equip.armor.rarityLabel}] ${p.equip.armor.n}` : p.equip.armor.n) : 'なし'
					const acN = p.equip.acc ? (p.equip.acc.rarityLabel ? `[${p.equip.acc.rarityLabel}] ${p.equip.acc.n}` : p.equip.acc.n) : 'なし'
					const wC = p.equip.weapon ? (p.equip.weapon.rarityColor || '#eee') : '#eee'
					const aC = p.equip.armor ? (p.equip.armor.rarityColor || '#eee') : '#eee'
					const acC = p.equip.acc ? (p.equip.acc.rarityColor || '#eee') : '#eee'
					const rowLabel = p.row === 'front' ? '⚔️前衛' : '🏹後衛'
					const rowColor = p.row === 'front' ? '#f87171' : '#60a5fa'
					const rowBtnStyle = battle.active
						? `font-size:0.72rem;padding:2px 8px;background:#222;border:1px solid #444;color:#555;border-radius:12px;cursor:not-allowed;opacity:0.5;`
						: `font-size:0.72rem;padding:2px 8px;background:${rowColor}22;border:1px solid ${rowColor};color:${rowColor};border-radius:12px;cursor:pointer;`
					return `<div class="char-card"><div style="display:flex;justify-content:space-between;align-items:center"><b>${p.name}</b> <div style="display:flex;gap:5px"><button class="btn-icon" onclick="openCharDetailModal(${i})" style="font-size:0.75rem; padding:4px 8px;">詳細</button><button class="btn-icon" style="padding:4px 8px; font-size:0.75rem;" onclick="openTraining(${i})">育成</button></div></div><div style="font-size:0.8rem;color:#aaa;margin-bottom:4px;">Lv.${p.lv} ${p.job}</div><div style="margin-bottom:4px;"><button onclick="toggleRow(${i})" ${battle.active ? 'disabled title="戦闘中は変更不可"' : ''} style="${rowBtnStyle}">${rowLabel}</button></div>
                            <div class="bar-bg"><div class="bar-fill" style="background:var(--hp-color); width:${(p.hp / fs.maxHp) * 100}%"></div></div>
                            <div class="bar-bg" style="height:4px;"><div class="bar-fill" style="background:var(--mp-color); width:${(p.mp / fs.maxMp) * 100}%"></div></div>
                            <div class="bar-bg" style="height:3px;"><div class="bar-fill" style="background:var(--exp-color); width:${expP}%"></div></div>
                                <div style="font-size:0.75rem; color:#eee; margin-top:6px; line-height:1.2;">物攻:${Math.floor(fs.str)} 特攻:${Math.floor(fs.matk)} 物耐:${Math.floor(fs.vit)} 特耐:${Math.floor(fs.mdef)}<br>EXP:${expP}%</div>
                            <div style="font-size:0.7rem; color:#666; display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;"><span style="color:${wC}">⚔️:${wN}</span><span style="color:${aC}">🛡️:${aN}</span><span style="color:${acC}">💍:${acN}</span><span>🔷:${(p.equip.runes || []).length}</span></div></div>`
				})
				.join('')
		}
		function addLog(m, c = '') {
			const l = document.getElementById('log-area')
			const d = document.createElement('div')
			d.className = `log-entry ${c}`
			d.innerHTML = `> ${m}`
			l.appendChild(d)
			l.scrollTop = l.scrollHeight
		}
		window.onload = () => {
			if (load_game()) {
				addLog('セーブデータをロードしました。', 'log-sys')
				updateUI()
				if (gameState.party.length === 0) {
					openTitleScreen()
				}
			} else {
				addLog('深淵へ続く物語が幕を開ける。')
				updateUI()
				openTitleScreen()
			}
			playBGM('town')
		}
		window.onresize = function () {
			console.log('Window resized')
		}
		</script>
	</body>
</html>
